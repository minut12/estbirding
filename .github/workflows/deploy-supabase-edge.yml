name: Deploy Supabase Edge Functions

on:
  push:
    branches:
      - main
    paths:
      - 'supabase/functions/**'
      - '.github/workflows/deploy-supabase-edge.yml'
  workflow_dispatch:

jobs:
  deploy-linnuliigid-snapshot:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install Supabase CLI
        run: npm i -g supabase
      - name: Deploy linnuliigid-snapshot
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
        run: supabase functions deploy linnuliigid-snapshot --project-ref eenwcyuyugyrjgpivxrq --no-verify-jwt

  deploy-species-prediction:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install Supabase CLI
        run: npm i -g supabase
      - name: Deploy species-prediction
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
        run: supabase functions deploy species-prediction --project-ref eenwcyuyugyrjgpivxrq --no-verify-jwt
