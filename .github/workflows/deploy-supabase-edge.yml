name: Deploy Supabase Edge Functions

on:
  push:
    branches:
      - main
    paths:
      - 'supabase/functions/linnuliigid-snapshot/**'
      - 'supabase/functions/ebird_recent/**'
      - '.github/workflows/deploy-supabase-edge.yml'
  workflow_dispatch:

jobs:
  deploy-linnuliigid-snapshot:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
      - name: Deploy linnuliigid-snapshot
        run: npx supabase@latest functions deploy linnuliigid-snapshot --project-ref eenwcyuyugyrjgpivxrq
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}

  deploy-ebird-recent:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
      - name: Deploy ebird_recent
        run: npx supabase@latest functions deploy ebird_recent --project-ref eenwcyuyugyrjgpivxrq
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
