name: Deploy Supabase Edge Functions

on:
  push:
    branches:
      - main
    paths:
      - 'supabase/functions/linnuliigid-snapshot/**'
      - 'supabase/functions/ebird_recent/**'
      - '.github/workflows/deploy-supabase-edge.yml'
  workflow_dispatch:

jobs:
  deploy-linnuliigid-snapshot:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Deploy linnuliigid-snapshot
        run: |
          curl -fsSL https://github.com/supabase/cli/releases/download/v2.20.12/supabase_2.20.12_linux_amd64.tar.gz | tar xz
          ./supabase functions deploy linnuliigid-snapshot --project-ref eenwcyuyugyrjgpivxrq
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}

  deploy-ebird-recent:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Deploy ebird_recent
        run: |
          curl -fsSL https://github.com/supabase/cli/releases/download/v2.20.12/supabase_2.20.12_linux_amd64.tar.gz | tar xz
          ./supabase functions deploy ebird_recent --project-ref eenwcyuyugyrjgpivxrq
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
