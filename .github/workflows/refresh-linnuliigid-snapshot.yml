name: Refresh linnuliigid snapshot

on:
  schedule:
    - cron: '0 */6 * * *'   # Every 6 hours
  workflow_dispatch:          # Manual trigger

jobs:
  refresh:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Trigger snapshot refresh (fire-and-forget)
        env:
          FUNCTION_URL: https://eenwcyuyugyrjgpivxrq.supabase.co/functions/v1/linnuliigid-snapshot
          SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
        run: |
          set -uo pipefail

          # Helper: POST and always leave /tmp/resp.json as valid (even-if-empty) JSON.
          do_post() {
            local out="$1" body="$2" max_time="$3"
            : > "$out"
            local code
            code=$(curl -sS --max-time "$max_time" -o "$out" -w '%{http_code}' \
              -X POST "$FUNCTION_URL" \
              -H "Content-Type: application/json" \
              -H "Authorization: Bearer $SERVICE_ROLE_KEY" \
              -d "$body" 2>/dev/null) || code="000"
            [ -s "$out" ] || echo '{}' > "$out"
            echo "${code:-000}"
          }

          extract_field() {
            local field="$1" file="$2"
            [ -s "$file" ] || { echo ""; return 0; }
            grep -o "\"$field\"[[:space:]]*:[[:space:]]*\"[^\"]*\"" "$file" 2>/dev/null \
              | head -1 \
              | sed -E "s/.*\"$field\"[[:space:]]*:[[:space:]]*\"([^\"]*)\".*/\1/" \
              || echo ""
          }
          extract_number() {
            local field="$1" file="$2"
            [ -s "$file" ] || { echo ""; return 0; }
            grep -o "\"$field\"[[:space:]]*:[[:space:]]*[0-9]\+" "$file" 2>/dev/null \
              | head -1 \
              | sed -E "s/.*\"$field\"[[:space:]]*:[[:space:]]*([0-9]+).*/\1/" \
              || echo ""
          }

          attempt() {
            local n="$1"
            echo "--- Attempt $n ---"
            CODE=$(do_post /tmp/resp.json '{"action":"start_refresh","force":true}' 60)
            echo "HTTP $CODE"
            head -c 400 /tmp/resp.json; echo
            STATUS=$(extract_field status /tmp/resp.json)
            DONE=$(extract_number progress_done /tmp/resp.json)
            TOTAL=$(extract_number progress_total /tmp/resp.json)
            echo "parsed: status='$STATUS' progress=${DONE:-?}/${TOTAL:-?}"
          }

          attempt 1

          # 200 ready  → snapshot is current (possibly just-completed)
          # 202 *      → refresh accepted / in progress
          # 409 *      → another refresh already running (also fine)
          # anything else (incl. 5xx, timeout 000) → retry once after 15s
          case "$CODE" in
            200|202|409)
              echo ""
              echo "✓ Snapshot system responded cleanly (HTTP $CODE, status='$STATUS'). Refresh will continue server-side."
              exit 0
              ;;
          esac

          echo ""
          echo "First attempt unsatisfactory (HTTP $CODE). Retrying once..."
          sleep 15
          attempt 2

          case "$CODE" in
            200|202|409)
              echo ""
              echo "✓ Snapshot system responded cleanly on retry (HTTP $CODE, status='$STATUS')."
              exit 0
              ;;
          esac

          echo ""
          echo "✗ ERROR: Snapshot endpoint did not respond acceptably after 2 attempts. Last HTTP=$CODE, status='$STATUS'."
          exit 1
