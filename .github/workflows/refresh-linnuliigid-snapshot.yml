name: Refresh linnuliigid snapshot

on:
  schedule:
    - cron: '0 */6 * * *'   # Every 6 hours
  workflow_dispatch:          # Manual trigger

jobs:
  refresh:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - name: Trigger snapshot refresh and wait for completion
        env:
          FUNCTION_URL: https://eenwcyuyugyrjgpivxrq.supabase.co/functions/v1/linnuliigid-snapshot
          SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
        run: |
          set -uo pipefail   # no -e; explicit per-call error handling

          MAX_POLLS=200
          SLEEP_BETWEEN=15
          STUCK_THRESHOLD_SEC=600

          extract_field() {
            local field="$1" file="$2"
            [ -s "$file" ] || { echo ""; return 0; }
            grep -o "\"$field\"[[:space:]]*:[[:space:]]*\"[^\"]*\"" "$file" 2>/dev/null \
              | head -1 \
              | sed -E "s/.*\"$field\"[[:space:]]*:[[:space:]]*\"([^\"]*)\".*/\1/" \
              || echo ""
          }
          extract_number() {
            local field="$1" file="$2"
            [ -s "$file" ] || { echo ""; return 0; }
            grep -o "\"$field\"[[:space:]]*:[[:space:]]*[0-9]\+" "$file" 2>/dev/null \
              | head -1 \
              | sed -E "s/.*\"$field\"[[:space:]]*:[[:space:]]*([0-9]+).*/\1/" \
              || echo ""
          }
          body_contains() {
            # $1 = substring, $2 = file
            [ -s "$2" ] || return 1
            grep -qF "$1" "$2" 2>/dev/null
          }

          do_post() {
            local out="$1" body="$2" max_time="$3"
            : > "$out"
            local code
            code=$(curl -sS --max-time "$max_time" -o "$out" -w '%{http_code}' \
              -X POST "$FUNCTION_URL" \
              -H "Content-Type: application/json" \
              -H "Authorization: Bearer $SERVICE_ROLE_KEY" \
              -d "$body" 2>/dev/null) || code="000"
            [ -s "$out" ] || echo '{}' > "$out"
            echo "${code:-000}"
          }

          echo "=== Step 1: Read baseline state ==="
          BASE_CODE=$(do_post /tmp/base.json '{"action":"start_refresh"}' 30)
          echo "HTTP $BASE_CODE"
          head -c 400 /tmp/base.json; echo
          INITIAL_GEN=$(extract_field generated_at /tmp/base.json)

          # If the baseline response is ALREADY "recently completed", the snapshot is fresh — exit now.
          if [ "$BASE_CODE" = "429" ] && body_contains "recently completed" /tmp/base.json; then
            echo ""
            echo "✓ Snapshot is already fresh (429 recently completed on baseline read)."
            exit 0
          fi

          echo "=== Step 2: Trigger refresh (fire-and-forget) ==="
          TRIG_CODE=$(do_post /tmp/trig.json '{"action":"start_refresh","force":true}' 90)
          echo "HTTP $TRIG_CODE"
          head -c 400 /tmp/trig.json; echo
          if [ -z "$INITIAL_GEN" ]; then
            INITIAL_GEN=$(extract_field generated_at /tmp/trig.json)
          fi
          echo "Baseline generated_at: '${INITIAL_GEN:-<none>}'"

          # If the trigger itself reports "recently completed", we're done.
          if [ "$TRIG_CODE" = "429" ] && body_contains "recently completed" /tmp/trig.json; then
            echo ""
            echo "✓ Trigger reported snapshot already fresh (429 recently completed)."
            exit 0
          fi

          echo "=== Step 3: Poll until snapshot ready ==="
          LAST_PROGRESS=-1
          LAST_PROGRESS_AT=$(date +%s)

          for i in $(seq 1 $MAX_POLLS); do
            echo "--- Poll $i / $MAX_POLLS ---"
            CODE=$(do_post /tmp/resp.json '{"action":"start_refresh"}' 30)
            echo "HTTP $CODE"
            head -c 300 /tmp/resp.json; echo

            STATUS=$(extract_field status /tmp/resp.json)
            GEN=$(extract_field generated_at /tmp/resp.json)
            DONE=$(extract_number progress_done /tmp/resp.json)
            TOTAL=$(extract_number progress_total /tmp/resp.json)
            echo "parsed: status='$STATUS' gen='$GEN' progress=${DONE:-?}/${TOTAL:-?}"

            # SUCCESS A: 429 "recently completed" — function's cooldown guard tells us the refresh just finished.
            if [ "$CODE" = "429" ] && body_contains "recently completed" /tmp/resp.json; then
              echo ""
              echo "✓ Snapshot refresh completed (429 recently completed on poll $i)."
              exit 0
            fi

            # SUCCESS B: 200 ready with advanced generated_at.
            if [ "$CODE" = "200" ] && [ "$STATUS" = "ready" ]; then
              if [ -n "$INITIAL_GEN" ] && [ -n "$GEN" ] && [ "$GEN" != "$INITIAL_GEN" ]; then
                echo ""
                echo "✓ Snapshot refresh completed successfully (fresh)."
                echo "  baseline generated_at: $INITIAL_GEN"
                echo "  final    generated_at: $GEN"
                exit 0
              fi
              if [ -z "$INITIAL_GEN" ]; then
                echo ""
                echo "✓ Snapshot is ready (no baseline, accepting)."
                echo "  generated_at: $GEN"
                exit 0
              fi
              echo "  (ready but generated_at unchanged — keep waiting)"
            fi

            # Stuck detection — only meaningful while status is actually 'running'
            NOW=$(date +%s)
            if [ "$STATUS" = "running" ] && [ -n "$DONE" ] && [ "$DONE" != "$LAST_PROGRESS" ]; then
              LAST_PROGRESS="$DONE"
              LAST_PROGRESS_AT=$NOW
            fi
            if [ "$STATUS" = "running" ]; then
              ELAPSED=$((NOW - LAST_PROGRESS_AT))
              if [ "$ELAPSED" -gt "$STUCK_THRESHOLD_SEC" ]; then
                echo ""
                echo "✗ ERROR: progress stuck at $LAST_PROGRESS for ${ELAPSED}s (>${STUCK_THRESHOLD_SEC}s). Aborting."
                exit 1
              fi
            else
              # Not running — reset the stuck timer so transient non-running states don't trip it
              LAST_PROGRESS_AT=$NOW
            fi

            # Other 429 (not "recently completed") — actual cooldown, back off longer
            if [ "$CODE" = "429" ]; then
              echo "Cooldown (non-completion) — waiting 60s..."
              sleep 60
              continue
            fi

            sleep $SLEEP_BETWEEN
          done

          echo ""
          echo "✗ ERROR: Did not see completion after $MAX_POLLS polls."
          echo "  baseline generated_at: ${INITIAL_GEN:-<none>}"
          echo "  last seen: status='$STATUS' gen='$GEN' progress=${DONE:-?}/${TOTAL:-?}"
          exit 1
