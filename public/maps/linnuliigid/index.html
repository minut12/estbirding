// --- buildTop3PeriodsSection: thin-data guard + "Parim aeg veel ees" hero ---
// (ranked 1/2/3 list removed; curve + density strip are later additive layers)
window.buildTop3PeriodsSection = function(speciesKey) {
  var probData = (window.__probDataBySpecies || {})[speciesKey];
  var periods = probData && probData.periods;

  // Step A — thin-data guard. Covers never-computed (no probData / empty periods) AND the
  // cloud-restored degraded path (single synthetic { pct, isCurrent, label:'current' } with no
  // numeric count — see 13281 / 13510). Returns fallback markup only: honesty line + a nudge
  // wired to the existing .top3-placeholder handler (-> window.toggleProbability). No hero/curve/strip.
  var _thin = !periods || periods.length <= 1
    || (periods.length === 1 && typeof periods[0].count !== 'number');
  if (_thin) {
    return '<div class="top3-section" style="border-top:1px solid #eef2f7;margin-top:8px;padding-top:8px;">'
      + '<div style="font-size:11px;color:#94a3b8;">Täielik hooaeg: andmed puuduvad</div>'
      + '<div class="top3-placeholder" data-species="' + speciesKey + '" style="display:inline-block;margin-top:8px;font-size:11px;font-weight:500;color:#185FA5;background:#E6F1FB;border:1px solid #85B7EB;border-radius:8px;padding:4px 10px;cursor:pointer;" title="Arvuta tõenäosus ja perioodid">Arvuta tõenäosus</div>'
      + '</div>';
  }

  // Step B — full-data hero. P2.5: source the same yearBreakdown the chart uses (admin-live) so the
  // hero + honesty agree with the chart month-for-month; non-admin (no yearBreakdown) -> season
  // `periods` unchanged (fortnight windows). Entries are chronological { label, pct, count, isCurrent }.
  var _src = (probData.yearBreakdown && probData.yearBreakdown.length) ? probData.yearBreakdown : periods;
  var curIdx = -1, current = null;
  for (var ci = 0; ci < _src.length; ci++) {
    if (_src[ci].isCurrent) { curIdx = ci; current = _src[ci]; break; }
  }

  // peak = max-pct period overall
  var peak = _src[0], peakIdx = 0;
  for (var pi = 0; pi < _src.length; pi++) {
    if ((_src[pi].pct || 0) > (peak.pct || 0)) { peak = _src[pi]; peakIdx = pi; }
  }

  // upcoming = highest-pct period strictly after current (pct > 0). No raw start date on the
  // period objects (mapping keeps only label/pct/count/isCurrent) -> no "X päeva pärast".
  var upcoming = null;
  for (var ui = curIdx + 1; ui < _src.length; ui++) {
    if ((_src[ui].pct || 0) > 0 && (!upcoming || (_src[ui].pct || 0) > (upcoming.pct || 0))) {
      upcoming = _src[ui];
    }
  }

  var html = '<div class="top3-section" style="border-top:1px solid #eef2f7;margin-top:8px;padding-top:8px;">';

  // praegu line (kept — the ranked "praegu" row is removed)
  if (current) {
    html += '<div style="font-size:10px;color:#94a3b8;margin-bottom:6px;">praegu ' + current.pct + '% · ' + current.label + '</div>';
  }

  // Hero: best upcoming window, else "möödas"
  if (upcoming && !(current && (current.pct || 0) >= (upcoming.pct || 0))) {
    html += '<div style="background:#fffbeb;border:1px solid #fde68a;border-radius:10px;padding:9px 11px;">';
    html += '<div style="font-size:10px;font-weight:600;color:#92400e;">Parim aeg veel ees</div>';
    html += '<div style="display:flex;align-items:baseline;gap:8px;margin-top:3px;">';
    html += '<span style="font-size:14px;font-weight:600;color:#1e293b;">' + upcoming.label + '</span>';
    html += '<span style="font-size:15px;font-weight:700;color:#92400e;">' + upcoming.pct + '%</span>';
    html += '</div></div>';
  } else if (upcoming && current) {
    // upcoming exists but now is as good as / better than it -> best time is now (amber)
    html += '<div style="background:#fffbeb;border:1px solid #fde68a;border-radius:10px;padding:9px 11px;">';
    html += '<div style="font-size:10px;font-weight:600;color:#92400e;">Parim aeg on praegu</div>';
    html += '<div style="display:flex;align-items:baseline;gap:8px;margin-top:3px;">';
    html += '<span style="font-size:14px;font-weight:600;color:#1e293b;">' + current.label + '</span>';
    html += '<span style="font-size:15px;font-weight:700;color:#92400e;">' + current.pct + '%</span>';
    html += '</div></div>';
  } else if (current && peakIdx === curIdx) {
    // no window ahead, but the peak IS the current period -> best time is right now (amber)
    html += '<div style="background:#fffbeb;border:1px solid #fde68a;border-radius:10px;padding:9px 11px;">';
    html += '<div style="font-size:10px;font-weight:600;color:#92400e;">Parim aeg on praegu</div>';
    html += '<div style="display:flex;align-items:baseline;gap:8px;margin-top:3px;">';
    html += '<span style="font-size:14px;font-weight:600;color:#1e293b;">' + current.label + '</span>';
    html += '<span style="font-size:15px;font-weight:700;color:#92400e;">' + current.pct + '%</span>';
    html += '</div></div>';
  } else {
    html += '<div style="background:#f8fafc;border:1px solid #eef2f7;border-radius:10px;padding:9px 11px;">';
    html += '<div style="font-size:12px;font-weight:600;color:#64748b;">Parim aeg on möödas</div>';
    html += '</div>';
  }

  // Honesty line — where the season peak actually sits (tense by peak vs current index)
  var _peakVerb = peakIdx < curIdx ? 'oli' : (peakIdx === curIdx ? 'on' : 'tuleb');
  html += '<div style="font-size:10px;color:#94a3b8;margin-top:6px;">hooaja tipp ' + _peakVerb + ' ' + peak.label + ' · ' + peak.pct + '%</div>';

  // --- Combo chart (v3): fixed 12-month (Jan–Dec) axis. Periods are bucketed by their START month
  // (parsed from the now-Estonian label); count SUMmed, pct MAXed per month. Empty months show no
  // bar with the line at baseline. Sidebar reads .count and .pct (NOT .probability — the popup).
  var _MI = { jaanuar:0, veebruar:1, 'märts':2, aprill:3, mai:4, juuni:5, juuli:6,
              august:7, september:8, oktoober:9, november:10, detsember:11 };
  // Phase 2: chart sources the full-year yearBreakdown (admin-live, all occurrences) when present,
  // matching the popup list; else the season-bounded periods (non-admin/cache). Hero/honesty above
  // still read the season `periods` untouched — only the chart goes full-year.
  var _chartSrc = (probData.yearBreakdown && probData.yearBreakdown.length) ? probData.yearBreakdown : periods;
  var _buck = []; for (var _b = 0; _b < 12; _b++) _buck.push({ count: 0, pct: 0, has: false });
  for (var _p = 0; _p < _chartSrc.length; _p++) {
    var _mtok = (String(_chartSrc[_p].label || '').match(/[A-Za-zÀ-ſ]+/) || [''])[0].toLowerCase();
    var _mi = _MI[_mtok]; if (_mi === undefined) continue;              // unmapped -> skip
    _buck[_mi].count += (_chartSrc[_p].count || 0);                     // count = SUM
    _buck[_mi].pct = Math.max(_buck[_mi].pct, _chartSrc[_p].pct || 0);  // pct = MAX
    _buck[_mi].has = true;
  }
  var _maxCount = 0, _maxPct = 0, _peakM = -1;
  for (var _k = 0; _k < 12; _k++) {
    if (_buck[_k].count > _maxCount) _maxCount = _buck[_k].count;
    if (_buck[_k].pct > _maxPct) { _maxPct = _buck[_k].pct; _peakM = _k; }
  }
  var _nowM = new Date().getMonth();   // praegu = current calendar month
  if (_maxCount > 0 || _maxPct > 0) {
    var _slot = 276 / 12, _barW = _slot * 0.72;
    var _cxs = [], _lys = [], _bars = '', _linePts = '';
    for (var _m2 = 0; _m2 < 12; _m2++) {
      var _cx = 12 + _m2 * _slot + _slot / 2;
      _cxs.push(_cx);
      var _bh = _maxCount > 0 ? (_buck[_m2].count / _maxCount) * 130 : 0;
      if (_bh > 0) {
        _bars += '<rect x="' + (_cx - _barW / 2).toFixed(1) + '" y="' + (150 - _bh).toFixed(1) + '" width="' + _barW.toFixed(1) + '" height="' + _bh.toFixed(1) + '" fill="#85B7EB" rx="1.5"/>';
      }
      var _ly = 150 - (_maxPct > 0 ? (_buck[_m2].pct / _maxPct) * 130 : 0);
      _lys.push(_ly);
      if (_maxPct > 0) _linePts += (_linePts ? ' ' : '') + _cx.toFixed(1) + ',' + _ly.toFixed(1);
    }
    // legend row
    html += '<div style="display:flex;align-items:center;gap:12px;margin-top:10px;font-size:10px;color:#94a3b8;">'
      + '<span style="display:inline-flex;align-items:center;gap:4px;"><span style="display:inline-block;width:9px;height:9px;border-radius:2px;background:#85B7EB;"></span>Vaatlused</span>'
      + '<span style="display:inline-flex;align-items:center;gap:4px;"><span style="display:inline-block;width:12px;height:2px;background:#D85A30;"></span>Tõenäosus</span>'
      + '</div>';
    html += '<svg viewBox="0 0 300 160" style="width:100%;height:auto;display:block;margin-top:3px;">';
    html += _bars;
    if (_maxPct > 0) {
      html += '<polyline points="' + _linePts + '" fill="none" stroke="#D85A30" stroke-width="2.5" stroke-linejoin="round" stroke-linecap="round"/>';
      if (_nowM === _peakM) {
        // current month IS the peak -> single hollow dot + merged label
        html += '<circle cx="' + _cxs[_nowM].toFixed(1) + '" cy="' + _lys[_nowM].toFixed(1) + '" r="4" fill="#fff" stroke="#D85A30" stroke-width="2"/>';
        html += '<text x="' + Math.max(28, Math.min(_cxs[_nowM], 272)).toFixed(1) + '" y="' + Math.max(9, _lys[_nowM] - 7).toFixed(1) + '" fill="#854F0B" font-size="9" text-anchor="middle">praegu · tipp</text>';
      } else {
        // peak month (filled orange) with "tipp" above
        html += '<circle cx="' + _cxs[_peakM].toFixed(1) + '" cy="' + _lys[_peakM].toFixed(1) + '" r="3.5" fill="#D85A30"/>';
        html += '<text x="' + Math.max(16, Math.min(_cxs[_peakM], 284)).toFixed(1) + '" y="' + Math.max(9, _lys[_peakM] - 7).toFixed(1) + '" fill="#993C1D" font-size="9" text-anchor="middle">tipp</text>';
        // current month (hollow) with "praegu" above -- sits on the baseline if the month is empty
        html += '<circle cx="' + _cxs[_nowM].toFixed(1) + '" cy="' + _lys[_nowM].toFixed(1) + '" r="4" fill="#fff" stroke="#D85A30" stroke-width="2"/>';
        html += '<text x="' + Math.max(16, Math.min(_cxs[_nowM], 284)).toFixed(1) + '" y="' + Math.max(9, _lys[_nowM] - 7).toFixed(1) + '" fill="#854F0B" font-size="9" text-anchor="middle">praegu</text>';
      }
    }
    html += '</svg>';
    // fixed 12-month axis (jaan..dets), labels rotated -40° so all 12 fit the narrow panel. Each
    // label sits at its slot centre as a % of width — slot centre 12+m*_slot+_slot/2 in the 300-unit
    // viewBox, so left = that / 3 percent. Reuses the same _slot the bars/line use.
    var _AB = ['jaan','veebr','märts','apr','mai','juuni','juuli','aug','sept','okt','nov','dets'];
    var _ax = '<div style="position:relative;height:32px;margin-top:4px;font-size:9px;color:#94a3b8;">';
    for (var _a = 0; _a < 12; _a++) {
      var _lx = (12 + _a * _slot + _slot / 2) / 3;             // % of width
      _ax += '<span style="position:absolute;top:0;left:' + _lx + '%;white-space:nowrap;'
           + 'transform:translateX(-50%) rotate(-40deg);transform-origin:center;">' + _AB[_a] + '</span>';
    }
    _ax += '</div>';
    html += _ax;
  }

  html += '</div>';
  return html;
};

document.addEventListener('click', function(e) {
  var row = e.target.closest('.top3-row');
  if (row) {
    e.preventDefault();
    e.stopPropagation();

    var species = row.getAttribute('data-species');
    var lat = parseFloat(row.getAttribute('data-lat'));
    var lon = parseFloat(row.getAttribute('data-lon'));

    // Fly to cell center
    if (Number.isFinite(lat) && Number.isFinite(lon) && window.map) {
      map.flyTo([lat, lon], 10, { duration: 1.2 });
    }

    // Enable Prob overlay if not already active
    if (typeof window.toggleProbability === 'function' && window.activeProbSpecies !== species) {
      window.toggleProbability(species);
    }

    // Make species visible if hidden
    if (window.points && window.points[species] && window.points[species].visible === false) {
      window.points[species].visible = true;
      if (typeof save === 'function') save();
      if (typeof updateMarker === 'function') updateMarker(species);
    }

    // Highlight species row
    try {
      var speciesRow = document.querySelector('.row[data-key="' + CSS.escape(species) + '"]');
      if (speciesRow) {
        speciesRow.style.outline = '2px solid #5DCAA5';
        speciesRow.style.outlineOffset = '2px';
        setTimeout(function() { speciesRow.style.outline = ''; speciesRow.style.outlineOffset = ''; }, 2000);
      }
    } catch(err) {}

    // Mobile: close sidebar
    try {
      var sidebar = document.getElementById('sidebar');
      if (sidebar && sidebar.classList.contains('open') && window.innerWidth <= 900) {
        sidebar.classList.remove('open');
        var backdrop = document.getElementById('sidebarBackdrop');
        if (backdrop) backdrop.classList.remove('show');
      }
    } catch(err) {}
    return;
  }

  // Placeholder click → trigger Prob for the species
  var ph = e.target.closest('.top3-placeholder');

      ph.textContent = '▦ Top perioodid: laen...';
      ph.style.color = '#64748b';
      window.toggleProbability(sp);
    }
  }
});


})();

<script>
(function(){
/* ====== Neighbour-country boost helpers (Phase 3) ====== */

var BM_NEIGHBOR_CACHE_KEY    = 'bm_neighbor_cache_v1';
var BM_NEIGHBOR_CACHE_TTL_MS = 6 * 60 * 60 * 1000;
var BM_NEIGHBOR_FETCH_TIMEOUT_MS = 15000;
var BM_NEIGHBOR_ENDPOINT = 'https://eenwcyuyugyrjgpivxrq.supabase.co/functions/v1/get-europe-ebird-cache';

var _NB_SOUTH = ['LV','LT','PL','BY'];
var _NB_NORTH = ['FI','SE','RU'];
var _NB_ALL   = ['FI','SE','LV','LT','PL','BY','RU'];

// IIFE-scoped active map. Populated by __scanEnnAll before the per-species loop.
var _activeNeighborMap = {};

function _neighborSeason(date){
  var d = (date instanceof Date) ? date : new Date();
  var m = d.getMonth() + 1;
  if (m >= 3 && m <= 5)  return 'spring';
  if (m >= 8 && m <= 10) return 'autumn';
  return 'other';
}

function _neighborSeasonLabelEt(season){
  if (season === 'spring') return 'kevad';
  if (season === 'autumn') return 'sügis';
  return '';
}

function _neighborCountriesForSeason(season){
  if (season === 'spring') return _NB_SOUTH.slice();
  if (season === 'autumn') return _NB_NORTH.slice();
  return _NB_ALL.slice();
}

async function _nbFetchWithTimeout(url, opts, ms){
  var ctrl  = (typeof AbortController === 'function') ? new AbortController() : null;
  var timer = ctrl ? setTimeout(function(){ try { ctrl.abort(); } catch(e){} }, ms) : null;
  try {
    var f = ctrl ? Object.assign({ signal: ctrl.signal }, opts || {}) : (opts || {});
    return await fetch(url, f);
  } finally {
    if (timer) clearTimeout(timer);
  }
}

function _loadNeighborDataLocal(){
  try {
    var raw = localStorage.getItem('bm_eu_last_good_snapshot');
    if (!raw) return null;
    var snap = JSON.parse(raw);
    var pts = snap && snap.payload && snap.payload.points;
    if (!pts || typeof pts !== 'object') return null;
    var out = {};
    Object.keys(pts).forEach(function(name){
      var entry = pts[name] || {};
      var regions = entry.regions || {};
      var arr = [];
      Object.keys(regions).forEach(function(cc){
        var r = regions[cc] || {};
        var occ7 = Number(r.occ7);
        if (!Number.isFinite(occ7) || occ7 <= 0) return;
        arr.push({
          cc: cc,
          occ7: occ7,
          latest_obs_date: r.t || null,
          latest_lat: Number.isFinite(Number(r.lat)) ? Number(r.lat) : null,
          latest_lon: Number.isFinite(Number(r.lon)) ? Number(r.lon) : null,
          latest_loc: r.loc || null,
        });
      });
      if (arr.length) out[name] = arr;
    });
    return out;
  } catch (e) {
    console.warn('[neighbor] local snapshot parse failed:', e);
    return null;
  }
}

async function _loadNeighborDataCloud(force){
  if (!force) {
    try {
      var cachedRaw = localStorage.getItem(BM_NEIGHBOR_CACHE_KEY);
      if (cachedRaw) {
        var cached = JSON.parse(cachedRaw);
        var ageMs  = Date.now() - Number(cached.fetchedAtMs || 0);
        if (cached && cached.bySpecies && ageMs >= 0 && ageMs < BM_NEIGHBOR_CACHE_TTL_MS) {
          return cached.bySpecies;
        }
      }
    } catch (e) {}
  }

  try {
    var resp = await _nbFetchWithTimeout(
      BM_NEIGHBOR_ENDPOINT,
      { method: 'GET', headers: { 'Accept': 'application/json' }, cache: 'no-store' },
      BM_NEIGHBOR_FETCH_TIMEOUT_MS
    );
    if (!resp.ok) throw new Error('HTTP ' + resp.status);
    var data = await resp.json();
    var rows = (data && Array.isArray(data.rows)) ? data.rows : [];
    var bySpecies = {};
    rows.forEach(function(r){
      var name = r && r.species_name;
      var cc   = r && r.country_code;
      var occ7 = Number(r && r.occ7);
      if (!name || !cc || !Number.isFinite(occ7) || occ7 <= 0) return;
      if (!bySpecies[name]) bySpecies[name] = [];
      bySpecies[name].push({
        cc: cc,
        occ7: occ7,
        latest_obs_date: r.latest_obs_date || null,
        latest_lat: Number.isFinite(Number(r.latest_lat)) ? Number(r.latest_lat) : null,
        latest_lon: Number.isFinite(Number(r.latest_lon)) ? Number(r.latest_lon) : null,
        latest_loc: r.latest_loc || null,
      });
    });
    try {
      localStorage.setItem(BM_NEIGHBOR_CACHE_KEY, JSON.stringify({
        fetchedAtMs: Date.now(),
        bySpecies: bySpecies,
      }));
    } catch (e) {}
    return bySpecies;
  } catch (e) {
    console.warn('[neighbor] cloud fetch failed:', e);
    return null;
  }
}

async function _loadNeighborData(force){
  var cloud = await _loadNeighborDataCloud(force === true);
  var local = _loadNeighborDataLocal();
  if (!cloud && !local) return {};
  var out = {};
  if (cloud) Object.keys(cloud).forEach(function(k){ out[k] = cloud[k].slice(); });
  if (local) {
    Object.keys(local).forEach(function(k){
      if (!out[k]) { out[k] = local[k].slice(); return; }
      var byCC = {};
      out[k].forEach(function(r){ byCC[r.cc] = r; });
      local[k].forEach(function(r){ byCC[r.cc] = r; });
      out[k] = Object.values(byCC);
    });
  }
  return out;
}

function _neighborBoost(speciesName, neighborMap, dateForSeason){
  var season  = _neighborSeason(dateForSeason);
  var allowed = _neighborCountriesForSeason(season);
  var allowedSet = {};
  allowed.forEach(function(cc){ allowedSet[cc] = true; });
  var entries = (neighborMap && neighborMap[speciesName]) || [];
  var contributing = entries
    .filter(function(r){ return allowedSet[r.cc] && Number(r.occ7) > 0; })
    .sort(function(a, b){ return a.cc < b.cc ? -1 : a.cc > b.cc ? 1 : 0; });
  var boost = Math.min(25, contributing.length * 5);
  return { boost: boost, neighbors: contributing, season: season };
}

function getEbirdCode(estName) {

  return null;
}

function prob(ds){
  if(!ds) return 0;
  var d=null,now=new Date(),yr=now.getFullYear();
  var m=String(ds).match(/^(\d{1,2})\.(\d{2})$/);
  if(m) d=new Date(yr,parseInt(m[2],10)-1,parseInt(m[1],10));
  if(!d){m=String(ds).match(/^(\d{4})-(\d{2})-(\d{2})/);if(m) d=new Date(yr,parseInt(m[2],10)-1,parseInt(m[3],10));}
  if(!d) return 0;
  var diff=(d.getTime()-now.getTime())/(864e5);
  if(diff<=0){var past=Math.abs(diff);
    if(past<=3) return 95;if(past<=7) return Math.round(90-past);
    if(past<=14) return Math.round(80-past*.8);if(past<=30) return Math.round(65-past*.8);
    return Math.max(5,Math.round(45-past*.5));}
  if(diff<=3) return Math.round(88-diff*3);if(diff<=7) return Math.round(75-diff*4);
  if(diff<=14) return Math.round(55-diff*2);if(diff<=30) return Math.round(30-(diff-14)*.8);
  return Math.max(1,Math.round(18-(diff-30)*.3));
}

// Inline mojibake decoder — fixes double-encoded UTF-8 in SPECIES names
// Self-contained: does NOT depend on any function outside this IIFE
function _fix(s) {
  if (!s || typeof s !== 'string') return s || '';
  // Quick check: if no high bytes, no mojibake possible
  if (!/[\u00c0-\u00ff]/.test(s)) return s;
  try {
    var bytes = [];
    for (var i = 0; i < s.length; i++) {
      var c = s.charCodeAt(i);
      if (c < 256) bytes.push(c);
      else return s; // has chars outside Latin-1 range, not mojibake
    }
    var decoded = new TextDecoder('utf-8').decode(new Uint8Array(bytes));
    if (decoded !== s && decoded.length > 0 && decoded.indexOf('\ufffd') === -1) {
      return decoded;
    }
  } catch(e) {}
  return s;
}

function missing(){
  var all=sp(),dates=sd(),pts=pt(),out=[];
  var ebCounts=window.__ennEbirdCounts||{};
  var thisYear=new Date().getFullYear();
  for(var i=0;i<all.length;i++){
    var n=all[i];
    var clean=_fix(n);
    var p=pts[n]||pts[clean]||{};

    // Has recent 7-day observations → definitely seen, skip
    if(Number.isFinite(p.occ7)&&p.occ7>0) continue;

    // Has observation date from THIS YEAR → seen this year, skip
    var dateStr=String(p.t||'').trim();
    if(dateStr){
      var yearMatch=dateStr.match(/^(\d{4})/);
      if(yearMatch&&parseInt(yearMatch[1],10)===thisYear) continue;
    }

    // This species hasn't been seen this year — it's "missing"
    var springDate=getSpringDate(n,dates)||getSpringDate(clean,dates)||'';
    springDate=String(springDate).trim();
    var baseProb=prob(springDate);
    var ebCode=getEbirdCode(n);
    var ebCount=ebCode?ebCounts[ebCode]||0:0;
    var finalProb=combinedProb(baseProb,ebCount);
    out.push({name:n,spring:springDate,prob:finalProb,baseProb:baseProb,ebirdCount:ebCount,ebirdCode:ebCode||''});
  }
  return out;
}

}

function _bmTimingPill(label){
  try{
    if(!label) return '';
    var MON=['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
    var parts=String(label).split('–');
    if(parts.length!==2) return '';
    function parseDM(s){
      var m=s.trim().match(/^(\d{1,2})\s+([A-Za-z]{3})$/);
      if(!m) return null;
      var mi=MON.indexOf(m[2].charAt(0).toUpperCase()+m[2].slice(1,3).toLowerCase());
      if(mi<0) return null;
      return {d:parseInt(m[1],10),mi:mi};
    }
    var a=parseDM(parts[0]), b=parseDM(parts[1]);
    if(!a||!b) return '';
    var now=new Date();
    var Y=now.getFullYear();
    var today=new Date(Y,now.getMonth(),now.getDate());
    var start=new Date(Y,a.mi,a.d);
    var end=new Date(Y,b.mi,b.d,23,59,59,999);
    var wraps=(b.mi<a.mi)||(b.mi===a.mi&&b.d<a.d);
    if(wraps){
      var startPrev=new Date(Y-1,a.mi,a.d);
      var endThis=new Date(Y,b.mi,b.d,23,59,59,999);
      if(today>=startPrev&&today<=endThis) return _bmPillNow();
      end=new Date(Y+1,b.mi,b.d,23,59,59,999);
    }
    if(today>=start&&today<=end) return _bmPillNow();
    if(today<start){
      var days=Math.ceil((start-today)/86400000);
      if(days<=0) days=1;
      return _bmPillSoon(days);
    }
    return '';
  }catch(e){ return ''; }
}

}

}

      console.warn('[neighbor] load failed, continuing without boost:', e);
      _activeNeighborMap = {};
    }

    // Phase 3: single regional-bulk eBird fetch, then serial prob-only scan.
    // eBird data used to be fetched per-species inside this loop (446 HTTP calls).
    // Now we fetch once via __refreshEbirdEEBulk and read counts from the bulk result.
    // 6h TTL gate (only at this call site, so other __refreshEbirdEEBulk callers
    // at 10206/10679/10685 keep their fetch-every-time behavior).
    var _shouldFetchEbirdObs = forceRescan;
    if (!_shouldFetchEbirdObs) {
      try {
        var _rawObsCache = localStorage.getItem('bm_ebird_obs_v1');
        if (!_rawObsCache) {
          _shouldFetchEbirdObs = true;
        } else {
          var _cachedObs = JSON.parse(_rawObsCache);
          var _ageMs = (_cachedObs && _cachedObs.fetchedAt) ? (Date.now() - Date.parse(_cachedObs.fetchedAt)) : Infinity;
          _shouldFetchEbirdObs = !Number.isFinite(_ageMs) || _ageMs >= 6 * 60 * 60 * 1000;
          if (!_shouldFetchEbirdObs) {
            console.log('[EBIRD-OBS] cache fresh (' + Math.round(_ageMs/60000) + 'min) — skipping eBird bulk in scan');
          }
        }
      } catch (e) { _shouldFetchEbirdObs = true; }
    }
    if (_shouldFetchEbirdObs) {
      try {
        if(typeof window.__refreshEbirdEEBulk==='function'){
          var bulkRes=await window.__refreshEbirdEEBulk();
          console.log('[SCAN-EBIRD] bulk', bulkRes);
        }
      } catch(bulkErr){
        console.warn('[EBIRD-OBS] scan fetch failed (non-fatal)', bulkErr && bulkErr.message);
      }
    }
    var __scanBulkCounts = window.__ennEbirdCounts || {};
    var __scanBulkUpdatedAt = new Date().toISOString();

    var scanDone=0,scanErrors=0,scanSkipped=0;
    render();

    for(var si=0;si<need.length;si++){
      if(_ennScanAbort){console.log('[SCAN] aborted at',si);break;}
      var name=need[si];
      if(btn) btn.textContent='Skaneerin '+(si+1)+'/'+need.length;

      // Apply bulk eBird result to this species regardless of prob cache hit.
      try{
        var _code = (typeof getEbirdCode==='function') ? getEbirdCode(name) : null;
        var _count7 = _code ? (Number(__scanBulkCounts[_code]) || 0) : 0;
        var _ee = (typeof window.__getEbirdEEPoint==='function') ? window.__getEbirdEEPoint(name) : null;
        // Write to whatever pt() reads from, so the per-species patch reaches the
        // store render() iterates. pt() is the same helper render() uses; it might
        // return closure-points, window.__bm_points, or window.points depending on
        // runtime state. Falling back to window.points preserves prior behaviour
        // when pt() isn't reachable.
        var __ebStore = (typeof pt === 'function') ? pt() : null;
        if (!__ebStore || typeof __ebStore !== 'object') {
          window.points = window.points || {};
          __ebStore = window.points;
        }
        __ebStore[name] = __ebStore[name] || {};
        var ep = __ebStore[name];
        ep.occ7Ebird=_count7;
        ep.occ7EbirdUpdated=__scanBulkUpdatedAt;
        if(_ee && Number.isFinite(_ee.lat) && Number.isFinite(_ee.lon)){
          ep.lat=_ee.lat;ep.lon=_ee.lon;
          if(_ee.t) ep.t=_ee.t;
          if(!ep.src) ep.src='eBird';   // do not clobber existing 'elurikkus' / other sources
          ep.lastFetched=_ee.lastFetched;
        }
        if (name === 'Punanokk-vart') {
          console.log('[NETTA-TRACE] points WRITE at EBIRD_BULK:',
            JSON.stringify({
              lat: ep.lat, lon: ep.lon,
              cellLat: ep.cellLat, cellLon: ep.cellLon,
              occ7: ep.occ7, occ7Ebird: ep.occ7Ebird, occ7Elu: ep.occ7Elu,
              t: ep.t, src: ep.src,
              clientScannedAt: ep.clientScannedAt, lastFetched: ep.lastFetched,
              _ee_has_coords: !!(_ee && Number.isFinite(_ee.lat) && Number.isFinite(_ee.lon)),
              _count7: _count7,
            })
          );
        }
        if(typeof window.__schedulePersistBadgeCache==='function') window.__schedulePersistBadgeCache();
      }catch(ebErr){console.warn('[SCAN-EBIRD] apply error',name,ebErr);}

      // Skip heavy prob computation if cached data is fresh (< 12h) and not force-rescanning.
      var _existing=(window.__probDataBySpecies||{})[name];
      if(!forceRescan&&_existing&&_existing.computedAt&&Date.now()-_existing.computedAt<(window.ENN_CACHE_TTL_MS||43200000)){
        scanSkipped++;
        if(scanSkipped%20===1) console.log('[SCAN] cache hit',name,'age:',Math.round((Date.now()-_existing.computedAt)/60000),'min');
        continue;
      }

      try{
        await window.computeProbForSpecies(name,{force:true});
        scanDone++;
      }catch(err){
        scanErrors++;
        console.warn('[SCAN] prob failed:',name,err&&err.message);
      }

      if(si%10===0&&typeof render==='function'){try{render();}catch(e){}}
    }

    if(typeof render==='function') render();
    var elapsed=Math.round((Date.now()-scanStartMs)/1000);
    console.log('[SCAN] done —',scanDone,'/',need.length,'species scanned,',scanSkipped,'cached,',scanErrors,'errors, in',elapsed+'s');

    if(btn){
      btn.disabled=false;btn.style.opacity='1';
      btn.textContent=scanErrors>0?'Valmis ('+scanErrors+' viga, '+elapsed+'s)':'Valmis ✓ ('+elapsed+'s)';
      setTimeout(function(){btn.textContent='Skaneeri';},5000);
    }
  }finally{
    window.__scanEnnAllRunning=false;
  }
};

window.__ennProb=function(speciesName){
  window.__closeEnn();
  setTimeout(function(){
    var filterBox=document.getElementById('filterBox');
    if(filterBox){
      filterBox.value=speciesName;
      filterBox.dispatchEvent(new Event('input',{bubbles:true}));
      try{if(typeof window.render==='function') window.render();}catch(e){}
    }
    setTimeout(function(){
      try{
        var row=document.querySelector('.row[data-key="'+speciesName.replace(/"/g,'\\"')+'"]');
        if(!row) try{row=document.querySelector('.row[data-key="'+CSS.escape(speciesName)+'"]');}catch(e){}
        if(row){
          row.scrollIntoView({behavior:'smooth',block:'center'});
          row.style.outline='2px solid #93c5fd';row.style.outlineOffset='2px';
          setTimeout(function(){row.style.outline='';row.style.outlineOffset='';},3000);
          var allBtns=row.querySelectorAll('button,[onclick]');
          var probFound=false;
          for(var i=0;i<allBtns.length;i++){
            var txt=(allBtns[i].textContent||'').trim();
            if(txt==='Prob'||txt==='⊙ Prob'||txt.indexOf('Prob')!==-1){allBtns[i].click();probFound=true;break;}
          }
          if(!probFound){
            var clickables=row.querySelectorAll('[onclick*="prob"],[onclick*="Prob"],[onclick*="topPeriod"],[onclick*="TopPeriod"]');
            if(clickables.length>0){clickables[0].click();probFound=true;}
          }
          if(!probFound){
            var links=row.querySelectorAll('span,a,div');
            for(var j=0;j<links.length;j++){
              var t=(links[j].textContent||'').trim();
              if(t.indexOf('vajuta Prob')!==-1||t.indexOf('Top periood')!==-1){links[j].click();break;}
            }
          }
        }else{
          // Row not found (species filtered out by 7p filter) — call toggleProbability directly
          console.log('[Ennustus] row not found for',speciesName,'— calling toggleProbability directly');
          if(typeof window.toggleProbability==='function') window.toggleProbability(speciesName);
        }
      }catch(e){console.warn('[Ennustus] Prob navigation failed:',e);}
    },400);
  },300);
};
window.__openEnnustus=window.__openEnn;

var bg=document.getElementById('ennBg');
if(bg) bg.addEventListener('click',function(e){if(e.target===this) window.__closeEnn();});
})();
</script>



<!-- === DIAG: avatar key-normalization recon (READ-ONLY, console only) === -->
<script>
(function(){
  try {
    window.__lastAvatarDefaults = window.__lastAvatarDefaults || null;
    window.addEventListener('message', function(ev){
      try {
        if (ev && ev.data && ev.data.type === 'AVATARS_DEFAULTS' && ev.data.avatars) {
          window.__lastAvatarDefaults = ev.data.avatars;
        }
      } catch(e){}
    });

    function cps(s){ try { return Array.from(String(s)).map(function(c){ return c.codePointAt(0).toString(16); }).join(' '); } catch(e){ return '?'; } }
    function slug(s){ try { return (typeof slugifySpeciesKey==='function') ? slugifySpeciesKey(s) : '(no slugify)'; } catch(e){ return '(err)'; } }
    function garble(s){ try { return (typeof _toInternalKey==='function') ? _toInternalKey(s) : '(no _toInternalKey)'; } catch(e){ return '(err)'; } }

    // Clean-Unicode target names. The diag prints codepoints, so even if these
    // literals get mangled on save we'll still see it in the output.
    var TARGETS = ['Värbkakk', 'Väike-kirjurähn'];

    window.__avatarDiag = function(){
      var sp    = (typeof SPECIES !== 'undefined') ? SPECIES : (window.SPECIES || []);
      var av    = (typeof avatars !== 'undefined') ? avatars : (window.avatars || {});
      var cloud = window.__lastAvatarDefaults || {};
      var cloudKeys = Object.keys(cloud);

      console.log('[AVATAR-DIAG] SPECIES count:', sp.length, '| cloud avatar keys:', cloudKeys.length);

      TARGETS.forEach(function(clean){
        var garbled = garble(clean);
        var sClean  = slug(clean);
        var sNFC    = slug(String(clean).normalize('NFC'));
        var sNFD    = slug(String(clean).normalize('NFD'));

        var idxClean   = sp.indexOf(clean);
        var idxGarbled = sp.indexOf(garbled);
        var speciesEntry = (idxGarbled >= 0) ? garbled : (idxClean >= 0 ? clean : null);
        var speciesSlug  = speciesEntry ? slug(speciesEntry) : '(not in SPECIES)';

        var matchExact = cloudKeys.filter(function(k){ return k === clean || k === garbled; });
        var matchSlug  = cloudKeys.filter(function(k){ return slug(k) === sClean; });
        var matchNFC   = cloudKeys.filter(function(k){ return slug(String(k).normalize('NFC')) === sClean; });
        var matchNFD   = cloudKeys.filter(function(k){ return slug(String(k).normalize('NFD')) === sClean; });

        console.log('[AVATAR-DIAG] ----', clean, '----');
        console.log('  clean cps        :', cps(clean));
        console.log('  garbled key      :', garbled, '| cps:', cps(garbled));
        console.log('  in SPECIES       : clean idx', idxClean, '| garbled idx', idxGarbled);
        console.log('  species slug     :', speciesSlug, '| clean slug:', sClean, '| NFC:', sNFC, '| NFD:', sNFD);
        console.log('  cloud match exact:', matchExact);
        console.log('  cloud match slug :', matchSlug.map(function(k){ return k + ' [' + cps(k) + ']'; }));
        console.log('  cloud match NFC  :', matchNFC.map(function(k){ return k + ' [' + cps(k) + ']'; }));
        console.log('  cloud match NFD  :', matchNFD.map(function(k){ return k + ' [' + cps(k) + ']'; }));
        console.log('  avatars[garbled] :', av[garbled] || '(none)');
        console.log('  avatars[clean]   :', av[clean] || '(none)');
        try { console.log('  getDisplayAvatar :', (typeof getDisplayAvatar==='function') ? getDisplayAvatar(speciesEntry || garbled) : '(no fn)'); }
        catch(e){ console.log('  getDisplayAvatar : (err)', e && e.message); }
      });
      return 'done';
    };

    function fireWhenReady(){
      if (typeof SPECIES === 'undefined') { setTimeout(fireWhenReady, 800); return; }
      setTimeout(function(){ try { window.__avatarDiag(); } catch(e){ console.log('[AVATAR-DIAG] error', e && e.message); } }, 3500);
    }
    if (document.readyState === 'loading') document.addEventListener('DOMContentLoaded', fireWhenReady);
    else fireWhenReady();
  } catch(e) { try { console.log('[AVATAR-DIAG] fatal', e && e.message); } catch(_){} }
})();
</script>
