<!doctype html>
<html>
<head>
  <meta charset="utf-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover"/>

  <style>

    *{box-sizing:border-box}
    html,body{height:100%;margin:0;padding:0;overflow:hidden;font-family:system-ui,Arial,sans-serif}
    #root{height:100%;display:flex;flex-direction:column}
    #app{display:flex;flex:1;min-height:0}
    #sidebar{width:360px;border-right:1px solid #ddd;padding:10px;overflow:auto;background:#fff;min-height:0;flex-shrink:0}
    #mapWrap{flex:1;min-height:0;position:relative}

    .top {display:flex;justify-content:space-between;align-items:center;gap:8px;flex-wrap:wrap}

    .btn.secondary {background:#666}
    input[type="text"] {width:100%;padding:6px;box-sizing:border-box;margin:6px 0}
    .pill {display:inline-block;padding:2px 6px;border-radius:10px;background:#eef;font-size:11px}
    details summary {cursor:pointer}
    .latin {color:#888;font-size:12px;margin-left:6px}
    .clickable {cursor:pointer}
    .muted {opacity:.55; text-decoration: line-through;}

  .last-fetched-inline{ font-size:11px; color:#64748b; margin-left:6px; white-space:nowrap }

  .fetch-error{font-size:11px;color:#dc2626;margin-top:2px;max-height:40px;overflow:auto}

.btn.on{background:#27ae60;color:#fff}

/* --- Marker crown for Rarity --- */
.marker-wrap{position:relative;width:44px;height:72px}
.marker-circle{position:absolute;left:2px;top:16px;width:40px;height:40px;border-radius:50%;border:3px solid #222;
  background-size:cover;background-position:center;background-color:#29c;box-sizing:border-box}
.marker-crown{position:absolute;left:50%;top:0;transform:translateX(-50%);width:26px;height:26px;display:flex;align-items:center;justify-content:center;
  filter:drop-shadow(0 1px 1px rgba(0,0,0,.35))}
.marker-crown svg{width:26px;height:26px;display:block}
.marker-count{position:absolute;left:50%;top:56px;transform:translateX(-50%);min-width:28px;padding:1px 6px;border-radius:10px;background:rgba(255,255,255,.92);border:1px solid #111;font-size:12px;line-height:14px;font-weight:700;text-align:center;box-shadow:0 1px 2px rgba(0,0,0,.2)}

.marker-count.mig-off{background:rgba(255,160,0,.95);color:#111;border-color:#8a5a00}

.rarity-select{font-size:12px;padding:3px 6px;border:1px solid #cbd5e1;border-radius:6px;background:#fff;vertical-align:middle}

  #springPanel{display:none;margin:8px 0 0;background:#fff;border:1px solid #cbd5e1;border-radius:10px;box-shadow:0 6px 18px rgba(0,0,0,0.10);overflow:hidden}

<script>
// --- Silent notifier: replace alerts with console logs ---
function notifySilent(msg){
  try { console.warn(msg); } catch(e){}
}
window._realAlert = window.alert;
window.alert = function(msg){ notifySilent(msg); };

// --- Per‑species clear: remove coords/date/occ/src and marker immediately ---
function clearOccurrence(key){
  try{
    window.points = window.points || {};
    const p = (points[key] = points[key] || {});
    delete p.lat; delete p.lon; delete p.t; delete p.occ; delete p.src;
    try{
      if (window.markers && typeof markers.has === 'function' && markers.has(key)){
        const m = markers.get(key);
        try { m.remove ? m.remove() : map.removeLayer(m); } catch(e){}
        try { markers.delete(key); } catch(e){}
      }
    }catch(e){ console.warn('marker remove failed', e); }
    try{
      if (window.circleLayers && typeof circleLayers.has === 'function' && circleLayers.has(key)){
        circleLayers.get(key).forEach(c => { try { c.remove ? c.remove() : map.removeLayer(c); } catch(e){} });
        circleLayers.delete(key);
      }
    }catch(e){ /* ignore */ }
    if (typeof save === 'function') save();
    if (typeof updateMarker === 'function') updateMarker(key);
    if (typeof render === 'function') render();
  }catch(e){ console.warn('clearOccurrence error', e); }
}
</script>

// === Avatar defaults & preloading ===
const DEFAULT_AVATARS = {};
const PLACEHOLDER_AVATAR_URL = new URL('avatars/placeholder.webp', window.location.href).toString();

function slugifySpeciesKey(key){
  return String(key).toLowerCase()
    .replace(/õ/g,'o').replace(/ä/g,'a').replace(/ö/g,'o').replace(/ü/g,'u')
    .replace(/š/g,'s').replace(/ž/g,'z')
    .replace(/[^a-z0-9]+/g,'-')
    .replace(/^-+|-+$/g,'');
}

const __avatarPreloadCache = new Set();
function preloadAvatars(urls){
  try{
    if(!urls) return;
    for(const u of urls){
      if(!u || __avatarPreloadCache.has(u)) continue;
      __avatarPreloadCache.add(u);
      const img = new Image();
      img.decoding = 'async';
      img.loading = 'eager';
      img.src = u;
    }
  }catch(e){ /* ignore */ }
}

const __avatarProbeCache = new Map();
function probeAvatarFile(key){
  if(__avatarProbeCache.has(key)) return Promise.resolve(__avatarProbeCache.get(key));
  const slug = slugifySpeciesKey(key);
  const url = new URL('avatars/' + slug + '.webp', window.location.href).toString();
  return new Promise(resolve=>{
    const img = new Image();
    img.onload = ()=>{ __avatarProbeCache.set(key, url); resolve(url); };
    img.onerror = ()=>{ __avatarProbeCache.set(key, null); resolve(null); };
    img.src = url;
  });
}

async function autoDetectAvatarsForActive(){
  try{
    const now = Date.now(), sevenMs = 7*24*60*60*1000;
    const activeKeys = [];
    for(const name of SPECIES){
      if(avatars[name]) continue;
      const p = points[name];
      if(!p) continue;
      let active = false;
      if(Number.isFinite(p.occ7) && p.occ7 > 0) active = true;
      if(!active && p.t){
        const ms = _toDay(p.t);
        if(ms && (now - ms) <= sevenMs) active = true;
      }
      if(active) activeKeys.push(name);
    }
    const results = await Promise.all(activeKeys.map(k => probeAvatarFile(k).then(url => ({k,url}))));
    let changed = false;
    for(const {k,url} of results){
      if(url){ avatars[k] = url; changed = true; }
    }
    if(changed){
      save();
      preloadAvatars(Object.values(avatars));
      activeKeys.forEach(k=>{ try{ updateMarker(k); }catch(e){} });
      render();
    }
  }catch(e){ /* ignore */ }
}

function getDisplayAvatar(key){
  return avatars[key] || PLACEHOLDER_AVATAR_URL;
}

// === Helpers ===
function _toDay(s){
  if(!s) return null;
  const m = (''+s).match(/(\d{4})-(\d{2})-(\d{2})/);
  if(!m) return null;
  return new Date(+m[1], +m[2]-1, +m[3]).getTime();
}

window.__recentOnly = true;
function isRecent(isoDate){
  try{
    const ms = _toDay(isoDate);
    if (!ms) return false;
    return (Date.now() - ms) <= 7 * 24 * 60 * 60 * 1000;
  }catch(e){ return false; }
}

function _borderColorByDate(isoDate){
  try{
    const ms = _toDay(isoDate);
    if (!ms) return '#e67e22';
    return (Date.now() - ms) <= 7 * 24 * 60 * 60 * 1000 ? '#27ae60' : '#e67e22';
  }catch(e){ return '#e67e22'; }
}

// =========================================
// === SNAPSHOT-BASED FETCHING (replaces per-species client scraping) ===
// =========================================
const SNAPSHOT_API = 'https://eenwcyuyugyrjgpivxrq.supabase.co/functions/v1/linnuliigid-snapshot';
let __pollTimer = null;
let __pollCount = 0;

function _showSnapshotBanner(msg, type){
  const el = document.getElementById('snapshotBanner');
  if(!el) return;
  el.style.display = 'block';
  el.className = 'snapshot-banner' + (type ? ' ' + type : '');
  el.textContent = msg;
}
function _hideSnapshotBanner(){
  const el = document.getElementById('snapshotBanner');
  if(el) el.style.display = 'none';
}

function _updateProgressUI(done, total, status){
  const prog = document.getElementById('fetchProgress');
  const bar = document.getElementById('fetchProgressBar');
  const barInner = document.getElementById('fetchProgressBarInner');
  const stopBtn = document.getElementById('btnStopFetch');
  if(!prog) return;
  if(status === 'running' && total > 0){
    prog.textContent = 'Server refresh: ' + done + '/' + total;
    if(bar){ bar.style.display='block'; barInner.style.width = Math.round(done/total*100)+'%'; }
    if(stopBtn) stopBtn.style.display='inline-block';
  } else {
    prog.textContent = status === 'ready' ? 'Data loaded' : (status === 'error' ? 'Refresh failed' : '');
    if(bar) bar.style.display='none';
    if(stopBtn) stopBtn.style.display='none';
  }
}

function _applySnapshot(snap){
  if(!snap || !snap.points_json) return;
  const pts = snap.points_json;
  for(const key in pts){
    if(!pts.hasOwnProperty(key)) continue;
    const s = pts[key];
    points[key] = points[key] || {};
    const p = points[key];
    if(s.t) p.t = s.t;
    if(Number.isFinite(s.lat) && Number.isFinite(s.lon)){ p.lat = s.lat; p.lon = s.lon; }
    if(Number.isFinite(s.occ7)) p.occ7 = s.occ7;
    if(s.src) p.src = s.src;
    if(typeof p.visible !== 'boolean') p.visible = true;
  }
  save();
  Object.keys(points).forEach(updateMarker);
  render();
}

async function loadSnapshot(){
  try{
    _showSnapshotBanner('Loading data…');
    const res = await fetch(SNAPSHOT_API, {cache:'no-store'});
    if(!res.ok) throw new Error('HTTP ' + res.status);
    const snap = await res.json();

    if(snap.status === 'running'){
      _updateProgressUI(snap.progress_done, snap.progress_total, 'running');
      _showSnapshotBanner('Server is refreshing data (' + snap.progress_done + '/' + snap.progress_total + ')…');
      // Apply last known data while refresh runs
      if(snap.points_json && Object.keys(snap.points_json).length > 0){
        _applySnapshot(snap);
      }
      _startPolling();
      return;
    }

    if(snap.points_json && Object.keys(snap.points_json).length > 0){
      _applySnapshot(snap);
      const age = snap.generated_at ? Math.round((Date.now() - new Date(snap.generated_at).getTime()) / 60000) : null;
      _showSnapshotBanner('Data loaded' + (age !== null ? ' (' + age + ' min ago)' : ''));
      setTimeout(_hideSnapshotBanner, 4000);
      _updateProgressUI(0, 0, 'ready');
    } else {
      _showSnapshotBanner('No snapshot data yet. Press "Refresh data" to generate.', 'warn');
    }

    if(snap.last_error){
      document.getElementById('fetchError').textContent = 'Last error: ' + snap.last_error;
    }
  }catch(e){
    console.warn('[snapshot] Load failed:', e);
    _showSnapshotBanner('Using cached data (server unavailable)', 'warn');
    // Fall back to localStorage (already loaded)
    Object.keys(points).forEach(updateMarker);
    render();
  }
}

function _startPolling(){
  _stopPolling();
  __pollCount = 0;
  __pollTimer = setInterval(async ()=>{
    __pollCount++;
    if(__pollCount > 90){ // 90 * 2s = 3 min max
      _stopPolling();
      _showSnapshotBanner('Refresh timed out. Try again later.', 'error');
      return;
    }
    try{
      const res = await fetch(SNAPSHOT_API, {cache:'no-store'});
      if(!res.ok) return;
      const snap = await res.json();
      _updateProgressUI(snap.progress_done, snap.progress_total, snap.status);

      if(snap.status === 'running'){
        _showSnapshotBanner('Refreshing: ' + snap.progress_done + '/' + snap.progress_total + '…');
      } else {
        _stopPolling();
        if(snap.status === 'ready' && snap.points_json){
          _applySnapshot(snap);
          _showSnapshotBanner('Refresh complete!');
          setTimeout(_hideSnapshotBanner, 4000);
        } else if(snap.status === 'error'){
          _showSnapshotBanner('Refresh failed: ' + (snap.last_error || 'Unknown error'), 'error');
          // Still apply whatever data exists
          if(snap.points_json && Object.keys(snap.points_json).length > 0){
            _applySnapshot(snap);
          }
        }
      }
    }catch(e){ /* keep polling */ }
  }, 2000);
}

function _stopPolling(){
  if(__pollTimer){ clearInterval(__pollTimer); __pollTimer = null; }
  _updateProgressUI(0, 0, '');
}

async function triggerRefresh(){
  try{
    _showSnapshotBanner('Requesting server refresh…');
    _updateProgressUI(0, SPECIES.length, 'running');

    // The POST requires X-INGEST-KEY — for browser-triggered refreshes,
    // we use the anon key approach. The edge function also accepts the EVENTS_INGEST_KEY.
    // For now, try without auth (the edge function checks X-INGEST-KEY header)
    const key = localStorage.getItem('__ingest_key') || '';
    const res = await fetch(SNAPSHOT_API, {
      method: 'POST',
      headers: {
        'Content-Type': 'application/json',
        'X-INGEST-KEY': key,
      },
    });

    if(res.status === 401){
      _showSnapshotBanner('Refresh requires admin key. Set via sidebar.', 'error');
      _updateProgressUI(0, 0, 'error');
      return;
    }
    if(res.status === 409){
      _showSnapshotBanner('Refresh already in progress…');
    }

    _startPolling();
  }catch(e){
    _showSnapshotBanner('Failed to start refresh: ' + e.message, 'error');
  }
}

// Wire buttons
function _wireSnapshotButtons(){
  const btnRefresh = document.getElementById('btnRefreshVisible');
  const btnStop = document.getElementById('btnStopFetch');
  if(btnRefresh && !btnRefresh.__wired){
    btnRefresh.addEventListener('click', triggerRefresh);
    btnRefresh.__wired = true;
  }
  if(btnStop && !btnStop.__wired){
    btnStop.addEventListener('click', _stopPolling);
    btnStop.__wired = true;
  }
}

});

// === Spring migration dates ===
function _normSpringDDMM(s){
  s = (s||'').trim();
  if(!s) return null;
  let m = s.match(/^(\d{1,2})\.(\d{1,2})$/);
  if(m){
    const d = parseInt(m[1],10), mo = parseInt(m[2],10);
    if(mo>=1 && mo<=12 && d>=1 && d<=31) return d+'.'+String(mo).padStart(2,'0');
  }
  m = s.match(/^(\d{4})-(\d{2})-(\d{2})$/);
  if(m){
    const d = parseInt(m[3],10), mo = parseInt(m[2],10);
    if(mo>=1 && mo<=12 && d>=1 && d<=31) return d+'.'+String(mo).padStart(2,'0');
  }
  return null;
}
function _ddmmToDate(ddmm){
  const mm = (ddmm||'').match(/^(\d{1,2})\.(\d{2})$/);
  if(!mm) return null;
  return new Date(2025, parseInt(mm[2],10)-1, parseInt(mm[1],10), 12, 0, 0, 0);
}
function _dateToDdmm(dt){
  return dt.getDate()+'.'+String(dt.getMonth()+1).padStart(2,'0');
}
function editSpringDate(key){
  const prev = (springDates && springDates[key]) ? springDates[key] : '';
  const v = prompt('Kevadine saabumise kuupäev (D.MM või YYYY-MM-DD)\n\n'+key, prev || '');
  if(v === null) return;
  if(String(v).trim() === ''){
    delete springDates[key];
    save(); render();
    return;
  }
  const n = _normSpringDDMM(v);
  if(!n){
    notifySilent('Vigane kuupäeva formaat. Kasuta D.MM (nt 5.04) või YYYY-MM-DD.');
    return;
  }
  springDates[key] = n;
  save(); render();
}

function updateMarker(key) {
  const p = points[key];
  if (markers.has(key)) { map.removeLayer(markers.get(key)); markers.delete(key); }
  if (!p) return;
  const passesRecent = isRecent(p.t) || (Number.isFinite(p.occ7) && p.occ7 > 0);
  const isVisible = (p.visible !== false) && passesRecent;
  if (isVisible && Number.isFinite(p.lat) && Number.isFinite(p.lon)) {
    const bcol = _borderColorByDate(p.t);
    const c7 = Number.isFinite(p.occ7) ? p.occ7 : null;
    const icon = avatarIcon(getDisplayAvatar(key), bcol, c7);
    const when = p.t ? '<br><small>vaatluse kuupäev: '+p.t+'</small>' : '';
    const src = p.src ? '<br><small>allikas: '+p.src+'</small>' : '';
    const m = L.marker([p.lat,p.lon], {icon}).addTo(map)
      .bindPopup('<b>'+key+'</b>'+when+(Number.isFinite(p.occ7)?'<br><small>7 päeva vaatlused: '+p.occ7+'</small>':'')+src);
    markers.set(key, m);
  }
}


// UI
function rowHTML(obj) {
  const key = obj.est;
  const p = points[key] || {};
  const bcol = _borderColorByDate(p.t);
  const hasPoint = Number.isFinite(p.lat) && Number.isFinite(p.lon);
  const muted = (p.visible===false) ? 'muted' : '';
  const occ7 = Number.isFinite(p.occ7) ? p.occ7 : null;

  const springVal = (springDates && springDates[key]) ? String(springDates[key]).trim() : '';
  const springTxt = ' <span class="pill">Kevad:</span> <span class="clickable" title="Muuda kevadise saabumise kuupäeva" onclick="editSpringDate(\''+key+'\')">'+( springVal || '—')+'</span>';

  const noCoords = !hasPoint && occ7 > 0;
  const meta = hasPoint
    ? '<span class="pill">lat:</span> '+p.lat.toFixed(4)+' <span class="pill">lon:</span> '+p.lon.toFixed(4)+(p.t?' <span class="pill">date:</span> '+p.t:'')+(occ7!==null?' <span class="pill">7d:</span> '+occ7:'')+springTxt
    : noCoords
      ? '<span class="pill" style="background:#fef3c7;color:#92400e">Koordinaadid peidetud</span>'+(occ7!==null?' <span class="pill">7d:</span> '+occ7:'')+springTxt
      : 'No location yet'+(occ7!==null?' <span class="pill">7d:</span> '+occ7:'')+springTxt;

  return '<div class="row" data-key="'+key+'">' +
    '<div class="avatar" style="background-image:url(\''+getDisplayAvatar(key)+'\');border:3px solid '+bcol+'"></div>' +
    '<div>' +
      '<div class="top">' +
        '<div class="name-label clickable '+muted+'" onclick="toggleVisibility(\''+key+'\')">'+key+'</div>' +

  const bM = document.getElementById('windMedium');
  const bL = document.getElementById('windLarge');
  const isMob = window.matchMedia && window.matchMedia('(max-width: 900px)').matches;

  let __lastWindSync = 0;
  function windyUrl(lat, lon, zoom){
    const z = Math.max(3, Math.min(12, Math.round(zoom||6)));
    return 'https://embed.windy.com/embed2.html?lat='+lat.toFixed(3)+'&lon='+lon.toFixed(3)+'&detailLat='+lat.toFixed(3)+'&detailLon='+lon.toFixed(3)+'&zoom='+z+'&level=surface&overlay=wind&marker=true&pressure=true';
  }
  function refreshWind(){
    if(isMob){
      const now = Date.now();
      if(now - __lastWindSync < 1000) return;
      __lastWindSync = now;
    }
    try{
      const c = window.map && map.getCenter ? map.getCenter() : {lat:58.7, lng:25.3};
      const z = window.map && map.getZoom ? map.getZoom() : 6;
      const url = windyUrl(c.lat, c.lng, z);
      if (iframe.getAttribute('src') !== url) iframe.setAttribute('src', url);
    }catch(e){}
  }
  function openWind(){
    refreshWind();
    if(isMob){
      panel.classList.add('windy-modal-open');
      document.body.style.overflow = 'hidden';
    } else {
      panel.style.display = 'block';
    }
    try{
      if (!window.__wind_sync__ && window.map){
        map.on('moveend zoomend', refreshWind);
        window.__wind_sync__ = true;
      }
    }catch(e){}
  }
  function closeWind(){
    if(isMob){
      panel.classList.remove('windy-modal-open');
      document.body.style.overflow = '';
      iframe.setAttribute('src', 'about:blank');
    } else {
      panel.style.display = 'none';
    }
    try{ setTimeout(()=>{ if(map && map.invalidateSize) map.invalidateSize(true); }, 260); }catch(e){}
  }
  btn.addEventListener('click', ()=>{
    const isOpen = isMob ? panel.classList.contains('windy-modal-open') : (panel.style.display !== 'none' && panel.style.display);
    if (!isOpen) openWind(); else closeWind();
  });
  btnClose.addEventListener('click', closeWind);
  const btnCloseMob = document.getElementById('windCloseMobile');
  if(btnCloseMob) btnCloseMob.addEventListener('click', closeWind);
  if(!isMob){
    bS.addEventListener('click', ()=>{ panel.style.width='320px'; panel.style.height='240px'; refreshWind(); });
    bM.addEventListener('click', ()=>{ panel.style.width='420px'; panel.style.height='300px'; refreshWind(); });
    bL.addEventListener('click', ()=>{ panel.style.width='560px'; panel.style.height='420px'; refreshWind(); });
  }
})();
</script>


<!-- === Kevadrände paneel === -->
<script>
(function(){
  function springSortKey(v){
    try{
      if(!v) return 999999;
      const x = (typeof _normSpringDDMM === 'function') ? (_normSpringDDMM(String(v).trim()) || String(v).trim()) : String(v).trim();
      let m = x.match(/^(\d{1,2})\.(\d{1,2})$/);
      if(m) return (+m[2])*100 + (+m[1]);
      m = x.match(/^(\d{4})-(\d{2})-(\d{2})$/);
      if(m) return (+m[2])*100 + (+m[3]);
      return 999999;
    }catch(e){ return 999999; }
  }
  function getSpringDates(){ try{ return (typeof springDates !== 'undefined') ? springDates : {}; }catch(e){ return {}; } }
  function getSpeciesList(){ try{ return (typeof SPECIES !== 'undefined') ? SPECIES : Object.keys(getSpringDates()); }catch(e){ return []; } }

  function renderSpringPanel(){
    const body = document.getElementById('springTableBody');
    const countEl = document.getElementById('springCount');
    const q = (document.getElementById('springSearch')?.value || '').toLowerCase().trim();
    if(!body || !countEl) return;
    const sd = getSpringDates();
    const list = getSpeciesList();
    const rows = [];
    for(const name of list){
      const raw = (sd[name] !== undefined) ? String(sd[name]).trim() : '';
      if(!raw) continue;
      if(q && !String(name).toLowerCase().includes(q)) continue;
      const disp = (typeof _normSpringDDMM === 'function') ? (_normSpringDDMM(raw) || raw) : raw;
      rows.push({name, disp, key: springSortKey(disp)});
    }
    rows.sort((a,b)=> (a.key-b.key) || String(a.name).localeCompare(String(b.name)));
    body.innerHTML = rows.map(r => {
      const safeName = String(r.name).replace(/"/g,'&quot;');
      return '<tr><td><span class="springDateBtn" onclick="editSpringDate(\''+safeName.replace(/'/g, "\\'")+'\')">'+ r.disp+'</span></td><td><span class="springSpeciesBtn" onclick="window.__springScrollToSpecies && window.__springScrollToSpecies(\''+safeName.replace(/'/g, "\\'")+'\')">'+ safeName+'</span></td></tr>';
    }).join('');
    countEl.textContent = rows.length;
  }

  window.__springScrollToSpecies = function(name){
    try{
      const row = document.querySelector('.row[data-key="'+CSS.escape(name)+'"]');
      if(row){
        row.scrollIntoView({behavior:'smooth', block:'nearest'});
        row.style.outline = '2px solid #93c5fd';
        row.style.outlineOffset = '2px';
        setTimeout(()=>{ row.style.outline=''; row.style.outlineOffset=''; }, 1200);
      }
    }catch(e){}
  };

  function toggleSpring(open){
    const panel = document.getElementById('springPanel');
    if(!panel) return;
    const wantOpen = (open===true) ? true : (open===false ? false : (panel.style.display==='none' || !panel.style.display));
    if(wantOpen){ panel.style.display = 'block'; renderSpringPanel(); } else { panel.style.display = 'none'; }
  }

  function wire(){
    const btn = document.getElementById('toggleSpring');
    const close = document.getElementById('springClose');
    const search = document.getElementById('springSearch');
    if(btn && !btn.__springBound){ btn.addEventListener('click', ()=> toggleSpring()); btn.__springBound = true; }
    if(close && !close.__springBound){ close.addEventListener('click', ()=> toggleSpring(false)); close.__springBound = true; }
    if(search && !search.__springBound){ search.addEventListener('input', renderSpringPanel); search.__springBound = true; }
  }

  try{
    if (typeof window.render === 'function' && !window.__springpanel_render_patch__){
      const _r = window.render;
      window.render = function(){ const out = _r.apply(this, arguments); try{ wire(); renderSpringPanel(); }catch(e){} return out; };
      window.__springpanel_render_patch__ = true;
    }
  }catch(e){}
  if (document.readyState === 'loading') document.addEventListener('DOMContentLoaded', ()=>{ wire(); renderSpringPanel(); });
  else { wire(); renderSpringPanel(); }
})();
</script>

<!-- === 7d active species badge === -->
<script>
(function(){
  function computeActiveSpecies7d(){
    try{
      const pts = (typeof points !== 'undefined') ? points : {};
      const list = (typeof SPECIES !== 'undefined') ? SPECIES : [];
      const now = Date.now(), sevenMs = 7*24*60*60*1000;
      let n = 0;
      for (const name of list){
        const p = pts[name] || {};
        let active = false;
        const occ7 = (p.occ7 === 0 || p.occ7) ? Number(p.occ7) : NaN;
        if (Number.isFinite(occ7)) active = occ7 > 0;
        if (!active && p.t){
          try{ const ms = (typeof _toDay === 'function') ? _toDay(p.t) : null; if (ms && (now - ms) <= sevenMs) active = true; }catch(e){}
        }
        if (active) n++;
      }
      return n;
    }catch(e){ return 0; }
  }
  function updateActive7dBadge(){
    try{
      const el = document.getElementById('active7dBadge');
      if (el) el.textContent = '7p liigid: ' + computeActiveSpecies7d();
    }catch(e){}
  }
  try{
    if (typeof window.render === 'function' && !window.__active7d_render_patch__){
      const _r = window.render;
      window.render = function(){ const out = _r.apply(this, arguments); try{ updateActive7dBadge(); }catch(e){} return out; };
      window.__active7d_render_patch__ = true;
    }
  }catch(e){}
  try{
    if (typeof window.updateMarker === 'function' && !window.__active7d_upd_patch__){
      const _u = window.updateMarker;
      window.updateMarker = function(){ const out = _u.apply(this, arguments); try{ updateActive7dBadge(); }catch(e){} return out; };
      window.__active7d_upd_patch__ = true;
    }
  }catch(e){}
  if (document.readyState === 'loading') document.addEventListener('DOMContentLoaded', updateActive7dBadge);
  else updateActive7dBadge();
  setInterval(updateActive7dBadge, 60000);
})();
</script>

<!-- === postMessage API for parent app (Avatar Manager) === -->
<script>
var __sharedDefaults = {};
(function(){
  window.addEventListener('message', function(ev){
    try{
      if(!ev.data || typeof ev.data !== 'object') return;
      var type = ev.data.type;
      if(type === 'AVATARS_DEFAULTS' && ev.data.avatars){
        __sharedDefaults = ev.data.avatars || {};
        var localAvatars = JSON.parse(localStorage.getItem(LS_AVATARS) || '{}');
        var merged = Object.assign({}, __sharedDefaults, localAvatars);
        for(var k in merged){ if(merged.hasOwnProperty(k) && merged[k]) avatars[k] = merged[k]; }
        save();
        preloadAvatars(Object.values(avatars));
        SPECIES.forEach(function(name){ try{ updateMarker(name); }catch(e){} });
        render();
      }
      if(type === 'AVATARS_UPDATE' && ev.data.avatars){
        var incoming = ev.data.avatars;
        for(var k in incoming){ if(incoming.hasOwnProperty(k)){ if(incoming[k]) avatars[k] = incoming[k]; else delete avatars[k]; } }
        save();
        preloadAvatars(Object.values(avatars));
        SPECIES.forEach(function(name){ try{ updateMarker(name); }catch(e){} });
        render();
      }
      if(type === 'AVATARS_REQUEST'){
        var src = ev.source;
        if(src && typeof src.postMessage === 'function') src.postMessage({ type: 'AVATARS_CURRENT', avatars: avatars }, '*');
      }
    }catch(e){ console.warn('postMessage handler error', e); }
  });
  try{ if(window.parent && window.parent !== window) window.parent.postMessage({ type: 'AVATARS_REQUEST' }, '*'); }catch(e){}
})();
</script>
