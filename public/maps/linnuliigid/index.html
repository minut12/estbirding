<script>
// Define the prediction selector EARLY so popup onclick handlers can find it
// even if later code throws during initialization.
window.__selectAsPredictionSpecies = function(scope, speciesName) {
  var name = String(speciesName || '').trim();
  if (!name) return;
  try {
    if (window.parent && window.parent !== window) {
      window.parent.postMessage({
        type: 'SPECIES_PREDICTION_SELECTED',
        scope: scope || 'linnuliigid',
        speciesKey: name,
        speciesName: name,
        userInitiated: true,
      }, '*');
    }
  } catch (_e) {}
};

// --- Silent notifier: replace alerts with console logs ---
function notifySilent(msg){
  try { console.warn(msg); } catch(e){}
}
window._realAlert = window.alert;
window.alert = function(msg){ notifySilent(msg); };

// --- Per-species clear: remove coords/date/occ/src and marker immediately ---
function clearOccurrence(key){
  try{
    window.points = window.points || {};
    const p = (points[key] = points[key] || {});
    if (key === 'Punanokk-vart') {
      console.log('[NETTA-TRACE] points WRITE at CLEAR_OCCURRENCE (before delete):',
        JSON.stringify({
          lat: p?.lat, lon: p?.lon,
          cellLat: p?.cellLat, cellLon: p?.cellLon,
          occ7: p?.occ7, occ7Ebird: p?.occ7Ebird, occ7Elu: p?.occ7Elu,
          t: p?.t, src: p?.src,
          clientScannedAt: p?.clientScannedAt, lastFetched: p?.lastFetched,
          stack: new Error().stack.split('\n').slice(1,4).join(' <- '),
        })
      );
    }
    delete p.lat; delete p.lon; delete p.t; delete p.occ; delete p.src;
    try{
      if (window.markers && typeof markers.has === 'function' && markers.has(key)){
        const m = markers.get(key);
        try { m.remove ? m.remove() : map.removeLayer(m); } catch(e){}
        try { markers.delete(key); } catch(e){}
      }
    }catch(e){ console.warn('marker remove failed', e); }
    try{
      if (window.circleLayers && typeof circleLayers.has === 'function' && circleLayers.has(key)){
        circleLayers.get(key).forEach(c => { try { c.remove ? c.remove() : map.removeLayer(c); } catch(e){} });
        circleLayers.delete(key);
      }
    }catch(e){ /* ignore */ }
    if (typeof save === 'function') save();
    if (typeof updateMarker === 'function') updateMarker(key);
    if (typeof render === 'function') render();
  }catch(e){ console.warn('clearOccurrence error', e); }
}
</script>

<script>
// ---- Event log helper: bubble events up to parent window ----
function _log(msg) {
  try {
    if (window.parent && window.parent !== window) {
      window.parent.postMessage({ type: 'LOG_EVENT', msg: msg }, '*');
    }
  } catch(e) {}
}

// ---- [NETTA-TRACE] diagnostic helper (additive logging only; NO behavior change) ----
// Captures ordered (t, eluExtra, src, coords) snapshots at each points write/read site
// to expose where eluExtra advances while p.t stays stale. Gated to Punanokk-vart unless
// window.__nettaTraceAll === true. Dump with: copy(JSON.stringify(window.__NETTA_TRACE, null, 2)).
var __nettaTrace = function(site, species, p){
  try{
    if(!window.__nettaTraceAll && species !== 'Punanokk-vart') return;
    window.__NETTA_TRACE = window.__NETTA_TRACE || [];
    var x = (p && p.eluExtra) ? p.eluExtra : {};
    var entry = {
      seq: window.__NETTA_TRACE.length,
      ts: new Date().toISOString(),
      site: site,
      species: species,
      t: p ? p.t : null,
      src: p ? p.src : null,
      eluLocality: x.locality != null ? x.locality : null,
      eluCollectors: x.collectors != null ? x.collectors : null,
      lat: p ? p.lat : null,
      lon: p ? p.lon : null,
      coords_source: p ? (p.coords_source || p.coordsSource) : null
    };
    window.__NETTA_TRACE.push(entry);
    console.log('[NETTA-TRACE]', site, JSON.stringify(entry));
  }catch(_e){}
};

// ---- GBIF polite client: max 3 concurrent + 429 backoff with jitter ----
var __gbifInFlight = 0;
var __gbifQueue = [];
var GBIF_MAX_CONCURRENT = 3;
var GBIF_MAX_RETRIES = 5;

function __gbifPump() {
  while (__gbifInFlight < GBIF_MAX_CONCURRENT && __gbifQueue.length) {
    var job = __gbifQueue.shift();
    __gbifInFlight++;
    job();
  }
}

function __gbifRelease() {
  __gbifInFlight = Math.max(0, __gbifInFlight - 1);
  __gbifPump();
}

function __gbifSleep(ms) {
  return new Promise(function(r){ setTimeout(r, ms); });
}

async function gbifFetch(url, opts) {
  return new Promise(function(resolve, reject) {
    __gbifQueue.push(async function run() {
      var attempt = 0;
      while (true) {
        try {
          var res = await fetch(url, opts);
          if (res.status === 429 && attempt < GBIF_MAX_RETRIES) {
            var ra = parseInt(res.headers.get('Retry-After') || '0', 10);
            var waitMs = ra > 0
              ? ra * 1000
              : Math.min(16000, 500 * Math.pow(2, attempt)) + Math.floor(Math.random() * 300);
            attempt++;
            console.log('[GBIF] 429 on attempt ' + attempt + ', retry in ' + waitMs + 'ms: ' + url.substring(0, 80));
            await __gbifSleep(waitMs);
            continue;
          }
          __gbifRelease();
          resolve(res);
          return;
        } catch (err) {
          if (attempt < GBIF_MAX_RETRIES) {
            var waitMs2 = Math.min(16000, 500 * Math.pow(2, attempt)) + Math.floor(Math.random() * 300);
            attempt++;
            await __gbifSleep(waitMs2);
            continue;
          }
          __gbifRelease();
          reject(err);
          return;
        }
      }
    });
    __gbifPump();
  });
}

function _fixMojibake(s){
  var v = String(s || "");
  if (!/[\u00C3\u00C2\u00E2]/.test(v)) return v;
  try {
    var bytes = new Uint8Array(v.length);
    for (var i = 0; i < v.length; i++) bytes[i] = v.charCodeAt(i) & 255;
    var decoded = new TextDecoder("utf-8", { fatal: false }).decode(bytes);
    return decoded || v;
  } catch(e){ return v; }
}
function _normText(s){ return _fixMojibake(s).replace(/\uFFFD/g, "").trim(); }

window.__bm_bundledSpeciesSet = null; // populated by _loadBundledLinnuliigidSpecies

window.__bm_addSpeciesIfMissing = function(name){
  try {
    if (!name || typeof name !== 'string') return false;
    var n = _normText(name);
    if (!n) return false;
    if (SPECIES.indexOf(n) !== -1) return false;
    SPECIES.push(n);
    DATA = SPECIES.map(function(est){ return { est: _normText(est), url: 'https://elurikkus.ee/app/occurrences/search?text=' + encodeURIComponent(_normText(est)) }; });
    if (typeof render === 'function') render();
    return true;
  } catch(e){ console.warn('[customSpecies] add failed', e); return false; }
};

window.__bm_removeCustomSpecies = function(name){
  try {
    if (!name || typeof name !== 'string') return false;
    var n = _normText(name);
    var i = SPECIES.indexOf(n);
    if (i === -1) return false;
    // Never remove bundled species
    if (window.__bm_bundledSpeciesSet && window.__bm_bundledSpeciesSet.has(n)) return false;
    SPECIES.splice(i, 1);
    DATA = SPECIES.map(function(est){ return { est: _normText(est), url: 'https://elurikkus.ee/app/occurrences/search?text=' + encodeURIComponent(_normText(est)) }; });
    try { if (typeof points === 'object' && points && points[n]) delete points[n]; } catch(_){}
    if (typeof save === 'function') save();
    if (typeof render === 'function') render();
    return true;
  } catch(e){ console.warn('[customSpecies] remove failed', e); return false; }
};

window.__bm_applyCustomSpeciesList = function(list){
  try {
    if (!Array.isArray(list)) return;
    var changed = false;
    for (var ci = 0; ci < list.length; ci++) {
      var n = (typeof list[ci] === 'string') ? _normText(list[ci]) : '';
      if (n && SPECIES.indexOf(n) === -1) {
        SPECIES.push(n);
        changed = true;
      }
    }
    if (changed) {
      DATA = SPECIES.map(function(est){ return { est: _normText(est), url: 'https://elurikkus.ee/app/occurrences/search?text=' + encodeURIComponent(_normText(est)) }; });
      if (typeof render === 'function') render();
    }
  } catch(e){ console.warn('[customSpecies] apply failed', e); }
};

window.__bm_reconcileCustomSpecies = function(list){
  try {
    if (!Array.isArray(list)) return;
    if (!window.__bm_bundledSpeciesSet) return;
    var allowed = {};
    for (var ri = 0; ri < list.length; ri++) {
      var rn = (typeof list[ri] === 'string') ? _normText(list[ri]) : '';
      if (rn) allowed[rn] = true;
    }
    var changed = false;
    for (var si = SPECIES.length - 1; si >= 0; si--) {
      var sn = SPECIES[si];
      if (window.__bm_bundledSpeciesSet.has(sn)) continue;
      if (!allowed[sn]) {
        SPECIES.splice(si, 1);
        try { if (typeof points === 'object' && points && points[sn]) delete points[sn]; } catch(_){}
        changed = true;
      }
    }
    if (changed) {
      DATA = SPECIES.map(function(est){ return { est: _normText(est), url: 'https://elurikkus.ee/app/occurrences/search?text=' + encodeURIComponent(_normText(est)) }; });
      if (typeof save === 'function') save();
      if (typeof render === 'function') render();
    }
  } catch(e){ console.warn('[customSpecies] reconcile failed', e); }
};

function _setRuntimeSpeciesList(list){
  const nextSpecies = [];
  const seen = new Set();
  for (const raw of (list || [])) {
    const key = _normText(raw);
    if(!key || seen.has(key)) continue;
    seen.add(key);
    nextSpecies.push(key);
  }
  SPECIES = nextSpecies;
  DATA = SPECIES.map(function(name){
    return { est: name, url: 'https://elurikkus.ee/app/occurrences/search?text=' + encodeURIComponent(name) };
  });
}

async function _loadBundledLinnuliigidSpecies(){
  try{
    const res = await fetch('/maps/linnuliigid/species.json', { cache: 'no-store' });
    if(!res.ok) return;
    const list = await res.json();
    if(!Array.isArray(list) || !list.length) return;
    // Capture bundled species set for reconciliation
    window.__bm_bundledSpeciesSet = new Set(list.map(function(s){ return _normText(s); }));
    const prevSerialized = JSON.stringify(SPECIES);
    _setRuntimeSpeciesList(list);
    if(JSON.stringify(SPECIES) === prevSerialized) return;
    setTimeout(function(){
      try{
        if(typeof refreshAllMarkers === 'function') refreshAllMarkers();
        else if(typeof render === 'function') render();
      }catch(e){}
    }, 0);
  }catch(e){}
}

    }

});

// Convert clean Unicode Estonian keys to the garbled double-encoded format used internally
function _toInternalKey(cleanKey) {
  if (!cleanKey) return cleanKey;
  return String(cleanKey)
    .replace(/õ/g, '\u00c3\u00b5').replace(/ä/g, '\u00c3\u00a4')
    .replace(/ö/g, '\u00c3\u00b6').replace(/ü/g, '\u00c3\u00bc')

}
function _toCleanKey(garbledKey) {
  if (!garbledKey) return garbledKey;
  return String(garbledKey)
    .replace(/\u00c3\u00b5/g, 'õ').replace(/\u00c3\u00a4/g, 'ä')

// Robust key normalizer: find the SPECIES entry that matches a cloud key via slug comparison
function _normalizeToInternal(key) {
  if (!key) return key;
  var s = String(key);
  if (typeof SPECIES !== 'undefined') {
    for (var i = 0; i < SPECIES.length; i++) { if (SPECIES[i] === s) return s; }
    var slug = slugifySpeciesKey(s);
    for (var i = 0; i < SPECIES.length; i++) { if (slugifySpeciesKey(SPECIES[i]) === slug) return SPECIES[i]; }
  }
  return _toInternalKey(key);
}

const __avatarPreloadCache = new Set();
function preloadAvatars(urls){
  try{
    if(!urls) return;
    for(const u of urls){
      if(!u || __avatarPreloadCache.has(u)) continue;
      __avatarPreloadCache.add(u);
      const img = new Image();
      img.decoding = 'async';
      img.loading = 'eager';
      img.src = u;
    }
  }catch(e){ /* ignore */ }
}

const __avatarProbeCache = new Map();
function probeAvatarFile(key){
  if(__avatarProbeCache.has(key)) return Promise.resolve(__avatarProbeCache.get(key));
  const slug = slugifySpeciesKey(key);
  const url = new URL('avatars/' + slug + '.webp', window.location.href).toString();
  return new Promise(resolve=>{
    const img = new Image();
    img.onload = ()=>{ __avatarProbeCache.set(key, url); resolve(url); };
    img.onerror = ()=>{ __avatarProbeCache.set(key, null); resolve(null); };
    img.src = url;
  });
}

    for(const {k,url} of results){
      if(url){ avatars[k] = url; changed = true; }
    }
    if(changed){
      save();
      preloadAvatars(Object.values(avatars));
      activeKeys.forEach(k=>{ try{ updateMarker(k); }catch(e){} });

function getDisplayAvatar(key){
  if(avatars[key]) return avatars[key];

  for(var k in avatars){

}

window.__bm_applySpeciesMetaToDicts = function(metaMap){
  try {
    if (!metaMap || typeof metaMap !== 'object') return;
    var sciAdded = 0, codeAdded = 0;
    for (var name in metaMap) {
      if (!metaMap.hasOwnProperty(name)) continue;
      var m = metaMap[name];
      if (!m || typeof m !== 'object') continue;
      var sci = (m.scientificName || '').trim();
      var code = (m.ebirdCode || '').trim();
      if (sci && (!SPECIES_SCINAMES[name] || SPECIES_SCINAMES[name] !== sci)) {
        SPECIES_SCINAMES[name] = sci;
        sciAdded++;
      }
      if (code && (!SPECIES_EBIRD_CODES[name] || SPECIES_EBIRD_CODES[name] !== code)) {
        SPECIES_EBIRD_CODES[name] = code;
        codeAdded++;
      }
    }
    if (sciAdded || codeAdded) {
      console.log('[customSpecies] applied meta to dicts:', { sciAdded: sciAdded, codeAdded: codeAdded });
    }
  } catch(e){ console.warn('[customSpecies] applySpeciesMetaToDicts failed', e); }
};

// One-time migration: bulk-import eBird codes into speciesMeta
(function migrateEbirdCodesToSpeciesMeta() {
  try {
    var MIGRATION_KEY = 'estbirding.speciesMeta.ebirdBulkImport.v1';
    if (localStorage.getItem(MIGRATION_KEY) === '1') return;
    var META_KEY = 'estbirding.speciesMeta.v1';
    var raw = localStorage.getItem(META_KEY);
    var meta = {};
    try { meta = JSON.parse(raw || '{}'); } catch(e) { meta = {}; }
    var updated = 0;
    for (var species in SPECIES_EBIRD_CODES) {
      if (!SPECIES_EBIRD_CODES.hasOwnProperty(species)) continue;
      var code = SPECIES_EBIRD_CODES[species];
      if (!meta[species]) meta[species] = { name: species };
      if (!meta[species].ebirdCode) { meta[species].ebirdCode = code; updated++; }
    }
    if (updated > 0) {
      localStorage.setItem(META_KEY, JSON.stringify(meta));
      localStorage.setItem('estbirding.speciesMeta.local.updatedAt', new Date().toISOString());
      console.info('eBird codes migration: wrote ' + updated + ' codes to speciesMeta');
    }
    localStorage.setItem(MIGRATION_KEY, '1');
  } catch(e) { console.warn('eBird codes migration failed:', e); }
})();

async function fetchCurrentYearSpringCandidateDates(speciesName, signal){

  const yearPrefix = String(year) + '-';
  const limit = 100;
  const maxPages = 30;
  const collected = [];

      if(!/^\d{4}-\d{2}-\d{2}$/.test(iso)) continue;
      if(iso.startsWith(yearPrefix)){
        collected.push(iso);

        pageHasOlderThanCurrentYear = true;

async function computeOcc7Offset(text, tryFetchHtml, signal){

    const html = await tryFetchHtml(url + (url.includes('?') ? '&' : '?') + '_cb=' + Date.now(), signal);
    const rows = parseSearchRows(html, url);

    if(page === 0) newestIso = rows[0].iso;
    oldestIso = rows[rows.length - 1].iso;
    let anyWithin = false;
    for(const r of rows){

      if(r && r.iso && !datesSeen.has(r.iso)){

async function debugOcc7Pages(species, maxPages){
  const pages = [];

  const seen = new Set();
  for(let page = 0; page < maxPages; page++){
    const offset = page * 100;
    const u = new URL('https://elurikkus.ee/app/occurrences/search');
    u.searchParams.set('text', species);
    u.searchParams.set('limit', '100');
    u.searchParams.set('offset', String(offset));
    u.searchParams.set('orderAscending', 'false');
    u.searchParams.set('orderBy', 'event_date_naive');
    u.searchParams.set('_dbg', String(Date.now()));
    let html = '';
    try{
      html = await tryFetch(u.toString());
    }catch(e){
      pages.push({ page: page + 1, url: u.toString(), error: String((e && e.message) || e) });
      break;
    }
    const rows = parseEluRowsForDebug(html, u.toString());
    if(!rows.length){
      pages.push({ page: page + 1, url: u.toString(), rows: 0, stop: 'no_rows' });
      break;
    }
    let uniqueWithin = 0;
    for(const r of rows){
      if(!r || !r.iso) continue;
      const uniqueKey = getEluRowUniqueKey(r);
      if(seen.has(uniqueKey)) continue;
      seen.add(uniqueKey);
      if(r.iso >= cutoff) uniqueWithin++;
    }
    const oldestIso = rows[rows.length - 1] ? (rows[rows.length - 1].iso || '') : '';
    pages.push({
      page: page + 1,
      url: u.toString(),
      rows: rows.length,
      firstOccId: rows[0] ? (rows[0].occId || '') : '',
      lastOccId: rows[rows.length - 1] ? (rows[rows.length - 1].occId || '') : '',
      newestIso: rows[0] ? (rows[0].iso || '') : '',
      oldestIso: oldestIso,
      within7dUnique: uniqueWithin
    });
    if(oldestIso && oldestIso < cutoff) break;
  }
  return pages;
}

function parseEluDetailCoordsFromJson(html) {

  function _ok(lat, lon) { return lat >= 57 && lat <= 60 && lon >= 21 && lon <= 29; }

  var m = s.match(/\\"coordinates\\":\{\\"is_restricted\\":(true|false),\\"longitude\\":(-?\d+(?:\.\d+)?),\\"latitude\\":(-?\d+(?:\.\d+)?)/);
  if (m) {
    var lat = parseFloat(m[3]), lon = parseFloat(m[2]);
    if (Number.isFinite(lat) && Number.isFinite(lon) && _ok(lat, lon))
      return { isRestricted: m[1] === 'true', lat: lat, lon: lon, _source: 'json-escaped-lon-first' };
  }
  m = s.match(/\\"coordinates\\":\{\\"is_restricted\\":(true|false),\\"latitude\\":(-?\d+(?:\.\d+)?),\\"longitude\\":(-?\d+(?:\.\d+)?)/);
  if (m) {
    var lat2 = parseFloat(m[2]), lon2 = parseFloat(m[3]);
    if (Number.isFinite(lat2) && Number.isFinite(lon2) && _ok(lat2, lon2))
      return { isRestricted: m[1] === 'true', lat: lat2, lon: lon2, _source: 'json-escaped-lat-first' };
  }

  // Unescaped form
  m = s.match(/"coordinates":\{"is_restricted":(true|false),"longitude":(-?\d+(?:\.\d+)?),"latitude":(-?\d+(?:\.\d+)?)/);
  if (m) {
    var lat3 = parseFloat(m[3]), lon3 = parseFloat(m[2]);
    if (Number.isFinite(lat3) && Number.isFinite(lon3) && _ok(lat3, lon3))
      return { isRestricted: m[1] === 'true', lat: lat3, lon: lon3, _source: 'json-plain-lon-first' };
  }
  m = s.match(/"coordinates":\{"is_restricted":(true|false),"latitude":(-?\d+(?:\.\d+)?),"longitude":(-?\d+(?:\.\d+)?)/);
  if (m) {
    var lat4 = parseFloat(m[2]), lon4 = parseFloat(m[3]);
    if (Number.isFinite(lat4) && Number.isFinite(lon4) && _ok(lat4, lon4))
      return { isRestricted: m[1] === 'true', lat: lat4, lon: lon4, _source: 'json-plain-lat-first' };
  }

  // Permissive fallback: find latitude/longitude separately within a "coordinates" block
  var block = s.match(/"coordinates"[^{]*\{([^{}]*)\}/) || s.match(/\\"coordinates\\"[^{]*\{([^{}]*)\}/);

    var inner = block[1];
    var latM = inner.match(/"latitude"[^0-9\-]*(-?\d+(?:\.\d+)?)/) || inner.match(/\\"latitude\\"[^0-9\-]*(-?\d+(?:\.\d+)?)/);
    var lonM = inner.match(/"longitude"[^0-9\-]*(-?\d+(?:\.\d+)?)/) || inner.match(/\\"longitude\\"[^0-9\-]*(-?\d+(?:\.\d+)?)/);
    var resM = inner.match(/"is_restricted"\s*:\s*(true|false)/) || inner.match(/\\"is_restricted\\"\s*:\s*(true|false)/);

      var lat5 = parseFloat(latM[1]), lon5 = parseFloat(lonM[1]);

        return { isRestricted: resM ? resM[1] === 'true' : false, lat: lat5, lon: lon5, _source: 'json-permissive' };
    }
  }

  return null;
}

    var dateIdx = -1;

      m = dtxt.match(/(\d{4}-\d{2}-\d{2}(?:\s+\d{2}:\d{2})?)/);

async function fetchSpringYearFirstOne(key){
  const dates = await fetchCurrentYearSpringCandidateDates(key);
  const year = new Date().getFullYear();
  const earliest = earliestInYearIsoAfterCutoff(dates, year, SPRING_CUTOFF_MMDD);
  const prevDisp = springYearFirst[key] ? isoToDdMm(springYearFirst[key]) : '';
  const nextDisp = earliest ? isoToDdMm(earliest) : '';
  console.info('[kevad-2026]', {
    species: key,
    candidates: dates.filter(function(d){ return String(d || '').startsWith(String(year) + '-'); }).join(',') || '-',
    count: dates.filter(function(d){ return String(d || '').startsWith(String(year) + '-'); }).length,
    selected: earliest || '',
    prev: prevDisp || '',
    next: nextDisp || '',
    source: 'full-year not map-snapshot',
  });
  if (!earliest) return;

  const prev = springYearFirst[key];
  if (prev && !isInvalidWinterValue(prev) && earliest > prev){
    console.warn('[kevad-2026] prevented later overwrite', { species: key, previous: prev, candidate: earliest });
    return;
  }
  if (earliest && (isInvalidWinterValue(prev) || !prev || earliest < prev)){
    springYearFirst[key] = earliest;
    localStorage.setItem(LS_SPRING_YEARFIRST, JSON.stringify(springYearFirst));
    console.info('[kevad-2026] updated', { species: key, previous: prevDisp || '', corrected: nextDisp || '' });
    if (typeof renderSpringPanel === 'function') renderSpringPanel();
  }
}

  __runId++;

function _scheduleLoadSnapshotRetry(reason){
  __pendingReload = true;
  if(__configDebounceTimer) clearTimeout(__configDebounceTimer);
  __configDebounceTimer = setTimeout(function(){
    __configDebounceTimer = null;
    if(__loaderStage === 'rate_limited' && __rateLimitRetryAtMs > Date.now()){
      __lastInfoMessage = 'Rate limited cooldown active; config retry deferred';
      _updateDebugPanel();
      return;
    }
    __lastInfoMessage = 'Config update queued (' + reason + ')';
    pushDebugEvent('SNAPSHOT_RETRY', 'Queued snapshot reload from config update', { reason: reason, runId: __runId });
    if(__snapshotInFlightRef){
      // Keep single-flight deterministic: let current request finish, then run one follow-up reload.
      return;
    }
    __pendingReload = false;
    loadSnapshot(false);
  }, CONFIG_RELOAD_DEBOUNCE_MS);
}

function _clearRateLimitTimers(){
  if(__rateLimitRetryTimer){ clearTimeout(__rateLimitRetryTimer); __rateLimitRetryTimer = null; }
  if(__rateLimitCountdownTimer){ clearInterval(__rateLimitCountdownTimer); __rateLimitCountdownTimer = null; }
  __rateLimitRetryAtMs = 0;
}
function _rateLimitRemainingSec(){
  if(!__rateLimitRetryAtMs) return 0;
  return Math.max(0, Math.ceil((__rateLimitRetryAtMs - Date.now()) / 1000));
}
function _calcRateLimitDelayMs(retryAfterSec){
  if(Number.isFinite(retryAfterSec) && retryAfterSec > 0){
    return Math.min(120000, Math.max(1000, Math.round(retryAfterSec * 1000)));
  }
  const base = RATE_LIMIT_BACKOFF_MS[Math.min(__rateLimitAttempt, RATE_LIMIT_BACKOFF_MS.length - 1)];
  const jitter = Math.round(base * (0.15 * Math.random()));
  return Math.min(120000, base + jitter);
}
function _scheduleRateLimitRetry(retryAfterSec){
  const delayMs = _calcRateLimitDelayMs(retryAfterSec);
  __rateLimitAttempt = Math.min(__rateLimitAttempt + 1, RATE_LIMIT_BACKOFF_MS.length - 1);
  _clearRateLimitTimers();
  __rateLimitRetryAtMs = Date.now() + delayMs;
  __lastErrorMessage = 'Rate limited';
  __lastInfoMessage = 'Rate limited, retrying in ' + _rateLimitRemainingSec() + 's';
  _showSnapshotBanner(__lastInfoMessage, 'warn');
  _updateDebugPanel();
  __rateLimitCountdownTimer = setInterval(function(){
    if(__loaderStage !== 'rate_limited'){
      if(__rateLimitCountdownTimer){ clearInterval(__rateLimitCountdownTimer); __rateLimitCountdownTimer = null; }
      return;
    }
    __lastInfoMessage = 'Rate limited, retrying in ' + _rateLimitRemainingSec() + 's';
    _showSnapshotBanner(__lastInfoMessage, 'warn');
    _updateProgressUI(0, 0, '');
    _updateDebugPanel();
  }, 1000);
  __rateLimitRetryTimer = setTimeout(function(){
    __rateLimitRetryTimer = null;
    if(__rateLimitCountdownTimer){ clearInterval(__rateLimitCountdownTimer); __rateLimitCountdownTimer = null; }
    _setLoaderStage('idle');
    loadSnapshot(true);
  }, delayMs);
}

  const staleNote = __serverMetaAvailable ? (_isServerDataStale(12) ? 'Server snapshot is stale' : 'Server data fresh') : '';

    : ((!__lastProcessedSnapshotId || __serverIsNewer) ? 'New server data available' : 'No new server data');
  const err = (__serverCheckStatus === 'error' && __serverCheckError) ? ('; check error: ' + __serverCheckError) : '';
  const ageText = (latestAgeHours == null) ? '-' : (latestAgeHours.toFixed(1) + 'h');
  if(clientWins){
    el.textContent = 'Elurikkus (client): latest occurrence ' + latestClient + ' | Snapshot (server, secondary): latest occurrence ' + latest + ' (age: ' + ageText + ') | built at ' + gen + ' | checked ' + chk + (staleNote ? (' | secondary note: ' + staleNote) : '') + err;
    return;

function _deriveMetaFromRowShape(row){
  if(!row || typeof row !== 'object') return null;
  const snapshotGeneratedAt = String(row.generated_at || row.snapshotGeneratedAt || '').trim();
  const totalItems = Number(row.progress_total || row.totalItems || 0) || 0;
  const payload = (row.points_json && typeof row.points_json === 'object') ? row.points_json : null;
  if(!payload) return null;
  const jsonText = JSON.stringify(row);
  const bytes = jsonText ? (new TextEncoder().encode(jsonText).length) : 0;
  let maxTs = 0;
  for(const k in payload){
    if(!Object.prototype.hasOwnProperty.call(payload, k)) continue;
    const v = payload[k] || {};
    let ts = _toDay(v.t || v.date || v.observed_at || v.eventDate || '');
    // Bug 2 fix: also scan items array — items may have fresher observedAt/rawObserved than top-level t
    if(Array.isArray(v.items)){
      for(let _ji = 0; _ji < v.items.length; _ji++){
        const _it = v.items[_ji] || {};
        const _its = _toDay(_it.observedAt || _it.rawObserved || _it.observed_at || _it.date || _it.t || '');
        if(_its && _its > ts) ts = _its;
      }
    }
    if(ts && ts > maxTs) maxTs = ts;
  }
  const dataMaxAt = maxTs > 0 ? new Date(maxTs).toISOString() : '';
  const itemCount = totalItems || Object.keys(payload).length;
  const snapshotId = String(bytes) + ':' + String(snapshotGeneratedAt || '-') + ':' + String(itemCount) + ':' + String(dataMaxAt || '-');
  return { snapshotId, snapshotGeneratedAt, bytes, totalItems: itemCount, dataMaxAt, dataMinAt: '' };
}
async function fetchServerMeta(){
  __serverCheckStatus = 'checking';
  __serverCheckError = '';
  _updateServerSnapshotStatus();
  try{
    const snapshotUrl = _resolveSnapshotApi();
    const metaUrl = _withCacheBuster(snapshotUrl + (snapshotUrl.indexOf('?') >= 0 ? '&' : '?') + 'meta=1');
    const traceId = _traceStart({ method: 'GET', url: metaUrl });
    const res = await fetch(metaUrl, {
      method:'GET',
      cache:'no-store',
      headers: { 'Accept': 'application/json' }
    });
    if(!res.ok) throw new Error('Meta fetch failed (HTTP ' + res.status + ')');
    const text = await res.text();
    const bytesRead = text ? (new TextEncoder().encode(text).length) : 0;
    let meta = {};
    try{ meta = text ? JSON.parse(text) : {}; }catch(e){ meta = {}; }
    _traceEnd(traceId, { status: res.status, ok: !!res.ok, bytesRead: bytesRead, details: { responseKeys: meta && typeof meta === 'object' ? Object.keys(meta) : [] } });
    const normalized = {
      snapshotId: String((meta && meta.snapshotId) || '').trim(),
      snapshotGeneratedAt: String((meta && (meta.snapshotGeneratedAt || meta.generatedAt)) || '').trim(),
      bytes: Number((meta && meta.bytes) || 0) || 0,
      totalItems: Number((meta && meta.totalItems) || 0) || 0,
      dataMaxAt: String((meta && meta.dataMaxAt) || '').trim(),
      dataMinAt: String((meta && meta.dataMinAt) || '').trim(),
    };
    // Bug 2 fix: explicitly detect row-shape payload (has points_json key) and derive meta from it
    if(meta && typeof meta === 'object' && 'points_json' in meta){
      console.log('[fix] fetchServerMeta: row-shape payload detected (has points_json), calling _deriveMetaFromRowShape');
      const rowFallback = _deriveMetaFromRowShape(meta);
      if(rowFallback){
        if(rowFallback.snapshotId) normalized.snapshotId = rowFallback.snapshotId;
        if(rowFallback.snapshotGeneratedAt) normalized.snapshotGeneratedAt = rowFallback.snapshotGeneratedAt;
        if(rowFallback.bytes) normalized.bytes = rowFallback.bytes;
        if(rowFallback.totalItems) normalized.totalItems = rowFallback.totalItems;
        if(rowFallback.dataMaxAt) normalized.dataMaxAt = rowFallback.dataMaxAt;
        if(rowFallback.dataMinAt) normalized.dataMinAt = rowFallback.dataMinAt;
      }
    }
    if(!normalized.snapshotId || !normalized.dataMaxAt || !normalized.bytes || !normalized.totalItems){
      const fallback = _deriveMetaFromRowShape(meta);
      if(fallback){
        normalized.snapshotId = fallback.snapshotId;
        normalized.snapshotGeneratedAt = fallback.snapshotGeneratedAt;
        normalized.bytes = fallback.bytes;
        normalized.totalItems = fallback.totalItems;
        normalized.dataMaxAt = fallback.dataMaxAt;
        normalized.dataMinAt = fallback.dataMinAt;
      }
    }
    const missing = [];
    if(!normalized.snapshotId) missing.push('snapshotId');
    if(!normalized.dataMaxAt) missing.push('dataMaxAt');
    if(!(normalized.bytes >= 0)) missing.push('bytes');
    if(!(normalized.totalItems >= 0)) missing.push('totalItems');
    if(missing.length){
      __serverMetaAvailable = false; console.log('[meta-trace]', 'fetchServerMeta missing-fields → false, missing=', missing.join(','), new Error().stack);
      __serverMetaFailCount++;
      __serverCheckStatus = 'error';
      __serverCheckError = 'Meta endpoint missing fields: ' + missing.join(', ');
      console.log('[fix] fetchServerMeta: missing fields (fail#' + __serverMetaFailCount + '):', missing.join(', '), '— loadSnapshot will still run via !__serverMetaAvailable');
      _updateServerSnapshotStatus();
      _updateDebugPanel();
      return null;
    }
    __serverSnapshotId = normalized.snapshotId;
    __serverGeneratedAt = normalized.snapshotGeneratedAt;
    __serverBytes = normalized.bytes;
    __serverDataMaxAt = normalized.dataMaxAt;
    __serverDataMinAt = normalized.dataMinAt;
    __serverCheckedAt = new Date().toISOString();
    __serverMetaAvailable = true; console.log('[meta-trace]', 'fetchServerMeta success → true, snapshotId=', __serverSnapshotId);
    __serverIsNewer = !!(__serverMetaAvailable && __lastProcessedSnapshotId && (__serverSnapshotId !== __lastProcessedSnapshotId));
    __serverCheckStatus = 'ok';
    logInfo('Server meta fetched', { snapshotId: __serverSnapshotId, dataMaxAt: __serverDataMaxAt, bytes: __serverBytes });
    _updateServerSnapshotStatus();
    _updateDebugPanel();
    return {
      snapshotId: __serverSnapshotId,
      snapshotGeneratedAt: __serverGeneratedAt,
      bytes: __serverBytes,
      dataMaxAt: __serverDataMaxAt,
      dataMinAt: __serverDataMinAt,
      metaAvailable: __serverMetaAvailable
    };
  }catch(e){
    __serverCheckedAt = new Date().toISOString();
    __serverMetaAvailable = false; console.log('[meta-trace]', 'fetchServerMeta catch → false', new Error().stack);
    __serverMetaFailCount++;
    __serverCheckStatus = 'error';
    __serverCheckError = String((e && e.message) ? e.message : e || 'meta fetch failed');
    console.log('[fix] fetchServerMeta: catch (fail#' + __serverMetaFailCount + '):', __serverCheckError, '— loadSnapshot will still run via !__serverMetaAvailable');
    logWarn('Server meta fetch failed', { error: __serverCheckError });
    _updateServerSnapshotStatus();
    _updateDebugPanel();
    return null;
  }
}

async function requestServerRebuild(){
  const snapshotUrl = _resolveSnapshotApi();
  const rebuildUrl = _withCacheBuster(snapshotUrl + (snapshotUrl.indexOf('?') >= 0 ? '&' : '?') + 'rebuild=1');
  const traceId = _traceStart({ method: 'GET', url: rebuildUrl });
  let res = await fetch(rebuildUrl, {
    method:'GET',
    cache:'no-store',
    headers: { 'Accept': 'application/json' }
  });
  let json = await res.json().catch(function(){ return {}; });
  if(!(res.ok || res.status === 202)){
    res = await fetch(_withCacheBuster(snapshotUrl), {
      method:'POST',
      cache:'no-store',
      headers: { 'Accept': 'application/json', 'Content-Type': 'application/json' },
      body: JSON.stringify({ action: 'rebuild' })
    });
    json = await res.json().catch(function(){ return {}; });
  }
  _traceEnd(traceId, { status: res.status, ok: !!res.ok, bytesRead: null, details: { responseKeys: json && typeof json === 'object' ? Object.keys(json) : [] } });
  const keys = json && typeof json === 'object' ? Object.keys(json) : [];
  const looksLikeRow = keys.indexOf('points_json') >= 0 && keys.indexOf('id') >= 0;
  if(looksLikeRow){
    throw new Error('Rebuild endpoint returned row-shape payload; expected status/snapshotId/dataMaxAt');
  }
  if(!(res.ok || res.status === 202)){
    logError('Rebuild request failed', { status: res.status });
    throw new Error('Rebuild request failed (HTTP ' + res.status + ')');
  }
  logInfo('Rebuild request response', {
    status: json && json.status,
    snapshotId: json && json.snapshotId,
    dataMaxAt: json && json.dataMaxAt,
    upstreamDataMaxAt: json && json.upstreamDataMaxAt
  });
  return json || {};
}

async function waitForSnapshotChange(previousSnapshotId, timeoutMs){
  const started = Date.now();
  const maxMs = Math.max(10000, Number(timeoutMs || 120000) || 120000);
  while((Date.now() - started) < maxMs){
    const meta = await fetchServerMeta();
    const cur = String((meta && meta.snapshotId) || __serverSnapshotId || '');
    if(cur && previousSnapshotId && cur !== previousSnapshotId) return true;
    if(cur && !previousSnapshotId) return true;
    await _delay(10000);
  }
  return false;
}
async function triggerRefreshDataFlow(){
  try{
    const beforeMeta = await fetchServerMeta();
    const previousSnapshotId = String((beforeMeta && beforeMeta.snapshotId) || __serverSnapshotId || '');
    const previousDataMaxAt = String((beforeMeta && beforeMeta.dataMaxAt) || __serverDataMaxAt || '');
    const stale = _isServerDataStale(12);
    _showSnapshotBanner('Requesting server rebuild...');
    const rebuild = await requestServerRebuild();
    const rebuildStatus = String((rebuild && rebuild.status) || '');
    const rebuildUpstreamDataMaxAt = String((rebuild && rebuild.upstreamDataMaxAt) || '');
    const rebuildBuiltDataMaxAt = String((rebuild && rebuild.dataMaxAt) || '');
    if(rebuildStatus === 'building' || rebuildStatus === 'rebuilt'){
      await waitForSnapshotChange(previousSnapshotId, 120000);
    } else if(rebuildStatus === 'cooldown'){
      await fetchServerMeta();
    } else if(stale){
      await waitForSnapshotChange(previousSnapshotId, 120000);
    }
    const afterMeta = await fetchServerMeta();
    await loadSnapshot(true);
    const nextDataMaxAt = String((afterMeta && afterMeta.dataMaxAt) || __serverDataMaxAt || '');
    if(rebuildBuiltDataMaxAt){
      _showSnapshotBanner('Rebuild result: built dataMaxAt=' + _fmtTs(rebuildBuiltDataMaxAt) + (rebuildUpstreamDataMaxAt ? (', upstreamDataMaxAt=' + _fmtTs(rebuildUpstreamDataMaxAt)) : ''), 'warn');
    }
    if(rebuildUpstreamDataMaxAt && previousDataMaxAt && rebuildUpstreamDataMaxAt === previousDataMaxAt){
      _showSnapshotBanner('Upstream unchanged (likely Elurikkus cache/stale): ' + _fmtTs(rebuildUpstreamDataMaxAt), 'warn');
    } else if(nextDataMaxAt && previousDataMaxAt && nextDataMaxAt === previousDataMaxAt){
      _showSnapshotBanner('Rebuilt, but upstream data unchanged (still ' + _fmtTs(nextDataMaxAt) + ')', 'warn');
    }
  }catch(e){
    __lastErrorMessage = String((e && e.message) ? e.message : e || 'refresh data flow failed');
    pushDebugEvent('REFRESH_FLOW_FALLBACK', 'Refresh flow failed, falling back to snapshot GET', { error: __lastErrorMessage }, 'warn');
    _showSnapshotBanner('Rebuild check failed, loading latest snapshot...', 'warn');
    await loadSnapshot(true);
  }
}

function _setResumeIndex(i){
  let next = Math.max(0, Number(i) || 0);
  if(__snapshotProgressTotal > 0){
    next = Math.min(next, Math.max(0, __snapshotProgressTotal - 1));
  }
  try { localStorage.setItem(ESTONIA_REFRESH_INDEX_KEY, String(next)); } catch(e){}
  _persistResumeState({
    resumeIndex: next,
    progress_done: (__snapshotProgressTotal > 0 ? Math.max(0, Number(__snapshotProgressDone || next) || 0) : next),
    progress_total: Math.max(0, Number(__snapshotProgressTotal || 0) || 0),
    status: String((__snapshotMeta && __snapshotMeta.status) || (__isRefreshRunning ? 'running' : '') || 'running'),
  });
}
function _getResumeIndex(){
  const valid = _validateAndSyncResumeState({ quiet: true });
  if(valid) return Math.max(0, Number(valid.resumeIndex || valid.progress_done || 0) || 0);
  try {
    let idx = Math.max(0, Number(localStorage.getItem(ESTONIA_REFRESH_INDEX_KEY) || 0) || 0);
    if(__snapshotProgressTotal > 0) idx = Math.min(idx, Math.max(0, __snapshotProgressTotal - 1));
    return idx;
  } catch(e){ return 0; }
}
function _isResumeTerminalStatus(status){

  return s === 'ready' || s === 'finished' || s === 'completed' || s === 'complete' || s === 'success';

function _clearResumeState(reason, logLine){
  const keys = _resumeStorageKeys();
  for(let i = 0; i < keys.length; i++){
    try{ localStorage.removeItem(keys[i]); }catch(e){}
    try{ sessionStorage.removeItem(keys[i]); }catch(e){}
  }
  if(logLine) console.log(logLine);
  pushDebugEvent('RESUME_CLEAR', 'Resume state cleared', { reason: reason || 'unknown', keys: keys });

}
function _persistResumeState(input){
  const total = Math.max(0, Number(input && input.progress_total || 0) || 0);
  const doneRaw = Math.max(0, Number(input && input.progress_done || 0) || 0);
  const done = total > 0 ? Math.min(doneRaw, total) : doneRaw;
  const resumeIndexRaw = Math.max(0, Number(input && input.resumeIndex != null ? input.resumeIndex : done) || 0);
  const resumeIndex = total > 0 ? Math.min(resumeIndexRaw, Math.max(0, total - 1)) : resumeIndexRaw;
  const status = String(input && input.status || (__isRefreshRunning ? 'running' : (__snapshotMeta && __snapshotMeta.status) || 'running'));
  if(!total || done >= total || _isResumeTerminalStatus(status)){
    return _clearResumeState('completed', '[resume] completed state, hiding resume');
  }
  const state = {
    buildId: MAP_BUILD_ID,
    buildStamp: MAP_BUILD_STAMP,
    savedAt: new Date().toISOString(),
    status: status,
    progress_done: done,
    progress_total: total,
    resumeIndex: resumeIndex,
  };
  try{
    localStorage.setItem(ESTONIA_RESUME_STATE_KEY, JSON.stringify(state));

  const base = SNAPSHOT_ERROR_BACKOFF_MS[idx];
  const jitter = Math.round(base * 0.2 * Math.random());
  __snapshotErrorRetryAttempt = Math.min(__snapshotErrorRetryAttempt + 1, SNAPSHOT_ERROR_BACKOFF_MS.length - 1);
  return base + jitter;
}
function _startWatchdog(){
  _stopWatchdog();
  __watchdogActive = false;
  __resumeLastAdvancedAtMs = Date.now();
  __lastResumeIndexSeen = _getResumeIndex();
  __watchdogTimer = setInterval(function(){
    if(!__isRefreshRunning) return;
    if(__loaderStage !== 'processing') return;
    if(__snapshotProgressTotal <= 0) return;
    if(__activeFetchStartedAtMs > 0 && (Date.now() - __activeFetchStartedAtMs) < FETCH_INFLIGHT_TIMEOUT_MS) return;
    const now = Date.now();
    const idx = _getResumeIndex();
    if(idx !== __lastResumeIndexSeen){
      __lastResumeIndexSeen = idx;
      __resumeLastAdvancedAtMs = now;
      return;
    }
    if((now - __resumeLastAdvancedAtMs) < WATCHDOG_MS) return;
    if(__watchdogActive) return;
    __watchdogActive = true;
    const nextIndex = Math.min(idx + 1, Math.max(0, __snapshotProgressTotal - 1));
    __lastFailedIndex = idx;
    __lastInfoMessage = 'Watchdog advanced stalled index ' + idx + ' -> ' + nextIndex;
    _recordWatchdogEvent(idx, nextIndex, 'watchdog');
    _pushIndexTrace(idx, 'watchdog', 'watchdog_timeout');
    pushDebugEvent('INDEX_RETRY', 'Watchdog advanced stalled index', { from: idx, to: nextIndex, runId: __runId }, 'warn');
    _setResumeIndex(nextIndex);
    _showSnapshotBanner(__lastInfoMessage, 'warn');
    __resumeLastAdvancedAtMs = now;
    pushDebugEvent('WATCHDOG_ABORT', 'Watchdog aborting active step', { index: idx, runId: __runId }, 'warn');
    try{ if(__activeStepController) __activeStepController.abort('watchdog_timeout'); }catch(e){}
    _abortActiveRequest();
    _controlSkipOnServer(nextIndex, 'watchdog')
      .then(function(payload){
        if(Number(payload && payload.progress_done || 0) < nextIndex){
          __lastInfoMessage = 'Skip command sent, but server did not advance. Check runner job storage.';
          _showSnapshotBanner(__lastInfoMessage, 'warn');
        }
      })
      .catch(function(err){
        __lastInfoMessage = 'Watchdog control request failed: ' + String(err && err.message ? err.message : err);
      })
      .finally(function(){
        __watchdogActive = false;
        loadSnapshotOnce();
      });
  }, 5000);
}
function _stopWatchdog(){
  if(__watchdogTimer){ clearInterval(__watchdogTimer); __watchdogTimer = null; }
  __activeFetchStartedAtMs = 0;
  __watchdogActive = false;
}

// Remove debug/trace fields that must never persist. Denylist (keeps every real field
// incl. coordLock / coords_source / coordsSource — only debug/trace keys are dropped).
function _stripEntryDebug(e){
  if(!e || typeof e !== 'object') return e;
  const out = {};
  for(const k in e){
    if(k === 'lastCoordDecision' || k === 'lastSelectedApply') continue;
    if(k.indexOf('__') === 0) continue;            // any __-prefixed top-level field
    if(k === 'eluExtra' && e.eluExtra && typeof e.eluExtra === 'object'){
      const ex = {};
      for(const xk in e.eluExtra){ if(xk.indexOf('__') === 0) continue; ex[xk] = e.eluExtra[xk]; }
      out.eluExtra = ex;
    } else {
      out[k] = e[k];
    }
  }
  return out;
}
function serializePoints(pts){
  const out = {};
  for(const k in pts) out[k] = _stripEntryDebug(pts[k]);
  return out;
}
function saveSnapshotLocal(){

function applySnapshot(snapshot){

  if(!snapshot.payload || typeof snapshot.payload !== 'object' || !snapshot.payload.points || typeof snapshot.payload.points !== 'object'){
    snapshotDebugNote = 'snapshot corrupted';
    return false;

  console.log('[NETTA-TRACE] applySnapshot(local) ENTRY:', JSON.stringify({
    local_before: (points && points['Punanokk-vart']) ? points['Punanokk-vart'] : null,
    local_snap_has: incomingPoints['Punanokk-vart'] || null,
    snapshot_createdAt: snapshot && snapshot.createdAt,
  }));
  const mergedPoints = Object.assign({}, points || {});
  Object.keys(incomingPoints).forEach(function(key){
    const incoming = incomingPoints[key];
    const existing = mergedPoints[key];
    if(existing &&
       String(existing.coordLock || '') === 'exact' &&
       String(existing.coordsSource || existing.coords_source || '') === 'elurikkus_occurrence_detail' &&
       Number.isFinite(Number(existing.lat)) &&

        console.log('[NETTA-TRACE] points WRITE at LOCAL_SNAP_PRESERVE_EXACT (existing kept):',
          JSON.stringify({
            lat: existing.lat, lon: existing.lon,
            cellLat: existing.cellLat, cellLon: existing.cellLon,
            occ7: existing.occ7, occ7Ebird: existing.occ7Ebird, occ7Elu: existing.occ7Elu,
            t: existing.t, src: existing.src,
            clientScannedAt: existing.clientScannedAt, lastFetched: existing.lastFetched,
          })
        );
      }
      return;
    }
    mergedPoints[key] = incoming;
    if (key === 'Punanokk-vart') {
      console.log('[NETTA-TRACE] points WRITE at LOCAL_SNAP_OVERWRITE:',
        JSON.stringify({
          lat: mergedPoints[key]?.lat, lon: mergedPoints[key]?.lon,
          cellLat: mergedPoints[key]?.cellLat, cellLon: mergedPoints[key]?.cellLon,
          occ7: mergedPoints[key]?.occ7, occ7Ebird: mergedPoints[key]?.occ7Ebird, occ7Elu: mergedPoints[key]?.occ7Elu,
          t: mergedPoints[key]?.t, src: mergedPoints[key]?.src,
          clientScannedAt: mergedPoints[key]?.clientScannedAt, lastFetched: mergedPoints[key]?.lastFetched,
          existing_had_lat: existing?.lat, existing_had_lon: existing?.lon, existing_coordLock: existing?.coordLock, existing_coordsSource: existing?.coordsSource || existing?.coords_source,
        })

    }

    local_after: (points && points['Punanokk-vart']) ? points['Punanokk-vart'] : null,
  }));
  dataMode = 'snapshot';
  lastSnapshotAt = snapshot.createdAt || null;
  snapshotDebugNote = null;

  try{ setTimeout(function(){ map.invalidateSize(); }, 200); }catch(e){}
  return true;
}

      progress_done: __snapshotProgressDone,
      progress_total: __snapshotProgressTotal,
      resumeIndex: Number(done || 0),
      status: 'running',

    __currentIndex = (__processedCount < __totalItems ? __processedCount : null);
    if(__currentIndex != null) _pushIndexTrace(__currentIndex, 'start');
    if(done > __lastProgressDone){
      __lastProgressDone = done;
      __lastProgressAt = Date.now();
      __lastProgressAtMs = __lastProgressAt;

      __lastHangProgressDone = done;

      if(__lastProcessedIndex != null) _pushIndexTrace(__lastProcessedIndex, 'done');
    }
    if(!_guardIndexState()){
      _updateIndexProgressLine();
      _updateDebugPanel();

    }
    prog.textContent = 'Client processing: ' + done + '/' + total;
    if(bar){ bar.style.display='block'; barInner.style.width = Math.round(done/total*100)+'%'; }
    if(stopBtn) stopBtn.style.display='inline-block';
  } else {
    if(status === 'ready' && __snapshotProgressTotal <= 0){
      __snapshotProgressTotal = SPECIES.length;
      __snapshotProgressDone = __snapshotProgressTotal;
    }
    _setIndexStateFromCounts(__snapshotProgressDone, __snapshotProgressTotal);
    if(status === 'ready'){
      __currentIndex = null;
      __nextIndex = __totalItems;
      __processedCount = __totalItems;
    }
    prog.textContent = status === 'ready' ? 'Data loaded' : (status === 'error' ? 'Refresh failed' : '');
    if(bar) bar.style.display='none';
    if(stopBtn) stopBtn.style.display='none';
    if(_isResumeTerminalStatus(status)){
      _clearResumeState('completed', '[resume] completed state, hiding resume');
    } else {
      _updateResumeButton(_validateAndSyncResumeState({ quiet: true }));
    }
  }
  _updateServerSnapshotStatus();
  _updateIndexProgressLine();
  _updateDebugPanel();
}

function _computeCutoffIso(){
  return cutoffIso7d() + 'T00:00:00.000Z';
}
function _explainInclusion(key, p){
  const point = p || {};
  const parsedTs = _toDay(point.t || '');
  const cutoffTs = _toDay(cutoffIso7d() + 'T00:00:00') || 0;
  const hasCoords = Number.isFinite(point.lat) && Number.isFinite(point.lon);
  const hasDate = Number.isFinite(parsedTs) && parsedTs > 0;
  const ageDays = hasDate ? ((Date.now() - parsedTs) / (24 * 60 * 60 * 1000)) : null;
  const withinByDate = hasDate && parsedTs >= cutoffTs;
  const withinByOcc7 = Number.isFinite(point.occ7) && point.occ7 > 0;
  const withinEffective = hasRecentObservation(point);
  const reasonsExcluded = [];
  if(point.visible === false) reasonsExcluded.push('SOURCE_DISABLED');
  if(!hasCoords) reasonsExcluded.push('MISSING_COORDS');
  if(!hasDate) reasonsExcluded.push('MISSING_DATE');
  if(is7daysOnly()){
    if(!withinEffective) reasonsExcluded.push('OUTSIDE_7D');
  }
  return {
    species: key,
    included: reasonsExcluded.length === 0,
    reasonsExcluded: reasonsExcluded,
    rawObserved: point.t || null,
    parsedDate: hasDate ? new Date(parsedTs).toISOString() : null,
    displayedDate: point.t ? formatDateEE(point.t) : null,
    ageDays: ageDays,
    hasCoords: hasCoords,
    coordsStatus: point.coords_status || (hasCoords ? 'public' : 'missing'),
    coordsSource: point.coords_source || (hasCoords ? 'exact' : 'none'),
    occ7: Number(point.occ7 || 0) || 0,
    occ7Source: String(point.occ7Source || ''),
    withinByDate: !!withinByDate,
    withinByOcc7: !!withinByOcc7,
    passesRecent: !!withinEffective,
    usedFallback: !!(String(point.coords_source || '').indexOf('snapshot') >= 0 || String(point.coords_source || '').indexOf('centroid') >= 0),
  };
}
function _computeSnapshotInspector(){
  const rows = [];
  for(const key of SPECIES){
    const p = points[key] || {};
    rows.push({
      species: key,
      t: String(p.t || ''),
      src: String(p.src || ''),
      hasCoords: Number.isFinite(p.lat) && Number.isFinite(p.lon),
      coordsStatus: String(p.coords_status || (Number.isFinite(p.lat) && Number.isFinite(p.lon) ? 'public' : 'missing')),
      coordsSource: String(p.coords_source || (Number.isFinite(p.lat) && Number.isFinite(p.lon) ? 'exact' : 'none')),
      occ7: Number(p.occ7 || 0) || 0,
      lat: p.lat,
      lon: p.lon,
    });
  }
  const dated = rows.map(function(r){
    const ts = _toDay(r.t || '');
    return Object.assign({}, r, { ts: ts && ts > 0 ? ts : 0 });
  }).filter(function(r){ return r.ts > 0; });
  const latestTs = dated.length ? Math.max.apply(null, dated.map(function(r){ return r.ts; })) : 0;
  const oldestTs = dated.length ? Math.min.apply(null, dated.map(function(r){ return r.ts; })) : 0;
  function bucket(ts){
    const ageDays = (Date.now() - ts) / (24 * 60 * 60 * 1000);
    if(ageDays < 1) return '0-1d';
    if(ageDays < 2) return '1-2d';
    if(ageDays < 3) return '2-3d';
    if(ageDays < 7) return '3-7d';
    if(ageDays < 14) return '7-14d';
    return '14d+';
  }
  const hist = { '0-1d': 0, '1-2d': 0, '2-3d': 0, '3-7d': 0, '7-14d': 0, '14d+': 0 };
  for(const r of dated){ hist[bucket(r.ts)]++; }
  const newestSamples = dated.slice().sort(function(a,b){ return b.ts - a.ts; }).slice(0,10).map(function(r){
    return {
      species: r.species,
      date: new Date(r.ts).toISOString(),
      source: r.src || '',
      coordsPresent: !!r.hasCoords,
      coordsStatus: r.coordsStatus,
      coordsSource: r.coordsSource,
      rawObserved: r.t || null,
      parsedTimestamp: r.ts ? new Date(r.ts).toISOString() : null,
      displayedDate: r.t ? formatDateEE(r.t) : null,
      id: r.species + ':' + (r.t || ''),
    };
  });
  const perSpecies = rows.map(function(r){
    const ts = _toDay(r.t || '');
    const newest = ts && ts > 0 ? ts : 0;
    return {
      species: r.species,
      countTotal: (r.hasCoords || r.t) ? 1 : 0,
      newestTs: newest,
      newestDate: newest ? new Date(newest).toISOString() : null,
      countWithin7d: (newest && ((Date.now() - newest) <= 7*24*60*60*1000)) || ((Number(r.occ7||0)||0) > 0) ? 1 : 0,
    };
  });
  const stalestSpecies = perSpecies.filter(function(x){ return !!x.newestTs; }).sort(function(a,b){ return a.newestTs - b.newestTs; }).slice(0,20);
  return {
    snapshotGeneratedAt: __serverGeneratedAt || (__snapshotMeta.generated_at || null),
    snapshotBytes: Number(__lastResponseBytes || __serverBytes || 0),
    totalItemsRaw: rows.length,
    latestOccurrenceAt: latestTs ? new Date(latestTs).toISOString() : null,
    oldestOccurrenceAt: oldestTs ? new Date(oldestTs).toISOString() : null,
    stalenessHours: latestTs ? ((Date.now() - latestTs) / (60*60*1000)) : null,
    histogram: hist,
    newestSamples: newestSamples,
    stalestSpecies: stalestSpecies,
  };
}
function _calcDataRangeFromPointsJson(pointsJson){
  let maxTs = 0;
  let minTs = Number.POSITIVE_INFINITY;
  const src = (pointsJson && typeof pointsJson === 'object') ? pointsJson : {};
  for(const k in src){
    if(!Object.prototype.hasOwnProperty.call(src, k)) continue;
    const v = src[k] || {};
    const ts = _toDay(v.t || v.date || v.observed_at || v.eventDate || '');
    if(ts && ts > 0){
      if(ts > maxTs) maxTs = ts;
      if(ts < minTs) minTs = ts;
    }
  }
  return {
    dataMaxAt: maxTs > 0 ? new Date(maxTs).toISOString() : '',
    dataMinAt: Number.isFinite(minTs) ? new Date(minTs).toISOString() : '',
  };
}
function _computeFilterVerifier(){
  const reasons = {};
  let included = 0;
  let excluded = 0;
  const olderIncluded = [];
  const freshExcluded = [];
  for(const key of SPECIES){
    const p = points[key] || {};
    const exp = _explainInclusion(key, p);
    if(exp.included) included++; else excluded++;
    for(const r of exp.reasonsExcluded){ reasons[r] = (reasons[r] || 0) + 1; }
    if(exp.included && is7daysOnly() && Number.isFinite(exp.ageDays) && exp.ageDays > 7){
      olderIncluded.push(exp);
    }
    if(!exp.included && Number.isFinite(exp.ageDays) && exp.ageDays <= 7){
      freshExcluded.push(exp);
    }
  }
  return {
    included: included,
    excluded: excluded,
    reasons: reasons,
    olderIncluded: olderIncluded.slice(0,20),
    freshExcluded: freshExcluded.slice(0,20),
  };
}
function _computeIndexAudit(totalItems, currentIndex, nextIndex, processedCount, lastProcessedIndex, indexTrace){
  const N = Math.max(0, Number(totalItems || 0) || 0);
  const expected = [];
  for(let i = 0; i < N; i++) expected.push(i);
  const doneCounts = new Map();
  const doneSet = new Set();
  const startSet = new Set();
  const outOfRangeEvents = [];
  const trace = Array.isArray(indexTrace) ? indexTrace.slice() : [];
  for(const ev of trace){
    const idx = Number.isFinite(ev && ev.index) ? Number(ev.index) : null;
    const action = String((ev && ev.action) || '');
    if(idx != null){
      if(idx < 0 || idx >= N){
        outOfRangeEvents.push({ ts: ev && ev.ts || '', index: idx, action: action });
      }
      if(action === 'done'){
        doneSet.add(idx);
        doneCounts.set(idx, (doneCounts.get(idx) || 0) + 1);
      }
      if(action === 'start'){
        startSet.add(idx);
      }
    }
  }
  const doneList = Array.from(doneSet.values()).sort(function(a,b){ return a - b; });
  const minDone = doneList.length ? doneList[0] : null;
  const maxDone = doneList.length ? doneList[doneList.length - 1] : null;
  const missingDone = expected.filter(function(i){ return !doneSet.has(i); });
  const duplicateDone = Array.from(doneCounts.entries()).filter(function(row){ return row[1] > 1; }).map(function(row){ return row[0]; }).sort(function(a,b){ return a - b; });

  let lastIndexChangeAt = null;
  let lastSeenIndex = null;
  const chronological = trace.slice().sort(function(a,b){
    return new Date(a && a.ts || 0).getTime() - new Date(b && b.ts || 0).getTime();
  });
  for(const ev of chronological){
    const idx = Number.isFinite(ev && ev.index) ? Number(ev.index) : null;
    if(idx == null) continue;
    if(lastSeenIndex == null || idx !== lastSeenIndex){
      lastSeenIndex = idx;
      lastIndexChangeAt = ev && ev.ts ? String(ev.ts) : null;
    }
  }
  let stuckSuspected = false;
  let stuckIndex = null;
  if(__loaderStage === 'processing' && Number.isFinite(currentIndex)){
    const lastChangeMs = lastIndexChangeAt ? new Date(lastIndexChangeAt).getTime() : NaN;
    if(Number.isFinite(lastChangeMs) && (Date.now() - lastChangeMs) > 10000){
      stuckSuspected = true;
      stuckIndex = Number(currentIndex);
    }
  }
  return {
    range: { start: 0, end: Math.max(0, N - 1) },
    minDone: minDone,
    maxDone: maxDone,
    uniqueDoneCount: doneSet.size,
    startUniqueCount: startSet.size,
    missingDoneCount: missingDone.length,
    missingDonePreview: missingDone.slice(0,20),
    duplicateDoneCount: duplicateDone.length,
    duplicateDonePreview: duplicateDone.slice(0,20),
    outOfRangeCount: outOfRangeEvents.length,
    outOfRangePreview: outOfRangeEvents.slice(0,20),
    lastIndexChangeAt: lastIndexChangeAt,
    stuckSuspected: stuckSuspected,
    stuckIndex: stuckIndex,
    currentIndex: Number.isFinite(currentIndex) ? Number(currentIndex) : null,
    nextIndex: Number.isFinite(nextIndex) ? Number(nextIndex) : 0,
    processedCount: Number.isFinite(processedCount) ? Number(processedCount) : 0,
    lastProcessedIndex: Number.isFinite(lastProcessedIndex) ? Number(lastProcessedIndex) : null,
  };
}

function _updateDebugPanel(){
  const el = document.getElementById('debugContent');
  const totalWithCoords = SPECIES.filter(n => { const p = points[n]; return p && Number.isFinite(p.lat); }).length;
  const visibleByOcc7 = SPECIES.filter(function(n){
    const p = points[n];
    if(!p || !(Number.isFinite(p.lat) && Number.isFinite(p.lon))) return false;
    const occ7 = (p.occ7 === 0 || p.occ7) ? Number(p.occ7) : NaN;
    return Number.isFinite(occ7) && occ7 > 0;
  }).length;
  const progressDone = Number(__snapshotProgressDone || 0);
  const progressTotal = Number(__snapshotProgressTotal || 0);
  const cutoffDate = new Date(Date.now() - 7 * 24 * 60 * 60 * 1000);
  const cutoffStr = cutoffDate.getFullYear() + '-' + String(cutoffDate.getMonth() + 1).padStart(2, '0') + '-' + String(cutoffDate.getDate()).padStart(2, '0');
  const statusLabel = (__loaderStage === 'rate_limited')

  const lines = [
    'buildId: <b>' + MAP_BUILD_ID + '</b>',

    'Markers rendered: <b>' + __renderedMarkerCount + '</b>',

    'lastSnapshotHash: <b>' + (__lastSnapshotHash ?? '-') + '</b>',
    'serverSnapshotId: <b>' + (_shortId(__serverSnapshotId)) + '</b>',
    'serverGeneratedAt: <b>' + (_fmtTs(__serverGeneratedAt)) + '</b>',

    'loaderStage: <b>' + (__loaderStage || '-') + '</b>',

  ];
  if(el) el.innerHTML = lines.join('<br>');
  const dbg = _updateDebugProPanel();
  try{
    const prev = window.__mapsDebugState || {};
    window.__mapsDebugState = Object.assign({}, prev, {
      lastRun: new Date().toISOString(),

        buildId: MAP_BUILD_ID,

function _eluExtraScore(ex){
  if(!ex || typeof ex !== 'object') return 0;
  var keys = ['municipality','locality','county','districts','communes','eestiOmavalitsused','individualCount','behavior','collectors'];
  var n = 0;
  for(var i=0;i<keys.length;i++){
    var v = ex[keys[i]];
    if(v == null) continue;
    if(typeof v === 'string' && v.trim() !== '') n++;
    else if(typeof v === 'number' && Number.isFinite(v)) n++;
  }
  return n;
}

function _buildEbirdComNameToEt(){
  try{
    var raw = localStorage.getItem('estbirding.speciesMeta.v1');
    if(!raw) return {};
    var meta = JSON.parse(raw);
    var map = {};
    for(var etName in meta){
      if(meta.hasOwnProperty(etName) && meta[etName].comName){
        map[meta[etName].comName] = etName;
      }
    }
    return map;
  }catch(e){ return {}; }
}

function refreshAllMarkers(){
  __renderedMarkerCount = 0;
  Object.keys(points).forEach(updateMarker);
  render();
  _checkEmpty7dBanner();
  if(__loaderStage === 'ready') __lastErrorMessage = '';
  _updateDebugPanel();
}
function rebuildAllMarkers(){
  try{
    const clusterGroup = window.__markerClusterGroup || window.markerClusterGroup || null;
    if(markers && typeof markers.forEach === 'function'){
      markers.forEach(function(m){
        try{
          if(clusterGroup && typeof clusterGroup.removeLayer === 'function' && map.hasLayer(clusterGroup)) clusterGroup.removeLayer(m);
          else map.removeLayer(m);
        }catch(e){}
      });
      markers.clear();
    }
  }catch(e){}
  __renderedMarkerCount = 0;
  Object.keys(points || {}).forEach(updateMarker);
}

function _checkEmpty7dBanner(){
  if(!is7daysOnly()) return;
  const recentCount = SPECIES.filter(n => { const p = points[n]; return p && hasRecentObservation(p); }).length;
  const totalWithCoords = SPECIES.filter(n => { const p = points[n]; return p && Number.isFinite(p.lat); }).length;
  if(recentCount === 0 && totalWithCoords > 0){
    _showSnapshotBanner('No observations in last 7 days in current dataset. Turn off "7 days only" to see all known locations.', 'warn', true);
  }
}

        await _applySnapshot(snap);
        const prevHashRun = __lastSnapshotHash;
        __lastSnapshotHash = String(__serverSnapshotId || '-') + ':' + String(__lastResponseBytes || 0) + ':' + String(snap.generated_at || '') + ':' + String(Object.keys(snap.points_json || {}).length);
        if(prevHashRun && prevHashRun !== __lastSnapshotHash && !__resumeExplicitRequested) _setResumeIndex(0);
        __lastProcessedAt = new Date().toISOString();
        pushDebugEvent('SNAPSHOT_APPLY_DONE', 'Applied running snapshot', { runId: runId, index: __currentIndex });
      }
      _setLoaderStage('ready');
      __snapshotErrorRetryAttempt = 0;
      __rateLimitAttempt = 0;
      _clearRateLimitTimers();
      _startPolling();
      return;
    }

    if(snap.points_json && Object.keys(snap.points_json).length > 0){
      pushDebugEvent('SNAPSHOT_APPLY_START', 'Applying snapshot', { runId: runId, index: __currentIndex });
      await _applySnapshot(snap);
      const prevHash = __lastSnapshotHash;
      __lastSnapshotHash = String(__serverSnapshotId || '-') + ':' + String(__lastResponseBytes || 0) + ':' + String(snap.generated_at || '') + ':' + String(Object.keys(snap.points_json || {}).length);
      if(prevHash && prevHash !== __lastSnapshotHash && !__resumeExplicitRequested) _setResumeIndex(0);
      __lastProcessedAt = new Date().toISOString();
      pushDebugEvent('SNAPSHOT_APPLY_DONE', 'Applied snapshot', { runId: runId, index: __currentIndex });
      __lastProgressAtMs = Date.now();
      pushDebugEvent('PROGRESS_TICK', 'Snapshot apply completed', { runId: runId, index: __currentIndex, atMs: __lastProgressAtMs });
      const age = snap.generated_at && window.formatAgeEE ? window.formatAgeEE(snap.generated_at) : null;
      _showSnapshotBanner('Data loaded' + (age ? ' (' + age + ')' : ''));
      _log('📸 snapshot: ' + Object.keys(points).length + ' species');
      setTimeout(_hideSnapshotBanner, 4000);
      _clearResumeState('completed', '[resume] completed state, hiding resume');
      _updateProgressUI(__snapshotProgressDone, __snapshotProgressTotal, 'ready');
    } else {
      _showSnapshotBanner('No snapshot data yet. Press "Force server refresh" to generate.', 'warn');
      _updateResumeButton(_validateAndSyncResumeState({ quiet: true }));
    }
    _setLoaderStage('ready');
    __snapshotErrorRetryAttempt = 0;
    __rateLimitAttempt = 0;
    _clearRateLimitTimers();

    if(__isRefreshRunning && snap.status !== 'running'){
      pushDebugEvent('REFRESH_COMPLETE', 'Snapshot reached terminal status', { status: snap.status, runId: runId });
      _stopPolling();
    }

    __lastProcessedSnapshotId = String((snap && snap.snapshotId) || __serverSnapshotId || __lastProcessedSnapshotId || '');
    __lastProcessedGeneratedAt = String((snap && (snap.snapshotGeneratedAt || snap.generatedAt || snap.generated_at)) || __serverGeneratedAt || __lastProcessedGeneratedAt || '');
    __serverIsNewer = false;
    __resumeExplicitRequested = false;
    _updateServerSnapshotStatus();
    if(snap.last_error && __loaderStage === 'error'){
      document.getElementById('fetchError').textContent = 'Last error: ' + snap.last_error;
    }
  }catch(e){
    if(e && e.isRateLimited){
      _setLoaderStage('rate_limited');
      _scheduleRateLimitRetry(e.retryAfterSec);
      return;
    }
    if(e && (e.isAbort || _isAbortLikeError(e))){
      const abortReason = (e && e.abortReason) ? e.abortReason : 'abort';
      __lastInfoMessage = 'Request cancelled (' + abortReason + ')';
      pushDebugEvent('SNAPSHOT_LOAD_CANCELLED', 'Snapshot load cancelled', { runId: runId, reason: abortReason }, 'warn');
      return;
    }
    __lastErrorMessage = String(e?.message || e || 'load failed');
    _setLoaderStage('error');
    __lastDurationMs = Date.now() - t0;
    if((__lastErrorMessage || '').indexOf('Supabase URL') >= 0){
      __lastInfoMessage = 'Waiting for config...';
      __lastErrorMessage = '';
      if(__snapshotLoadRetryCount < 10){
        __snapshotLoadRetryCount++;
        __lastInfoMessage = 'Waiting for config...';
        pushDebugEvent('SNAPSHOT_RETRY', 'Retry snapshot load due to config', {
          reason: 'supabase_config',
          retry: __snapshotLoadRetryCount,
          runId: runId,
        }, 'warn');
        _requestSupabaseConfigFromParent();
        setTimeout(function(){ loadSnapshot(false); }, 500);
      } else {
        _showSnapshotBanner('Missing Supabase config after retries', 'error');
      }
      _updateDebugPanel();
      throw e;
    }
    __lastErrorObj = {
      name: e && e.name ? e.name : 'Error',
      message: __lastErrorMessage || String(e),
      stack: e && e.stack ? e.stack : '',
      cause: e && e.cause ? _safeData(e.cause) : null,
      abortReason: e && e.abortReason ? e.abortReason : null,
    };
    pushDebugEvent('SNAPSHOT_LOAD_FAIL', 'Snapshot load failed', __lastErrorObj, 'error');
    console.error('[snapshot] Load failed:', e);
    if(_isNetworkFetchError(e)){
      const retryMs = _snapshotErrorBackoffMs();
      __lastInfoMessage = 'Network/CORS fetch failed; retrying in ' + Math.round(retryMs / 1000) + 's';
      pushDebugEvent('SNAPSHOT_RETRY', 'Retry after network/CORS fetch error', { retryMs: retryMs, runId: runId }, 'warn');
      _showSnapshotBanner(__lastInfoMessage, 'warn');
      if(__isRefreshRunning){
        await _delay(retryMs);
        refreshAllMarkers();
        return;
      }
    }
    if(e && Number(e.httpStatus) >= 500){
      _showSnapshotBanner('Using cached data (server unavailable)', 'warn');
    } else {
      _showSnapshotBanner('Using cached data (snapshot request failed)', 'warn');
    }
    refreshAllMarkers();
    throw e;
  }finally{
    __activeStepController = null;
    _updateProgressUI(__snapshotProgressDone, __snapshotProgressTotal, '');
    _scheduleNextSnapshotRefresh(SNAPSHOT_AUTO_REFRESH_MS);
  }
}

function loadSnapshotOnce(force){
  if(force && __snapshotInFlightRef) __pendingReload = true;
  if(__snapshotInFlightRef){
    pushDebugEvent('SNAPSHOT_LOAD_JOIN', 'Joining in-flight snapshot load', {
      startedAtMs: __snapshotInFlightStartedAtMs,
      ageMs: __snapshotInFlightStartedAtMs ? (Date.now() - __snapshotInFlightStartedAtMs) : null,
      runId: __runId
    });
    return __snapshotInFlightRef;
  }
  __snapshotInFlightStartedAtMs = Date.now();
  __isReloading = true;
  __snapshotInFlightRef = (async function(){
    try{
      return await _loadSnapshotImpl();
    }catch(e){
      if(!_isAbortLikeError(e)){
        __lastErrorMessage = String(e && e.message ? e.message : e);
        _setLoaderStage('error');
      }
      throw e;
    } finally {
      __snapshotInFlightRef = null;
      __snapshotInFlightStartedAtMs = 0;
      __isReloading = false;
      if(__pendingReload){
        __pendingReload = false;
        __configReloadAbortIssued = false;
        setTimeout(function(){ loadSnapshot(false); }, 0);
      } else {
        __configReloadAbortIssued = false;
      }
      _updateDebugPanel();
    }
  })();
  return __snapshotInFlightRef;
}

function loadSnapshot(force){
  console.log('[NETTA-TRACE] loadSnapshot called, __scanEnnAllRunning =',
    !!window.__scanEnnAllRunning, 'force =', !!force,
    'local_Punanokk_lat =', (typeof points !== 'undefined' && points['Punanokk-vart']) ? points['Punanokk-vart'].lat : '(none)');
  if(window.__scanEnnAllRunning && !window.__scanEnnAllAllowSnapshot){
    console.log('[loadSnapshot] suppressed: scan in progress');
    return Promise.resolve({suppressed:true});
  }
  return loadSnapshotOnce(!!force).catch(function(err){
    if(!_isAbortLikeError(err)){
      __lastErrorMessage = String(err && err.message ? err.message : err);
      _setLoaderStage('error');
    }
    _updateDebugPanel();
    return null;
  });
}

function _startPolling(){
  if(__snapshotAutoRefreshTimer){ clearTimeout(__snapshotAutoRefreshTimer); __snapshotAutoRefreshTimer = null; }
  if(__isRefreshRunning){
    pushDebugEvent('POLL_JOIN', 'Polling already active; not starting another loop', { runId: __runId });
    return;
  }
  __isRefreshRunning = true;
  __stopController = new AbortController();
  _startWatchdog();
  __pollCount = 0;
  const token = ++__pollLoopToken;
  (async function pollLoop(){
    while(__isRefreshRunning && token === __pollLoopToken){
    __pollCount++;
    if(__pollCount > 90){
      _stopPolling();
      _showSnapshotBanner('Refresh timed out. Try again later.', 'error');
      break;
    }
    try{
      await loadSnapshotOnce();
      const now = Date.now();
      if(__isRefreshRunning && __lastProgressAt > 0 && (now - __lastProgressAt) > 20000){
        pushDebugEvent('STUCK_DETECTED', 'No progress for 20s', {
          index: __currentIndex,
          attempt: __attemptForCurrentIndex,
          lastProgressAtMs: __lastProgressAt,
          lastPhase: __lastPhase
        }, 'warn');
      }
      // Watchdog logic is centralized in _startWatchdog to avoid duplicate force-advance spam.
    }catch(e){
      if(e && e.isAbort){
        if(e.abortReason === 'stop'){
          _stopPolling();
          _showSnapshotBanner('Stopped by user', 'warn');
          break;
        }
        if(e.abortReason === 'new-run' || e.abortReason === 'stop' || e.abortReason === 'watchdog_timeout' || e.abortReason === 'replace' || e.abortReason === 'active_request_abort'){
          pushDebugEvent('POLL_CANCELLED', 'Poll iteration cancelled', { reason: e.abortReason, runId: __runId }, 'warn');
          if(e.abortReason === 'new-run') break;
          await _delay(600);
          continue;
        }
        __lastInfoMessage = 'Request cancelled (' + (e.abortReason || 'abort') + ')';
      } else {
        __lastErrorMessage = String(e?.message || e || 'poll failed');
      }
      if((__lastErrorMessage || '').indexOf('Supabase URL') >= 0){
        _stopPolling();
        _showSnapshotBanner('Refresh stopped: ' + __lastErrorMessage, 'error');
        var ferr = document.getElementById('fetchError');
        if(ferr) ferr.textContent = __lastErrorMessage;
        break;
      }
    }finally{
      __activeStepController = null;
    }
      if(!__isRefreshRunning || token !== __pollLoopToken) break;
      await _delay(2000);
    }
  })();
}

function _stopPolling(){
  if(__pollTimer){ clearInterval(__pollTimer); __pollTimer = null; }
  __pollLoopToken++;
  __isRefreshRunning = false;
  _clearRateLimitTimers();
  _stopWatchdog();
  _abortActiveRequest();
  try{ __stopController.abort('replace'); }catch(e){}
  // Immediately recreate so future requests aren't poisoned
  __stopController = new AbortController();
  _endRefreshRun();
  _updateProgressUI(0, 0, '');
}

// Public refresh (no key needed)
async function triggerRefresh(opts){
  const options = opts || {};
  const validResume = _validateAndSyncResumeState({ quiet: false });
  if(options.resumeFromSaved && !validResume){
    _showSnapshotBanner('No valid resume state found.', 'warn');
    return;
  }
  __resumeExplicitRequested = !!options.resumeFromSaved;
  const force = !!options.force;
  const runId = (options.newRun || !__runningRef) ? _beginRefreshRun(!!options.newRun) : __runId;
  try{
    __refreshStartedAtMs = Date.now();
    __lastProgressAtMs = __refreshStartedAtMs;
    await fetchServerMeta();
    pushDebugEvent((options.resumeFromSaved ? 'REFRESH_RESUME' : 'REFRESH_START'), 'Refresh requested', {
      runId: runId,
      startIndex: options.startIndex,
      resumeFromSaved: !!options.resumeFromSaved,
      force: force,
      filter7d: is7daysOnly(),
    });
    _ensureStopController();
    if(!_resolveSupabaseUrlLocal()) _requestSupabaseConfigFromParent();
    const validation = _validateSupabaseLocal();
    if(!validation.ok) throw new Error(validation.error || 'Supabase config vigane');
    const supabaseUrl = validation.url;
    const anonKey = _resolveSupabaseAnonKeyLocal();
    const healthUrl = supabaseUrl + '/auth/v1/health';
    try{
      const healthRes = await fetchWithTimeout(healthUrl, {
        method:'GET',
        headers: anonKey ? { apikey: anonKey, authorization: 'Bearer ' + anonKey } : {},
      }, 10000, runId);
      __lastRequestUrl = healthUrl;
      __lastDurationMs = 0;
      if(!(healthRes.ok || healthRes.status === 401 || healthRes.status === 404)){
        throw new Error('Supabase health check failed (HTTP ' + healthRes.status + ')');
      }
    }catch(healthErr){
      const msg = String(healthErr && healthErr.message ? healthErr.message : healthErr);
      if(msg.indexOf('TypeError') >= 0 || msg.indexOf('Failed to fetch') >= 0 || msg.indexOf('NetworkError') >= 0){
        throw new Error('Supabase URL unreachable (DNS). Update Supabase URL override in Settings.');
      }
      throw healthErr;
    }

    _showSnapshotBanner('Requesting server refresh...');
    _updateProgressUI(0, SPECIES.length, 'running');
    const explicitStart = Number(options.startIndex);
    const startIndex = Number.isFinite(explicitStart)
      ? Math.max(0, explicitStart)
      : (options.resumeFromSaved ? Number(validResume && validResume.resumeIndex || 0) : 0);
    const prevIndex = __currentIndex;
    __currentIndex = startIndex;
    __attemptForCurrentIndex = (prevIndex === startIndex) ? (__attemptForCurrentIndex + 1) : 1;
    pushDebugEvent('INDEX_START', 'Starting index', { runId: runId, index: startIndex, attempt: __attemptForCurrentIndex });
    const snapshotUrl = _resolveSnapshotApi();
    __lastRequestUrl = snapshotUrl;

    const res = await fetchWithTimeout(snapshotUrl, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ start_index: startIndex, force }),
    }, 30000, runId);

    if(res.status === 429){
      pushDebugEvent('INDEX_RETRY', 'Refresh throttled (429)', { runId: runId, index: startIndex, force: force }, 'warn');
      const data = await res.json().catch(()=>({}));
      if(!options.silent) _showSnapshotBanner(data.error || 'Refresh recently triggered. Try again later.', 'warn');
      _updateProgressUI(0, 0, '');
      setTimeout(_hideSnapshotBanner, 6000);
      return;
    }
    if(res.status === 409){
      pushDebugEvent('INDEX_RETRY', 'Refresh locked (409)', { runId: runId, index: startIndex, force: force }, 'warn');
      if(force) _showSnapshotBanner('Server says running; forcing takeover (stale-run check)...', 'warn');
      else _showSnapshotBanner('Refresh already in progress...');
    }

    _startPolling();
    loadSnapshot(false);
    pushDebugEvent('INDEX_SUCCESS', 'Refresh accepted', { runId: runId, index: startIndex, httpStatus: res.status });
    _updateDebugPanel();
  }catch(e){
    var reason = (e && e.abortReason) || '';
    if(e && (e.isAbort || _isAbortLikeError(e))){
      if(reason === 'user' || reason === 'new-run' || reason === 'stop'){
        _endRefreshRun();
        _updateProgressUI(0, 0, '');
        pushDebugEvent('REFRESH_STOP', 'Refresh cancelled gracefully', { runId: runId, reason: reason, userStop: reason === 'user' });
        if(reason === 'user') _showSnapshotBanner('Stopped by user', 'warn');
        return;
      }
      __lastInfoMessage = 'Request cancelled (' + (reason || 'abort') + ')';
      pushDebugEvent('REFRESH_STOP', 'Refresh request cancelled', { runId: runId, reason: reason || 'abort' }, 'warn');
      return;
    } else {
      __lastErrorMessage = String(e?.message || e || 'start failed');
    }
    if(reason === 'user'){
      // User pressed Stop – don't retry
      _stopPolling();
      pushDebugEvent('REFRESH_STOP', 'Stopped by user', { runId: runId, reason: reason, userStop: true });
      _showSnapshotBanner('Stopped by user', 'warn');
      _updateProgressUI(0, 0, '');
    } else if(reason === 'timeout'){
      // POST timed out – auto-retry after 2s
      _showSnapshotBanner('Refresh request timed out, retrying...', 'warn');
      pushDebugEvent('INDEX_RETRY', 'Refresh request timeout, retrying', { runId: runId, reason: reason }, 'warn');
      setTimeout(function(){ triggerRefresh(options); }, 2000);
    } else {
      __lastErrorObj = {
        name: e && e.name ? e.name : 'Error',
        message: __lastErrorMessage || String(e),
        stack: e && e.stack ? e.stack : '',
        cause: e && e.cause ? _safeData(e.cause) : null,
        abortReason: reason || null,
      };
      pushDebugEvent('FETCH_FAIL', 'Refresh start failed', __lastErrorObj, 'error');
      _setLoaderStage('error');
      _showSnapshotBanner('Failed to start refresh: ' + (__lastErrorMessage || 'Unknown error'), 'error');
      _stopPolling();
      _updateProgressUI(0, 0, '');
    }
    var ferr = document.getElementById('fetchError');
    if(ferr) ferr.textContent = __lastErrorMessage || 'start failed';
  }
}

          source: 'button',
          view: _getElurikkusRefreshView(),
          jobId: __elurikkusBulkCurrentJobId || null,
        });
        return;

      btnElu.__running = true;
      btnElu.disabled = true;
      try{
        await refreshAllFromElurikkus();

        // no separate trigger here — this handler is also skipped by the duplicate-refresh guard.
      }finally{
        btnElu.__running = false;
        btnElu.disabled = false;
      }
    });
    btnElu.__wired = true;
  }
  if(btnResume && !btnResume.__wired){
    btnResume.addEventListener('click', function(){ triggerRefresh({ resumeFromSaved: true, force: true, newRun: true }); });
    btnResume.__wired = true;
  }
  if(btnStop && !btnStop.__wired){
    btnStop.addEventListener('click', function(){
      if((__eluBulkActive && __eluBulkAbort) || (__elurikkusBulkActive && (__elurikkusBulkAbortController || __elurikkusBulkAbort))){

          if(__eluBulkAbort) __eluBulkAbort.abort('user');
          if(__elurikkusBulkAbortController) __elurikkusBulkAbortController.abort('user');
          else if(__elurikkusBulkAbort) __elurikkusBulkAbort.abort('user');
        }catch(e){}
        __eluBulkActive = false;
        __elurikkusBulkActive = false;
        if(btnStop) btnStop.style.display = 'none';
        const eluProg = document.getElementById('eluProgress');
        if(eluProg){
          eluProg.textContent = 'Elurikkus refresh stopped: ' + Number(__elurikkusBulkStats.done || 0) + '/' + Number(__elurikkusBulkStats.total || 0) + ' species';
        }
        _showSnapshotBanner('Stopped by user', 'warn');
        _updateDebugPanel();
        return;
      }
      __abortReasonHint = 'user';
      _abortActiveRequest();
      try{ __stopController.abort('stop'); }catch(e){}
      // Immediately recreate so nothing is poisoned
      __stopController = new AbortController();
      _stopPolling();
      _showSnapshotBanner('Stopped by user', 'warn');
    });
    btnStop.__wired = true;
  }
  if(recentToggle && !recentToggle.__wired){
    recentToggle.textContent = '7p: ' + (window.__recentOnly ? 'ON' : 'OFF');

      setRecentOnly(!window.__recentOnly);

      try{ localStorage.setItem(LS_ELU_AUTO_30M, this.checked ? '1' : '0'); }catch(e){}

    btnCopyDebug.addEventListener('click', _copyDebugJson);

  if(btnCopyDebugPro && !btnCopyDebugPro.__wired){

      if(navigator.clipboard && navigator.clipboard.writeText){
        navigator.clipboard.writeText(text).then(function(){ logInfo('Copied debug pro JSON'); }).catch(function(err){ logWarn('Copy debug pro failed', { err: String(err) }); });
      }

    btnCopyDebugPro.__wired = true;

  if(btnExportDebugPro && !btnExportDebugPro.__wired){
    btnExportDebugPro.addEventListener('click', function(){
      const payload = _computeDebugProObject();
      const text = JSON.stringify(payload, null, 2);

      document.body.appendChild(a);

  if(btnClearTrace && !btnClearTrace.__wired){
    btnClearTrace.addEventListener('click', function(){

    });
