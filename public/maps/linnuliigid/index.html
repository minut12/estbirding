  }
  if(btnCopySelectedTrace && !btnCopySelectedTrace.__wired){
    btnCopySelectedTrace.addEventListener('click', function(){
      const selected = __networkTrace.find(function(x){ return x.id === __selectedTraceId; }) || __networkTrace[0] || null;
      if(!selected) return;
      const text = JSON.stringify(selected, null, 2);
      if(navigator.clipboard && navigator.clipboard.writeText){
        navigator.clipboard.writeText(text);
      }
    });
    btnCopySelectedTrace.__wired = true;
  }
  if(btnCopyIndexTrace && !btnCopyIndexTrace.__wired){
    btnCopyIndexTrace.addEventListener('click', function(){
      const text = JSON.stringify(__indexTrace.slice(0, 100), null, 2);
      if(navigator.clipboard && navigator.clipboard.writeText) navigator.clipboard.writeText(text);
    });
    btnCopyIndexTrace.__wired = true;
  }
  if(btnClearIndexTrace && !btnClearIndexTrace.__wired){
    btnClearIndexTrace.addEventListener('click', function(){
      __indexTrace.length = 0;
      _updateDebugProPanel();
      _updateIndexProgressLine();
    });
    btnClearIndexTrace.__wired = true;
  }
  if(btnRerunVerification && !btnRerunVerification.__wired){
    btnRerunVerification.addEventListener('click', function(){
      __snapshotInspector = _computeSnapshotInspector();
      __filterVerifier = _computeFilterVerifier();
      _updateDebugProPanel();
    });
    btnRerunVerification.__wired = true;
  }
  if(toggleSlowMode && !toggleSlowMode.__wired){
    toggleSlowMode.checked = !!__slowMode;
    toggleSlowMode.addEventListener('change', function(){ __slowMode = !!toggleSlowMode.checked; _updateDebugProPanel(); });
    toggleSlowMode.__wired = true;
  }
  if(btnClearDebug && !btnClearDebug.__wired){
    btnClearDebug.addEventListener('click', _clearDebugEvents);
    btnClearDebug.__wired = true;
  }
}

window.addEventListener('message', function(ev){
  try{
    if(!ev.data || typeof ev.data !== 'object') return;
    var t = ev.data.type;
    if(t === 'SET_ADMIN_KEY') return; // no longer used
    if(t === 'SUPABASE_CONFIG'){
      if(CLASSIC_MODE) return;
      const hadNoApi = !SNAPSHOT_API;
      const hadUrlMissingErr = ((__lastErrorMessage || '').indexOf('Supabase URL puudub') >= 0);
      const prevCfg = resolveSupabaseConfig();
      __resolvedSupabaseUrl = String(ev.data.supabaseUrl || '').trim();
      __resolvedSupabaseAnonKey = String(ev.data.supabaseAnonKey || '').trim();
      const nextCfg = resolveSupabaseConfig();
      const materialChanged = (String(prevCfg.supabaseUrl || '') !== String(nextCfg.supabaseUrl || '')) || (String(prevCfg.anonKey || '') !== String(nextCfg.anonKey || ''));
      __configArrivedAtMs = Date.now();
      __supabaseConfigReady = !!__resolvedSupabaseUrl;
      if(hadUrlMissingErr) __lastErrorMessage = '';
      __lastInfoMessage = 'Config ready';
      pushDebugEvent('CONFIG_READY', 'Received SUPABASE_CONFIG', {
        waitMs: (__configWaitStartedAtMs ? (__configArrivedAtMs - __configWaitStartedAtMs) : null),
        supabaseUrl: __resolvedSupabaseUrl || '',
        anonMasked: _maskKey(__resolvedSupabaseAnonKey),
      });
      __snapshotMeta.status = null;
      try { _resolveSnapshotApi(); } catch(e) {}
      if(!__bootLoadStarted && __supabaseConfigReady){
        _startSnapshotBoot();
      } else if(materialChanged && (hadNoApi || hadUrlMissingErr || !__snapshotMeta.generated_at)){
        pushDebugEvent('SNAPSHOT_RETRY_REASON', 'Retry reason supabase_config', { hadNoApi: hadNoApi, hadUrlMissingErr: hadUrlMissingErr }, 'warn');
        _scheduleLoadSnapshotRetry('supabase_config');
      }
      // Load cloud caches now that config is available (run once only)
      if(!window.__elurikkusCacheLoadedOnce){
        window.__elurikkusCacheLoadedOnce = true;
        _loadElurikkusCacheFromSupabase();
      }
      if(!window.__ebirdCacheLoadedOnce){
        window.__ebirdCacheLoadedOnce = true;
        _loadEbirdCacheFromSupabase();
      }
      _updateDebugPanel();
      return;
    }
    if(t === 'SUPABASE_CONFIG_ERROR'){
      __lastErrorMessage = String(ev.data.error || 'Supabase config invalid');
      __lastErrorObj = { name: 'SupabaseConfigError', message: __lastErrorMessage, stack: '', cause: null, abortReason: null };
      pushDebugEvent('CONFIG_ERROR', 'Received SUPABASE_CONFIG_ERROR', __lastErrorObj, 'error');
      _showSnapshotBanner(__lastErrorMessage, 'error');
      _updateDebugPanel();
      return;
    }
    if(t === 'SPECIES_VISIBILITY_RESTORE' && Array.isArray(ev.data.hiddenSpecies)){
      var hiddenSet = {};
      ev.data.hiddenSpecies.forEach(function(k){ hiddenSet[k] = true; });
      var changed = false;
      SPECIES.forEach(function(name){
        points[name] = points[name] || {};
        var shouldHide = !!hiddenSet[name];
        var isHidden = (points[name].visible === false);
        if(shouldHide !== isHidden){
          points[name].visible = !shouldHide;
          changed = true;
        }
      });
      if(changed){ save(); rebuildAllMarkers(); render(); }
      return;
    }
    if(t === 'SPECIES_PREDICTION_ACTIVE_SPECIES'){
      var activeSpecies = String(ev.data.speciesName || ev.data.speciesKey || '').trim();
      if(activeSpecies){
        window.__predictionSyncedSpecies = activeSpecies;
        window.__selectedSpecies = activeSpecies;
        if(typeof render === 'function') render();
      }
      return;
    }
    if (t === 'GBIF_PINS_DEFAULTS' && ev.data.scopeId === GBIF_PIN_SCOPE_ID) {
      pinnedGbif.clear();
      (ev.data.pins || []).forEach(function(p){
        if (!p || p.gbifId == null) return;
        var gid = String(p.gbifId);
        pinnedGbif.set(gid, {
          gbifId: gid, species: String(p.species),
          lat: Number(p.lat), lon: Number(p.lon), date: p.date != null ? p.date : null,
          details: (p.details != null ? p.details : null)
        });
      });
      renderPinnedGbifMarkers();
      return;
    }
    if(ev.origin !== window.location.origin) return;
    if(t === 'MAP_REFRESH_VISIBLE') refreshVisible();
    if(t === 'MAP_REFRESH_SELECTED') refreshSelected();
    if(t === 'MAP_PING' && ev.source){
      ev.source.postMessage({ type: 'MAP_PONG' }, ev.origin);
    }
  }catch(e){ console.warn('[map] postMessage handler error', e); }
});


function _prunePointsForStorage(pts) {
  var pruned = {};
  var KEEP = ['lat','lon','t','occ7','src','visible','rarity','migration','coords_status',
    'occ7Ebird','occ7EbirdUpdated','occ7Elu','occ7EluUpdated','lastFetched','clientScannedAt',
    'ebirdCode','ebirdAuto','loc','openUrl','searchUrl','coords_source','coordsSource','coordLock','eluExtra'];
  for (var key in pts) {
    var p = pts[key];
    if (!p) continue;
    var row = {};
    for (var i = 0; i < KEEP.length; i++) {
      if (p[KEEP[i]] !== undefined && p[KEEP[i]] !== null && p[KEEP[i]] !== '') row[KEEP[i]] = p[KEEP[i]];
    }
    // Deep-clean eluExtra so the kept `eluExtra` doesn't drag __occ7debug/__coordDebug along.
    if (Object.keys(row).length > 0) pruned[key] = _stripEntryDebug(row);
  }
  return pruned;
}
function save() {
  try { localStorage.setItem(LS_RECENT_ONLY, window.__recentOnly ? '1' : '0'); } catch(e) {}
  try { localStorage.setItem(LS_AVATARS, JSON.stringify(avatars)); } catch(e) { console.warn('[save] avatars failed', e); }
  try {
    localStorage.setItem(LS_POINTS, JSON.stringify(_prunePointsForStorage(points)));
  } catch(e) {
    console.warn('[save] points failed, trying minimal', e);
    // Free space: drop per-species prob caches
    try{for(var li=localStorage.length-1;li>=0;li--){var lk=localStorage.key(li);if(lk&&lk.indexOf('bm_prob2_')===0)localStorage.removeItem(lk);}}catch(ce){}
    var minimal = {};
    for (var k in points) { var mp=points[k]; if(mp&&Number.isFinite(mp.lat)) minimal[k]={lat:mp.lat,lon:mp.lon,t:mp.t,src:mp.src,occ7Elu:mp.occ7Elu,occ7Ebird:mp.occ7Ebird,coordLock:mp.coordLock,coords_source:mp.coords_source,coordsSource:mp.coordsSource}; }
    // Strip undefineds
    for(var mk in minimal){for(var mf in minimal[mk]){if(minimal[mk][mf]===undefined)delete minimal[mk][mf];}}
    try { localStorage.setItem(LS_POINTS, JSON.stringify(minimal)); console.log('[save] points minimal ok'); } catch(e2) { console.error('[save] points completely failed', e2); }
  }
  try { localStorage.setItem(LS_NAMES, JSON.stringify(nameCache)); } catch(e) {}
  try { localStorage.setItem(LS_SPRING, JSON.stringify(springDates)); } catch(e) {}
  try { localStorage.setItem(LS_SPRING_META, JSON.stringify(springMeta || {})); } catch(e) {}
  try { localStorage.setItem(LS_SPRING_YEARFIRST, JSON.stringify(springYearFirst)); } catch(e) {}
  try { _persistLiveCaches(); } catch(e) { console.warn('[save] liveCaches failed', e); }
  // Keep window references in sync after save
  window.__bm_points = points;
  window.__bm_springDates = springDates;
}

// Icons
function rarityToBadge(level){
  var style = window.getRarityStyle ? window.getRarityStyle(level || 'none') : null;
  return style && style.badgeText ? style.badgeText : '';
}
function rarityToBorder(level, fallback){
  var style = window.getRarityStyle ? window.getRarityStyle(level || 'none') : null;
  return (style && style.ringColor) || fallback || '#222';
}
// === GBIF functions ===
function _gbifMiniIcon(avatarUrl, year) {
  var currentYear = new Date().getFullYear();
  var age = currentYear - (year || currentYear);
  var opacity = Math.max(0.3, 1 - (age * 0.07));
  var borderColor = age <= 1 ? '#4f46e5' : age <= 3 ? '#6366f1' : age <= 6 ? '#818cf8' : '#a5b4fc';
  var bg = avatarUrl
    ? "background-image:url('" + avatarUrl + "')"
    : "background-color:#c7d2fe";
  var html = '<div class="gbif-mini-icon" style="border-color:' + borderColor + ';opacity:' + opacity + ';' + bg + '"></div>';
  return L.divIcon({
    html: html,
    className: 'gbif-mini-marker',
    iconSize: [22, 22],
    iconAnchor: [11, 11],
    popupAnchor: [0, -14]
  });
}

async function resolveGbifTaxonKey(species) {
  // 1. Check cache
  var cached = gbifTaxonKeys[species];
  if (cached && cached.taxonKey) return cached.taxonKey;

  // 2. Look up scientific name from embedded table
  var sciName = SPECIES_SCINAMES[species];
  // 2b. Fallback: check speciesMeta localStorage (for custom species)
  if (!sciName) {
    try {
      var metaRaw = localStorage.getItem('estbirding.speciesMeta.v1');
      if (metaRaw) {
        var metaMap = JSON.parse(metaRaw);
        var m = metaMap && metaMap[species];
        if (m && typeof m.scientificName === 'string' && m.scientificName.trim()) {
          sciName = m.scientificName.trim();
          SPECIES_SCINAMES[species] = sciName;
        }
      }
    } catch(_){}
  }
  if (sciName) {
    try {
      var url = 'https://api.gbif.org/v1/species/match?name='
        + encodeURIComponent(sciName) + '&kingdom=Animalia&strict=true';
      var res = await gbifFetch(url);
      if (res.ok) {
        var data = await res.json();
        if (data.usageKey && data.matchType !== 'NONE') {
          gbifTaxonKeys[species] = { taxonKey: data.usageKey, scientificName: data.scientificName || sciName, resolvedVia: 'sciname_lookup' };
          _saveGbifTaxonKeys();
          console.info('GBIF: ' + species + ' → ' + (data.scientificName || sciName) + ' (key ' + data.usageKey + ')');
          return data.usageKey;
        }
      }
    } catch(e) { console.warn('GBIF match failed for ' + sciName, e); }
    // Retry without strict
    try {
      var url2 = 'https://api.gbif.org/v1/species/match?name='
        + encodeURIComponent(sciName) + '&kingdom=Animalia';
      var res2 = await gbifFetch(url2);
      if (res2.ok) {
        var data2 = await res2.json();
        if (data2.usageKey && data2.confidence > 80) {
          gbifTaxonKeys[species] = { taxonKey: data2.usageKey, scientificName: data2.scientificName || sciName, resolvedVia: 'sciname_loose' };
          _saveGbifTaxonKeys();
          return data2.usageKey;
        }
      }
    } catch(e) {}
  }

  // 3. Last resort: GBIF suggest with Estonian name (unreliable)
  try {
    var url3 = 'https://api.gbif.org/v1/species/suggest?q='
      + encodeURIComponent(species) + '&rank=SPECIES&limit=5';
    var res3 = await gbifFetch(url3);
    if (res3.ok) {
      var suggestions = await res3.json();
      var bird = suggestions.find(function(s) { return s.class === 'Aves'; });
      if (bird && bird.key) {
        gbifTaxonKeys[species] = { taxonKey: bird.key, scientificName: bird.scientificName || '?', resolvedVia: 'suggest_fallback', warning: true };
        _saveGbifTaxonKeys();
        console.warn('GBIF fallback: ' + species + ' → ' + (bird.scientificName || '?') + ' (may be wrong)');
        return bird.key;
      }
    }
  } catch(e) {}

  console.warn('GBIF: could not resolve ' + species);
  return null;
}

function buildGbifPopup(species, occ) {
  var gbifId = occ && occ.key != null ? String(occ.key) : '';
  if (gbifId) {
    __gbifOccById[gbifId] = {
      species: species,
      lat: Number(occ.decimalLatitude),
      lon: Number(occ.decimalLongitude),
      date: occ.eventDate ? String(occ.eventDate).slice(0,10) : null,
    };
  }
  var pinned = gbifId && pinnedGbif.has(gbifId);
  var pinBtn = gbifId
    ? '<button onclick="window.__toggleGbifPin(\'' + gbifId + '\')" '
      + 'style="padding:3px 8px;border:1px solid #6366f1;border-radius:6px;'
      + 'background:#eef2ff;color:#4338ca;font-size:11px;cursor:pointer">'
      + (pinned ? '📌 Eemalda nõel' : '📌 Kinnita nõelaga')
      + '</button>'
    : '';
  var lat = Number(occ.decimalLatitude).toFixed(4);
  var lon = Number(occ.decimalLongitude).toFixed(4);
  var coords = lat + ', ' + lon;
  var dateStr = occ.eventDate
    ? occ.eventDate.slice(0, 10)
    : (occ.year ? occ.year + (occ.month ? '-' + String(occ.month).padStart(2,'0') : '') : '?');
  var locParts = [occ.locality, occ.stateProvince].filter(Boolean);
  var locStr = locParts.length ? locParts.join(', ') : '';
  var cached = gbifTaxonKeys[species] || {};
  var displaySci = cached.scientificName || SPECIES_SCINAMES[species] || '';
  var sciLine = displaySci
    ? '<br><small style="color:#64748b;font-style:italic">' + escapeHtml(displaySci) + '</small>'
    : '';
  var warningLine = (cached.warning || (cached.resolvedVia && cached.resolvedVia.indexOf('fallback') !== -1))
    ? '<br><small style="color:#f59e0b">&#9888;&#65039; Kontrollimata vaste</small>'
    : '';
  var wazeUrl = 'https://waze.com/ul?ll=' + lat + ',' + lon + '&navigate=yes';
  var mapsUrl = 'https://www.google.com/maps?q=' + lat + ',' + lon;
  var btnStyle = 'padding:3px 8px;border:1px solid #6366f1;border-radius:6px;background:#eef2ff;color:#4338ca;font-size:11px;cursor:pointer;text-decoration:none';
  return '<div style="min-width:200px">'
    + '<b>' + escapeHtml(species) + '</b>'
    + sciLine
    + '<br><small>Kuupäev: ' + escapeHtml(dateStr) + '</small>'
    + (locStr ? '<br><small>Koht: ' + escapeHtml(locStr) + '</small>' : '')
    + '<br><small>Aasta: ' + (occ.year || '?') + '</small>'
    + '<br><small>Koordinaadid: ' + coords + '</small>'
    + warningLine
    + '<br><div style="display:flex;gap:6px;margin-top:6px;flex-wrap:wrap">'
    + '<button onclick="navigator.clipboard.writeText(\'' + coords + '\').then(()=>{this.textContent=\'Kopeeritud!\';setTimeout(()=>{this.textContent=\'Kopeeri\'},1500)})" style="' + btnStyle + '">Kopeeri</button>'
    + '<a href="' + wazeUrl + '" target="_blank" rel="noopener" style="' + btnStyle + '">Waze</a>'
    + '<a href="' + mapsUrl + '" target="_blank" rel="noopener" style="' + btnStyle + '">Maps</a>'
    + pinBtn
    + '</div>'
    + '<div style="margin-top:4px"><small style="color:#6366f1">GBIF</small></div>'
    + '</div>';
}

async function toggleGbifData(species) {
  if (gbifMarkers.has(species) && gbifMarkers.get(species).length > 0) {
    gbifMarkers.get(species).forEach(function(m){ try { map.removeLayer(m); } catch(e){} });
    gbifMarkers.delete(species);
    if (window.gbifStats) delete window.gbifStats[species];
    render();
    return;
  }
  gbifLoadingSpecies.add(species);
  render();
  try {
    var taxonKey = await resolveGbifTaxonKey(species);
    if (!taxonKey) {
      notifySilent('GBIF: liiki ei leitud – ' + species);
      gbifLoadingSpecies.delete(species);
      render();
      return;
    }
    var allResults = [];
    var currentYear = new Date().getFullYear();
    var startYear = currentYear - 9;
    var PER_YEAR_LIMIT = 80;
    for (var yr = currentYear; yr >= startYear; yr--) {
      try {
        var url = 'https://api.gbif.org/v1/occurrence/search'
          + '?taxonKey=' + taxonKey
          + '&country=EE'
          + '&hasCoordinate=true'
          + '&hasGeospatialIssue=false'
          + '&year=' + yr
          + '&limit=' + PER_YEAR_LIMIT;
        var res = await gbifFetch(url);
        if (!res.ok) continue;
        var data = await res.json();
        allResults.push.apply(allResults, data.results || []);
      } catch (err) {
        console.warn('GBIF fetch year ' + yr + ' failed', err);
      }
    }
    var avatarUrl = getDisplayAvatar(species);
    var markerList = [];
    for (var i = 0; i < allResults.length; i++) {
      var occ = allResults[i];
      var lat = occ.decimalLatitude;
      var lon = occ.decimalLongitude;
      if (!Number.isFinite(lat) || !Number.isFinite(lon)) continue;
      if (occ.key != null && pinnedGbif.has(String(occ.key))) continue; // pinned occ is drawn by the persistent pin layer
      var icon = _gbifMiniIcon(avatarUrl, occ.year);
      var m = L.marker([lat, lon], { icon: icon });
      m.bindPopup(buildGbifPopup(species, occ));
      m.addTo(map);
      markerList.push(m);
    }
    gbifMarkers.set(species, markerList);
    var years = allResults.map(function(o){ return o.year; }).filter(function(y){ return Number.isFinite(y); });
    var minYear = years.length ? Math.min.apply(null, years) : startYear;
    var maxYear = years.length ? Math.max.apply(null, years) : currentYear;
    if (!window.gbifStats) window.gbifStats = {};
    window.gbifStats[species] = { count: allResults.length, minYear: minYear, maxYear: maxYear, fetchedAt: new Date().toISOString() };
  } catch (err) {
    console.warn('GBIF fetch error for ' + species, err);
  } finally {
    gbifLoadingSpecies.delete(species);
    render();
  }
}

// Persistent pin layer — independent of the GBIF/obs browse toggles and the 7p filter.
// pinnedGbif / pinnedGbifMarkers / __gbifOccById now hold mixed sources keyed by a
// source-namespaced id: 'ebird:…' / 'elu:…' / bare-numeric GBIF occ.key.
function renderPinnedGbifMarkers(){
  try {
    pinnedGbifMarkers.forEach(function(m){ try { map.removeLayer(m); } catch(e){} });
    pinnedGbifMarkers.clear();
    pinnedGbif.forEach(function(pin, id){
      if (!Number.isFinite(pin.lat) || !Number.isFinite(pin.lon)) return;
      // Keep the occ registry fresh so the unpin button works even with no live marker.
      __gbifOccById[id] = { species: pin.species, lat: pin.lat, lon: pin.lon, date: pin.date };
      var avatarUrl = getDisplayAvatar(pin.species);
      var icon, popupHtml;
      if (id.indexOf('ebird:') === 0 || id.indexOf('elu:') === 0) {
        var isEbird = id.indexOf('ebird:') === 0;
        var srcColor = isEbird ? '#f59e0b' : '#1E7F3E';            // orange eBird / green eElu
        var srcBg = isEbird ? '#fef3c7' : '#dcfce7';
        var srcText = isEbird ? '#92400e' : '#166534';
        var srcLabel = isEbird ? 'eBird' : 'eElurikkus';
        var hasAv = !!(avatarUrl && avatarUrl.indexOf('placeholder') === -1);
        var letter = String(pin.species || '?').charAt(0).toUpperCase();
        icon = _eluObsAvatarIcon(hasAv ? avatarUrl : '', srcColor, 'solid', 3, 0.95, letter);
        var dateFmt = pin.date ? String(pin.date).replace(/^(\d{4})-(\d{2})-(\d{2}).*/, '$3.$2.$1') : '?';
        var pinCoords = Number(pin.lat).toFixed(5) + ', ' + Number(pin.lon).toFixed(5);
        var pinCopyBtn = '<button '
          + "onclick=\"navigator.clipboard.writeText('" + pinCoords + "').then(function(){"
          + "this.textContent='Kopeeritud!';var b=this;setTimeout(function(){b.textContent='Kopeeri'},1500)}.bind(this))\" "
          + 'style="padding:3px 8px;border:1px solid ' + srcColor + ';border-radius:6px;'
          + 'background:' + srcBg + ';color:' + srcText + ';font-size:11px;cursor:pointer">Kopeeri</button>';
        // Rich detail lines (elu pins carry pin.details; GBIF/eBird/legacy pins have
        // null → sparse popup, no regression). Mirrors _eluObsPopupHtml's labels.
        var __det = pin.details || null;
        var __detailHtml = '';
        if (__det) {
          var __koht = String(__det.loc || '').trim();
          if (__det.cty) __koht = __koht ? (__koht + ', ' + String(__det.cty)) : String(__det.cty);
          if (__koht) __detailHtml += '<div>koht: ' + escapeHtml(__koht) + '</div>';
          if (__det.n != null && String(__det.n).trim() !== '') __detailHtml += '<div>Individual count: ' + escapeHtml(String(__det.n)) + '</div>';
          if (__det.bhv) __detailHtml += '<div>Behavior: ' + escapeHtml(String(__det.bhv)) + '</div>';
          if (__det.obr) __detailHtml += '<div>Collectors: ' + escapeHtml(String(__det.obr)) + '</div>';
          __detailHtml += '<div style="margin-top:4px;font-size:11px;opacity:.8">coords: ' + Number(pin.lat).toFixed(5) + ', ' + Number(pin.lon).toFixed(5) + '</div>';
        }
        popupHtml = '<div style="font-family:system-ui;font-size:12px">'
          + '<b>' + escapeHtml(pin.species) + '</b><br>' + escapeHtml(dateFmt)
          + '<br><span style="color:' + srcColor + ';font-size:11px">' + srcLabel + '</span>'
          + (__detailHtml ? '<div style="margin-top:6px">' + __detailHtml + '</div>' : '')
          + '<div style="display:flex;gap:6px;margin-top:6px;flex-wrap:wrap">'
          + pinCopyBtn
          + '<button onclick="window.__toggleGbifPin(\'' + id + '\')" '
          + 'style="padding:3px 8px;border:1px solid ' + srcColor + ';border-radius:6px;'
          + 'background:' + srcBg + ';color:' + srcText + ';font-size:11px;cursor:pointer">📌 Eemalda nõel</button>'
          + '</div></div>';
      } else {
        var year = pin.date ? parseInt(String(pin.date).slice(0,4), 10) : null;
        icon = _gbifMiniIcon(avatarUrl, year);
        popupHtml = buildGbifPopup(pin.species, {
          key: id,
          decimalLatitude: pin.lat,
          decimalLongitude: pin.lon,
          eventDate: pin.date,
          year: year
        });
      }
      // Sidebar filter: skip pins whose species doesn't match the filter text.
      // Forgiving (lowercase substring) — a near-miss key still filters; a true
      // mismatch fails VISIBLE (pin stays), never fails-hidden.
      var __pinPasses = (typeof _speciesPassesSidebarFilter === 'function')
        ? _speciesPassesSidebarFilter(pin.species)
        : (function(){
            try {
              var box = document.getElementById('filterBox');
              var q = (box && box.value || '').toLowerCase().trim();
              if (!q) return true;
              return String(pin.species || '').toLowerCase().indexOf(q) !== -1;
            } catch(e){ return true; }
          })();
      if (!__pinPasses) { return; } // skip this pin (forEach callback continue)

      // Hide pins whose species is toggled off in the sidebar (visible===false).
      // Match by species → points key. Unknown species => fail VISIBLE (pin stays).
      var __pinPts = (window.points && window.points[pin.species])
        || (typeof points !== 'undefined' ? points[pin.species] : null);
      if (__pinPts && __pinPts.visible === false) { return; } // species hidden → skip pin

      var m = L.marker([pin.lat, pin.lon], { icon: icon });
      m.bindPopup(popupHtml);
      m.addTo(map); // base markerPane — always visible, NOT the cluster group, ignores filters
      pinnedGbifMarkers.set(id, m);
    });
  } catch(e){ console.warn('[gbif-pin] render failed', e); }
}

window.__toggleGbifPin = function(gbifId){
  gbifId = String(gbifId || '');
  if (!gbifId) return;
  if (pinnedGbif.has(gbifId)) {
    // optimistic unpin
    pinnedGbif.delete(gbifId);
    renderPinnedGbifMarkers();
    try { parent.postMessage({ type: 'GBIF_PIN_REMOVE', scopeId: GBIF_PIN_SCOPE_ID, gbifId: gbifId }, '*'); } catch(e){}
  } else {
    var occ = __gbifOccById[gbifId];
    if (!occ) { console.warn('[gbif-pin] no occ data for', gbifId); return; }
    var pin = { gbifId: gbifId, species: occ.species, lat: occ.lat, lon: occ.lon, date: occ.date || null, details: (occ.details || null) };
    pinnedGbif.set(gbifId, pin);
    renderPinnedGbifMarkers();
    try { parent.postMessage({ type: 'GBIF_PIN_ADD', scopeId: GBIF_PIN_SCOPE_ID, pin: pin }, '*'); } catch(e){}
  }
  // elu-obs pins: the transient secondary layer must re-sync so (a) on pin, the now-stale transient under
  // the new pin is dropped by the skip-if-pinned guard, and (b) on unpin, the obs is redrawn (or stays gone
  // if it has aged out of the 7d payload). Guarded to elu: ids so GBIF/eBird pin toggles don't re-render.
  if (String(gbifId).indexOf('elu:') === 0) { try { _syncEluObsVisibility(); } catch(e){} }
  try { map.closePopup(); } catch(e){}
};

function _eluObsIcon(avatarUrl){

// Canonical synthetic pin id for a secondary elu-obs record. MUST match the id
// shape used by the persistent pin layer and the gbif_pins store:
// 'elu:<species>:<lat5>:<lon5>:<YYYY-MM-DD>'. Date is sliced to 10 chars so the id
// stays stable regardless of any time component on the source date.
function _eluObsSynthId(species, lat, lon, date){
  return 'elu:' + species + ':' + Number(lat).toFixed(5) + ':' + Number(lon).toFixed(5)
       + ':' + String(date || '').slice(0, 10);

function _eluObsPopupHtml(speciesKey, o, sid){

// Mirror updateMarker()'s isVisible decision so secondaries appear/disappear
// exactly with the species' main marker.
function _eluObsSpeciesVisible(key){
  var p = points[key];
  if(!p) return false;
  var hasCoords = Number.isFinite(p.lat) && Number.isFinite(p.lon);
  var coordsRestricted = String(p.coords_status || '') === 'restricted'
    || String(p.coords_status || '') === 'restricted_or_missing';
  var passesRecent = (!window.__recentOnly) || (typeof hasRecentObservation === 'function' ? hasRecentObservation(p) : true);
  var passesSidebarFilter = (typeof _speciesPassesSidebarFilter === 'function') ? _speciesPassesSidebarFilter(key) : true;
  return (p.visible !== false) && passesRecent && hasCoords && !coordsRestricted && passesSidebarFilter;

function _clearEluObsMarkers(){
  try{
    eluObsMarkers.forEach(function(list){
      (list || []).forEach(function(m){ try{ map.removeLayer(m); }catch(e){} });
    });
  }catch(e){}
  try{ eluObsMarkers.clear(); }catch(e){}
}
function _renderEluObsMarkers(){
  if(!ELU_OBS_PINS_ENABLED) return;
  _clearEluObsMarkers();
  var payload = __eluRecentObs;
  if(!payload || !payload.species || typeof payload.species !== 'object') return;
  if(typeof L === 'undefined' || !map) return;

  // Build slug -> actual points key index once (same normalization getDisplayAvatar uses).
  var slugIndex = {};
  for(var k in points){
    if(!points.hasOwnProperty(k)) continue;
    var sl = (typeof slugifySpeciesKey === 'function') ? slugifySpeciesKey(k) : String(k).toLowerCase();
    if(!(sl in slugIndex)) slugIndex[sl] = k;
  }
  function _resolveKey(sciName){
    if(points[sciName]) return sciName;
    var clean = (typeof _normText === 'function') ? _normText(sciName) : sciName;
    if(clean !== sciName && points[clean]) return clean;
    var sl = (typeof slugifySpeciesKey === 'function') ? slugifySpeciesKey(sciName) : String(sciName).toLowerCase();
    return slugIndex[sl] || '';
  }

  var unmatched = 0;
  var speciesNames = Object.keys(payload.species);
  for(var si = 0; si < speciesNames.length; si++){
    var sciName = speciesNames[si];
    var entry = payload.species[sciName];
    if(!entry || !Array.isArray(entry.obs) || !entry.obs.length) continue;
    var key = _resolveKey(sciName);
    if(!key){ unmatched++; continue; }
    if(!_eluObsSpeciesVisible(key)) continue;
    var p = points[key];
    var mainLat = (p && Number.isFinite(p.lat)) ? Number(p.lat) : null;
    var mainLon = (p && Number.isFinite(p.lon)) ? Number(p.lon) : null;
    // Newest first, then skip the obs that IS the main marker, then cap to N.
    var obs = entry.obs.slice().sort(function(a, b){ return String((b && b.d) || '').localeCompare(String((a && a.d) || '')); });
    var chosen = [];
    for(var oi = 0; oi < obs.length && chosen.length < ELU_OBS_MAX_PER_SPECIES; oi++){
      var o = obs[oi];
      var lat = Number(o && o.lat), lon = Number(o && o.lon);
      if(!Number.isFinite(lat) || !Number.isFinite(lon)) continue;
      if(mainLat !== null && mainLon !== null && Math.abs(lat - mainLat) < 1e-4 && Math.abs(lon - mainLon) < 1e-4) continue;
      chosen.push(o);
    }
    if(!chosen.length) continue;
    var avatarUrl = (typeof getDisplayAvatar === 'function') ? getDisplayAvatar(key) : '';
    var markerList = [];
    for(var ci = 0; ci < chosen.length; ci++){
      var co = chosen[ci];
      try{
        // Pinnable secondary obs: canonical synthId, skip if already pinned (the
        // persistent pin layer draws it instead), and register the occ so the
        // popup's "Kinnita nõelaga" button can drive __toggleGbifPin.
        var __sid = _eluObsSynthId(key, co.lat, co.lon, co.d);
        if(pinnedGbif.has(__sid)) continue; // pinned → drawn by persistent pin layer, bypasses 7d age-out
        // Stash rich popup fields (null/empty omitted) so a pin captures them and
        // keeps full detail in the pin-layer popup after the 7d source obs ages out.
        var __d = {};
        if(co.loc) __d.loc = co.loc;
        if(co.cty) __d.cty = co.cty;
        if(co.obr) __d.obr = co.obr;
        if(co.n != null) __d.n = co.n;
        if(co.bhv) __d.bhv = co.bhv;
        if(co.sid) __d.sid = co.sid;
        __gbifOccById[__sid] = { species: key, lat: Number(co.lat), lon: Number(co.lon), date: co.d ? String(co.d).slice(0,10) : null, details: (Object.keys(__d).length ? __d : null) };
        var m = L.marker([Number(co.lat), Number(co.lon)], { icon: _eluObsIcon(avatarUrl) });
        m.bindPopup(_eluObsPopupHtml(key, co, __sid));
        m.addTo(map); // base map pane, like GBIF markers — NOT the cluster group
        markerList.push(m);
      }catch(e){}
    }
    if(markerList.length) eluObsMarkers.set(key, markerList);
  }
  if(unmatched > 0) console.log('[elu-obs] unmatched: ' + unmatched + ' species');
  try{
    var __eluDiagSpecies = 0, __eluDiagPins = 0, __eluDiagMax = 0, __eluDiagMaxKey = '';
    eluObsMarkers.forEach(function(list, key){
      var c = (list && list.length) ? list.length : 0;
      if(c > 0){ __eluDiagSpecies++; __eluDiagPins += c; if(c > __eluDiagMax){ __eluDiagMax = c; __eluDiagMaxKey = key; } }
    });
    console.log('[elu-obs] rendered:', {
      speciesWithPins: __eluDiagSpecies,
      totalPins: __eluDiagPins,
      maxPerSpecies: __eluDiagMax,
      maxKey: __eluDiagMaxKey,
      rukkiPins: (eluObsMarkers.get('Rukkirääk') || []).length,
      poldvuttPins: (eluObsMarkers.get('Põldvutt') || []).length,
      rukkiResolvedKey: _resolveKey('Rukkirääk'),
      poldvuttResolvedKey: _resolveKey('Põldvutt'),
      payloadSpecies: (__eluRecentObs && __eluRecentObs.species) ? Object.keys(__eluRecentObs.species).length : 0
    });
  }catch(e){ console.warn('[elu-obs] diag failed', e); }
}
// Cheap re-projection to match current visibility (hide/unhide, 7p toggle, filter).
function _syncEluObsVisibility(){

async function _fetchEluRecentObs(){
  if(!ELU_OBS_PINS_ENABLED) return;
  try{
    var res = await fetch('https://eenwcyuyugyrjgpivxrq.supabase.co/functions/v1/get-elurikkus-recent-obs', { cache: 'no-store' });
    if(!res || !res.ok){ console.warn('[elu-obs] fetch failed: HTTP ' + (res && res.status)); return; }

    }
  }catch(e){
    console.warn('[elu-obs] fetch error — keeping previous data', e); // leave __eluRecentObs in place
  }
}

// === Spring migration dates ===
function _normSpringDDMM(s){
  s = (s||'').trim();
  if(!s) return null;
  let m = s.match(/^(\d{1,2})\.(\d{1,2})$/);
  if(m){
    const d = parseInt(m[1],10), mo = parseInt(m[2],10);
    if(mo>=1 && mo<=12 && d>=1 && d<=31) return d+'.'+String(mo).padStart(2,'0');
  }
  m = s.match(/^(\d{4})-(\d{2})-(\d{2})$/);
  if(m){
    const d = parseInt(m[3],10), mo = parseInt(m[2],10);
    if(mo>=1 && mo<=12 && d>=1 && d<=31) return d+'.'+String(mo).padStart(2,'0');
  }
  return null;
}
function _ddmmToDate(ddmm){
  const mm = (ddmm||'').match(/^(\d{1,2})\.(\d{2})$/);
  if(!mm) return null;
  return new Date(2025, parseInt(mm[2],10)-1, parseInt(mm[1],10), 12, 0, 0, 0);
}
function _dateToDdmm(dt){
  return dt.getDate()+'.'+String(dt.getMonth()+1).padStart(2,'0');
}

function updateMarker(key) {
  __nettaTrace('update_marker', key, points[key]);
  const p = points[key];
  const prevMarker = markers.has(key) ? markers.get(key) : null;
  const clusterGroup = window.__markerClusterGroup || window.markerClusterGroup || null;
  if (!p) {
    if(prevMarker){
      try{
        if(clusterGroup && typeof clusterGroup.removeLayer === 'function' && map.hasLayer(clusterGroup)) clusterGroup.removeLayer(prevMarker);
        else map.removeLayer(prevMarker);
      }catch(e){}
      markers.delete(key);
    }
    return;
  }

  const hasCoords = Number.isFinite(p.lat) && Number.isFinite(p.lon);
  const coordsRestricted = String(p.coords_status || '') === 'restricted'
    || String(p.coords_status || '') === 'restricted_or_missing';
  const markerCount = getMarkerCount(p);
  const passesRecent = (!window.__recentOnly) || hasRecentObservation(p);
  const passesSidebarFilter = _speciesPassesSidebarFilter(key);
  const isVisible = (p.visible !== false) && passesRecent && hasCoords && !coordsRestricted && passesSidebarFilter;
  if (key === 'Punanokk-vart') {
    console.log('[NETTA-TRACE] render DECISION:', JSON.stringify({
      hasLat: !!Number.isFinite(p?.lat),
      hasLon: !!Number.isFinite(p?.lon),
      lat: p?.lat, lon: p?.lon,
      visible: p?.visible,
      coords_status: p?.coords_status,
      coordsRestricted: coordsRestricted,
      occ7: p?.occ7,
      src: p?.src,
      t: p?.t,
      passesRecent: passesRecent,
      recentOnly: !!window.__recentOnly,
      willRender: isVisible,
    }));
  }
  if (!isVisible) {
    if(prevMarker){
      try{
        if(clusterGroup && typeof clusterGroup.removeLayer === 'function' && map.hasLayer(clusterGroup)) clusterGroup.removeLayer(prevMarker);
        else map.removeLayer(prevMarker);
      }catch(e){}
      markers.delete(key);
    }
    return;
  }

  __renderedMarkerCount++;
  const bcol = _borderColorByDate(p.t);
  const metaCfg = window.getSpeciesMetaShared ? window.getSpeciesMetaShared(key) : { rarityLevel: 'none' };
  const c7 = Number.isFinite(markerCount) && markerCount >= 1 ? markerCount : null;
  const icon = avatarIcon(getDisplayAvatar(key), bcol, c7, metaCfg.rarityLevel || 'none');
  const popupHtml = buildPopupHtml(key, p);
  const old = prevMarker && prevMarker.getLatLng ? prevMarker.getLatLng() : null;
  if(prevMarker && old && (Math.abs(Number(old.lat) - Number(p.lat)) > 1e-6 || Math.abs(Number(old.lng) - Number(p.lon)) > 1e-6) && typeof prevMarker.setLatLng === 'function'){
    try{ prevMarker.setLatLng([p.lat, p.lon]); }catch(e){}
  }
  if(prevMarker){
    try{
      if(clusterGroup && typeof clusterGroup.removeLayer === 'function' && map.hasLayer(clusterGroup)) clusterGroup.removeLayer(prevMarker);
      else map.removeLayer(prevMarker);
      markers.delete(key);
    }catch(_e){}
  }
  console.log('[fix] updateMarker: placing', key, 'at lat=', p.lat, 'lon=', p.lon);
  const m = L.marker([p.lat,p.lon], {icon});
  if(clusterGroup && typeof clusterGroup.addLayer === 'function' && map.hasLayer(clusterGroup)){
    try{ clusterGroup.addLayer(m); }catch(e){ m.addTo(map); }
  } else {
    m.addTo(map);
  }
  if(m.getPopup()){
    m.setPopupContent(popupHtml);
  } else {
    m.bindPopup(popupHtml, { closeButton:true, autoPan:true, closeOnClick:false, autoClose:false });
  }
  m.on('click', () => m.openPopup());
  m.on('touchend', () => m.openPopup());
  p.lastMarkerMove = {
    oldLat: old ? Number(old.lat) : Number(p.lat),
    oldLon: old ? Number(old.lng) : Number(p.lon),
    newLat: Number(p.lat),
    newLon: Number(p.lon),
    changed: !old || Math.abs(old.lat - p.lat) > 1e-6 || Math.abs(old.lng - p.lon) > 1e-6,
    atISO: new Date().toISOString()
  };
  if(p.lastMarkerMove.changed && clusterGroup && typeof clusterGroup.removeLayer === 'function' && typeof clusterGroup.addLayer === 'function' && map.hasLayer(clusterGroup)){
    try{ clusterGroup.removeLayer(m); clusterGroup.addLayer(m); }catch(e){}
  }
  markers.set(key, m);
}


// UI
function escapeHtml(s){
  return String(s || '')
    .replace(/&/g, '&amp;')
    .replace(/</g, '&lt;')
    .replace(/>/g, '&gt;')
    .replace(/"/g, '&quot;')
    .replace(/'/g, '&#39;');

function _urlBase64ToUint8Array(base64String) {
  var padding = '='.repeat((4 - base64String.length % 4) % 4);
  var base64 = (base64String + padding).replace(/-/g, '+').replace(/_/g, '/');
  var rawData = atob(base64);
  var outputArray = new Uint8Array(rawData.length);
  for (var i = 0; i < rawData.length; i++) outputArray[i] = rawData.charCodeAt(i);
  return outputArray;
}

function render() {
  if (window.__applyingSnapshot) return;
  const q = (document.getElementById('filterBox').value||'').toLowerCase().trim();
  const list = document.getElementById('list'); list.innerHTML='';
  const recent7 = is7daysOnly();
  const arr = DATA.filter(function(x){
    if(!x.est.toLowerCase().includes(q)) return false;
    if(recent7){
      const p = points[x.est];
      if(!p) return false;
      if(!hasRecentObservation(p)) return false;
    }
    return true;
  });
  arr.sort((a, b) => a.est.localeCompare(b.est, 'et'));
  for (const o of arr) list.insertAdjacentHTML('beforeend', rowHTML(o));
  const firstRow = list.querySelector('.row[data-key]');
  const syncedPredictionSpecies = getPredictionSpeciesPreference();
  if(syncedPredictionSpecies){
    window.__selectedSpecies = syncedPredictionSpecies;
  } else if(firstRow && !window.__selectedSpecies) {
    window.__selectedSpecies = firstRow.getAttribute('data-key') || window.__selectedSpecies;
  }

  // --- 7-day validation logging ---
  try {
    const cutoff = new Date(_days7CutoffTs()).toISOString();
    const rawCount = DATA.length;
    const filteredCount = arr.length;
    const visibleSpeciesKeys = arr.map(function(x){ return x.est; });
    let oldestVisible = null, newestVisible = null;
    for(const key of visibleSpeciesKeys){
      const p = points[key];
      if(!p) continue;
      const d = getEffectiveRecentDate(p);
      const ts = _parseObservedTs(d);
      if(!Number.isFinite(ts)) continue;
      if(oldestVisible === null || ts < oldestVisible) oldestVisible = ts;
      if(newestVisible === null || ts > newestVisible) newestVisible = ts;
    }
    console.log('[7day] active=' + recent7);
    console.log('[7day] cutoff=' + cutoff);
    console.log('[7day] rawRecords=' + rawCount);
    console.log('[7day] filteredRecords=' + filteredCount);
    console.log('[7day] oldestVisible=' + (oldestVisible ? new Date(oldestVisible).toISOString() : 'none'));
    console.log('[7day] newestVisible=' + (newestVisible ? new Date(newestVisible).toISOString() : 'none'));
    if(recent7){
      const cutoffTs = _days7CutoffTs();
      for(const key of visibleSpeciesKeys){
        const p = points[key];
        if(!p) continue;
        const d = getEffectiveRecentDate(p);
        const ts = _parseObservedTs(d);
        if(Number.isFinite(ts) && ts < cutoffTs){
          console.debug('[7day] old record visible species=' + key + ' date=' + d);
        }
      }
    }
  } catch(e){ /* ignore logging errors */ }
}

(function(){
  var KEY='bm_admin';
  function isOn(){ return localStorage.getItem(KEY)==='1'; }
  function apply(){ document.body.dataset.admin = isOn() ? '1' : ''; }
  function on(){ localStorage.setItem(KEY,'1'); apply(); return true; }
  function off(){ localStorage.removeItem(KEY); apply(); return false; }
  function toggle(){ return isOn() ? off() : on(); }

  // Rehydrate from ?admin=1 (persistent — writes to localStorage)
  try {
    var q = new URLSearchParams(location.search);
    if(q.get('admin')==='1') localStorage.setItem(KEY,'1');
  } catch(e){}

  // Initial apply (handle both post-DOM and pre-DOM script positions)
  if(document.readyState==='loading'){
    document.addEventListener('DOMContentLoaded', apply, {once:true});
  } else {
    apply();
  }

  // Keybind: bare Shift+A, guarded against input focus and key auto-repeat
  document.addEventListener('keydown', function(e){
    if(e.repeat) return;
    if(!e.shiftKey) return;
    if(e.ctrlKey || e.altKey || e.metaKey) return;
    var k = e.key;
    if(k !== 'A' && k !== 'a') return;
    var el = document.activeElement;
    if(el){
      var tag = el.tagName;
      if(tag==='INPUT' || tag==='TEXTAREA' || el.isContentEditable) return;
    }
    e.preventDefault();
    var next = toggle();
    console.log('[bm-admin]', next ? 'ON' : 'OFF');
  });

  // Console API
  window.__bmAdmin = { on: on, off: off, toggle: toggle, isOn: isOn };
})();

// ---- Freshness helpers (Phase D · Fix 2b) ----
(function(){
  // Scheduler hours in Europe/Tallinn — matches n8n cron `0 7,19 * * *`
  // in the `compute-ennustus-scheduler` workflow. Update BOTH if the cron changes.
  var ENN_SCHEDULER_HOURS = [7, 19];

  function _padHour(h){ return (h < 10 ? '0' + h : String(h)) + ':00'; }

  function _tallinnDateKey(d){
    // Stable "YYYY-MM-DD" in Europe/Tallinn for same-day comparison
    try {
      return new Intl.DateTimeFormat('en-CA', {
        timeZone: 'Europe/Tallinn',
        year: 'numeric', month: '2-digit', day: '2-digit'
      }).format(d);
    } catch(e) { return String(d.getTime()); }
  }

  function _ennFmtLastUpdated(ms){
    if(!ms || !isFinite(ms)) return '—';
    var d = new Date(ms);
    var now = new Date();
    var sameDay = _tallinnDateKey(d) === _tallinnDateKey(now);
    try {
      var hhmm = new Intl.DateTimeFormat('et-EE', {
        timeZone: 'Europe/Tallinn',
        hour: '2-digit', minute: '2-digit', hour12: false
      }).format(d);
      if(sameDay) return hhmm;
      var ddmm = new Intl.DateTimeFormat('et-EE', {
        timeZone: 'Europe/Tallinn',
        day: '2-digit', month: '2-digit'
      }).format(d);
      return ddmm + ' ' + hhmm;
    } catch(e) { return '—'; }
  }

  function _ennFmtNextRun(){
    try {
      var hStr = new Intl.DateTimeFormat('en-GB', {
        timeZone: 'Europe/Tallinn',
        hour: '2-digit', hour12: false
      }).format(new Date());
      var hNow = parseInt(hStr, 10);
      if(!isFinite(hNow)) return '—';
      for(var i = 0; i < ENN_SCHEDULER_HOURS.length; i++){
        if(ENN_SCHEDULER_HOURS[i] > hNow) return _padHour(ENN_SCHEDULER_HOURS[i]);
      }
      return _padHour(ENN_SCHEDULER_HOURS[0]);
    } catch(e) { return '—'; }
  }

  function _ennMaxComputedAt(){
    var pd = window.__probDataBySpecies || {};
    var max = 0;
    for(var k in pd){
      var c = pd[k] && pd[k].computedAt;
      if(c && c > max) max = c;
    }
    return max || null;
  }

  function _ennRenderFresh(){
    var tsEl = document.getElementById('ennFreshTs');
    var nextEl = document.getElementById('ennFreshNext');
    if(!tsEl && !nextEl) return; // panel not present yet
    if(tsEl) tsEl.textContent = _ennFmtLastUpdated(_ennMaxComputedAt());
    if(nextEl) nextEl.textContent = _ennFmtNextRun();
  }

  window.__ennRenderFresh = _ennRenderFresh;
  window.__ennFmtNextRun = _ennFmtNextRun;
  window.__ennFmtLastUpdated = _ennFmtLastUpdated;
})();

<script>
(function(){
  function getSidebarHost(){
    return document.querySelector('#sidebar .panel-content-scroll') || document.getElementById('sidebar') || document.body;
  }
  function placeSidebarTools(){
    const bar = document.getElementById('windToggleBar');
    const spring = document.getElementById('springPanel');
    const host = getSidebarHost();
    const filterBox = document.getElementById('filterBox');
    try{
      if(!bar || !host) return;
      if(bar.parentElement !== host){
        if(filterBox && filterBox.parentElement === host) host.insertBefore(bar, filterBox);
        else host.prepend(bar);
      } else if(filterBox && bar.nextElementSibling !== spring && filterBox.previousElementSibling !== bar){
        host.insertBefore(bar, filterBox);
      }
      if(spring){
        if(spring.parentElement !== host){
          if(filterBox && filterBox.parentElement === host) host.insertBefore(spring, filterBox);
          else host.appendChild(spring);
        }
        if(bar.nextElementSibling !== spring){
          host.insertBefore(spring, bar.nextSibling);
        }
      }
    }catch(e){}
  }
  (function placeWindButton(){
    placeSidebarTools();
    window.__placeSidebarTools = placeSidebarTools;
  })();

  const panel = document.getElementById('windPanel');
  const iframe = document.getElementById('windyFrame');
  const btn = document.getElementById('toggleWind');
  const btnClose = document.getElementById('windClose');
  const bS = document.getElementById('windSmall');
  const bM = document.getElementById('windMedium');
  const bL = document.getElementById('windLarge');
  const isMob = window.matchMedia && window.matchMedia('(max-width: 900px)').matches;

  let __lastWindSync = 0;
  function windyUrl(lat, lon, zoom){
    const z = Math.max(3, Math.min(12, Math.round(zoom||6)));
    return 'https://embed.windy.com/embed2.html?lat='+lat.toFixed(3)+'&lon='+lon.toFixed(3)+'&detailLat='+lat.toFixed(3)+'&detailLon='+lon.toFixed(3)+'&zoom='+z+'&level=surface&overlay=wind&marker=true&pressure=true';
  }
  function refreshWind(){
    if(isMob){
      const now = Date.now();
      if(now - __lastWindSync < 1000) return;
      __lastWindSync = now;
    }
    try{
      const c = window.map && map.getCenter ? map.getCenter() : {lat:58.7, lng:25.3};
      const z = window.map && map.getZoom ? map.getZoom() : 6;
      const url = windyUrl(c.lat, c.lng, z);
      if (iframe.getAttribute('src') !== url) iframe.setAttribute('src', url);
    }catch(e){}
  }
  function openWind(){
    refreshWind();
    if(isMob){
      panel.classList.add('windy-modal-open');
      document.body.style.overflow = 'hidden';
    } else {
      panel.style.display = 'flex';
    }
    try{
      if (!window.__wind_sync__ && window.map){
        map.on('moveend zoomend', refreshWind);
        window.__wind_sync__ = true;
      }
    }catch(e){}
  }
  function closeWind(){
    if(isMob){
      panel.classList.remove('windy-modal-open');
      document.body.style.overflow = '';
      iframe.setAttribute('src', 'about:blank');
    } else {
      panel.style.display = 'none';
    }
    try{ setTimeout(()=>{ if(map && map.invalidateSize) map.invalidateSize(true); }, 260); }catch(e){}
  }
  btn.addEventListener('click', ()=>{
    const isOpen = isMob ? panel.classList.contains('windy-modal-open') : (panel.style.display !== 'none' && panel.style.display);
    if (!isOpen) openWind(); else closeWind();
  });
  btnClose.addEventListener('click', closeWind);
  const btnCloseMob = document.getElementById('windCloseMobile');
  if(btnCloseMob) btnCloseMob.addEventListener('click', closeWind);
  if(!isMob){
    bS.addEventListener('click', ()=>{ panel.style.width='320px'; panel.style.height='240px'; refreshWind(); });
    bM.addEventListener('click', ()=>{ panel.style.width='420px'; panel.style.height='300px'; refreshWind(); });
    bL.addEventListener('click', ()=>{ panel.style.width='560px'; panel.style.height='420px'; refreshWind(); });
  }
  try{
    if (typeof window.render === 'function' && !window.__sidebar_tools_render_patch__){
      const _r = window.render;
      window.render = function(){
        const out = _r.apply(this, arguments);
        try{ placeSidebarTools(); }catch(e){}
        return out;
      };
      window.__sidebar_tools_render_patch__ = true;
    }
  }catch(e){}
})();
</script>


<!-- === Kevadrände paneel === -->
<script>
(function(){
  function springSortKey(v){
    try{
      if(!v) return 999999;
      const x = (typeof _normSpringDDMM === 'function') ? (_normSpringDDMM(String(v).trim()) || String(v).trim()) : String(v).trim();
      let m = x.match(/^(\d{1,2})\.(\d{1,2})$/);
      if(m) return (+m[2])*100 + (+m[1]);
      m = x.match(/^(\d{4})-(\d{2})-(\d{2})$/);
      if(m) return (+m[2])*100 + (+m[3]);
      return 999999;
    }catch(e){ return 999999; }
  }
  function getSpringDates(){ try{ return (typeof springDates !== 'undefined') ? springDates : {}; }catch(e){ return {}; } }
  function getSpeciesList(){ try{ return (typeof SPECIES !== 'undefined') ? SPECIES : Object.keys(getSpringDates()); }catch(e){ return []; } }
  function getSpringPanelOpen(){
    try{ return localStorage.getItem(LS_SPRING_PANEL_OPEN) === '1'; }catch(e){ return false; }
  }
  function setSpringPanelOpen(on){
    try{ localStorage.setItem(LS_SPRING_PANEL_OPEN, on ? '1' : '0'); }catch(e){}
  }
  function ensureSpringState(){
    if(!springDates || typeof springDates !== 'object'){
      springDates = {};
    }
    springDates = _sanitizeSpringDateMap(springDates);
    // CRITICAL: keep window.springDates in sync after reassignment
    window.springDates = springDates;
  }
  function ensureSpringUiPlaced(){
    try{
      if(typeof window.__placeSidebarTools === 'function') window.__placeSidebarTools();
    }catch(e){}
  }

  function renderSpringPanel(){
    ensureSpringState();
    ensureSpringUiPlaced();
    const body = document.getElementById('springTableBody');
    const countEl = document.getElementById('springCount');
    const refreshBtn = document.getElementById('springRefresh');
    const q = (document.getElementById('springSearch')?.value || '').toLowerCase().trim();
    if(!body || !countEl) return;
    if(refreshBtn){
      refreshBtn.disabled = springYearRefreshInFlight;
      refreshBtn.textContent = springYearRefreshInFlight ? 'Värskendan…' : 'Värskenda kevadrännet';
    }
    const sd = getSpringDates();
    const list = getSpeciesList();
    const rows = [];
    for(const name of list){
      const raw = _getSpringValue(name);
      if(!raw) continue;
      if(q && !String(name).toLowerCase().includes(q)) continue;
      const disp = _springDisplayValue(raw);
      rows.push({name, disp, key: springSortKey(disp)});
    }
    rows.sort((a,b)=> (a.key-b.key) || String(a.name).localeCompare(String(b.name)));
    body.innerHTML = rows.map(r => {
      const safeName = String(r.name).replace(/"/g,'&quot;');
      const yIso = springYearFirst[r.name];
      const yDisp = yIso ? isoToDdMm(yIso) : '—';
      const key = safeName;
      const springDateText = r.disp;
      const isEditing = (springEditRowKey === key);
      const currentVal = _springDisplayValue(_getSpringValue(key));
      const canEdit = _canEditKevadranne();
      const dateCellHtml = canEdit && isEditing
        ? `
    <div class="spring-edit-wrap" style="display:flex; gap:6px; align-items:center;">
      <input class="spring-edit-input" data-key="${key}" value="${currentVal}" placeholder="DD.MM"
        inputmode="numeric"
        style="width:72px; padding:6px 8px; border:1px solid #ddd; border-radius:10px; font-size:14px;" />
      <button class="spring-edit-save" data-key="${key}"
        style="padding:6px 10px; border:0; border-radius:10px; background:#16a34a; color:#fff;">OK</button>
      <button class="spring-edit-cancel" data-key="${key}"
        style="padding:6px 10px; border:0; border-radius:10px; background:#eee; color:#111;">X</button>
    </div>
  `
        : (canEdit
          ? `
    <button class="spring-date-btn" data-key="${key}"
      style="border:0; border-radius:999px; padding:6px 10px; background:#f3f4f6; color:#111;">
      ${springDateText}
    </button>
  `
          : `<span style="border-radius:999px; padding:6px 10px; background:#f3f4f6; color:#111; display:inline-block;">${springDateText}</span>`);
      return '<tr><td>'+dateCellHtml+'</td><td><span class="springSpeciesBtn" onclick="window.__springScrollToSpecies && window.__springScrollToSpecies(\''+safeName.replace(/'/g, "\\'")+'\')">'+ safeName+'</span></td><td>'+yDisp+'</td></tr>';
    }).join('');
    // Auto-scan disabled — user triggers refresh manually via the
    // "Värskenda 2026 esmavaatlused" button in the Kevad panel header.
    countEl.textContent = rows.length;
  }
  window.renderSpringPanel = renderSpringPanel;

  window.__springScrollToSpecies = function(name){
    try{
      const escaped = (window.CSS && CSS.escape) ? CSS.escape(name) : String(name).replace(/"/g, '\\"');
      const row = document.querySelector('.row[data-key="'+escaped+'"]') || document.querySelector('[data-key="'+escaped+'"]');
      if(row){
        row.scrollIntoView({behavior:'smooth', block:'nearest'});
        row.style.outline = '2px solid #93c5fd';
        row.style.outlineOffset = '2px';
        setTimeout(()=>{ row.style.outline=''; row.style.outlineOffset=''; }, 1200);
      }
    }catch(e){}
  };

  function toggleSpring(open){
    const panel = document.getElementById('springPanel');
    if(!panel) return;
    const wantOpen = (open===true) ? true : (open===false ? false : (panel.style.display==='none' || !panel.style.display));
    if(wantOpen){
      panel.style.display = 'flex';
      setSpringPanelOpen(true);
      renderSpringPanel();
    } else {
      panel.style.display = 'none';
      setSpringPanelOpen(false);
    }
  }
  window.toggleSpring = toggleSpring;

  function wire(){
    ensureSpringUiPlaced();
    const btn = document.getElementById('toggleSpring');
    const close = document.getElementById('springClose');
    const search = document.getElementById('springSearch');
    const refreshBtn = document.getElementById('springRefresh');
    if(btn && !btn.__springBound){ btn.addEventListener('click', ()=> toggleSpring()); btn.__springBound = true; }
    if(close && !close.__springBound){ close.addEventListener('click', ()=> toggleSpring(false)); close.__springBound = true; }
    if(search && !search.__springBound){ search.addEventListener('input', renderSpringPanel); search.__springBound = true; }
    if(refreshBtn && !refreshBtn.__springBound){
      refreshBtn.addEventListener('click', async function(){
        if(springYearRefreshInFlight) return;
        const keys = getSpeciesList().filter(function(name){
          return !!_getSpringValue(name);
        });
        springYearRefreshInFlight = true;
        renderSpringPanel();
        try{
          await refreshSpringYearFirstForKeys(keys);
        } finally {
          springYearRefreshInFlight = false;
          renderSpringPanel();
        }
      });
      refreshBtn.__springBound = true;
    }
    const refreshAllBtn = document.getElementById('springRefreshBtn');
    if(refreshAllBtn && !refreshAllBtn.__springBound){
      refreshAllBtn.addEventListener('click', () => manualRefreshAllSpringYearFirst());
      refreshAllBtn.__springBound = true;
    }
  }

  try{
    if (typeof window.render === 'function' && !window.__springpanel_render_patch__){
      const _r = window.render;
      window.render = function(){
        const out = _r.apply(this, arguments);
        try{
          wire();
          if(getSpringPanelOpen()) toggleSpring(true);
          else renderSpringPanel();
        }catch(e){}
        return out;
      };
      window.__springpanel_render_patch__ = true;
    }
  }catch(e){}
  if (document.readyState === 'loading') document.addEventListener('DOMContentLoaded', ()=>{
    wire();
    if(getSpringPanelOpen()) toggleSpring(true);
    else renderSpringPanel();
  });
  else {
    wire();
    if(getSpringPanelOpen()) toggleSpring(true);
    else renderSpringPanel();
  }
})();
</script>

<!-- === 7d active species badge === -->
<script>
(function(){
  function computeActiveSpecies7d(){
    try{
      const pts = (typeof points !== 'undefined') ? points : {};
      const list = (typeof SPECIES !== 'undefined') ? SPECIES : [];
      const now = Date.now(), sevenMs = 7*24*60*60*1000;
      let n = 0;
      for (const name of list){
        const p = pts[name] || {};
        let active = false;
        const occ7 = (p.occ7 === 0 || p.occ7) ? Number(p.occ7) : NaN;
        if (Number.isFinite(occ7)) active = occ7 > 0;
        if (!active && p.t){
          try{ const ms = (typeof _toDay === 'function') ? _toDay(p.t) : null; if (ms && (now - ms) <= sevenMs) active = true; }catch(e){}
        }
        if (active) n++;
      }
      return n;
    }catch(e){ return 0; }
  }
  function updateActive7dBadge(){

<!-- === postMessage API for parent app (Avatar Manager) === -->
<script>
var __sharedDefaults = {};
(function(){
  window.addEventListener('message', function(ev){
    try{
      if(!ev.data || typeof ev.data !== 'object') return;
      var type = ev.data.type;
      if(type === 'AVATARS_DEFAULTS' && ev.data.avatars){
        __sharedDefaults = {};
        var incomingDefaults = ev.data.avatars || {};
        var _matchCount = 0;
        for(var dk in incomingDefaults){
          if(!incomingDefaults.hasOwnProperty(dk)) continue;
          var normKey = _normalizeToInternal(dk);
          __sharedDefaults[normKey] = incomingDefaults[dk];
          if(normKey !== dk) __sharedDefaults[dk] = incomingDefaults[dk];
          if(normKey !== dk) _matchCount++;
        }
        console.log('[iframe] AVATARS_DEFAULTS received:', Object.keys(incomingDefaults).length, 'keys,', _matchCount, 'normalized to internal format');
        var localAvatars = JSON.parse(localStorage.getItem(LS_AVATARS) || '{}');
        var merged = Object.assign({}, __sharedDefaults, localAvatars);
        for(var k in merged){ if(merged.hasOwnProperty(k) && merged[k]) avatars[k] = merged[k]; }
        save();
        preloadAvatars(Object.values(avatars));
        SPECIES.forEach(function(name){ try{ updateMarker(name); }catch(e){} });
        render();
      }
      if(type === 'AVATARS_UPDATE' && ev.data.avatars){
        var incoming = ev.data.avatars;
        for(var k in incoming){
          if(!incoming.hasOwnProperty(k)) continue;
          var nk = _normalizeToInternal(k);
          if(incoming[k]){ avatars[nk] = incoming[k]; if(nk !== k) avatars[k] = incoming[k]; }
          else { delete avatars[nk]; if(nk !== k) delete avatars[k]; }
        }
        save();
        preloadAvatars(Object.values(avatars));
        SPECIES.forEach(function(name){ try{ updateMarker(name); }catch(e){} });
        render();
      }
      if(type === 'AVATARS_REQUEST'){
        var src = ev.source;
        if(src && typeof src.postMessage === 'function') src.postMessage({ type: 'AVATARS_CURRENT', avatars: avatars }, '*');
      }
      if(type === 'SPECIES_META_DEFAULTS' && ev.data.speciesMeta && typeof ev.data.speciesMeta === 'object'){
        var currentMeta = JSON.parse(localStorage.getItem('estbirding.speciesMeta.v1') || '{}');
        var incomingMeta = ev.data.speciesMeta || {};
        var normalizedMeta = {};
        for(var mk in incomingMeta){
          if(!incomingMeta.hasOwnProperty(mk)) continue;
          var mnk = _normalizeToInternal(mk);
          normalizedMeta[mnk] = incomingMeta[mk];
          if(mnk !== mk) normalizedMeta[mk] = incomingMeta[mk];
        }
        var mergedMeta = {};
        var allKeys = {};
        for (var ck in currentMeta) allKeys[ck] = true;
        for (var ik in normalizedMeta) allKeys[ik] = true;
        for (var amk in allKeys) {
          mergedMeta[amk] = Object.assign({}, currentMeta[amk] || {}, normalizedMeta[amk] || {});
        }
        localStorage.setItem('estbirding.speciesMeta.v1', JSON.stringify(mergedMeta));
        if (typeof window.__bm_applySpeciesMetaToDicts === 'function') {
          window.__bm_applySpeciesMetaToDicts(mergedMeta);
        }
        render();

        try {
          var rebuiltNotify = [];
          for (var mKey in mergedMeta) {
            if (mergedMeta[mKey] && mergedMeta[mKey].notify === true) {
              rebuiltNotify.push(mKey);
            }
          }
          var localNotify = __notifySpecies || [];
          for (var li = 0; li < localNotify.length; li++) {
            if (rebuiltNotify.indexOf(localNotify[li]) < 0) {
              rebuiltNotify.push(localNotify[li]);
            }
          }
          __notifySpecies = rebuiltNotify;
          localStorage.setItem('bm_notify_species', JSON.stringify(__notifySpecies));
          console.log('[notify] Rebuilt from cloud sync:', __notifySpecies.length, 'species');
          if (typeof render === 'function') render();
        } catch(e) {
          console.warn('[notify] Rebuild from cloud failed:', e);
        }
      }
      if(type === 'SPECIES_META_REQUEST'){
        var src2 = ev.source;
        if(src2 && typeof src2.postMessage === 'function') src2.postMessage({ type: 'SPECIES_META_CURRENT', speciesMeta: JSON.parse(localStorage.getItem('estbirding.speciesMeta.v1') || '{}') }, '*');
      }
      if(type === 'CUSTOM_SPECIES_DEFAULTS' && Array.isArray(ev.data.customSpecies)){
        try {
          localStorage.setItem('estbirding.customSpecies.v1', JSON.stringify(ev.data.customSpecies));
        } catch(_){}
        if (typeof window.__bm_applyCustomSpeciesList === 'function') {
          window.__bm_applyCustomSpeciesList(ev.data.customSpecies);
        }
        if (typeof window.__bm_reconcileCustomSpecies === 'function') {
          window.__bm_reconcileCustomSpecies(ev.data.customSpecies);
        }
      }
      if(type === 'CUSTOM_SPECIES_REMOVE' && typeof ev.data.name === 'string'){
        if (typeof window.__bm_removeCustomSpecies === 'function') {
          window.__bm_removeCustomSpecies(ev.data.name);
        }
      }
      if(type === 'APP_PERMISSIONS' && ev.data.permissions && typeof ev.data.permissions === 'object'){
        window.__appPermissions = Object.assign({}, window.__appPermissions || {}, ev.data.permissions || {});
        springEditRowKey = null;
        try{ render(); }catch(e){}
        try{ renderSpringPanel(); }catch(e){}
      }
    }catch(e){ console.warn('postMessage handler error', e); }
  });
  try{
    if(window.parent && window.parent !== window){
      window.parent.postMessage({ type: 'AVATARS_REQUEST' }, '*');
      window.parent.postMessage({ type: 'SPECIES_META_REQUEST' }, '*');
      window.parent.postMessage({ type: 'CUSTOM_SPECIES_REQUEST' }, '*');
    }
  }catch(e){}
})();
</script>
