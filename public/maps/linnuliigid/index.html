<script>
// --- Silent notifier: replace alerts with console logs ---
function notifySilent(msg){
  try { console.warn(msg); } catch(e){}
}
// (Back-compat) if any code still calls notifySilent(), shadow it to be silent:
window._realAlert = window.alert;
window.alert = function(msg){ notifySilent(msg); };

// --- Per‑species clear: remove coords/date/occ/src and marker immediately ---

function clearOccurrence(key){
  try{
    // ensure data container exists
    window.points = window.points || {};
    const p = (points[key] = points[key] || {});

    // clear fields
    delete p.lat; delete p.lon; delete p.t; delete p.occ; delete p.src;

    // remove marker layer immediately if present
    try{
      if (window.markers && typeof markers.has === 'function' && markers.has(key)){
        const m = markers.get(key);
        try { m.remove ? m.remove() : map.removeLayer(m); } catch(e){}
        try { markers.delete(key); } catch(e){}
      }
    }catch(e){ console.warn('marker remove failed', e); }

    // remove any occurrence circles
    try{
      if (window.circleLayers && typeof circleLayers.has === 'function' && circleLayers.has(key)){
        circleLayers.get(key).forEach(c => { try { c.remove ? c.remove() : map.removeLayer(c); } catch(e){} });
        circleLayers.delete(key);
      }
    }catch(e){ /* ignore */ }

    // save and update UI
    if (typeof save === 'function') save();
    if (typeof updateMarker === 'function') updateMarker(key);
    if (typeof render === 'function') render();
  }catch(e){ console.warn('clearOccurrence error', e); }
}
</script>

// === Avatar defaults & preloading ===

// Slugify Estonian species name to filename
function slugifySpeciesKey(key){
  return String(key).toLowerCase()
    .replace(/õ/g,'o').replace(/ä/g,'a').replace(/ö/g,'o').replace(/ü/g,'u')
    .replace(/š/g,'s').replace(/ž/g,'z')
    .replace(/[^a-z0-9]+/g,'-')
    .replace(/^-+|-+$/g,'');
}

const __avatarPreloadCache = new Set();
function preloadAvatars(urls){
  try{
    if(!urls) return;
    for(const u of urls){
      if(!u || __avatarPreloadCache.has(u)) continue;
      __avatarPreloadCache.add(u);
      const img = new Image();
      img.decoding = 'async';
      img.loading = 'eager';
      img.src = u;
    }
  }catch(e){ /* ignore */ }
}

// Auto-detect avatar file for a single species key (returns Promise)
const __avatarProbeCache = new Map(); // key -> url|null
function probeAvatarFile(key){
  if(__avatarProbeCache.has(key)) return Promise.resolve(__avatarProbeCache.get(key));
  const slug = slugifySpeciesKey(key);
  const url = new URL('avatars/' + slug + '.webp', window.location.href).toString();
  return new Promise(resolve=>{
    const img = new Image();
    img.onload = ()=>{
      __avatarProbeCache.set(key, url);
      resolve(url);
    };
    img.onerror = ()=>{
      __avatarProbeCache.set(key, null);
      resolve(null);
    };
    img.src = url;
  });
}

async function autoDetectAvatarsForActive(){
  try{
    const now = Date.now(), sevenMs = 7*24*60*60*1000;
    const activeKeys = [];
    for(const name of SPECIES){
      if(avatars[name]) continue; // localStorage already has one
      const p = points[name];
      if(!p) continue;
      let active = false;
      if(Number.isFinite(p.occ7) && p.occ7 > 0) active = true;
      if(!active && p.t){
        const ms = _toDay(p.t);
        if(ms && (now - ms) <= sevenMs) active = true;
      }
      if(active) activeKeys.push(name);
    }
    // Probe in parallel (only active species without existing avatar)
    const results = await Promise.all(activeKeys.map(k => probeAvatarFile(k).then(url => ({k,url}))));
    let changed = false;
    for(const {k,url} of results){
      if(url){
        avatars[k] = url;
        changed = true;
      }
    }
    if(changed){
      save();
      preloadAvatars(Object.values(avatars));
      // Re-render markers and sidebar
      activeKeys.forEach(k=>{ try{ updateMarker(k); }catch(e){} });
      render();
    }
  }catch(e){ /* ignore */ }
}

// === Per-species cache with TTL ===
const CACHE_PREFIX = 'linn_cache_v1:';
const CACHE_TTL_MS = 6 * 60 * 60 * 1000; // 6 hours

function getCachedSpecies(key){
  try{
    const raw = localStorage.getItem(CACHE_PREFIX + key);
    if(!raw) return null;
    const obj = JSON.parse(raw);
    if(!obj || !obj.cachedAt) return null;
    return obj;
  }catch(e){ return null; }
}
function setCachedSpecies(key, data){
  try{
    data.cachedAt = Date.now();
    localStorage.setItem(CACHE_PREFIX + key, JSON.stringify(data));
  }catch(e){}
}
function isCacheExpired(cached){
  if(!cached || !cached.cachedAt) return true;
  return (Date.now() - cached.cachedAt) > CACHE_TTL_MS;
}

// Load cached data into points on startup (instant markers)
(function loadCacheIntoPoints(){
  for(const name of SPECIES){
    const c = getCachedSpecies(name);
    if(!c) continue;
    points[name] = points[name] || {};
    if(Number.isFinite(c.lat)) points[name].lat = c.lat;
    if(Number.isFinite(c.lon)) points[name].lon = c.lon;
    if(c.lastDate) points[name].t = c.lastDate;
    if(Number.isFinite(c.occ7)) points[name].occ7 = c.occ7;
    if(c.src) points[name].src = c.src;
    if(typeof points[name].visible !== 'boolean') points[name].visible = true;
  }
})();

// === Auto update (no UI changes) ===
function _toDay(s){
  if(!s) return null;
  const m = (''+s).match(/(\d{4})-(\d{2})-(\d{2})/);
  if(!m) return null;
  return new Date(+m[1], +m[2]-1, +m[3]).getTime();
}
function _isNewer(newD, oldD){
  const a = _toDay(newD), b = _toDay(oldD);
  if(a && b) return a > b;
  return !!newD && !oldD;
}

// --- Recent-only (markers only) helpers ---
window.__recentOnly = true; // ALWAYS enforce last-7-days only
function isRecent(isoDate){
  try{
    const ms = _toDay(isoDate);
    if (!ms) return false;
    const seven = 7 * 24 * 60 * 60 * 1000;
    return (Date.now() - ms) <= seven;
  }catch(e){ return false; }
}

function _borderColorByDate(isoDate){
  try{
    const ms = _toDay(isoDate);
    if (!ms) return '#e67e22';
    const now = Date.now();
    const seven = 7 * 24 * 60 * 60 * 1000;
    return (now - ms) <= seven ? '#27ae60' : '#e67e22';
  }catch(e){ return '#e67e22'; }
}

// === Fetch Queue System ===
const FETCH_CONCURRENCY = IS_MOBILE ? 2 : 4;
let __fetchQueue = [];
let __fetchRunning = 0;
let __fetchAbort = null; // AbortController
let __fetchTotal = 0;
let __fetchDone = 0;
let __fetchLastError = '';

function _updateFetchUI(){
  const prog = document.getElementById('fetchProgress');
  const bar = document.getElementById('fetchProgressBar');
  const barInner = document.getElementById('fetchProgressBarInner');
  const errEl = document.getElementById('fetchError');
  const stopBtn = document.getElementById('btnStopFetch');
  if(!prog) return;
  if(__fetchTotal > 0 && __fetchDone < __fetchTotal){
    prog.textContent = 'Refreshing: ' + __fetchDone + '/' + __fetchTotal;
    if(bar){ bar.style.display='block'; barInner.style.width = Math.round(__fetchDone/__fetchTotal*100)+'%'; }
    if(stopBtn) stopBtn.style.display='inline-block';
  } else {
    prog.textContent = __fetchTotal > 0 ? 'Done (' + __fetchDone + '/' + __fetchTotal + ')' : '';
    if(bar) bar.style.display='none';
    if(stopBtn) stopBtn.style.display='none';
  }
  if(errEl) errEl.textContent = __fetchLastError ? 'Last error: ' + __fetchLastError : '';
}

function _stopFetchQueue(){
  __fetchQueue = [];
  if(__fetchAbort){ try{ __fetchAbort.abort(); }catch(e){} }
  __fetchAbort = null;
  __fetchRunning = 0;
  _updateFetchUI();
}

async function _processQueue(){
  while(__fetchQueue.length > 0 && __fetchRunning < FETCH_CONCURRENCY){
    const item = __fetchQueue.shift();
    if(!item) continue;
    __fetchRunning++;
    (async ()=>{
      try{
        await autoFetchCoords(item.key, item.url);
        // Update cache
        const p = points[item.key];
        if(p) setCachedSpecies(item.key, { lat:p.lat, lon:p.lon, lastDate:p.t, occ7:p.occ7, src:p.src });
      }catch(e){
        __fetchLastError = item.key + ': ' + (e.message||e);
      }
      __fetchDone++;
      __fetchRunning--;
      _updateFetchUI();
      _processQueue();
    })();
  }
}

let __lastRefreshClick = 0;
function _enqueueFetch(speciesKeys){
  // Debounce
  const now = Date.now();
  if(now - __lastRefreshClick < 1000) return;
  __lastRefreshClick = now;

  _stopFetchQueue();
  __fetchAbort = new AbortController();
  __fetchTotal = speciesKeys.length;
  __fetchDone = 0;
  __fetchLastError = '';

  for(const key of speciesKeys){
    const obj = DATA.find(d => d.est === key);
    if(obj) __fetchQueue.push({ key: obj.est, url: obj.url });
  }
  _updateFetchUI();
  _processQueue();
}

// Get currently visible/filtered species keys
function _getFilteredSpeciesKeys(){
  const q = (document.getElementById('filterBox')?.value||'').toLowerCase().trim();
  return DATA.filter(x => x.est.toLowerCase().includes(q)).map(x => x.est);
}

// Wire buttons (after DOM ready)
function _wireFetchButtons(){
  const btnVis = document.getElementById('btnRefreshVisible');
  const btnSel = document.getElementById('btnRefreshSelected');
  const btnStop = document.getElementById('btnStopFetch');
  if(btnVis && !btnVis.__wired){
    btnVis.addEventListener('click', ()=>{
      const keys = _getFilteredSpeciesKeys();
      // On mobile, only fetch species with expired or missing cache
      const toFetch = IS_MOBILE ? keys.filter(k => isCacheExpired(getCachedSpecies(k))) : keys;
      if(toFetch.length === 0){ document.getElementById('fetchProgress').textContent = 'All cached (< 6h old)'; return; }
      _enqueueFetch(toFetch);
    });
    btnVis.__wired = true;
  }
  if(btnSel && !btnSel.__wired){
    btnSel.addEventListener('click', ()=>{
      // "Selected" = species with highlight or just the filter result if small
      const keys = _getFilteredSpeciesKeys();
      if(keys.length > 20){
        document.getElementById('fetchProgress').textContent = 'Filter to fewer species first (max 20)';
        return;
      }
      _enqueueFetch(keys);
    });
    btnSel.__wired = true;
  }
  if(btnStop && !btnStop.__wired){
    btnStop.addEventListener('click', _stopFetchQueue);
    btnStop.__wired = true;
  }
}

// === Desktop: idle background refresh ===
function _desktopIdleRefresh(){
  if(IS_MOBILE) return; // Never auto on mobile
  const keys = SPECIES.filter(k => isCacheExpired(getCachedSpecies(k)));
  if(keys.length === 0) return;
  _enqueueFetch(keys);
}

// Schedule: desktop auto-refresh after 4s, then every 30min
if(!IS_MOBILE){
  const scheduleIdle = typeof requestIdleCallback === 'function'
    ? (fn) => requestIdleCallback(fn, {timeout: 10000})
    : (fn) => setTimeout(fn, 4000);
  scheduleIdle(() => _desktopIdleRefresh());
  setInterval(() => {
    if(!IS_MOBILE){
      const schedIdle = typeof requestIdleCallback === 'function'
        ? (fn) => requestIdleCallback(fn, {timeout: 10000})
        : (fn) => setTimeout(fn, 2000);
      schedIdle(() => _desktopIdleRefresh());
    }
  }, 30 * 60 * 1000);
}

// === Spring migration dates (editable) ===
const EE_NUM = {
  "ühe":1,"üks":1,"kahe":2,"kaks":2,"kolme":3,"kolm":3,"nelja":4,"neli":4,"viie":5,"viis":5,
  "kuue":6,"kuus":6,"seitsme":7,"seitse":7,"kaheksa":8,"üheksa":9,"kümme":10,"üksteist":11,
  "kaksteist":12,"kolmteist":13,"neliteist":14,"viisteist":15,"kuusteist":16,"seitseteist":17,
  "kaheksateist":18,"üheksateist":19,"kakskümmend":20,
  "kakskümmend üks":21,"kakskümmend kaks":22,"kakskümmend kolm":23,"kakskümmend neli":24,
  "kakskümmend viis":25,"kakskümmend kuus":26,"kakskümmend seitse":27,"kakskümmend kaheksa":28,
  "kakskümmend üheksa":29,"kolmkümmend":30,"kolmkümmend üks":31
};

function _normSpringDDMM(s){
  s = (s||'').trim();
  if(!s) return null;
  let m = s.match(/^(\d{1,2})\.(\d{1,2})$/);
  if(m){
    const d = parseInt(m[1],10), mo = parseInt(m[2],10);
    if(mo>=1 && mo<=12 && d>=1 && d<=31) return `${d}.${String(mo).padStart(2,'0')}`;
  }
  m = s.match(/^(\d{4})-(\d{2})-(\d{2})$/);
  if(m){
    const d = parseInt(m[3],10), mo = parseInt(m[2],10);
    if(mo>=1 && mo<=12 && d>=1 && d<=31) return `${d}.${String(mo).padStart(2,'0')}`;
  }
  return null;
}
function _ddmmToDate(ddmm){
  const mm = (ddmm||'').match(/^(\d{1,2})\.(\d{2})$/);
  if(!mm) return null;
  const d = parseInt(mm[1],10), mo = parseInt(mm[2],10);
  if(!Number.isFinite(d) || !Number.isFinite(mo)) return null;
  return new Date(2025, mo-1, d, 12, 0, 0, 0);
}
function _dateToDdmm(dt){
  const d = dt.getDate();
  const mo = dt.getMonth()+1;
  return `${d}.${String(mo).padStart(2,'0')}`;
}
function editSpringDate(key){
  const prev = (springDates && springDates[key]) ? springDates[key] : '';
  const v = prompt(`Kevadine saabumise kuupäev (D.MM või YYYY-MM-DD)\n\n${key}`, prev || '');
  if(v === null) return;
  if(String(v).trim() === ''){
    delete springDates[key];
    save(); render();
    return;
  }
  const n = _normSpringDDMM(v);
  if(!n){
    notifySilent('Vigane kuupäeva formaat. Kasuta D.MM (nt 5.04) või YYYY-MM-DD.');
    return;
  }
  springDates[key] = n;
  save(); render();
}

function _parseEeNum(token, prevToken){
  token = (token||'').toLowerCase().trim();
  prevToken = (prevToken||'').toLowerCase().trim();
  if(/^\d+$/.test(token)) return parseInt(token,10);
  if(EE_NUM[token]) return EE_NUM[token];
  const combo = (prevToken ? (prevToken + ' ' + token) : '');
  if(combo && EE_NUM[combo]) return EE_NUM[combo];
  return null;
}

function parseSpringDatesFromTxt(text){
  const out = {};
  const paras = String(text||'').split(/\n\s*\n/g).map(s=>s.trim()).filter(Boolean);

  const entryRe = /^([A-ZÄÖÜÕŠŽ][^\n–-]{1,80}?)\s*(?:\([^)]*\))?\s*[–-]\s*([0-3]?\d\.[01]?\d)\b/;
  const avgParenRe = /keskmis(?:e|est|ega)[^()]{0,40}\((\d{1,2}\.\d{2})\)/i;

  for(const para of paras){
    const m = para.match(entryRe);
    if(!m) continue;
    const species = m[1].trim();
    const obsRaw = m[2].trim();
    const obs = _normSpringDDMM(obsRaw);
    if(!obs) continue;

    let avg = null;

    const mp = para.match(avgParenRe);
    if(mp){
      avg = _normSpringDDMM(mp[1]);
    } else {
      // Find phrases like "... 5 päeva võrra hilisem/varasem" and compute "usual" date.
      const re = /\b([0-9]+|[a-zäöüõšž]+)\s+p(?:äeva|äev)\b/ig;
      let mm;
      while((mm = re.exec(para)) !== null){
        const token = mm[1];
        const before = para.slice(0, mm.index).trim();
        const prevToken = before ? before.split(/\s+/).slice(-1)[0].replace(/[().,;:]+$/,'') : '';
        const n = _parseEeNum(token, prevToken);
        if(!n) continue;

        const after = para.slice(re.lastIndex, re.lastIndex + 60);
        const dirM = after.match(/\b(varasem|hilisem)\b/i);
        if(!dirM) continue;

        const direction = dirM[1].toLowerCase();
        const obsDt = _ddmmToDate(obs);
        if(!obsDt) continue;
        const avgDt = new Date(obsDt.getTime() + (direction === 'hilisem' ? -n : n) * 24*60*60*1000);
        avg = _dateToDdmm(avgDt);
        break;
      }
    }

    out[species] = avg || obs; // if no usable "usual date", fall back to observed date
  }
  return out;
}

function importSpringDatesTxt(){
  const input = document.createElement('input');
  input.type = 'file';
  input.accept = '.txt,text/plain';
  input.onchange = ()=>{
    const f = input.files && input.files[0];
    if(!f) return;
    const r = new FileReader();
    r.onload = ()=>{
      try{
        const parsed = parseSpringDatesFromTxt(r.result || '');
        springDates = Object.assign({}, springDates || {}, parsed || {});
        save(); render();
        notifySilent('Spring dates imported: ' + Object.keys(parsed||{}).length);
      }catch(e){
        notifySilent('Spring .txt import failed: ' + (e && e.message ? e.message : e));
      }
    };
    r.readAsText(f);
  };
  input.click();
}

function exportSpringDates(){

    const url = URL.createObjectURL(blob);

function updateMarker(key) {
  const p = points[key];
  if (markers.has(key)) { map.removeLayer(markers.get(key)); markers.delete(key); }
  if (!p) return;
  const passesRecent = isRecent(p.t) || (Number.isFinite(p.occ7) && p.occ7 > 0);
const isVisible = (p.visible !== false) && passesRecent;
if (isVisible && Number.isFinite(p.lat) && Number.isFinite(p.lon)) {
    const bcol = _borderColorByDate(p.t);
    const c7 = Number.isFinite(p.occ7) ? p.occ7 : null;
    const icon = avatarIcon(getDisplayAvatar(key), bcol, c7);
    const when = p.t ? `<br><small>vaatluse kuupäev: ${p.t}</small>` : '';
    const src = p.src?`<br><small>allikas: ${p.src}</small>`:'';
    const m = L.marker([p.lat,p.lon], {icon}).addTo(map)
      .bindPopup(`<b>${key}</b>${when}${(Number.isFinite(p.occ7)?`<br><small>7 päeva vaatlused: ${p.occ7}</small>`:'')}${src}`);
    markers.set(key, m);
  }
}



// ----- Fetch helpers (search → detail → coords + eventDate) -------
function makeFetchURL(url) {
  // cache-bust every request
  url = url + (url.includes('?') ? '&' : '?') + '_ts=' + Date.now();
  const bases = [ '', proxyBase, 'https://api.allorigins.win/raw?url=', 'https://cors.isomorphic-git.org/' ];
  const built = [];
  for (const b of bases) built.push(b ? b + encodeURIComponent(url) : url);
  return [...new Set(built)];
}

async function tryFetch(url) {
  const list = makeFetchURL(url);
  for (const u of list) {
    try {
      const res = await fetch(u, {mode:'cors', cache:'no-store'});
      if (!res.ok) continue;
      const txt = await res.text();
      if (txt && txt.length > 400) return txt;
    } catch(e) { /* try next */ }
  }
  throw new Error('All fetch attempts failed (CORS/blocked).');
}

// Extract Estonian "Tavanimetus"
function stripTags(html) { return html.replace(/<[^>]*>/g,' '); }
function extractEstName(html) {
  let m = html.match(/"vernacularName"\s*:\s*"([^"]+)"/i);
  if (m) return m[1].trim();
  const txt = stripTags(html).replace(/\s+/g,' ').trim();
  m = txt.match(/Tavanimetus\s*[:\-–]\s*([A-Za-zÄÖÜÕäöüõšžŠŽ\s\-']{2,80})/i);
  if (m) return m[1].trim();
  m = txt.match(/Tavanimetus\s+([A-Za-zÄÖÜÕäöüõšžŠŽ][A-Za-zÄÖÜÕäöüõšžŠŽ\s\-']{1,80})/i);
  if (m) return m[1].trim();
  return null;
}

// === NEW: extract occurrence date from page ===
function extractEventDate(html) {
  // 1) DarwinCore JSON
  let m = html.match(/"eventDate"\s*:\s*"([^"]+)"/i);
  if (m) return m[1];
  // 2) Label "Kuupäev: 2024-05-12" (or English Date:)
  m = html.match(/(?:Kuupäev|Date)\s*[:\-–]\s*([0-9]{4}-[0-9]{2}-[0-9]{2})/i);
  if (m) return m[1];
  // 3) any yyyy-mm-dd as fallback
  m = html.match(/([0-9]{4}-[0-9]{2}-[0-9]{2})/);
  if (m) return m[1];
  return null;
}
// === NEW: extract *all* occurrence dates from search page and count last-N-days sightings ===
function extractAllEventDates(html){
  const out = [];
  if (!html) return out;
  let m;
  const reJson = /"eventDate"\s*:\s*"?(\d{4}-\d{2}-\d{2})/ig;
  while ((m = reJson.exec(html)) !== null) out.push(m[1]);
  const reLbl = /(?:Kuupäev|Date)\s*[:\-–]\s*(\d{4}-\d{2}-\d{2})/ig;
  while ((m = reLbl.exec(html)) !== null) out.push(m[1]);
  // fallback (less strict)
  if (out.length === 0){
    const reAny = /(\d{4}-\d{2}-\d{2})/g;
    while ((m = reAny.exec(html)) !== null){
      out.push(m[1]);
      if (out.length > 500) break;
    }
  }
  return out;
}
function countInLastNDaysFromDates(dates, days){
  try{
    const now = Date.now();
    const windowMs = (days * 24 * 60 * 60 * 1000);
    let c = 0;
    (dates || []).forEach(d=>{
      const ms = _toDay(d);
      if (!ms) return;
      const diff = now - ms;
      if (diff >= 0 && diff <= windowMs) c++;
    });
    return c;
  }catch(e){ return 0; }
}


// Extract coordinates
function extractLatLon(html) {
  const patterns = [
    /decimalLatitude\D+(-?\d+\.\d+)\D+decimalLongitude\D+(-?\d+\.\d+)/i,
    /"decimalLatitude"\s*:\s*(-?\d+\.\d+)[^\d-]+?"decimalLongitude"\s*:\s*(-?\d+\.\d+)/i,
    /([5-6]\d\.\d+)\s*[;,\s]\s*(2\d\.\d+)/,   // lat, lon
    /(2\d\.\d+)\s*[;,\s]\s*([5-6]\d\.\d+)/,   // lon, lat
    /L\.marker\s*\(\s*\[\s*([5-6]\d\.\d+)\s*,\s*(2\d\.\d+)\s*\]/i,
    /"coordinates"\s*:\s*\[\s*(2\d\.\d+)\s*,\s*([5-6]\d\.\d+)\s*\]/
  ];
  for (const re of patterns) {
    const m = html.match(re);
    if (m) {
      let a = parseFloat(m[1]), b = parseFloat(m[2]);
      if (a >= 50 && a <= 70 && b >= 20 && b <= 30) return [a,b];
      if (b >= 50 && b <= 70 && a >= 20 && a <= 30) return [b,a];
    }
  }
  return null;
}

function findFirstDetailLink(html) {
  const re = /href=["']([^"']*(?:occurrence|occurrences|observation|observations)[^"']*)["']/i;
  const m = html.match(re);
  if (!m) return null;
  let href = m[1];
  if (href.startsWith('http')) return href;
  if (href.startsWith('/')) return 'https://elurikkus.ee' + href;
  return 'https://elurikkus.ee/' + href;
}

<script>
(function(){
  function springSortKey(v){
    try{
      if(!v) return 999999;
      const s = String(v).trim();
      // Prefer normalized D.MM if available
      const n = (typeof _normSpringDDMM === 'function') ? _normSpringDDMM(s) : '';
      const x = n || s;
      let m = x.match(/^(\d{1,2})\.(\d{1,2})$/);
      if(m){
        const d = +m[1], mo = +m[2];
        return mo*100 + d;
      }
      m = x.match(/^(\d{4})-(\d{2})-(\d{2})$/);
      if(m){
        const mo = +m[2], d = +m[3];
        return mo*100 + d;
      }
      return 999999;
    }catch(e){ return 999999; }
  }

  function getSpringDates(){
    try{
      return (typeof springDates !== 'undefined') ? springDates : (window.springDates || {});
    }catch(e){ return {}; }
  }
  function getSpeciesList(){
    try{
      return (typeof SPECIES !== 'undefined') ? SPECIES : (window.SPECIES || Object.keys(getSpringDates()||{}));
    }catch(e){ return Object.keys(getSpringDates()||{}); }
  }

  function renderSpringPanel(){
    const body = document.getElementById('springTableBody');
    const countEl = document.getElementById('springCount');
    const q = (document.getElementById('springSearch')?.value || '').toLowerCase().trim();
    if(!body || !countEl) return;

    const sd = getSpringDates() || {};
    const list = getSpeciesList() || [];
    const rows = [];

    for(const name of list){
      const raw = (sd && sd[name] !== undefined) ? String(sd[name]).trim() : '';
      if(!raw) continue;
      if(q && !String(name).toLowerCase().includes(q)) continue;
      const disp = (typeof _normSpringDDMM === 'function') ? (_normSpringDDMM(raw) || raw) : raw;
      rows.push({name, disp, key: springSortKey(disp)});
    }

    rows.sort((a,b)=> (a.key-b.key) || String(a.name).localeCompare(String(b.name)));

    body.innerHTML = rows.map(r => {
      const safeName = String(r.name).replace(/"/g,'&quot;');
      const safeDisp = String(r.disp).replace(/"/g,'&quot;');
      return `<tr>
        <td><span class="springDateBtn" title="Muuda kuupäeva" onclick="editSpringDate('${safeName.replace(/'/g, "\\'")}')">${safeDisp}</span></td>
        <td><span class="springSpeciesBtn" title="Leia liigi kaart küljepaneelis" onclick="window.__springScrollToSpecies && window.__springScrollToSpecies('${safeName.replace(/'/g, "\\'")}')">${safeName}</span></td>
      </tr>`;
    }).join('');

    countEl.textContent = rows.length;
  }

  // Scroll-to helper (sidebar), without disturbing map state
  window.__springScrollToSpecies = function(name){
    try{
      const row = document.querySelector(`.row[data-key="${CSS.escape(name)}"]`);
      if(row){
        row.scrollIntoView({behavior:'smooth', block:'nearest'});
        row.style.outline = '2px solid #93c5fd';
        row.style.outlineOffset = '2px';
        setTimeout(()=>{ row.style.outline=''; row.style.outlineOffset=''; }, 1200);
      }
    }catch(e){}
  };

  function toggleSpring(open){
    const panel = document.getElementById('springPanel');
    if(!panel) return;
    const wantOpen = (open===true) ? true : (open===false ? false : (panel.style.display==='none' || !panel.style.display));
    if(wantOpen){
      panel.style.display = 'block';
      renderSpringPanel();
    }else{
      panel.style.display = 'none';
    }
  }

  // Wire UI
  function wire(){
    const btn = document.getElementById('toggleSpring');
    const close = document.getElementById('springClose');
    const search = document.getElementById('springSearch');
    if(btn && !btn.__springBound){
      btn.addEventListener('click', ()=> toggleSpring());
      btn.__springBound = true;
    }
    if(close && !close.__springBound){
      close.addEventListener('click', ()=> toggleSpring(false));
      close.__springBound = true;
    }
    if(search && !search.__springBound){
      search.addEventListener('input', renderSpringPanel);
      search.__springBound = true;
    }
  }

  // Keep spring panel refreshed when the rest of the UI rerenders (e.g., after editing a date)
  try{
    if (typeof window.render === 'function' && !window.__springpanel_render_patch__){
      const _r = window.render;
      window.render = function(){
        const out = _r.apply(this, arguments);
        try{ wire(); renderSpringPanel(); }catch(e){}
        return out;
      };
      window.__springpanel_render_patch__ = true;
    }
  }catch(e){}

  if (document.readyState === 'loading'){
    document.addEventListener('DOMContentLoaded', ()=>{ wire(); renderSpringPanel(); });
  } else {
    wire(); renderSpringPanel();
  }
})();
</script>

<script>
(function(){
  function computeActiveSpecies7d(){
  try{
    // NOTE: top-level const/let are not on window; access by identifier first
    const pts = (typeof points !== 'undefined') ? points : (window.points || {});
    const list = (typeof SPECIES !== 'undefined') ? SPECIES : (window.SPECIES || []);
    const now = Date.now();
    const sevenMs = 7 * 24 * 60 * 60 * 1000;

    let n = 0;
    for (const name of list){
      const p = pts[name] || {};
      let active = false;

      // Primary signal: 7-day occurrences counter (occ7)
      const occ7 = (p.occ7 === 0 || p.occ7) ? Number(p.occ7) : NaN;
      if (Number.isFinite(occ7)) active = occ7 > 0;

      // Fallback: check last observation date (p.t) within last 7 days
      if (!active && p.t){
        try{
          const ms = (typeof _toDay === 'function') ? _toDay(p.t) : null;
          if (ms && (now - ms) <= sevenMs) active = true;
        }catch(e){}
      }

      if (active) n++;
    }
    return n;
  }catch(e){ return 0; }
}

  function updateActive7dBadge(){
    try{
      const el = document.getElementById('active7dBadge');
      if (!el) return;
      const n = computeActiveSpecies7d();
      el.textContent = '7p liigid: ' + n;
    }catch(e){}
  }

  // Patch render & updateMarker to keep the badge in sync
  try{
    if (typeof window.render === 'function' && !window.__active7d_render_patch__){
      const _r = window.render;
      window.render = function(){
        const out = _r.apply(this, arguments);
        try{ updateActive7dBadge(); }catch(e){}
        return out;
      };
      window.__active7d_render_patch__ = true;
    }
  }catch(e){}

  try{
    if (typeof window.updateMarker === 'function' && !window.__active7d_upd_patch__){
      const _u = window.updateMarker;
      window.updateMarker = function(){
        const out = _u.apply(this, arguments);
        try{ updateActive7dBadge(); }catch(e){}
        return out;
      };
      window.__active7d_upd_patch__ = true;
    }
  }catch(e){}

  // Init + periodic refresh (in case the 7-day window changes over time)
  if (document.readyState === 'loading'){
    document.addEventListener('DOMContentLoaded', updateActive7dBadge);
  } else {
    updateActive7dBadge();
  }
  setInterval(updateActive7dBadge, 60 * 1000);
})();
</script>


<script>
(function(){
  function refreshLF(){
    try{
      (window.SPECIES||[]).forEach(function(name){
        const row = document.querySelector(`.row[data-key="${CSS.escape(name)}"]`);
        if(!row) return;
        const p = (window.points||{})[name]||{};
        const t = p.lastFetched ? new Date(p.lastFetched).toLocaleString([], {hour:'2-digit', minute:'2-digit', year:'numeric', month:'2-digit', day:'2-digit'}).replace(',', '') : '';
        const inline = row.querySelector('.last-fetched-inline');
        const line = row.querySelector('.last-fetched-line');
        if (inline) inline.textContent = t ? (' · uuendatud ' + t) : '';
        if (line)   line.textContent   = t ? ('Värskendatud: ' + t) : '';
      });
    }catch(e){}
  }
  if (typeof window.render === 'function' && !window.__lf_patch__){
    const _r = window.render;
    window.render = function(){
      const r = _r.apply(this, arguments);
      try{ refreshLF(); }catch(e){}
      return r;
    };
    window.__lf_patch__ = true;
  } else {
    document.addEventListener('DOMContentLoaded', refreshLF);
  }
  setTimeout(refreshLF, 800);
  // Update when marker is updated
  try{
    const _upd = window.updateMarker;
    if (typeof _upd === 'function' && !window.__lf_upd__){
      window.updateMarker = function(key){
        const ret = _upd.apply(this, arguments);
        try{ refreshLF(); }catch(e){}
        return ret;
      };
      window.__lf_upd__ = true;
    }
  }catch(e){}
})();
</script>

<script>
// === postMessage API for parent app (Avatar Manager) ===
// Shared defaults from parent (Supabase-backed, lower priority than local overrides)
var __sharedDefaults = {};

(function(){
  window.addEventListener('message', function(ev){
    try{
      if(!ev.data || typeof ev.data !== 'object') return;
      var type = ev.data.type;

      // Parent sends shared defaults (from Supabase cloud)
      if(type === 'AVATARS_DEFAULTS' && ev.data.avatars){
        __sharedDefaults = ev.data.avatars || {};
        // Merge: local overrides take priority over shared defaults
        var localAvatars = JSON.parse(localStorage.getItem(LS_AVATARS) || '{}');
        var merged = Object.assign({}, __sharedDefaults, localAvatars);
        // Apply to avatars object
        for(var k in merged){
          if(merged.hasOwnProperty(k) && merged[k]){
            avatars[k] = merged[k];
          }
        }
        save();
        preloadAvatars(Object.values(avatars));
        SPECIES.forEach(function(name){ try{ updateMarker(name); }catch(e){} });
        render();
      }

      // Legacy: direct avatar update (still supported)
      if(type === 'AVATARS_UPDATE' && ev.data.avatars){
        var incoming = ev.data.avatars;
        for(var k in incoming){
          if(incoming.hasOwnProperty(k)){
            if(incoming[k]) avatars[k] = incoming[k];
            else delete avatars[k];
          }
        }
        save();
        preloadAvatars(Object.values(avatars));
        SPECIES.forEach(function(name){ try{ updateMarker(name); }catch(e){} });
        render();
      }

      // Parent requests current avatar state
      if(type === 'AVATARS_REQUEST'){
        var src = ev.source;
        if(src && typeof src.postMessage === 'function'){
          src.postMessage({ type: 'AVATARS_CURRENT', avatars: avatars }, '*');
        }
      }
    }catch(e){ console.warn('postMessage handler error', e); }
  });

  // Request avatars from parent on load
  try{
    if(window.parent && window.parent !== window){
      window.parent.postMessage({ type: 'AVATARS_REQUEST' }, '*');
    }
  }catch(e){ /* ignore */ }
})();
</script>
