      if(typeof window.__placeSidebarTools === 'function') window.__placeSidebarTools();
    }catch(e){}
  }

  function renderSpringPanel(){
    ensureSpringState();
    ensureSpringUiPlaced();
    const body = document.getElementById('springTableBody');
    const countEl = document.getElementById('springCount');
    const refreshBtn = document.getElementById('springRefresh');
    const q = (document.getElementById('springSearch')?.value || '').toLowerCase().trim();
    if(!body || !countEl) return;
    if(refreshBtn){
      refreshBtn.disabled = springYearRefreshInFlight;
      refreshBtn.textContent = springYearRefreshInFlight ? 'Värskendan…' : 'Värskenda kevadrännet';
    }
    const sd = getSpringDates();
    const list = getSpeciesList();
    const rows = [];
    for(const name of list){
      const raw = _getSpringValue(name);
      if(!raw) continue;
      if(q && !String(name).toLowerCase().includes(q)) continue;
      const disp = _springDisplayValue(raw);
      rows.push({name, disp, key: springSortKey(disp)});
    }
    rows.sort((a,b)=> (a.key-b.key) || String(a.name).localeCompare(String(b.name)));
    body.innerHTML = rows.map(r => {
      const safeName = String(r.name).replace(/"/g,'&quot;');
      const yIso = springYearFirst[r.name];
      const yDisp = yIso ? isoToDdMm(yIso) : '—';
      const key = safeName;
      const springDateText = r.disp;
      const isEditing = (springEditRowKey === key);
      const currentVal = _springDisplayValue(_getSpringValue(key));
      const canEdit = _canEditKevadranne();
      const dateCellHtml = canEdit && isEditing
        ? `
    <div class="spring-edit-wrap" style="display:flex; gap:6px; align-items:center;">
      <input class="spring-edit-input" data-key="${key}" value="${currentVal}" placeholder="DD.MM"
        inputmode="numeric"
        style="width:72px; padding:6px 8px; border:1px solid #ddd; border-radius:10px; font-size:14px;" />
      <button class="spring-edit-save" data-key="${key}"
        style="padding:6px 10px; border:0; border-radius:10px; background:#16a34a; color:#fff;">OK</button>
      <button class="spring-edit-cancel" data-key="${key}"
        style="padding:6px 10px; border:0; border-radius:10px; background:#eee; color:#111;">X</button>
    </div>
  `
        : (canEdit
          ? `
    <button class="spring-date-btn" data-key="${key}"
      style="border:0; border-radius:999px; padding:6px 10px; background:#f3f4f6; color:#111;">
      ${springDateText}
    </button>
  `
          : `<span style="border-radius:999px; padding:6px 10px; background:#f3f4f6; color:#111; display:inline-block;">${springDateText}</span>`);
      return '<tr><td>'+dateCellHtml+'</td><td><span class="springSpeciesBtn" onclick="window.__springScrollToSpecies && window.__springScrollToSpecies(\''+safeName.replace(/'/g, "\\'")+'\')">'+ safeName+'</span></td><td>'+yDisp+'</td></tr>';
    }).join('');
    // Auto-scan disabled — user triggers refresh manually via the
    // "Värskenda 2026 esmavaatlused" button in the Kevad panel header.
    countEl.textContent = rows.length;
  }
  window.renderSpringPanel = renderSpringPanel;

  window.__springScrollToSpecies = function(name){
    try{
      const escaped = (window.CSS && CSS.escape) ? CSS.escape(name) : String(name).replace(/"/g, '\\"');
      const row = document.querySelector('.row[data-key="'+escaped+'"]') || document.querySelector('[data-key="'+escaped+'"]');
      if(row){
        row.scrollIntoView({behavior:'smooth', block:'nearest'});
        row.style.outline = '2px solid #93c5fd';
        row.style.outlineOffset = '2px';
        setTimeout(()=>{ row.style.outline=''; row.style.outlineOffset=''; }, 1200);
      }
    }catch(e){}
  };

  function toggleSpring(open){
    const panel = document.getElementById('springPanel');
    if(!panel) return;
    const wantOpen = (open===true) ? true : (open===false ? false : (panel.style.display==='none' || !panel.style.display));
    if(wantOpen){
      panel.style.display = 'flex';
      setSpringPanelOpen(true);
      renderSpringPanel();
    } else {
      panel.style.display = 'none';
      setSpringPanelOpen(false);
    }
  }
  window.toggleSpring = toggleSpring;

  function wire(){
    ensureSpringUiPlaced();
    const btn = document.getElementById('toggleSpring');
    const close = document.getElementById('springClose');
    const search = document.getElementById('springSearch');
    const refreshBtn = document.getElementById('springRefresh');
    if(btn && !btn.__springBound){ btn.addEventListener('click', ()=> toggleSpring()); btn.__springBound = true; }
    if(close && !close.__springBound){ close.addEventListener('click', ()=> toggleSpring(false)); close.__springBound = true; }
    if(search && !search.__springBound){ search.addEventListener('input', renderSpringPanel); search.__springBound = true; }
    if(refreshBtn && !refreshBtn.__springBound){
      refreshBtn.addEventListener('click', async function(){
        if(springYearRefreshInFlight) return;
        const keys = getSpeciesList().filter(function(name){
          return !!_getSpringValue(name);
        });
        springYearRefreshInFlight = true;
        renderSpringPanel();
        try{
          await refreshSpringYearFirstForKeys(keys);
        } finally {
          springYearRefreshInFlight = false;
          renderSpringPanel();
        }
      });
      refreshBtn.__springBound = true;
    }
    const refreshAllBtn = document.getElementById('springRefreshBtn');
    if(refreshAllBtn && !refreshAllBtn.__springBound){
      refreshAllBtn.addEventListener('click', () => manualRefreshAllSpringYearFirst());
      refreshAllBtn.__springBound = true;
    }
  }

  try{
    if (typeof window.render === 'function' && !window.__springpanel_render_patch__){
      const _r = window.render;
      window.render = function(){
        const out = _r.apply(this, arguments);
        try{
          wire();
          if(getSpringPanelOpen()) toggleSpring(true);
          else renderSpringPanel();
        }catch(e){}
        return out;
      };
      window.__springpanel_render_patch__ = true;
    }
  }catch(e){}
  if (document.readyState === 'loading') document.addEventListener('DOMContentLoaded', ()=>{
    wire();
    if(getSpringPanelOpen()) toggleSpring(true);
    else renderSpringPanel();
  });
  else {
    wire();
    if(getSpringPanelOpen()) toggleSpring(true);
    else renderSpringPanel();
  }
})();
</script>

<!-- === postMessage API for parent app (Avatar Manager) === -->
<script>
var __sharedDefaults = {};
(function(){
  window.addEventListener('message', function(ev){
    try{
      if(!ev.data || typeof ev.data !== 'object') return;
      var type = ev.data.type;
      if(type === 'AVATARS_DEFAULTS' && ev.data.avatars){
        __sharedDefaults = {};
        var incomingDefaults = ev.data.avatars || {};
        var _matchCount = 0;
        for(var dk in incomingDefaults){
          if(!incomingDefaults.hasOwnProperty(dk)) continue;
          var normKey = _normalizeToInternal(dk);
          __sharedDefaults[normKey] = incomingDefaults[dk];
          if(normKey !== dk) __sharedDefaults[dk] = incomingDefaults[dk];
          if(normKey !== dk) _matchCount++;
        }
        console.log('[iframe] AVATARS_DEFAULTS received:', Object.keys(incomingDefaults).length, 'keys,', _matchCount, 'normalized to internal format');
        var localAvatars = JSON.parse(localStorage.getItem(LS_AVATARS) || '{}');
        var merged = Object.assign({}, __sharedDefaults, localAvatars);
        for(var k in merged){ if(merged.hasOwnProperty(k) && merged[k]) avatars[k] = merged[k]; }
        save();
        preloadAvatars(Object.values(avatars));
        SPECIES.forEach(function(name){ try{ updateMarker(name); }catch(e){} });
        render();
      }
      if(type === 'AVATARS_UPDATE' && ev.data.avatars){
        var incoming = ev.data.avatars;
        for(var k in incoming){
          if(!incoming.hasOwnProperty(k)) continue;
          var nk = _normalizeToInternal(k);
          if(incoming[k]){ avatars[nk] = incoming[k]; if(nk !== k) avatars[k] = incoming[k]; }
          else { delete avatars[nk]; if(nk !== k) delete avatars[k]; }
        }
        save();
        preloadAvatars(Object.values(avatars));
        SPECIES.forEach(function(name){ try{ updateMarker(name); }catch(e){} });
        render();
      }
      if(type === 'AVATARS_REQUEST'){
        var src = ev.source;
        if(src && typeof src.postMessage === 'function') src.postMessage({ type: 'AVATARS_CURRENT', avatars: avatars }, '*');
      }
      if(type === 'SPECIES_META_DEFAULTS' && ev.data.speciesMeta && typeof ev.data.speciesMeta === 'object'){
        var currentMeta = JSON.parse(localStorage.getItem('estbirding.speciesMeta.v1') || '{}');
        var incomingMeta = ev.data.speciesMeta || {};
        var normalizedMeta = {};
        for(var mk in incomingMeta){
          if(!incomingMeta.hasOwnProperty(mk)) continue;
          var mnk = _normalizeToInternal(mk);
          normalizedMeta[mnk] = incomingMeta[mk];
          if(mnk !== mk) normalizedMeta[mk] = incomingMeta[mk];
        }
        var mergedMeta = Object.assign({}, currentMeta, normalizedMeta);
        localStorage.setItem('estbirding.speciesMeta.v1', JSON.stringify(mergedMeta));
        render();
      }
      if(type === 'SPECIES_META_REQUEST'){
        var src2 = ev.source;
        if(src2 && typeof src2.postMessage === 'function') src2.postMessage({ type: 'SPECIES_META_CURRENT', speciesMeta: JSON.parse(localStorage.getItem('estbirding.speciesMeta.v1') || '{}') }, '*');
      }
      if(type === 'APP_PERMISSIONS' && ev.data.permissions && typeof ev.data.permissions === 'object'){
        window.__appPermissions = Object.assign({}, window.__appPermissions || {}, ev.data.permissions || {});
        springEditRowKey = null;
        try{ render(); }catch(e){}
        try{ renderSpringPanel(); }catch(e){}
      }
    }catch(e){ console.warn('postMessage handler error', e); }
  });
  try{
    if(window.parent && window.parent !== window){
      window.parent.postMessage({ type: 'AVATARS_REQUEST' }, '*');
      window.parent.postMessage({ type: 'SPECIES_META_REQUEST' }, '*');
    }
  }catch(e){}
})();
</script>

<!-- eBird EE Layer -->
<script>
(function(){
  // --- Storage ---
  var LS_EBIRD_EE_LAYER = 'bm_ebird_ee_layer';
  var LS_EBIRD_EE_POINTS = 'bm_ebird_ee_points';
  var ebirdEEPoints = {};
  try { ebirdEEPoints = JSON.parse(localStorage.getItem(LS_EBIRD_EE_POINTS) || '{}'); } catch(e){ ebirdEEPoints = {}; }
  function saveEbirdEE(){ try { localStorage.setItem(LS_EBIRD_EE_POINTS, JSON.stringify(ebirdEEPoints)); } catch(e){} }

  window.__ebirdEELayerOn = (localStorage.getItem(LS_EBIRD_EE_LAYER) === '1');
  var ebirdEEMarkers = new Map();

  // --- Toggle button ---
  var ebirdEEBtn = document.getElementById('toggleEbirdEE');
  function syncEbirdEEBtn(){
    if(window.__ebirdEELayerOn){
      ebirdEEBtn.className = 'btn on';
      ebirdEEBtn.textContent = 'eBird EE: ON';
    } else {
      ebirdEEBtn.className = 'btn secondary';
      ebirdEEBtn.textContent = 'eBird EE';
    }
    ebirdEEBtn.style.whiteSpace = 'nowrap';
  }
  ebirdEEBtn.addEventListener('click', function(){
    window.__ebirdEELayerOn = !window.__ebirdEELayerOn;
    localStorage.setItem(LS_EBIRD_EE_LAYER, window.__ebirdEELayerOn ? '1' : '0');
    if(window.__ebirdEELayerOn){
      ebirdEEBtn.textContent = 'eBird EE: Loading...';
      ebirdEEBtn.disabled = true;
      ebirdEEBtn.style.opacity = '0.6';
      _updateEbirdEEProgress(0, 0, 'Starting...', 'running');
      if(Object.keys(ebirdEEPoints).length > 0) refreshEbirdEEMarkers();
      refreshEbirdEEAll();
    } else {
      syncEbirdEEBtn();
      refreshEbirdEEMarkers();
      _updateEbirdEEProgress(0, 0, '', 'idle');
    }
  });
  syncEbirdEEBtn();

  // --- Marker icon (text label) ---
  function _ebirdMarkerIcon(avatarUrl, howMany, rarityLevel){
    var color = '#4CAF50';
    var countHtml = (Number.isFinite(howMany) && howMany > 0)
      ? '<div class="marker-count ebird-count" title="Lindude arv (eBird)">' + howMany + '</div>'
      : '';
    var ebirdLabel = '<div class="marker-ebird-label">eBird</div>';
    var bg = avatarUrl ? "background-image:url('" + avatarUrl + "')" : "background-color:#4CAF50";
    var html = '<div class="marker-wrap">' + ebirdLabel + '<div class="marker-circle" style="border-color:' + color + ';' + bg + '"></div>' + countHtml + '</div>';
    return L.divIcon({html:html, className:'', iconSize:[44,72], iconAnchor:[22,36], popupAnchor:[0,-36]});
  }

  // --- Popup ---
  function ebirdEEPopupHtml(key, ep){
    var displayName = window.normalizeUiText ? window.normalizeUiText(key) : key;
    var when = ep.t ? '<br><small>last seen: ' + formatDateEE(ep.t) + '</small>' : '';
    var where = ep.loc ? '<br><small>location: ' + ep.loc + '</small>' : '';
    var srcLn = '<br><small>source: eBird EE (Estonia)</small>';
    var occLn = '<br><small>7d records: ' + (ep.occ7 || 0) + ' (computed from last 30d)</small>';
    var countLn = Number.isFinite(ep.howMany) ? '<br><small>bird count: ' + ep.howMany + '</small>' : '';
    var observerLn = ep.observer ? '<br><small>observer: ' + ep.observer + '</small>' : '';
    var checklistLn = ep.subId
      ? '<br><small><a href="https://ebird.org/checklist/' + ep.subId + '" target="_blank" rel="noopener" style="color:#4CAF50">view checklist &#8599;</a></small>'
      : '';
    var metaCfg = window.getSpeciesMetaShared ? window.getSpeciesMetaShared(key) : { rarityLevel: 'none' };
    var rarLn = (metaCfg.rarityLevel && metaCfg.rarityLevel !== 'none' && window.getRarityBadgeText)
      ? '<br><small>rarity: ' + window.getRarityBadgeText(metaCfg.rarityLevel) + '</small>' : '';
    return '<b>' + displayName + '</b>' + when + where + srcLn + occLn + countLn + observerLn + checklistLn + rarLn;
  }

  // --- Fetch single species ---
  async function fetchEbirdEEForSpecies(estName){
    var code = (typeof SPECIES_EBIRD_CODES !== 'undefined' && SPECIES_EBIRD_CODES[estName]) || '';
    if(!code && window.points && window.points[estName] && window.points[estName].ebirdCode) code = window.points[estName].ebirdCode;
    if(!code) return null;

    var SUPABASE_REF = 'eenwcyuyugyrjgpivxrq';
    var token = localStorage.getItem('bm_ebird_token') || '9s72dc2jcjlq';
    var directUrl = 'https://api.ebird.org/v2/data/obs/EE/recent/' + encodeURIComponent(code) + '?back=30&maxResults=1000&detail=full&_ts=' + Date.now();
    var proxyUrl = 'https://' + SUPABASE_REF + '.supabase.co/functions/v1/ebird_recent?regionCode=EE&back=30&maxResults=1000&detail=full&speciesCode=' + encodeURIComponent(code);

    var arr;
    try {
      var res = await fetch(directUrl, { headers: { 'X-eBirdApiToken': token } });
      if(!res.ok) throw new Error('direct HTTP ' + res.status);
      arr = await res.json();
    } catch(directErr){
      try {
        var res2 = await fetch(proxyUrl);
        if(!res2.ok) throw new Error('proxy HTTP ' + res2.status);
        var json = await res2.json();
        arr = Array.isArray(json) ? json : (json.observations || json.data || []);
      } catch(proxyErr){
        throw new Error('both direct (' + directErr.message + ') and proxy (' + proxyErr.message + ') failed');
      }
    }

    if(!Array.isArray(arr) || arr.length === 0) return null;

    var occ7 = 0;
    var now = Date.now();
    var win7 = 7 * 24 * 60 * 60 * 1000;
    arr.forEach(function(o){
      var d = String(o.obsDt || '').substring(0, 10);
      var ms = (typeof _toDay === 'function') ? _toDay(d) : Date.parse(d);
      if(ms && (now - ms) >= 0 && (now - ms) <= win7) occ7++;
    });

    arr.sort(function(a,b){ return String(b.obsDt || '').localeCompare(String(a.obsDt || '')); });
    var latest = arr[0];
    var lat = +latest.lat, lon = +latest.lng;
    if(!Number.isFinite(lat) || !Number.isFinite(lon)) return null;

    return {
      lat: lat, lon: lon,
      t: (latest.obsDt || '').substring(0, 10),
      loc: latest.locName || '',
      occ7: occ7,
      howMany: Number.isFinite(latest.howMany) ? latest.howMany : null,
      observer: latest.userDisplayName || (latest.firstName && latest.lastName ? ((latest.firstName || '') + ' ' + (latest.lastName || '')).trim() : null),
      subId: latest.subId || null,
      lastFetched: new Date().toISOString(),
      src: 'eBird EE'
    };
  }

  window.__fetchEbirdEEForSpecies = fetchEbirdEEForSpecies;

  // --- Progress indicator ---
  function _updateEbirdEEProgress(done, total, currentSpecies, status){
    var el = document.getElementById('ebirdEEProgress');
    if(!el){
      var container = document.getElementById('windToggleBar');
      if(container){
        el = document.createElement('div');
        el.id = 'ebirdEEProgress';
        el.className = 'fetch-progress';
        container.parentNode.insertBefore(el, container.nextSibling);
      }
      if(!el) return;
    }
    if(status === 'idle'){
      el.style.display = 'none';
      el.textContent = '';
      el.style.color = '';
      return;
    }
    el.style.display = 'block';
    el.style.color = '';
    if(status === 'running'){
      if(total > 0){
        el.textContent = 'eBird EE: ' + done + '/' + total + ' | ' + (currentSpecies || '...');
      } else {
        el.textContent = 'eBird EE: ' + (currentSpecies || 'Starting...');
      }
    } else if(status === 'done'){
      var found = 0;
      try {
        var keys = Object.keys(ebirdEEPoints);
        for(var i = 0; i < keys.length; i++){
          var ep = ebirdEEPoints[keys[i]];
          if(ep && Number.isFinite(ep.lat) && Number.isFinite(ep.lon)) found++;
        }
      } catch(e){}
      el.textContent = 'eBird EE: Done. ' + found + ' species with data.';
      setTimeout(function(){ el.style.display = 'none'; }, 8000);
    } else if(status === 'error'){
      el.textContent = 'eBird EE: Error — ' + (currentSpecies || 'unknown');
      el.style.color = '#dc2626';
      setTimeout(function(){ el.style.display = 'none'; el.style.color = ''; }, 8000);
    }
  }

  // --- Bulk fetch ---
  async function refreshEbirdEEAll(){
    if(window.__ebirdEERefreshing){
      _updateEbirdEEProgress(0, 0, 'Already refreshing...', 'running');
      return;
    }
    window.__ebirdEERefreshing = true;
    var speciesList = Object.keys(SPECIES_EBIRD_CODES || {});
    var total = speciesList.length;
    if(total === 0){
      _updateEbirdEEProgress(0, 0, 'No species list found', 'error');
      window.__ebirdEERefreshing = false;
      return;
    }
    var done = 0, errors = 0, found = 0;
    _updateEbirdEEProgress(0, total, 'Starting...', 'running');
    for(var i = 0; i < total; i++){
      var name = speciesList[i];
      _updateEbirdEEProgress(done, total, name, 'running');
      try {
        var result = await fetchEbirdEEForSpecies(name);
        if(result){ ebirdEEPoints[name] = result; found++; }
      } catch(e){
        errors++;
        console.warn('eBird EE fetch failed:', name, e);
      }
      done++;
      if(ebirdEEBtn && window.__ebirdEELayerOn){
        ebirdEEBtn.textContent = 'eBird EE: ' + done + '/' + total;
      }
      await new Promise(function(r){ setTimeout(r, 400); });
      if(done % 5 === 0){
        saveEbirdEE();
        refreshEbirdEEMarkers();
        _updateEbirdEEProgress(done, total, name, 'running');
      }
      if(!window.__ebirdEELayerOn){
        _updateEbirdEEProgress(0, 0, '', 'idle');
        ebirdEEBtn.disabled = false;
        ebirdEEBtn.style.opacity = '';
        syncEbirdEEBtn();
        window.__ebirdEERefreshing = false;
        return;
      }
    }
    saveEbirdEE();
    refreshEbirdEEMarkers();
    window.__ebirdEERefreshing = false;
    _updateEbirdEEProgress(done, total, '', 'done');
    ebirdEEBtn.disabled = false;
    ebirdEEBtn.style.opacity = '';
    syncEbirdEEBtn();
    console.log('[eBird EE] Refresh done: total=' + done + ', found=' + found + ', errors=' + errors);
  }

  // --- Collision detection utilities ---
  function spreadOverlappingCoords(items, threshold, spreadRadius){
    threshold = threshold || 0.0005;
    spreadRadius = spreadRadius || 0.0008;
    var groups = {};
    for(var i = 0; i < items.length; i++){
      var item = items[i];
      var gLat = Math.round(item.lat / threshold) * threshold;
      var gLon = Math.round(item.lon / threshold) * threshold;
      var gKey = gLat.toFixed(5) + ',' + gLon.toFixed(5);
      if(!groups[gKey]) groups[gKey] = [];
      groups[gKey].push(i);
    }
    var result = [];
    for(var i = 0; i < items.length; i++){
      result.push({ key: items[i].key, lat: items[i].lat, lon: items[i].lon, original: items[i] });
    }
    var groupKeys = Object.keys(groups);
    for(var g = 0; g < groupKeys.length; g++){
      var indices = groups[groupKeys[g]];
      if(indices.length < 2) continue;
      var cLat = 0, cLon = 0;
      for(var j = 0; j < indices.length; j++){
        cLat += items[indices[j]].lat;
        cLon += items[indices[j]].lon;
      }
      cLat /= indices.length;
      cLon /= indices.length;
      var count = indices.length;
      for(var j = 0; j < count; j++){
        var angle = (2 * Math.PI * j) / count - Math.PI / 2;
        result[indices[j]].lat = cLat + spreadRadius * Math.sin(angle);
        result[indices[j]].lon = cLon + spreadRadius * Math.cos(angle);
      }
    }
    return result;
  }

  function getElurikkusCollisionOffset(lat, lon, threshold){
    threshold = threshold || 0.0005;
    var pts = window.points || {};
    var keys = Object.keys(pts);
    for(var i = 0; i < keys.length; i++){
      var p = pts[keys[i]];
      if(!p || !Number.isFinite(p.lat) || !Number.isFinite(p.lon)) continue;
      if(Math.abs(p.lat - lat) < threshold && Math.abs(p.lon - lon) < threshold){
        return { lat: 0.0006, lon: 0.0008 };
      }
    }
    return { lat: 0, lon: 0 };
  }

  // --- Render markers ---
  function refreshEbirdEEMarkers(){
    ebirdEEMarkers.forEach(function(m){
      try { map.removeLayer(m); } catch(e){}
    });
    ebirdEEMarkers.clear();

    if(!window.__ebirdEELayerOn) return;

    var now = Date.now();
    var win7 = 7 * 24 * 60 * 60 * 1000;

    // Step 1: Collect visible eBird markers
    var visibleItems = [];
    var keys = Object.keys(ebirdEEPoints);
    for(var i = 0; i < keys.length; i++){
      var key = keys[i];
      var ep = ebirdEEPoints[key];
      if(!ep || !Number.isFinite(ep.lat) || !Number.isFinite(ep.lon)) continue;

      if(window.__recentOnly){
        var occ7 = Number(ep.occ7 || 0);
        var dateRecent = false;
        if(ep.t){
          var ms = (typeof _toDay === 'function') ? _toDay(ep.t) : Date.parse(ep.t);
          if(ms && (now - ms) >= 0 && (now - ms) <= win7) dateRecent = true;
        }
        if(!(occ7 > 0) && !dateRecent) continue;
      }

      var mainP = (window.points || {})[key] || {};
      if(mainP.visible === false) continue;

      visibleItems.push({ key: key, lat: ep.lat, lon: ep.lon, ep: ep });
    }

    // Step 2: Spread overlapping eBird markers
    var spread = spreadOverlappingCoords(visibleItems, 0.0005, 0.0008);

    // Step 3: Create markers with adjusted coordinates
    for(var i = 0; i < spread.length; i++){
      var s = spread[i];
      var ep = s.original.ep;
      var key = s.key;

      var elOffset = getElurikkusCollisionOffset(s.lat, s.lon, 0.0005);
      var finalLat = s.lat + elOffset.lat;
      var finalLon = s.lon + elOffset.lon;

      var avatar = (typeof getDisplayAvatar === 'function') ? getDisplayAvatar(key) : ((typeof avatars !== 'undefined' && avatars[key]) || '');
      var count = Number.isFinite(ep.howMany) ? ep.howMany : null;
      var metaCfg = window.getSpeciesMetaShared ? window.getSpeciesMetaShared(key) : { rarityLevel: 'none' };
      var icon = _ebirdMarkerIcon(avatar, count, metaCfg.rarityLevel || 'none');

      var m = L.marker([finalLat, finalLon], { icon: icon });
      m.bindPopup(ebirdEEPopupHtml(key, ep));
      m.addTo(map);
      ebirdEEMarkers.set(key, m);
    }
  }
  window.refreshEbirdEEMarkers = refreshEbirdEEMarkers;

  // --- 7-day filter integration ---
  if(typeof window.updateMarker === 'function' && !window.__ebird_ee_upd_patch__){
    var _origUpdateMarker = window.updateMarker;
    window.updateMarker = function(){
      var out = _origUpdateMarker.apply(this, arguments);
      clearTimeout(window.__ebirdEERefreshTimer);
      window.__ebirdEERefreshTimer = setTimeout(refreshEbirdEEMarkers, 200);
      return out;
    };
    window.__ebird_ee_upd_patch__ = true;
  }

  // --- Auto-refresh every 30 min ---
  setInterval(function(){
    if(window.__ebirdEELayerOn) refreshEbirdEEAll();
  }, 30 * 60 * 1000);

  // --- Init: restore from cache ---
  if(window.__ebirdEELayerOn && Object.keys(ebirdEEPoints).length > 0){
    setTimeout(refreshEbirdEEMarkers, 1000);
    setTimeout(refreshEbirdEEAll, 5000);
  }
})();
</script>

  mapWrap.appendChild(probPanel);

  // Close button handler

    if(activeProbSpecies) toggleProbability(activeProbSpecies);
  });

  // --- Helpers ---
  var probLayerGroup = null;

  function parseProbDate(dateStr) {
    if (!dateStr) return null;
    var s = String(dateStr).trim();
    // Try "YYYY-MM-DD" manual parse first (avoids timezone issues)
    var m = s.match(/^(\d{4})-(\d{2})-(\d{2})/);
    if (m) return new Date(+m[1], +m[2] - 1, +m[3]);
    // Try "DD.MM.YYYY" (Estonian format)
    m = s.match(/^(\d{2})\.(\d{2})\.(\d{4})/);
    if (m) return new Date(+m[3], +m[2] - 1, +m[1]);
    // Try standard parse
    var d = new Date(s);
    if (!isNaN(d.getTime()) && d.getFullYear() > 1900) return d;
    return null;
  }

  function getDayOfYear(date) {
    var start = new Date(date.getFullYear(), 0, 0);
    return Math.floor((date - start) / 86400000);
  }

  function isInSeasonWindow(occDateStr, windowDays) {
    windowDays = windowDays || 21;
    var occ = parseProbDate(occDateStr);
    if (!occ) return false;
    var now = new Date();
    var nowDoy = getDayOfYear(now);
    var occDoy = getDayOfYear(occ);
    var diff = Math.abs(nowDoy - occDoy);
    return Math.min(diff, 365 - diff) <= windowDays;
  }

  // Check if an occurrence date falls within a specific season range (start/end Date objects)
  function isInSeasonRange(occDateStr, seasonStart, seasonEnd) {
    var occ = parseProbDate(occDateStr);
    if (!occ) return false;
    var occDoy = getDayOfYear(occ);
    var startDoy = getDayOfYear(seasonStart);
    var endDoy = getDayOfYear(seasonEnd);
    if (startDoy <= endDoy) {
      return occDoy >= startDoy && occDoy <= endDoy;
    }
    // Wraps around year boundary
    return occDoy >= startDoy || occDoy <= endDoy;
  }

  function formatSeasonWindow(windowDays) {
    windowDays = windowDays || 21;
    var now = new Date();
    var start = new Date(now); start.setDate(start.getDate() - windowDays);
    var end = new Date(now); end.setDate(end.getDate() + windowDays);
    var fmt = function(d) { return d.toLocaleDateString('en-US', { month: 'short', day: 'numeric' }); };
    return fmt(start) + ' \u2013 ' + fmt(end);
  }

  // Derive season window from actual GBIF data distribution (10th–90th percentile + 7d padding)
  function calculateSeasonFromData(occurrences) {
    var daysInMonth = [0, 31, 28, 31, 30, 31, 30, 31, 31, 30, 31, 30, 31];
    function monthDayToDoy(m, d) {
      var doy = 0;
      for (var i = 1; i < m; i++) doy += daysInMonth[i];
      return doy + d;
    }
    function doyToDate(year, doy) {
      var d = new Date(year, 0, 1);
      d.setDate(d.getDate() + doy - 1);
      return d;
    }

    var doys = [];
    for (var i = 0; i < occurrences.length; i++) {
      var d = parseProbDate(occurrences[i].date);
      if (d) doys.push(getDayOfYear(d));
    }

    if (doys.length < 5) {
      // Too few records — fall back to ±21 days from now
      var now = new Date();
      var start = new Date(now); start.setDate(start.getDate() - 21);
      var end = new Date(now); end.setDate(end.getDate() + 21);
      var fmt = function(dd) { return dd.toLocaleDateString('en-US', { month: 'short', day: 'numeric' }); };
      return { start: start, end: end, label: fmt(start) + ' \u2013 ' + fmt(end) };
    }

    doys.sort(function(a, b) { return a - b; });

    var p10 = doys[Math.floor(doys.length * 0.10)];
    var p90 = doys[Math.floor(doys.length * 0.90)];

    // Pad by 7 days
    p10 = Math.max(1, p10 - 7);
    p90 = Math.min(365, p90 + 7);

    var year = new Date().getFullYear();
    var startDate = doyToDate(year, p10);
    var endDate = doyToDate(year, p90);

    var fmt2 = function(dd) { return dd.toLocaleDateString('en-US', { month: 'short', day: 'numeric' }); };
    return { start: startDate, end: endDate, label: fmt2(startDate) + ' \u2013 ' + fmt2(endDate) };
  }

  function deduplicateOccurrences(occs) {
    var seen = {};
    return occs.filter(function(o) {
      var key = (o.date ? String(o.date).substring(0,10) : 'nodate') + '|' + Math.round(o.lat*200) + '|' + Math.round(o.lon*200);
      if (seen[key]) return false;
      seen[key] = true;
      return true;
    });
  }

  // Fixed Estonia bounding box
  var ESTONIA_BOUNDS = { minLat: 57.50, maxLat: 59.75, minLon: 21.50, maxLon: 28.25 };

  // Simple land mask — only skip cells that are definitely deep open sea
  function isLikelyLand(lat, lon) {
    if (lat > 59.85) return false;    // well north of Estonia
    if (lat < 57.45) return false;    // south of Latvia border
    if (lon < 21.3) return false;     // far west of Saaremaa
    if (lon > 28.3) return false;     // east of Narva
    // Deep Baltic west of Saaremaa (not coastal)
    if (lon < 21.8 && lat < 57.9) return false;
    return true;  // everything else is potentially land or coastal
  }

  function buildEstoniaGrid(occs, gridSize) {
    gridSize = gridSize || 0.15;
    var cells = {};
    var precision = gridSize < 0.1 ? 3 : 2;

    // Create cells covering all of Estonia
    for (var lat = ESTONIA_BOUNDS.minLat; lat < ESTONIA_BOUNDS.maxLat; lat += gridSize) {
      for (var lon = ESTONIA_BOUNDS.minLon; lon < ESTONIA_BOUNDS.maxLon; lon += gridSize) {
        var gLat = Math.floor(lat / gridSize) * gridSize;
        var gLon = Math.floor(lon / gridSize) * gridSize;
        var cLat = gLat + gridSize / 2;
        var cLon = gLon + gridSize / 2;
        if (!isLikelyLand(cLat, cLon)) continue;
        var key = gLat.toFixed(precision) + '|' + gLon.toFixed(precision);
        if (!cells[key]) {
          cells[key] = { latMin: gLat, latMax: gLat + gridSize, lonMin: gLon, lonMax: gLon + gridSize, occurrences: [], gbifCount: 0, gbifCountTotal: 0, eluCount: 0, centerLat: cLat, centerLon: cLon };
        }
      }
    }

    // Assign occurrences to cells
    occs.forEach(function(o) {
      var gLat = Math.floor(o.lat / gridSize) * gridSize;
      var gLon = Math.floor(o.lon / gridSize) * gridSize;
      var key = gLat.toFixed(precision) + '|' + gLon.toFixed(precision);
      if (!cells[key]) {
        cells[key] = { latMin: gLat, latMax: gLat + gridSize, lonMin: gLon, lonMax: gLon + gridSize, occurrences: [], gbifCount: 0, gbifCountTotal: 0, eluCount: 0, centerLat: gLat + gridSize / 2, centerLon: gLon + gridSize / 2 };
      }
      cells[key].occurrences.push(o);
      var _src = String(o.source || '').toLowerCase();
      if (_src === 'gbif') cells[key].gbifCount++;
      else if (_src.indexOf('elurikkus') !== -1) cells[key].eluCount++;
    });

    return Object.values(cells);
  }

  // --- Temporal period helpers ---
  function getSeasonPeriods(seasonStart, seasonEnd) {
    var months = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
    // If no season dates provided, fall back to ±21 days
    if (!seasonStart || !seasonEnd) {
      var now = new Date();
      seasonStart = new Date(now); seasonStart.setDate(seasonStart.getDate() - 21);
      seasonEnd = new Date(now); seasonEnd.setDate(seasonEnd.getDate() + 21);
    }
    var periods = [];
    var current = new Date(seasonStart);
    while (current < seasonEnd) {
      var periodEnd = new Date(current.getTime() + 14 * 86400000);
      if (periodEnd > seasonEnd) periodEnd = new Date(seasonEnd);
      // Skip very short tail periods (<3 days)
      if (periodEnd - current < 3 * 86400000 && periods.length > 0) break;
      periods.push({
        start: new Date(current),
        end: new Date(periodEnd),
        label: String(current.getDate()).padStart(2,'0') + ' ' + months[current.getMonth()] + '\u2013' + String(periodEnd.getDate()).padStart(2,'0') + ' ' + months[periodEnd.getMonth()],
        count: 0
      });
      current = periodEnd;
    }
    return periods;
  }

  function assignRecordsToPeriods(cell, periods) {
    cell.periods = periods.map(function(p) { return { start: p.start, end: p.end, label: p.label, count: 0, probability: 1, isCurrent: false, obsCount: 0 }; });
    for (var i = 0; i < cell.occurrences.length; i++) {
      var d = parseProbDate(cell.occurrences[i].date);
      if (!d) continue;
      var doy = getDayOfYear(d);
      for (var p = 0; p < cell.periods.length; p++) {
        var pStartDoy = getDayOfYear(cell.periods[p].start);
        var pEndDoy = getDayOfYear(cell.periods[p].end);
        if (doy >= pStartDoy && doy < pEndDoy) {
          cell.periods[p].count++;
          break;
        }
      }
    }
  }

  function calculatePeriodProbabilities(cell, eluPoint, cellSize) {
    if (!cell.periods || !cell.periods.length) return;
    var now = new Date();
    var markerInCell = !!cell.markerInCell;

    // Within-cell normalization with confidence dampening for sparse cells
    var maxPeriodCount = 0;
    var totalSeasonObs = 0;
    for (var p = 0; p < cell.periods.length; p++) {
      if (cell.periods[p].count > maxPeriodCount) maxPeriodCount = cell.periods[p].count;
      totalSeasonObs += cell.periods[p].count;
    }
    var effectiveMax = Math.max(maxPeriodCount, 10); // floor at 10 to prevent 1/1=100%
    // Confidence: cells with few total obs get dampened (1obs→18%, 5→47%, 10→68%, 50→100%)
    var confidence = Math.min(1.0, Math.log1p(totalSeasonObs) / Math.log1p(50));

    for (var p = 0; p < cell.periods.length; p++) {
      var period = cell.periods[p];
      var periodHistorical = 0;
      if (maxPeriodCount > 0 && period.count > 0) {
        periodHistorical = Math.round(
          (Math.log1p(period.count) / Math.log1p(effectiveMax)) * confidence * 95
        );
      }
      var isCurrentPeriod = (now >= period.start && now < period.end);
      var periodRecency = (isCurrentPeriod && markerInCell) ? Math.round(cell.scoreRecency * 0.9 * confidence) : 0;

      period.probability = Math.max(1, Math.min(95, periodHistorical + periodRecency));
      period.isCurrent = isCurrentPeriod;
      period.obsCount = period.count;
    }
    cell.periodConfidence = confidence;
  }

  function calculateProbabilities(gridCells, seasonal, allOccs, speciesName, cellSize, seasonInfo) {
    cellSize = cellSize || 0.15;

    // === Composite scoring (rebuilt 2026-04-14) ===
    // Produces spread across 0–95 instead of saturating at 95 for every species.
    // Three components: history (60w), freshness (35w), season (5w) × confidence.

    var HISTORY_WEIGHT = 60;
    var FRESHNESS_WEIGHT = 35;
    var SEASON_WEIGHT = 5;

    // --- A: Per-cell history density (log-normalized against species' own max) ---
    var maxCellOcc = 0;
    for (var _ai = 0; _ai < gridCells.length; _ai++) {
      var _aoLen = (gridCells[_ai].occurrences || []).length;
      if (_aoLen > maxCellOcc) maxCellOcc = _aoLen;
    }

    // --- B: Confidence dampening based on total data volume ---
    // 500+ records → 1.0, 50 → ~0.63, 5 → ~0.29, floor at 0.3
    var totalRecords = (allOccs || []).length;
    var confidence = Math.max(0.3, Math.min(1.0, Math.log1p(totalRecords) / Math.log1p(500)));

    // --- C: Season centrality per period ---
    var periodTemplate = getSeasonPeriods(seasonInfo && seasonInfo.start, seasonInfo && seasonInfo.end);
    // Pre-count total occurrences per period template slot across ALL cells
    var periodTotalCounts = [];
    for (var _ci = 0; _ci < periodTemplate.length; _ci++) periodTotalCounts.push(0);
    for (var _oi = 0; _oi < (allOccs || []).length; _oi++) {
      var _od = parseProbDate((allOccs[_oi] || {}).date || (allOccs[_oi] || {}).eventDate);
      if (!_od) continue;
      var _odoy = getDayOfYear(_od);
      for (var _pi = 0; _pi < periodTemplate.length; _pi++) {
        var _ps = getDayOfYear(periodTemplate[_pi].start);
        var _pe = getDayOfYear(periodTemplate[_pi].end);
        if (_odoy >= _ps && _odoy < _pe) { periodTotalCounts[_pi]++; break; }

      if (!_lTs || _lTs <= 0 || (_now - _lTs) > _7dMs) continue;

      var cellOccCount = (cell.occurrences || []).length;
      var histPct = maxCellOcc > 0 ? Math.log1p(cellOccCount) / Math.log1p(maxCellOcc) : 0;

            _rl.lon >= cell.lonMin && _rl.lon < cell.lonMax) {

        var periodFresh = isCurrentPeriod ? freshPct : 0;

        var rawScore = (HISTORY_WEIGHT * histBlended +
                        FRESHNESS_WEIGHT * periodFresh +
                        SEASON_WEIGHT * central) * confidence;

        cellPeriods.push({
          label: periodTemplate[pk].label,
          start: periodTemplate[pk].start,

        headlineProb = Math.max.apply(null, cellPeriods.map(function(p) { return p.probability; }));
      }
      cell.probability = headlineProb;

      // Diagnostic fields (for [PROB-SCORE] log)
      cell.scoreHistory = Math.round(histPct * HISTORY_WEIGHT * confidence);
      cell.scoreRecency = Math.round(freshPct * FRESHNESS_WEIGHT * confidence);
      cell.scoreSeason = Math.round((periodCentrality[0] || 0.3) * SEASON_WEIGHT * confidence);
    });

    return gridCells;
  }

  function extractScientificName(items) {
    for (var i = 0; i < items.length; i++) {
      var name = String(items[i].scientificName || '').trim();
      if (name && /^[A-Z][a-z]+ [a-z]+/.test(name)) return name;
    }
    return null;
  }

  // --- Cache (v2: key changed to invalidate pre-eluCount caches) ---
  var PROB_CACHE_PREFIX = 'bm_prob2_';
  function loadProbCache(species) {
    try {
      var raw = localStorage.getItem(PROB_CACHE_PREFIX + species);
      if (!raw) return null;
      var data = JSON.parse(raw);
      if (Date.now() - new Date(data.fetchedAt).getTime() > 6 * 3600000) return null;
      return data;
    } catch(e) { return null; }
  }
  function saveProbCache(species, data) {
    try { localStorage.setItem(PROB_CACHE_PREFIX + species, JSON.stringify(data)); } catch(e) {}
  }

  // --- Fetch GBIF per-year sampling for better coverage ---
  // Resolve GBIF taxonKey from scientific name (cached)
  var __taxonKeyCache = {};
  // Restore taxonKey cache from localStorage (keys never change)
  try{var _tkRaw=localStorage.getItem('bm_taxonkey_cache');if(_tkRaw) __taxonKeyCache=JSON.parse(_tkRaw);}catch(_e){__taxonKeyCache={};}

  async function _resolveTaxonKeyFromSciName(sciName) {
    if (__taxonKeyCache[sciName] !== undefined) return __taxonKeyCache[sciName];
    try {
      var res = await window.gbifFetch('https://api.gbif.org/v1/species/match?name=' + encodeURIComponent(sciName) + '&kingdom=Animalia&strict=false');
      if (res.ok) {
        var data = await res.json();
        if (data && data.usageKey) {
          __taxonKeyCache[sciName] = data.usageKey;
          try{localStorage.setItem('bm_taxonkey_cache',JSON.stringify(__taxonKeyCache));}catch(_e){}
          return data.usageKey;
        }
      }
    } catch(e) { console.warn('[PROB-GBIF] taxonKey resolve failed:', sciName, e); }
    __taxonKeyCache[sciName] = null;
    return null;
  }
  window.__taxonKeyCache = __taxonKeyCache;

  // GBIF occurrence cache with 24h TTL
  // In-memory GBIF cache — survives within session, lost on page reload
  var __gbifMemoryCache = new Map();
  var GBIF_CACHE_TTL_MS=24*60*60*1000;
  window.__gbifMemoryCache = __gbifMemoryCache;

  // Clean up stale bm_gbif_* localStorage keys from previous deploy
  (function(){try{var rm=[];for(var i=0;i<localStorage.length;i++){var k=localStorage.key(i);if(k&&k.indexOf('bm_gbif_')===0)rm.push(k);}rm.forEach(function(k){try{localStorage.removeItem(k);}catch(e){}});if(rm.length)console.log('[cleanup] removed',rm.length,'stale bm_gbif_* keys');}catch(e){}})();

  function _getGbifCache(name){
    var entry=__gbifMemoryCache.get(name);
    if(!entry) return null;
    if(Date.now()-entry.ts>GBIF_CACHE_TTL_MS){__gbifMemoryCache.delete(name);return null;}
    return entry.data;
  }
  function _setGbifCache(name,occs){
    var compact=occs.map(function(o){return{lat:o.lat,lon:o.lon,date:o.date||'',source:'gbif'};});
    __gbifMemoryCache.set(name,{ts:Date.now(),data:compact});
  }

  async function fetchProbGbifOccurrences(scientificName, onProgress) {
    if (!scientificName) return [];

    // Check cache first
    var cached=_getGbifCache(scientificName);
    if(cached){
      console.log('[PROB-GBIF] cache hit',scientificName,'records:',cached.length);
      return cached;
    }

    // Resolve taxonKey first — allows single-request year-range query
    var taxonKey = await _resolveTaxonKeyFromSciName(scientificName);
    if (!taxonKey) {
      console.log('[PROB-GBIF] no taxonKey for', scientificName);
      return [];
    }

    var currentYear = new Date().getFullYear();
    var startYear = currentYear - 10;
    var baseUrl = 'https://api.gbif.org/v1/occurrence/search?taxonKey=' + taxonKey
      + '&country=EE&hasCoordinate=true&hasGeospatialIssue=false'
      + '&year=' + startYear + ',' + currentYear + '&limit=300';

    var allOccs = [];
    var MAX_PAGES = 10; // safety cap: 10 × 300 = 3000 records

    for (var page = 0; page < MAX_PAGES; page++) {
      var offset = page * 300;
      try {
        var url = baseUrl + '&offset=' + offset;
        var res = await window.gbifFetch(url);
        if (!res.ok) { console.warn('[PROB-GBIF] HTTP', res.status, 'for', scientificName); break; }
        var json = await res.json();
        var results = (json.results || [])
          .filter(function(r) { return Number.isFinite(r.decimalLatitude) && Number.isFinite(r.decimalLongitude); })
          .map(function(r) {
            return { lat: r.decimalLatitude, lon: r.decimalLongitude, date: r.eventDate || '', source: 'gbif', scientificName: r.scientificName || scientificName };
          });
        allOccs = allOccs.concat(results);
        if (onProgress) onProgress(page + 1, MAX_PAGES, allOccs.length);
        if (results.length < 300 || json.endOfRecords) break;
      } catch(e) {
        console.warn('[PROB-GBIF] fetch failed page', page, scientificName, e);
        break;
      }
    }

    console.log('[PROB-GBIF] fetched', scientificName, 'taxonKey:', taxonKey, 'records:', allOccs.length);
    // Cache the result
    _setGbifCache(scientificName,allOccs);
    return allOccs;
  }

  // --- Paginated eElurikkus fetch for probability ---
  async function fetchElurikkusAllDatesForProb(speciesName, options) {
    options = options || {};
    var searchUrlBase = 'https://elurikkus.ee/app/occurrences/search?text='
      + encodeURIComponent(speciesName);
    var maxPages = Number.isFinite(options.maxPages) ? options.maxPages : 30;
    var pageSize = 50;
    var allItems = [];
    var seenDates = {};

    for (var page = 0; page < maxPages; page++) {
      var offset = page * pageSize;
      var pageUrl = searchUrlBase + '&country=Estonia&offset=' + offset;

      try {
        var html = await tryFetch(pageUrl);
        var rows = extractElurikkusRecordRows(html);

        if (!rows || !rows.length) {
          var dates = extractElurikkusRecordDatesIso(html);
          if (!dates || !dates.length) dates = extractAllEventDates(html);
          rows = (dates || []).map(function(d) {
            return { observedAt: d, municipality: '', locality: '', placeText: '', county: '' };
          });
        }

        if (!rows || rows.length === 0) {
          console.log('[PROB-ELU] Page', page, 'returned 0 rows — stopping');
          break;
        }

        for (var r = 0; r < rows.length; r++) {
          var row = rows[r];
          var dateKey = (row.observedAt || '') + '|' + (row.locality || '') + '|' + (row.municipality || '');
          if (!seenDates[dateKey]) {
            seenDates[dateKey] = true;
            allItems.push({
              observedAt: row.observedAt || '',
              placeText: row.placeText || row.locality || '',
              municipality: row.municipality || '',
              locality: row.locality || '',
              county: row.county || '',
              coordsStatus: 'restricted'
            });
          }
        }

        setProbStatus('Fetching eElurikkus... page ' + (page + 1) + ' (' + allItems.length + ' records)');

        if (rows.length < pageSize) break;
        await new Promise(function(resolve) { setTimeout(resolve, 300); });
      } catch(e) {
        console.warn('[PROB-ELU] Page', page, 'failed:', e);
        break;
      }
    }

    console.log('[PROB-ELU] Total items for', speciesName, ':', allItems.length, 'across', Math.min(page + 1, maxPages), 'pages');
    return allItems;
  }

  // --- Layer rendering ---
  function clearProbabilityLayer() {
    if (probLayerGroup) { map.removeLayer(probLayerGroup); probLayerGroup = null; }
  }

  function buildTemporalBreakdown(cell) {
    if (!cell.periods || !cell.periods.length) return '';
    var html = '<div style="border-top:1px solid #eee;margin-top:6px;padding-top:6px">'
      + '<div style="font-size:11px;font-weight:600;color:#555;margin-bottom:4px">\uD83D\uDCC5 Probability by period:</div>';
    for (var p = 0; p < cell.periods.length; p++) {
      var period = cell.periods[p];
      var prob = period.probability || 1;
      var barColor = prob > 60 ? '#E24B4A' : prob > 25 ? '#E88D2A' : '#7F77DD';
      var bgColor = period.isCurrent ? '#f0f9ff' : 'transparent';
      var currentMarker = period.isCurrent ? ' \u25C0 now' : '';
      var fontWeight = period.isCurrent ? 'font-weight:600' : '';
      var barWidth = Math.max(4, Math.round(prob * 0.8));
      html += '<div style="display:flex;align-items:center;gap:6px;padding:2px 4px;margin:1px 0;border-radius:3px;background:' + bgColor + ';' + fontWeight + '">'
        + '<span style="font-size:10px;color:#666;min-width:100px;white-space:nowrap">' + period.label + '</span>'
        + '<div style="flex:1;height:8px;background:#f1f1f1;border-radius:4px;overflow:hidden">'
        + '<div style="width:' + barWidth + '%;height:100%;background:' + barColor + ';border-radius:4px"></div></div>'
        + '<span style="font-size:10px;color:#555;min-width:32px;text-align:right">' + prob + '%</span>'
        + '<span style="font-size:9px;color:#999;min-width:20px">(' + (period.obsCount || 0) + ')' + (period.obsCount <= 1 ? ' \u26A0' : period.obsCount <= 2 ? ' ~' : '') + '</span>'
        + '<span style="font-size:9px;color:#2196F3">' + currentMarker + '</span>'
        + '</div>';
    }
    html += '</div>';
    return html;
  }

  function buildProbPopup(cell, speciesName, totalObs, totalInSeason, seasonInfo) {
    var probColor = cell.probability > 60 ? '#A32D2D' : cell.probability > 25 ? '#B06A1A' : '#534AB7';
    var cellSize = 0.15;
    var cLat = Number.isFinite(cell.centerLat) ? cell.centerLat : (cell.latMin + cell.latMax) / 2;
    var cLon = Number.isFinite(cell.centerLon) ? cell.centerLon : (cell.lonMin + cell.lonMax) / 2;

    // eElurikkus line — clearly show per-cell vs species-wide
    var eluPoint = (typeof points !== 'undefined' && points[speciesName]) || {};
    var eluOcc7 = Number.isFinite(eluPoint.occ7) ? eluPoint.occ7 : 0;
    var eluLine;

    if (Number.isFinite(eluPoint.lat) && Number.isFinite(eluPoint.lon)) {
      var dLat = Math.abs(eluPoint.lat - cLat);
      var dLon = Math.abs(eluPoint.lon - cLon);
      var isInCell = (eluPoint.lat >= cell.latMin && eluPoint.lat < cell.latMax &&
                      eluPoint.lon >= cell.lonMin && eluPoint.lon < cell.lonMax);
      var dateStr = eluPoint.t ? formatDateEE(eluPoint.t) : '?';
      var distKm = Math.round(Math.sqrt(dLat * dLat + dLon * dLon) * 111);

      if (isInCell) {
        eluLine = '<div style="margin:2px 0;font-size:12px;color:#555">'
          + '\uD83D\uDD0D eElurikkus: <b>marker in cell</b> \u00b7 '
          + dateStr + ' \u00b7 ' + eluOcc7 + ' obs (7d)'
          + '</div>';
      } else {
        eluLine = '<div style="margin:2px 0;font-size:12px;color:#999">'
          + '\uD83D\uDD0D eElurikkus: 0 in cell \u00b7 marker ' + distKm + ' km away'
          + '</div>';
      }
    } else {
      eluLine = '<div style="margin:2px 0;font-size:12px;color:#999">\uD83D\uDD0D eElurikkus: no data</div>';
    }

    // Determine if headline is showing current period or season
    var _currentPeriod = null;
    if (cell.periods) {
      for (var _cp = 0; _cp < cell.periods.length; _cp++) {
        if (cell.periods[_cp].isCurrent) { _currentPeriod = cell.periods[_cp]; break; }
      }
    }
    var _isCurrentPeriodScore = _currentPeriod && _currentPeriod.probability > 1 && cell.probability === _currentPeriod.probability;
    var _subtitleText = _isCurrentPeriodScore
      ? 'probability in current period (' + _currentPeriod.label + ')'
      : 'probability in current season';

    // Score breakdown
    var breakdownLine = '';
    var parts = [];
    if (cell.seasonProbability && cell.seasonProbability !== cell.probability) {
      parts.push('Season: ' + cell.seasonProbability + '%');
    }
    if (cell.scoreHistory > 0) {
      var hDetail = 'GBIF ' + (cell.scoreHistoryGbif || 0) + 'pt + eElu ' + (cell.scoreHistoryElu || 0) + 'pt';
      parts.push(cell.scoreHistory + '% history (' + hDetail + ')');
    }
    if (cell.scoreRecency > 0) parts.push(cell.scoreRecency + '% freshness');
    if (parts.length > 0) {
      breakdownLine = '<div style="font-size:11px;color:#94a3b8;margin-top:6px;border-top:1px solid #eee;padding-top:4px">'
        + 'Score: ' + parts.join(' + ') + '</div>';
    }

    var gbifSeason = cell.gbifCount || 0;
    var gbifTotal = cell.gbifCountTotal || gbifSeason;

    // Temporal breakdown
    var temporalHtml = buildTemporalBreakdown(cell);

    return '<div style="font-family:system-ui;min-width:240px;max-width:360px">'
      + '<div style="font-size:22px;font-weight:600;color:' + probColor + ';margin-bottom:2px">' + cell.probability + '%</div>'
      + '<div style="font-size:12px;color:#64748b;margin-bottom:8px">' + _subtitleText + '</div>'
      + '<div style="border-top:1px solid #eee;padding-top:6px;margin-top:2px">'
        + '<div style="font-size:12px;color:#555">\uD83D\uDCCD <b>This cell:</b> GBIF ' + gbifSeason + ' in season'
        + (gbifTotal > gbifSeason ? ' (' + gbifTotal + ' total)' : '')
        + ((cell.eluCount || 0) > 0 ? ' \u00b7 eElurikkus ' + cell.eluCount : '')
        + '</div>'
        + eluLine
      + '</div>'
      + '<div style="font-size:12px;color:#94a3b8;margin-top:6px">'
        + '\uD83D\uDCCA All cells: ' + (totalObs || '?') + ' obs \u00b7 ' + (totalInSeason || '?') + ' in season'
      + '</div>'
      + '<div style="font-size:11px;color:#94a3b8;margin-top:2px">Season: ' + (seasonInfo && seasonInfo.label ? seasonInfo.label : formatSeasonWindow()) + '</div>'
      + breakdownLine
      + temporalHtml
    + '</div>';
  }

  function renderProbabilityOverlay(gridCells, speciesName, totalObs, totalInSeason, seasonInfo) {
    clearProbabilityLayer();
    probLayerGroup = L.layerGroup();

    gridCells.forEach(function(cell) {
      // Skip cells with no signal at all (no GBIF, no eElurikkus history, no freshness)
      if (cell.gbifCount <= 0 && (cell.eluCount || 0) <= 0 && !cell.markerInCell && (cell.scoreRecency || 0) <= 0) return;
      var bounds = [[cell.latMin, cell.lonMin], [cell.latMax, cell.lonMax]];
      var fillColor, fillOpacity, strokeColor, strokeOpacity;
      if (cell.probability > 60) { fillColor = '#E24B4A'; fillOpacity = 0.50; strokeColor = '#A32D2D'; strokeOpacity = 0.6; }
      else if (cell.probability > 25) { fillColor = '#E88D2A'; fillOpacity = 0.45; strokeColor = '#B06A1A'; strokeOpacity = 0.5; }
      else { fillColor = '#7F77DD'; fillOpacity = 0.25; strokeColor = '#534AB7'; strokeOpacity = 0.3; }

      var rect = L.rectangle(bounds, { fillColor: fillColor, fillOpacity: fillOpacity, color: strokeColor, weight: 1, opacity: strokeOpacity, interactive: true });
      rect.bindPopup(buildProbPopup(cell, speciesName, totalObs, totalInSeason, seasonInfo));
      probLayerGroup.addLayer(rect);
    });

    // Top-5 hotspot markers
    var topCells = gridCells.slice().sort(function(a,b){ return b.probability - a.probability; }).slice(0,5);
    topCells.forEach(function(cell) {
      var center = [(cell.latMin + cell.latMax)/2, (cell.lonMin + cell.lonMax)/2];
      var mc = cell.probability > 60 ? '#A32D2D' : cell.probability > 25 ? '#B06A1A' : '#534AB7';
      var marker = L.circleMarker(center, { radius: 5, fillColor: mc, fillOpacity: 1, color: 'white', weight: 1.5 });
      marker.bindPopup(buildProbPopup(cell, speciesName, totalObs, totalInSeason, seasonInfo));
      probLayerGroup.addLayer(marker);
    });

    probLayerGroup.addTo(map);
  }

  // --- Core compute+write function (no UI side effects) ---
  // Returns { scored, data, seasonInfo, seasonal } on success, or null on skip/failure.
  async function computeProbForSpecies(speciesName, options) {

<!-- ===== Top 3 Probability Periods (v2) — reads from existing Prob system ===== -->
<script>
(function(){
'use strict';

window.__probDataBySpecies = window.__probDataBySpecies || {};

// --- buildTop3PeriodsSection: renders top-3 periods + "now" row in sidebar ---
window.buildTop3PeriodsSection = function(speciesKey) {
  var probData = (window.__probDataBySpecies || {})[speciesKey];
  if (!probData || !probData.periods || !probData.periods.length) {
    return '<div class="top3-placeholder" data-species="' + speciesKey + '" style="margin-top:6px;font-size:11px;color:#94a3b8;cursor:pointer;" title="Vajuta Prob nuppu andmete laadimiseks">▦ Top perioodid: vajuta Prob</div>';
  }

  var periods = probData.periods;
  var currentPeriod = null;
  for (var cp = 0; cp < periods.length; cp++) {
    if (periods[cp].isCurrent) { currentPeriod = periods[cp]; break; }
  }

  // Top 3 by pct (exclude 0%)
  var ranked = periods.filter(function(p) { return p.pct > 0; })
    .sort(function(a, b) { return b.pct - a.pct || b.count - a.count; })
    .slice(0, 3);

  if (!ranked.length) {
    return '<div style="margin-top:6px;font-size:11px;color:#94a3b8;">▦ Vaatlusi pole leitud</div>';
  }

  var colors = [
    { bg: '#E1F5EE', text: '#0F6E56', bar: '#1D9E75' },
    { bg: '#E6F1FB', text: '#185FA5', bar: '#378ADD' },
    { bg: '#FAEEDA', text: '#854F0B', bar: '#EF9F27' },
  ];
  var maxPct = ranked[0].pct || 1;

  var html = '<div class="top3-section" style="border-top:1px solid #eef2f7;margin-top:8px;padding-top:8px;">';
  html += '<div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:6px;">';
  html += '<span style="font-size:11px;font-weight:500;color:#64748b;">▦ Parimad perioodid</span>';
  html += '<span style="font-size:9px;color:#94a3b8;">GBIF+eLurikkus</span>';
  html += '</div>';

  for (var i = 0; i < ranked.length; i++) {
    var r = ranked[i];
    var c = colors[i] || colors[2];
    var barWidth = Math.round((r.pct / maxPct) * 100);

    html += '<div class="top3-row" data-species="' + speciesKey + '"';
    html += ' data-lat="' + (probData.cellLat || '') + '"';
    html += ' data-lon="' + (probData.cellLon || '') + '"';
    html += ' style="display:flex;align-items:center;gap:6px;padding:5px 8px;margin-bottom:3px;background:#fff;border-radius:8px;border:1px solid #eef2f7;cursor:pointer;"';
    html += ' onmouseover="this.style.borderColor=\'#5DCAA5\'" onmouseout="this.style.borderColor=\'#eef2f7\'">';

    // Rank badge
    html += '<div style="width:18px;height:18px;border-radius:50%;background:' + c.bg + ';color:' + c.text + ';font-size:10px;font-weight:500;display:flex;align-items:center;justify-content:center;flex-shrink:0;">' + (i + 1) + '</div>';

    // Period label (line 1) + count + bar + % (line 2)
    html += '<div style="flex:1;min-width:0;">';
    html += '<div style="font-size:11px;font-weight:500;color:#1e293b;">' + r.label + '</div>';
    html += '<div style="display:flex;align-items:center;gap:6px;margin-top:1px;">';
    html += '<span style="font-size:10px;color:#94a3b8;">(' + r.count + ')</span>';
    html += '<div style="flex:1;max-width:50px;height:4px;border-radius:2px;background:#f1f5f9;overflow:hidden;">';
    html += '<div style="width:' + barWidth + '%;height:100%;background:' + c.bar + ';border-radius:2px;"></div>';
    html += '</div>';
    html += '<span style="font-size:11px;font-weight:500;color:' + c.text + ';">' + r.pct + '%</span>';
    html += '</div>';
    html += '</div>';

    // Chevron
    html += '<svg width="10" height="10" viewBox="0 0 24 24" fill="none" stroke="#cbd5e1" stroke-width="2.5" style="flex-shrink:0;"><path d="M9 18l6-6-6-6"/></svg>';
    html += '</div>';
  }

  // "praegu" (now) row
  if (currentPeriod) {
    var isInTop3 = false;
    for (var t = 0; t < ranked.length; t++) {
      if (ranked[t].label === currentPeriod.label) { isInTop3 = true; break; }
    }
    html += '<div style="display:flex;align-items:center;gap:6px;padding:5px 8px;margin-top:2px;background:' + (currentPeriod.pct > 0 ? '#fffbeb' : '#f8fafc') + ';border-radius:8px;border:1px solid ' + (currentPeriod.pct > 0 ? '#fde68a' : '#eef2f7') + ';">';
    html += '<div style="font-size:9px;font-weight:500;color:#92400e;background:#fef3c7;padding:2px 6px;border-radius:999px;flex-shrink:0;">praegu</div>';
    html += '<div style="flex:1;min-width:0;"><div style="font-size:11px;color:#1e293b;">' + currentPeriod.label + '</div></div>';
    html += '<span style="font-size:11px;font-weight:500;color:' + (currentPeriod.pct > 0 ? '#92400e' : '#94a3b8') + ';">' + currentPeriod.pct + '%</span>';
    html += '<span style="font-size:10px;color:#94a3b8;">(' + currentPeriod.count + ')</span>';
    if (isInTop3) html += '<span style="font-size:9px;color:#16a34a;" title="See periood on ka top 3 seas">\u2605</span>';
    html += '</div>';
  }

  html += '</div>';
  return html;
};

// --- Click handler: top3 row → fly to cell, enable Prob overlay ---
document.addEventListener('click', function(e) {
  var row = e.target.closest('.top3-row');
  if (row) {
    e.preventDefault();
    e.stopPropagation();

    var species = row.getAttribute('data-species');
    var lat = parseFloat(row.getAttribute('data-lat'));
    var lon = parseFloat(row.getAttribute('data-lon'));

    // Fly to cell center
    if (Number.isFinite(lat) && Number.isFinite(lon) && window.map) {
      map.flyTo([lat, lon], 10, { duration: 1.2 });
    }

    // Enable Prob overlay if not already active
    if (typeof window.toggleProbability === 'function' && window.activeProbSpecies !== species) {
      window.toggleProbability(species);
    }

    // Make species visible if hidden
    if (window.points && window.points[species] && window.points[species].visible === false) {
      window.points[species].visible = true;
      if (typeof save === 'function') save();
      if (typeof updateMarker === 'function') updateMarker(species);
    }

    // Highlight species row
    try {
      var speciesRow = document.querySelector('.row[data-key="' + CSS.escape(species) + '"]');
      if (speciesRow) {
        speciesRow.style.outline = '2px solid #5DCAA5';
        speciesRow.style.outlineOffset = '2px';
        setTimeout(function() { speciesRow.style.outline = ''; speciesRow.style.outlineOffset = ''; }, 2000);
      }
    } catch(err) {}

    // Mobile: close sidebar
    try {
      var sidebar = document.getElementById('sidebar');
      if (sidebar && sidebar.classList.contains('open') && window.innerWidth <= 900) {
        sidebar.classList.remove('open');
        var backdrop = document.getElementById('sidebarBackdrop');
        if (backdrop) backdrop.classList.remove('show');
      }
    } catch(err) {}
    return;
  }

  // Placeholder click → trigger Prob for the species
  var ph = e.target.closest('.top3-placeholder');
  if (ph) {
    var sp = ph.getAttribute('data-species');
    if (sp && typeof window.toggleProbability === 'function') {
      ph.textContent = '▦ Top perioodid: laen...';
      ph.style.color = '#64748b';
      window.toggleProbability(sp);
    }
  }
});


})();
</script>

<script>
(function(){
var SPRING = {

"Kadakatäks":"22.04","Kaelusrästas":"17.04","Kalakotkas":"31.03","Kaldapääsuke":"29.04",

"Rabapistrik":"11.04","Randtiir":"16.04","Rohunepp":"28.04","Rukkirääk":"7.05",
"Rägapart":"25.03","Räusk":"4.04","Räusktiir":"4.04","Räästapääsuke":"18.04","Rüüt":"5.03",
