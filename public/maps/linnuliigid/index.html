"Väikehüüp":"30.05","Väikekoovitaja":"12.04","Väikerüdi":"17.05","Väiketiir":"21.04",
"Väiketüll":"6.04","Värbrüdi":"20.04","Väänkael":"11.04","Ööbik":"28.04","Öösorr":"24.04"
};

var EBIRD_CODES_FALLBACK = {};
try { EBIRD_CODES_FALLBACK = JSON.parse(localStorage.getItem('bm_ebird_codes') || '{}'); } catch(e) {}

var EBIRD_TOKEN = '9s72dc2jcjlq';
var ebirdRecentCache = null;
window.__ennEbirdCounts = {};

function fetchEbirdRecent(callback) {
  var url = 'https://api.ebird.org/v2/data/obs/EE/recent?back=30&maxResults=10000&_ts=' + Date.now();
  fetch(url, { headers: { 'X-eBirdApiToken': EBIRD_TOKEN }, cache: 'no-store' })
  .then(function(res) { if (!res.ok) throw new Error('eBird HTTP ' + res.status); return res.json(); })
  .then(function(arr) {
    if (!Array.isArray(arr)) throw new Error('eBird: invalid response');
    // Build per-species-code counts directly from the raw array
    var countsByCode = {};
    for (var i = 0; i < arr.length; i++) {
      var obs = arr[i], code = String(obs.speciesCode || '');
      if (!code) continue;
      if (!countsByCode[code]) countsByCode[code] = { count: 0, lastDate: '', comName: obs.comName || '' };
      countsByCode[code].count++;
      var dt = String(obs.obsDt || '').substring(0, 10);
      if (dt > countsByCode[code].lastDate) countsByCode[code].lastDate = dt;
    }
    ebirdRecentCache = { fetchedAt: Date.now(), data: countsByCode, totalObs: arr.length };
    // Store per-species-code 7-day counts on window for direct lookup
    window.__ennEbirdCounts = {};
    var _now7 = Date.now(), _7days = 7 * 24 * 60 * 60 * 1000;
    for (var _ai = 0; _ai < arr.length; _ai++) {
      var _aobs = arr[_ai], _acode = String(_aobs.speciesCode || '');
      if (!_acode) continue;
      var _ams = new Date(String(_aobs.obsDt || '').substring(0, 10)).getTime();
      if (_now7 - _ams <= _7days) {
        window.__ennEbirdCounts[_acode] = (window.__ennEbirdCounts[_acode] || 0) + 1;
      }
    }
    console.log('[Ennustus] eBird EE fetched:', Object.keys(countsByCode).length, 'species,', arr.length, 'obs, __ennEbirdCounts:', Object.keys(window.__ennEbirdCounts).length);
    callback(null, countsByCode);
  })
  .catch(function(err) { console.warn('[Ennustus] eBird fetch failed:', err.message); callback(err, null); });
}

function getEbirdCode(estName) {
  var clean = (typeof _fix === 'function') ? _fix(estName) : estName;
  // Primary source: the comprehensive SPECIES_EBIRD_CODES constant (clean UTF-8 keys)
  try {
    if (typeof SPECIES_EBIRD_CODES !== 'undefined') {
      if (SPECIES_EBIRD_CODES[estName]) return SPECIES_EBIRD_CODES[estName];
      if (SPECIES_EBIRD_CODES[clean]) return SPECIES_EBIRD_CODES[clean];
    }
  } catch(e) {}
  // speciesMeta in localStorage (may have either encoding as key)
  try { var meta = JSON.parse(localStorage.getItem('estbirding.speciesMeta.v1') || '{}');
    if (meta[estName] && meta[estName].ebirdCode) return meta[estName].ebirdCode;
    if (meta[clean] && meta[clean].ebirdCode) return meta[clean].ebirdCode;
  } catch(e) {}
  try { if (EBIRD_CODES_FALLBACK[estName]) return EBIRD_CODES_FALLBACK[estName];
    if (EBIRD_CODES_FALLBACK[clean]) return EBIRD_CODES_FALLBACK[clean]; } catch(e) {}
  try { var pts = window.points || {};
    var p = pts[estName] || pts[clean];
    if (p && p.ebirdCode) return p.ebirdCode; } catch(e) {}
  return null;
}

function combinedProb(springProb, ebirdCount) {
  if (!ebirdCount || ebirdCount <= 0) return springProb;
  var boost = ebirdCount >= 11 ? 50 : ebirdCount >= 6 ? 40 : ebirdCount >= 3 ? 30 : 20;
  return Math.min(99, springProb + boost);
}

// Ennustus eElurikkus cache (persists for 2 hours)
window.__ennustusEluCache=window.__ennustusEluCache||{};

function getEluCached(speciesName){
  var entry=window.__ennustusEluCache[speciesName];
  if(entry&&(Date.now()-entry.fetchedAt<2*3600000)) return entry.count;
  return null;
}

function getEluCount(speciesName) {
  var clean=_fix(speciesName);
  // Method 0: from ennustus scan cache (try both raw and clean keys)
  var cached=getEluCached(speciesName);
  if(cached===null) cached=getEluCached(clean);
  if(cached!==null) return cached;
  // Method 1: from points occ7
  try {
    var pts=pt();
    var p=pts[speciesName]||pts[clean];
    if(p&&Number.isFinite(p.occ7)&&p.occ7>0) return p.occ7;
  } catch(e) {}
  // Method 2: from live eElurikkus cache
  try {
    var elu=window.__elurikkusBySpecies||{};
    var entry=elu[speciesName]||elu[clean];
    if(!entry){
      var normKey=(typeof window._normalizeSpeciesKey==='function')?window._normalizeSpeciesKey(clean):clean;
      entry=elu[normKey];
    }
    if(entry&&entry.items&&Array.isArray(entry.items)&&entry.items.length>0) return entry.items.length;
  } catch(e) {}
  // Method 3: from liveStats
  try {
    var liveStats=window.liveStatsBySpecies||{};
    var cacheKey=(typeof window._normalizeSpeciesKey==='function')?window._normalizeSpeciesKey(clean):clean;
    if(liveStats[cacheKey]&&Number.isFinite(liveStats[cacheKey].itemsWithin7d)) return liveStats[cacheKey].itemsWithin7d;
  } catch(e) {}
  return -1; // -1 = not fetched yet, 0 = fetched but none
}

function sd(){
  try{ var s=JSON.parse(localStorage.getItem('bm_rari_spring_dates')||'null');
    if(s&&typeof s==='object'&&Object.keys(s).length>0) return Object.assign({},SPRING,s);
  }catch(e){}
  return Object.assign({},SPRING);
}
function sp(){
  try{if(window.SPECIES&&window.SPECIES.length) return window.SPECIES;}catch(e){}
  try{if(window.__bm_SPECIES&&window.__bm_SPECIES.length) return window.__bm_SPECIES;}catch(e){}
  try{var s=JSON.parse(localStorage.getItem('bm_species_list_global')||'null');if(s&&s.length) return s;}catch(e){}
  try{if(typeof SPECIES!=='undefined'&&SPECIES.length) return SPECIES;}catch(e){}
  return [];
}
function pt(){
  try{if(window.points&&typeof window.points==='object'&&Object.keys(window.points).length>0) return window.points;}catch(e){}
  try{if(window.__bm_points&&typeof window.__bm_points==='object') return window.__bm_points;}catch(e){}
  try{var s=JSON.parse(localStorage.getItem('bm_rari_points')||'null');if(s) return s;}catch(e){}
  try{if(typeof points!=='undefined') return points;}catch(e){}
  return {};
}
function av(n){
  var c=_fix(n);
  try{if(typeof window.getDisplayAvatar==='function') return window.getDisplayAvatar(n)||window.getDisplayAvatar(c)||'';}catch(e){}
  try{var a=window.avatars||window.__bm_avatars||JSON.parse(localStorage.getItem('bm_rari_avatars')||'{}');return a[n]||a[c]||'';}catch(e){}
  return '';
}
function dn(n){var c=_fix(n);try{if(typeof window.normalizeUiText==='function') return window.normalizeUiText(c)||window.normalizeUiText(n)||c;}catch(e){}return c;}

function prob(ds){
  if(!ds) return 0;
  var d=null,now=new Date(),yr=now.getFullYear();
  var m=String(ds).match(/^(\d{1,2})\.(\d{2})$/);
  if(m) d=new Date(yr,parseInt(m[2],10)-1,parseInt(m[1],10));
  if(!d){m=String(ds).match(/^(\d{4})-(\d{2})-(\d{2})/);if(m) d=new Date(yr,parseInt(m[2],10)-1,parseInt(m[3],10));}
  if(!d) return 0;
  var diff=(d.getTime()-now.getTime())/(864e5);
  if(diff<=0){var past=Math.abs(diff);
    if(past<=3) return 95;if(past<=7) return Math.round(90-past);
    if(past<=14) return Math.round(80-past*.8);if(past<=30) return Math.round(65-past*.8);
    return Math.max(5,Math.round(45-past*.5));}
  if(diff<=3) return Math.round(88-diff*3);if(diff<=7) return Math.round(75-diff*4);
  if(diff<=14) return Math.round(55-diff*2);if(diff<=30) return Math.round(30-(diff-14)*.8);
  return Math.max(1,Math.round(18-(diff-30)*.3));
}

function getSpringDate(name,dates){
  if(dates[name]) return dates[name];
  var lo=name.toLowerCase().trim();
  var keys=Object.keys(dates);
  for(var i=0;i<keys.length;i++){if(keys[i].toLowerCase().trim()===lo) return dates[keys[i]];}
  return '';
}

// Inline mojibake decoder — fixes double-encoded UTF-8 in SPECIES names
// Self-contained: does NOT depend on any function outside this IIFE
function _fix(s) {
  if (!s || typeof s !== 'string') return s || '';
  // Quick check: if no high bytes, no mojibake possible
  if (!/[\u00c0-\u00ff]/.test(s)) return s;
  try {
    var bytes = [];
    for (var i = 0; i < s.length; i++) {
      var c = s.charCodeAt(i);
      if (c < 256) bytes.push(c);
      else return s; // has chars outside Latin-1 range, not mojibake
    }
    var decoded = new TextDecoder('utf-8').decode(new Uint8Array(bytes));
    if (decoded !== s && decoded.length > 0 && decoded.indexOf('\ufffd') === -1) {
      return decoded;
    }
  } catch(e) {}
  return s;
}

function missing(){
  var all=sp(),dates=sd(),pts=pt(),out=[];
  var ebCounts=window.__ennEbirdCounts||{};
  var thisYear=new Date().getFullYear();
  for(var i=0;i<all.length;i++){
    var n=all[i];
    var clean=_fix(n);
    var p=pts[n]||pts[clean]||{};

    // Has recent 7-day observations → definitely seen, skip
    if(Number.isFinite(p.occ7)&&p.occ7>0) continue;

    // Has observation date from THIS YEAR → seen this year, skip
    var dateStr=String(p.t||'').trim();
    if(dateStr){
      var yearMatch=dateStr.match(/^(\d{4})/);
      if(yearMatch&&parseInt(yearMatch[1],10)===thisYear) continue;
    }

    // This species hasn't been seen this year — it's "missing"
    var springDate=getSpringDate(n,dates)||getSpringDate(clean,dates)||'';
    springDate=String(springDate).trim();
    var baseProb=prob(springDate);
    var ebCode=getEbirdCode(n);
    var ebCount=ebCode?ebCounts[ebCode]||0:0;
    var finalProb=combinedProb(baseProb,ebCount);
    out.push({name:n,spring:springDate,prob:finalProb,baseProb:baseProb,ebirdCount:ebCount,ebirdCode:ebCode||''});
  }
  return out;
}

var sort='prob';
var _ennScanAbort=false;

function getCurrentProbScore(name){
  var probData=(window.__probDataBySpecies||{})[name];
  if(!probData||!probData.periods) return null;
  for(var i=0;i<probData.periods.length;i++){
    if(probData.periods[i].isCurrent) return probData.periods[i].pct;
  }
  return null;
}

function isOnMap(name,pts){
  var clean=_fix(name);
  var p=pts[name]||pts[clean]||{};
  return Number.isFinite(p.lat)&&Number.isFinite(p.lon)&&p.visible!==false;
}

function render(){
  var allSpecies=sp(),dates=sd(),pts=pt();
  var q=(document.getElementById('ennQ')||{}).value||'';
  q=q.toLowerCase().trim();
  var displayList=[];
  var cachedCount=0;
  for(var i=0;i<allSpecies.length;i++){
    var n=allSpecies[i];
    if(!isOnMap(n,pts)) continue;
    if(q&&n.toLowerCase().indexOf(q)===-1&&_fix(n).toLowerCase().indexOf(q)===-1) continue;
    var clean=_fix(n);
    var p=pts[n]||pts[clean]||{};
    var _srcLo=String(p.src||'').toLowerCase();
    var occ7Ebird=Number(p.occ7Ebird||0)||(!p.occ7Ebird&&_srcLo.indexOf('ebird')!==-1?Number(p.occ7||0):0);
    var occ7Elu=Number(p.occ7Elu||0)||(!p.occ7Elu&&_srcLo.indexOf('elurikkus')!==-1?Number(p.occ7||0):0);
    var currentScore=getCurrentProbScore(n);
    if(currentScore===null) currentScore=getCurrentProbScore(clean);
    if(currentScore!==null) cachedCount++;
    var springDate=getSpringDate(n,dates)||getSpringDate(clean,dates)||'';
    var ebirdBoost=occ7Ebird>0?Math.min(5,Math.round(Math.log1p(occ7Ebird))):0;
    var eluBoost=occ7Elu>0?Math.min(5,Math.round(Math.log1p(occ7Elu))):0;
    var boost=ebirdBoost+eluBoost;
    var finalScore=currentScore!==null?Math.min(95,currentScore+boost):null;
    if(finalScore!==null&&finalScore>=80){console.log('[PROB-FINAL]',n,{currentScore:currentScore,ebirdBoost:ebirdBoost,eluBoost:eluBoost,boost:boost,finalScore:finalScore});}
    var ebirdScanned=p.occ7EbirdUpdated!=null;
    var eluScanned=p.occ7Elu!=null||_srcLo.indexOf('elurikkus')!==-1;
    displayList.push({name:n,spring:springDate,score:finalScore,baseScore:currentScore,occ7Ebird:occ7Ebird,occ7Elu:occ7Elu,ebirdScanned:ebirdScanned,eluScanned:eluScanned});
  }
  if(sort==='prob') displayList.sort(function(a,b){
    var sa=a.score!==null?a.score:-1,sb=b.score!==null?b.score:-1;
    return sb-sa;
  });
  else if(sort==='spring') displayList.sort(function(a,b){return ssk(a.spring)-ssk(b.spring);});
  else displayList.sort(function(a,b){return a.name.localeCompare(b.name,'et');});

  var el=document.getElementById('ennSum');
  if(el) el.innerHTML='<span><b>'+displayList.length+'</b> liiki kaardil · <b>'+cachedCount+'</b> skaneeritud</span>';

  var lst=document.getElementById('ennLst');
  if(!lst) return;
  var h='';
  for(var k=0;k<displayList.length;k++){
    var s=displayList[k],nm=dn(s.name),aurl=av(s.name);
    var hasScore=s.score!==null;
    var sc=hasScore?s.score:0;
    var bc=hasScore?(sc>=50?'#16a34a':sc>=20?'#d97706':'#cbd5e1'):'#e5e7eb';
    var pc=hasScore?(sc>=50?'#16a34a':sc>=20?'#d97706':sc>=5?'#94a3b8':'#cbd5e1'):'#cbd5e1';
    var sty=aurl?'background-image:url(\''+aurl+'\');border-color:'+bc:'border-color:'+bc;
    var _isSpringFmt=s.spring&&/^\d{1,2}\.\d{2}$/.test(String(s.spring).trim());
    var sl=_isSpringFmt?'Kevad: '+s.spring:'Kevadkuupäev puudub';
    var escName=s.name.replace(/'/g,"\\'");
    var ebLabel='';
    var _ebTxt=s.ebirdScanned?'eBird: '+s.occ7Ebird:'eBird: \u2014';
    var _ebClr=s.ebirdScanned?(s.occ7Ebird>0?'#16a34a':'#94a3b8'):'#cbd5e1';
    ebLabel+='<span style="color:'+_ebClr+';font-size:10px;margin-left:6px">'+_ebTxt+'</span>';
    var _elTxt=s.eluScanned?'eElu: '+s.occ7Elu:'eElu: \u2014';
    var _elClr=s.eluScanned?(s.occ7Elu>0?'#3b82f6':'#94a3b8'):'#cbd5e1';
    ebLabel+='<span style="color:'+_elClr+';font-size:10px;margin-left:4px">'+_elTxt+'</span>';
    var pctHtml=hasScore?'<div class="ePct" style="color:'+pc+'">'+sc+'%</div>':
      '<div class="ePct" style="color:#cbd5e1">&mdash;</div><div class="eObs" style="color:#d97706;font-size:10px">Vajab skaneerimist</div>';
    h+='<div class="eR"><div class="eAv" style="'+sty+'"></div><div class="eInf">'+
      '<div class="eNm">'+nm+ebLabel+' <button class="ePrb" onclick="window.__ennProb(\''+escName+'\')">Prob</button></div><div class="eLt">'+sl+'</div>'+
      '<div class="eBar"><div class="eBf" style="width:'+(hasScore?Math.min(100,sc):0)+'%;background:'+bc+'"></div></div>'+
      '</div><div class="eRt">'+pctHtml+'</div></div>';
  }
  if(!h){
    if(q) h='<div style="padding:16px;text-align:center;color:#94a3b8">Liiki "'+q+'" ei leitud</div>';
    else h='<div style="padding:16px;text-align:center;color:#94a3b8">Kõik liigid on kaardil!</div>';
  }
  lst.innerHTML=h;

  var ft=document.getElementById('ennFt');
  if(ft){
    var footerLabel='Näitab '+displayList.length+' liiki';
    ft.innerHTML='<span>'+footerLabel+'</span>'+
      '<div style="display:flex;gap:6px;align-items:center"><span style="color:#64748b">Sorteeri:</span>'+
      '<button class="eSP '+(sort==='prob'?'eSA':'eSO')+'" onclick="window.__sortEnn(\'prob\')">% laskuv</button>'+
      '<button class="eSP '+(sort==='spring'?'eSA':'eSO')+'" onclick="window.__sortEnn(\'spring\')">Kevad kp</button>'+
      '<button class="eSP '+(sort==='az'?'eSA':'eSO')+'" onclick="window.__sortEnn(\'az\')">A-Z</button></div>';
  }
}

function ssk(ds){if(!ds) return 999999;
  var m=String(ds).match(/^(\d{1,2})\.(\d{2})$/);
  if(m) return parseInt(m[2],10)*100+parseInt(m[1],10);
  m=String(ds).match(/^(\d{4})-(\d{2})-(\d{2})/);
  if(m) return parseInt(m[2],10)*100+parseInt(m[3],10);
  return 999999;}

window.__openEnn=function(){
  // Backfill occ7Elu from existing data on open
  var _pts=pt(),_all=sp();
  for(var _oi=0;_oi<_all.length;_oi++){
    var _on=_all[_oi],_oc=_fix(_on);
    var _op=_pts[_on]||_pts[_oc];
    if(!_op) continue;
    var _os=String(_op.src||'').toLowerCase();
    if(_os.indexOf('elurikkus')!==-1&&_op.occ7!=null&&_op.occ7Elu==null){
      _op.occ7Elu=Number(_op.occ7||0);
      _op.occ7EluUpdated=_op.lastFetched||new Date().toISOString();
    }
  }
  var bg=document.getElementById('ennBg');
  if(bg) bg.style.display='flex';
  render();
};
window.__closeEnn=function(){document.getElementById('ennBg').style.display='none';_ennScanAbort=true;};
window.__renderEnn=render;
window.__sortEnn=function(s){sort=s;render();};

window.__scanEnnAll=async function(btn,opts){
  if(window.__scanEnnAllRunning) return;
  window.__scanEnnAllRunning=true;
  _ennScanAbort=false;
  opts=opts||{};
  var skipEluRefresh=opts.skipEluRefresh!==false; // default: skip
  var scanStartMs=Date.now();

  try{
    // Phase 1: Elurikkus cloud refresh (only if explicitly requested via Värskenda)
    if(!skipEluRefresh){
      if(btn){btn.disabled=true;btn.style.opacity='.6';btn.textContent='Värskendan eElurikkus...';}
      try{
        var ELU_EDGE='https://eenwcyuyugyrjgpivxrq.supabase.co/functions/v1/elurikkus-bulk-refresh';
        var ELU_SECRET='elu-refresh-2026';
        var ELU_BATCH=75;
        var totalSpecies=sp().length||450;
        var eluUpdated=0,eluErrors=0;

        // Build batch offsets
        var batchOffsets=[];
        for(var eluOff=0;eluOff<totalSpecies;eluOff+=ELU_BATCH) batchOffsets.push(eluOff);

        // Run 3 batches in parallel at a time
        var PARALLEL_BATCHES=3;
        for(var bi=0;bi<batchOffsets.length;bi+=PARALLEL_BATCHES){
          if(_ennScanAbort){console.log('[ELU-REFRESH] ABORTED at group',bi);break;}
          var slice=batchOffsets.slice(bi,bi+PARALLEL_BATCHES);
          console.log('[ELU-REFRESH] parallel group offsets:',slice);
          if(btn) btn.textContent='eElu '+slice[0]+'/'+totalSpecies;

          var groupResults=await Promise.all(slice.map(function(offset){
            return fetch(ELU_EDGE,{
              method:'POST',
              headers:{'Content-Type':'application/json','x-refresh-secret':ELU_SECRET},
              body:JSON.stringify({offset:offset,limit:ELU_BATCH})
            }).then(function(r){return r.ok?r.json():Promise.resolve({failed:true,offset:offset});})
              .catch(function(err){console.warn('[ELU-REFRESH] batch error offset='+offset,err);return{failed:true,offset:offset};});
          }));

          for(var gi=0;gi<groupResults.length;gi++){
            var gr=groupResults[gi];
            if(gr&&!gr.failed){
              eluUpdated+=(gr.updated||0);
              eluErrors+=(gr.errors||0);
              console.log('[ELU-REFRESH] batch offset='+slice[gi],gr);
            }
          }
        }
        console.log('[ELU-REFRESH] done. updated:',eluUpdated,'errors:',eluErrors);
      }catch(eluTopErr){
        console.warn('[ELU-REFRESH] top-level error',eluTopErr);
      }

      // Reload elurikkus cache into points
      try{
        if(btn) btn.textContent='Laadin eElu...';
        if(typeof _loadElurikkusCacheFromSupabase==='function'){
          await _loadElurikkusCacheFromSupabase();
        }
      }catch(reloadErr){
        console.warn('[SCAN] cache reload error',reloadErr);
      }
    }else{
      console.log('[SCAN] skipping Elurikkus refresh (using cached data)');
    }

    if(btn){btn.disabled=true;btn.style.opacity='.6';}

    // Phase 2: Build species list
    var allSpecies=sp(),pts=pt();
    for(var bi2=0;bi2<allSpecies.length;bi2++){
      var _bn=allSpecies[bi2],_bc=_fix(_bn);
      var _bp=pts[_bn]||pts[_bc];
      if(!_bp) continue;
      var _bsrc=String(_bp.src||'').toLowerCase();
      if(_bsrc.indexOf('elurikkus')!==-1&&_bp.occ7!=null&&_bp.occ7Elu==null){
        _bp.occ7Elu=Number(_bp.occ7||0);
        _bp.occ7EluUpdated=_bp.lastFetched||new Date().toISOString();
      }
    }
    var need=[];
    for(var i=0;i<allSpecies.length;i++){
      var n=allSpecies[i];
      if(!isOnMap(n,pts)) continue;
      need.push(n);
    }
    console.log('[SCAN] per-species loop over',need.length,'species');
    if(need.length===0){
      if(btn){btn.disabled=false;btn.style.opacity='1';btn.textContent='Pole liike';setTimeout(function(){btn.textContent='Skaneeri';},2000);}
      return;
    }

    // Phase 3: Serial per-species scan with 150ms delay
    var scanDone=0,scanErrors=0;
    render();

    for(var si=0;si<need.length;si++){
      if(_ennScanAbort){console.log('[SCAN] aborted at',si);break;}
      var name=need[si];
      if(btn) btn.textContent='Skaneerin '+(si+1)+'/'+need.length;

      try{
        await window.computeProbForSpecies(name,{force:true});
        scanDone++;
      }catch(err){
        scanErrors++;
        console.warn('[SCAN] prob failed:',name,err&&err.message);
      }

      try{
        if(typeof window.__fetchEbirdEEForSpecies==='function'){
          var ebResult=await window.__fetchEbirdEEForSpecies(name);
          if(ebResult){
            window.points=window.points||{};
            window.points[name]=window.points[name]||{};
            var ep=window.points[name];
            ep.occ7Ebird=ebResult.occ7;
            ep.occ7EbirdUpdated=new Date().toISOString();
            if(Number.isFinite(ebResult.lat)&&Number.isFinite(ebResult.lon)){
              ep.lat=ebResult.lat;ep.lon=ebResult.lon;
            }
            if(ebResult.t) ep.t=ebResult.t;
            ep.src='eBird';ep.lastFetched=ebResult.lastFetched;
          }
        }
      }catch(ebErr){console.warn('[SCAN-EBIRD] error',name,ebErr);}

      await new Promise(function(r){setTimeout(r,150);});
      if(si%10===0&&typeof render==='function'){try{render();}catch(e){}}
    }

    if(typeof render==='function') render();
    var elapsed=Math.round((Date.now()-scanStartMs)/1000);
    console.log('[SCAN] done —',scanDone,'/',need.length,'species scanned, errors:',scanErrors,'in',elapsed+'s');

    if(btn){
      btn.disabled=false;btn.style.opacity='1';
      btn.textContent=scanErrors>0?'Valmis ('+scanErrors+' viga, '+elapsed+'s)':'Valmis ✓ ('+elapsed+'s)';
      setTimeout(function(){btn.textContent='Skaneeri';},5000);
    }
  }finally{
    window.__scanEnnAllRunning=false;
  }
};

window.__ennProb=function(speciesName){
  window.__closeEnn();
  setTimeout(function(){
    var filterBox=document.getElementById('filterBox');
    if(filterBox){
      filterBox.value=speciesName;
      filterBox.dispatchEvent(new Event('input',{bubbles:true}));
      try{if(typeof window.render==='function') window.render();}catch(e){}
    }
    setTimeout(function(){
      try{
        var row=document.querySelector('.row[data-key="'+speciesName.replace(/"/g,'\\"')+'"]');
        if(!row) try{row=document.querySelector('.row[data-key="'+CSS.escape(speciesName)+'"]');}catch(e){}
        if(row){
          row.scrollIntoView({behavior:'smooth',block:'center'});
          row.style.outline='2px solid #93c5fd';row.style.outlineOffset='2px';
          setTimeout(function(){row.style.outline='';row.style.outlineOffset='';},3000);
          var allBtns=row.querySelectorAll('button,[onclick]');
          var probFound=false;
          for(var i=0;i<allBtns.length;i++){
            var txt=(allBtns[i].textContent||'').trim();
            if(txt==='Prob'||txt==='⊙ Prob'||txt.indexOf('Prob')!==-1){allBtns[i].click();probFound=true;break;}
          }
          if(!probFound){
            var clickables=row.querySelectorAll('[onclick*="prob"],[onclick*="Prob"],[onclick*="topPeriod"],[onclick*="TopPeriod"]');
            if(clickables.length>0){clickables[0].click();probFound=true;}
          }
          if(!probFound){
            var links=row.querySelectorAll('span,a,div');
            for(var j=0;j<links.length;j++){
              var t=(links[j].textContent||'').trim();
              if(t.indexOf('vajuta Prob')!==-1||t.indexOf('Top periood')!==-1){links[j].click();break;}
            }
          }
        }
      }catch(e){console.warn('[Ennustus] Prob navigation failed:',e);}
    },400);
  },300);
};
window.__openEnnustus=window.__openEnn;

var bg=document.getElementById('ennBg');
if(bg) bg.addEventListener('click',function(e){if(e.target===this) window.__closeEnn();});
})();
</script>
