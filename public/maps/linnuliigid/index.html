// Icons
function rarityToBadge(level){
  var style = window.getRarityStyle ? window.getRarityStyle(level || 'none') : null;
  return style && style.badgeText ? style.badgeText : '';
}
function rarityToBorder(level, fallback){
  var style = window.getRarityStyle ? window.getRarityStyle(level || 'none') : null;
  return (style && style.ringColor) || fallback || '#222';
}
function _markerIcon(avatarUrl, borderColor, count7d, rarityLevel){
  const color = rarityToBorder(rarityLevel, borderColor || '#222');
  const style = window.getRarityStyle ? window.getRarityStyle(rarityLevel || 'none') : null;
  const count = Number.isFinite(count7d)
    ? '<div class="marker-count" title="Vaatlused viimase 7 päeva jooksul">' + count7d + '</div>'
    : '';
  const rarityBadge = rarityToBadge(rarityLevel)
    ? '<div class="marker-rarity-badge" style="background:' + (style ? style.badgeBg : '#111') + ';color:' + (style ? style.badgeFg : '#fff') + '">' + rarityToBadge(rarityLevel) + '</div>'
    : '';
  const bg = avatarUrl ? "background-image:url('" + avatarUrl + "')" : "background-color:#29c";
  const html = '<div class="marker-wrap"><div class="marker-circle" style="border-color:' + color + ';' + bg + '"></div>' + rarityBadge + count + '</div>';
  return L.divIcon({html, className:'', iconSize:[44,72], iconAnchor:[22,36], popupAnchor:[0,-36]});
}
function defaultIcon(borderColor, count7d, rarityLevel) { return _markerIcon('', borderColor, count7d, rarityLevel); }
function avatarIcon(url, borderColor, count7d, rarityLevel) { return _markerIcon(url, borderColor, count7d, rarityLevel); }


// Avatar & manual location
function setLocation(key) {
  const prev = points[key] ? (points[key].lat||'')+','+(points[key].lon||'') : '';
  const txt = prompt('Paste coordinates as "lat,lon":', prev);
  if (!txt) return;
  const m = txt.split(',').map(v=>parseFloat(v.trim()));
  if (m.length===2 && Number.isFinite(m[0]) && Number.isFinite(m[1])) {
    points[key] = points[key] || {};
    points[key].lat=m[0]; points[key].lon=m[1];
    points[key].t = points[key].t || '(kuupäev puudub)';
    points[key].src='manual';
    if(typeof points[key].visible!=='boolean') points[key].visible=true;
    save(); updateMarker(key); render();
  } else notifySilent('Invalid format. Use: 59.123,24.456');
}

function toggleVisibility(key){
  points[key] = points[key] || {};
  points[key].visible = (points[key].visible === false) ? true : false;
  save(); updateMarker(key); render();
}

function setRarity(key, val){
  points[key] = points[key] || {};
  const v = (val || '').trim();
  if (v) points[key].rarity = v;
  else delete points[key].rarity;
  save(); updateMarker(key); render();
}

function setMigration(key, on){
  points[key] = points[key] || {};
  points[key].migration = !!on;
  save(); updateMarker(key); render();
}

// === Spring migration dates ===
function _normSpringDDMM(s){
  s = (s||'').trim();
  if(!s) return null;
  let m = s.match(/^(\d{1,2})\.(\d{1,2})$/);
  if(m){
    const d = parseInt(m[1],10), mo = parseInt(m[2],10);
    if(mo>=1 && mo<=12 && d>=1 && d<=31) return d+'.'+String(mo).padStart(2,'0');
  }
  m = s.match(/^(\d{4})-(\d{2})-(\d{2})$/);
  if(m){
    const d = parseInt(m[3],10), mo = parseInt(m[2],10);
    if(mo>=1 && mo<=12 && d>=1 && d<=31) return d+'.'+String(mo).padStart(2,'0');
  }
  return null;
}
function _ddmmToDate(ddmm){
  const mm = (ddmm||'').match(/^(\d{1,2})\.(\d{2})$/);
  if(!mm) return null;
  return new Date(2025, parseInt(mm[2],10)-1, parseInt(mm[1],10), 12, 0, 0, 0);
}
function _dateToDdmm(dt){
  return dt.getDate()+'.'+String(dt.getMonth()+1).padStart(2,'0');
}
function editSpringDate(key){
  const prev = (springDates && springDates[key]) ? springDates[key] : '';
  const v = prompt('Kevadine saabumise kuupäev (D.MM või YYYY-MM-DD)\n\n'+key, prev || '');
  if(v === null) return;
  if(String(v).trim() === ''){
    delete springDates[key];
    save(); render();
    return;
  }
  const n = _normSpringDDMM(v);
  if(!n){
    notifySilent('Vigane kuupäeva formaat. Kasuta D.MM (nt 5.04) või YYYY-MM-DD.');
    return;
  }
  springDates[key] = n;
  save(); render();
}

function updateMarker(key) {
  const p = points[key];
  if (markers.has(key)) { map.removeLayer(markers.get(key)); markers.delete(key); }
  if (!p) return;

  // Determine visibility based on 7-day toggle
  const hasCoords = Number.isFinite(p.lat) && Number.isFinite(p.lon);
  const passesRecent = isRecent(p.t);
  const passesFilter = is7daysOnly() ? passesRecent : true;
  const isVisible = (p.visible !== false) && passesFilter && hasCoords;

  if (isVisible) {
    __renderedMarkerCount++;
    const bcol = _borderColorByDate(p.t);
    const metaCfg = window.getSpeciesMetaShared ? window.getSpeciesMetaShared(key) : { rarityLevel: 'none' };
    const c7 = Number.isFinite(p.occ7) ? p.occ7 : null;
    const icon = avatarIcon(getDisplayAvatar(key), bcol, c7, metaCfg.rarityLevel || 'none');
    const when = p.t ? '<br><small>' + ((window.ET_STRINGS && window.ET_STRINGS.observationDate) || 'vaatluse kuup\u00e4ev') + ': ' + (window.formatDateEE ? window.formatDateEE(p.t) : p.t) + '</small>' : '';
    const src = p.src ? '<br><small>allikas: '+p.src+'</small>' : '';
    const m = L.marker([p.lat,p.lon], {icon}).addTo(map)
      .bindPopup('<b>'+key+'</b>'+when+(Number.isFinite(p.occ7)?'<br><small>' + ((window.ET_STRINGS && window.ET_STRINGS.days7) || '7 p\u00e4eva vaatlused') + ': '+p.occ7+'</small>':'')+src);
    markers.set(key, m);
  }
}


// UI
function rowHTML(obj) {
  const key = obj.est;
  const p = points[key] || {};
  const bcol = _borderColorByDate(p.t);
  const hasPoint = Number.isFinite(p.lat) && Number.isFinite(p.lon);
  const muted = (p.visible===false) ? 'muted' : '';
  const occ7 = Number.isFinite(p.occ7) ? p.occ7 : null;
  const metaCfg = window.getSpeciesMetaShared ? window.getSpeciesMetaShared(key) : { rarityLevel: 'none' };
  const rarityText = window.getRarityBadgeText ? window.getRarityBadgeText(metaCfg.rarityLevel) : '';
  const springVal = (springDates && springDates[key]) ? String(springDates[key]).trim() : '';
  const springTxt = (springEditRowKey === key)
    ? '<span class="kevadi-chip"><span class="spring-edit-wrap" style="display:inline-flex; gap:6px; align-items:center;"><span class="pill">Kevad:</span><input class="spring-edit-input" data-key="'+key+'" value="'+springVal+'" placeholder="DD.MM" inputmode="numeric" style="width:70px; padding:4px 6px; border:1px solid #ddd; border-radius:10px; font-size:13px;" /><button class="spring-edit-save" data-key="'+key+'" style="border:0; border-radius:10px; padding:4px 8px; background:#16a34a; color:#fff;">OK</button><button class="spring-edit-cancel" data-key="'+key+'" style="border:0; border-radius:10px; padding:4px 8px; background:#eee; color:#111;">X</button></span></span>'
    : '<span class="kevadi-chip"><span class="spring-date-btn" data-key="'+key+'" style="cursor:pointer; pointer-events:auto; border:0; border-radius:999px; padding:6px 10px; background:#f3f4f6; color:#111;">Kevad: '+(springVal || '-')+'</span></span>';

  const noCoords = !hasPoint && occ7 > 0;
  const metaRow1 = hasPoint
    ? '<span class="pill">lat:</span> '+p.lat.toFixed(4)+' <span class="pill">lon:</span> '+p.lon.toFixed(4)+(p.t?' <span class="pill">date:</span> ' + (window.formatDateEE ? window.formatDateEE(p.t) : p.t):'')+(occ7!==null?' <span class="pill">7d:</span> '+occ7:'')
    : noCoords
      ? '<span class="pill" style="background:#fef3c7;color:#92400e">Koordinaadid peidetud</span>'+(occ7!==null?' <span class="pill">7d:</span> '+occ7:'')
      : ((window.ET_STRINGS && window.ET_STRINGS.noLocationYet) || 'Asukoht puudub')+(occ7!==null?' <span class="pill">7d:</span> '+occ7:'');
  const meta = '<div class="meta-grid"><div class="meta-row1">'+metaRow1+'</div><div class="meta-row2">'+springTxt+'</div></div>';

  return '<div class="row" data-key="'+key+'">' +
    '<div class="avatar" style="background-image:url(\''+getDisplayAvatar(key)+'\');border:3px solid '+bcol+'"></div>' +
    '<div class="row-main">' +
      '<div class="top">' +
        '<div class="name-row"><div class="name-label clickable '+muted+'" onclick="toggleVisibility(\''+key+'\')">'+key+'</div>' + (rarityText ? '<span class="rarity-badge" title="Haruldus">'+rarityText+'</span>' : '') + '</div>' +
      '</div>' +
      '<div class="small">'+meta+'</div>' +
    '</div>' +
    '<div class="controls">' +
      '<a class="btn" target="_blank" href="'+obj.url+'">Open</a>' +
    '</div>' +
  '</div>';
}

function render() {
  const q = (document.getElementById('filterBox').value||'').toLowerCase().trim();
  const list = document.getElementById('list'); list.innerHTML='';
  const arr = DATA.filter(x=> x.est.toLowerCase().includes(q));
  for (const o of arr) list.insertAdjacentHTML('beforeend', rowHTML(o));
}

(function bindSpringInlineEditDelegation(){
  if (window.__springInlineEditBound) return;
  window.__springInlineEditBound = true;

  function stop(e){ e.preventDefault(); e.stopPropagation(); }

  document.addEventListener('click', (e) => {
    const t = e.target;

    // Start edit
    const startBtn = t.closest?.('.spring-date-btn');
    if (startBtn){
      stop(e);
      springEditRowKey = startBtn.getAttribute('data-key');
      if (typeof renderSpringPanel === 'function') renderSpringPanel();
      if (typeof render === 'function') render(); // if your main UI uses render()
      setTimeout(() => {
        const inp = document.querySelector(`.spring-edit-input[data-key="${springEditRowKey}"]`);
        if(inp){ try{ inp.focus(); inp.select(); }catch(_){} }
      }, 50);
      return;
    }

    // Cancel
    const cancelBtn = t.closest?.('.spring-edit-cancel');
    if (cancelBtn){
      stop(e);
      springEditRowKey = null;
      if (typeof renderSpringPanel === 'function') renderSpringPanel();
      if (typeof render === 'function') render();
      return;
    }

    // Save
    const saveBtn = t.closest?.('.spring-edit-save');
    if (saveBtn){
      stop(e);
      const key = saveBtn.getAttribute('data-key');
      const inp = document.querySelector(`.spring-edit-input[data-key="${key}"]`);
      if(!inp) return;

      const norm = normalizeSpringDate(inp.value);
      if (norm === null){
        inp.style.borderColor = '#b91c1c';
        return;
      }

      if(!norm){
        delete springDates[key];
      } else {
        springDates[key] = norm;
      }

      if (typeof save === 'function') save();
      springEditRowKey = null;

      if (typeof renderSpringPanel === 'function') renderSpringPanel();
      if (typeof render === 'function') render();
      return;
    }
  }, true); // capture=true helps on mobile overlays/leaflet
})();

_wireSnapshotButtons();
function _startSnapshotBoot(){
  if(__bootLoadStarted) return;
  const cfg = resolveSupabaseConfig();
  if(cfg.supabaseUrl){
    __supabaseConfigReady = true;
    __bootLoadStarted = true;
    fetchServerMeta();
    _startServerMetaPolling();
    loadSnapshot();
    return;
  }
  __supabaseConfigReady = false;
  _requestSupabaseConfigFromParent();
  setTimeout(function(){
    if(__bootLoadStarted) return;
    const lateCfg = resolveSupabaseConfig();
    if(lateCfg.supabaseUrl){
      __supabaseConfigReady = true;
      __bootLoadStarted = true;
      fetchServerMeta();
      _startServerMetaPolling();
      loadSnapshot();
    }
  }, 1500);
}

(function(){
  const sidebar = document.getElementById('sidebar');
  const closeBtn = document.getElementById('closeSidebarBtn');
  const backdrop = document.getElementById('sidebarBackdrop');
  if(!sidebar || !backdrop) return;

  function invalidateSoon(){
    try{ setTimeout(()=>{ if(map && map.invalidateSize) map.invalidateSize(true); }, 260); }catch(e){}
  }
  function openSidebar(){
    sidebar.classList.add('open');
    backdrop.classList.add('show');
    document.body.classList.add('sidebar-open');
    invalidateSoon();
  }
  function closeSidebar(){
    sidebar.classList.remove('open');
    backdrop.classList.remove('show');
    document.body.classList.remove('sidebar-open');
    invalidateSoon();
  }

  initMapHamburgerControl({
    map,
    onClick: function(){
      if (sidebar.classList.contains('open')) closeSidebar();
      else openSidebar();
    },
    title: (window.ET_STRINGS && window.ET_STRINGS.listMenu) || 'Nimekiri',
    ariaLabel: (window.ET_STRINGS && window.ET_STRINGS.listMenu) || 'Nimekiri',
    iconText: '☰'

  if (closeBtn) closeBtn.addEventListener('click', closeSidebar);

  try{
    if (window.matchMedia && window.matchMedia('(max-width: 900px)').matches) closeSidebar();
  }catch(e){}

  window.addEventListener('resize', invalidateSoon);
  window.addEventListener('orientationchange', invalidateSoon);
})();

<script>
(function(){
  (function placeWindButton(){
    const bar = document.getElementById('windToggleBar');
    const spring = document.getElementById('springPanel');
    const exportRow = document.getElementById('exportBtn')?.parentElement;
    try{
      if (exportRow && exportRow.parentElement){
        exportRow.parentElement.insertBefore(bar, exportRow.nextSibling);
        if(spring){ exportRow.parentElement.insertBefore(spring, bar.nextSibling); }
      } else {
        const sb = (document.getElementById('sidebar')||document.body);
        sb.prepend(bar);
        if(spring){ sb.insertBefore(spring, bar.nextSibling); }
      }
    }catch(e){}
  })();

  const panel = document.getElementById('windPanel');
  const iframe = document.getElementById('windyFrame');
  const btn = document.getElementById('toggleWind');
  const btnClose = document.getElementById('windClose');
  const bS = document.getElementById('windSmall');
  const bM = document.getElementById('windMedium');
  const bL = document.getElementById('windLarge');
  const isMob = window.matchMedia && window.matchMedia('(max-width: 900px)').matches;

  let __lastWindSync = 0;
  function windyUrl(lat, lon, zoom){
    const z = Math.max(3, Math.min(12, Math.round(zoom||6)));
    return 'https://embed.windy.com/embed2.html?lat='+lat.toFixed(3)+'&lon='+lon.toFixed(3)+'&detailLat='+lat.toFixed(3)+'&detailLon='+lon.toFixed(3)+'&zoom='+z+'&level=surface&overlay=wind&marker=true&pressure=true';
  }
  function refreshWind(){
    if(isMob){
      const now = Date.now();
      if(now - __lastWindSync < 1000) return;
      __lastWindSync = now;
    }
    try{
      const c = window.map && map.getCenter ? map.getCenter() : {lat:58.7, lng:25.3};
      const z = window.map && map.getZoom ? map.getZoom() : 6;
      const url = windyUrl(c.lat, c.lng, z);
      if (iframe.getAttribute('src') !== url) iframe.setAttribute('src', url);
    }catch(e){}
  }
  function openWind(){
    refreshWind();
    if(isMob){
      panel.classList.add('windy-modal-open');
      document.body.style.overflow = 'hidden';
    } else {
      panel.style.display = 'block';
    }
    try{
      if (!window.__wind_sync__ && window.map){
        map.on('moveend zoomend', refreshWind);
        window.__wind_sync__ = true;
      }
    }catch(e){}
  }
  function closeWind(){
    if(isMob){
      panel.classList.remove('windy-modal-open');
      document.body.style.overflow = '';
      iframe.setAttribute('src', 'about:blank');
    } else {
      panel.style.display = 'none';
    }
    try{ setTimeout(()=>{ if(map && map.invalidateSize) map.invalidateSize(true); }, 260); }catch(e){}
  }
  btn.addEventListener('click', ()=>{
    const isOpen = isMob ? panel.classList.contains('windy-modal-open') : (panel.style.display !== 'none' && panel.style.display);
    if (!isOpen) openWind(); else closeWind();
  });
  btnClose.addEventListener('click', closeWind);
  const btnCloseMob = document.getElementById('windCloseMobile');
  if(btnCloseMob) btnCloseMob.addEventListener('click', closeWind);
  if(!isMob){
    bS.addEventListener('click', ()=>{ panel.style.width='320px'; panel.style.height='240px'; refreshWind(); });
    bM.addEventListener('click', ()=>{ panel.style.width='420px'; panel.style.height='300px'; refreshWind(); });
    bL.addEventListener('click', ()=>{ panel.style.width='560px'; panel.style.height='420px'; refreshWind(); });
  }
})();
</script>

<script>
(function(){
  function springSortKey(v){
    try{
      if(!v) return 999999;
      const x = (typeof _normSpringDDMM === 'function') ? (_normSpringDDMM(String(v).trim()) || String(v).trim()) : String(v).trim();
      let m = x.match(/^(\d{1,2})\.(\d{1,2})$/);
      if(m) return (+m[2])*100 + (+m[1]);
      m = x.match(/^(\d{4})-(\d{2})-(\d{2})$/);
      if(m) return (+m[2])*100 + (+m[3]);
      return 999999;
    }catch(e){ return 999999; }
  }
  function getSpringDates(){ try{ return (typeof springDates !== 'undefined') ? springDates : {}; }catch(e){ return {}; } }
  function getSpeciesList(){ try{ return (typeof SPECIES !== 'undefined') ? SPECIES : Object.keys(getSpringDates()); }catch(e){ return []; } }

  function renderSpringPanel(){
    const body = document.getElementById('springTableBody');
    const countEl = document.getElementById('springCount');
    const q = (document.getElementById('springSearch')?.value || '').toLowerCase().trim();
    if(!body || !countEl) return;
    const sd = getSpringDates();
    const list = getSpeciesList();
    const rows = [];
    for(const name of list){
      const raw = (sd[name] !== undefined) ? String(sd[name]).trim() : '';
      if(!raw) continue;
      if(q && !String(name).toLowerCase().includes(q)) continue;
      const disp = (typeof _normSpringDDMM === 'function') ? (_normSpringDDMM(raw) || raw) : raw;
      rows.push({name, disp, key: springSortKey(disp)});
    }
    rows.sort((a,b)=> (a.key-b.key) || String(a.name).localeCompare(String(b.name)));
    body.innerHTML = rows.map(r => {
      const safeName = String(r.name).replace(/"/g,'&quot;');
      const yIso = springYearFirst[r.name];
      const yDisp = yIso ? isoToDdMm(yIso) : '—';
      const key = safeName;
      const springDateText = r.disp;
      const isEditing = (springEditRowKey === key);
      const currentVal = (springDates && springDates[key]) ? springDates[key] : '';
      const dateCellHtml = isEditing
        ? `
    <div class="spring-edit-wrap" style="display:flex; gap:6px; align-items:center;">
      <input class="spring-edit-input" data-key="${key}" value="${currentVal}" placeholder="DD.MM"
        inputmode="numeric"
        style="width:72px; padding:6px 8px; border:1px solid #ddd; border-radius:10px; font-size:14px;" />
      <button class="spring-edit-save" data-key="${key}"
        style="padding:6px 10px; border:0; border-radius:10px; background:#16a34a; color:#fff;">OK</button>
      <button class="spring-edit-cancel" data-key="${key}"
        style="padding:6px 10px; border:0; border-radius:10px; background:#eee; color:#111;">X</button>
    </div>
  `
        : `
    <button class="spring-date-btn" data-key="${key}"
      style="border:0; border-radius:999px; padding:6px 10px; background:#f3f4f6; color:#111;">
      ${springDateText}
    </button>
  `;
      return '<tr><td>'+dateCellHtml+'</td><td><span class="springSpeciesBtn" onclick="window.__springScrollToSpecies && window.__springScrollToSpecies(\''+safeName.replace(/'/g, "\\'")+'\')">'+ safeName+'</span></td><td>'+yDisp+'</td></tr>';
    }).join('');
    const keysShown = rows.map(r=>r.name);
    enqueueSpringYearFirst(keysShown);
    countEl.textContent = rows.length;
  }
  window.renderSpringPanel = renderSpringPanel;

  window.__springScrollToSpecies = function(name){
    try{
      const row = document.querySelector('.row[data-key="'+CSS.escape(name)+'"]');
      if(row){
        row.scrollIntoView({behavior:'smooth', block:'nearest'});
        row.style.outline = '2px solid #93c5fd';
        row.style.outlineOffset = '2px';
        setTimeout(()=>{ row.style.outline=''; row.style.outlineOffset=''; }, 1200);
      }
    }catch(e){}
  };

  function toggleSpring(open){
    const panel = document.getElementById('springPanel');
    if(!panel) return;
    const wantOpen = (open===true) ? true : (open===false ? false : (panel.style.display==='none' || !panel.style.display));
    if(wantOpen){ panel.style.display = 'block'; renderSpringPanel(); } else { panel.style.display = 'none'; }
  }

  function wire(){
    const btn = document.getElementById('toggleSpring');
    const close = document.getElementById('springClose');
    const search = document.getElementById('springSearch');
    if(btn && !btn.__springBound){ btn.addEventListener('click', ()=> toggleSpring()); btn.__springBound = true; }
    if(close && !close.__springBound){ close.addEventListener('click', ()=> toggleSpring(false)); close.__springBound = true; }
    if(search && !search.__springBound){ search.addEventListener('input', renderSpringPanel); search.__springBound = true; }
  }

  try{
    if (typeof window.render === 'function' && !window.__springpanel_render_patch__){
      const _r = window.render;
      window.render = function(){ const out = _r.apply(this, arguments); try{ wire(); renderSpringPanel(); }catch(e){} return out; };
      window.__springpanel_render_patch__ = true;
    }
  }catch(e){}
  if (document.readyState === 'loading') document.addEventListener('DOMContentLoaded', ()=>{ wire(); renderSpringPanel(); });
  else { wire(); renderSpringPanel(); }
})();
</script>

<!-- === 7d active species badge === -->
<script>
(function(){
  function computeActiveSpecies7d(){
    try{
      const pts = (typeof points !== 'undefined') ? points : {};
      const list = (typeof SPECIES !== 'undefined') ? SPECIES : [];
      const now = Date.now(), sevenMs = 7*24*60*60*1000;
      let n = 0;
      for (const name of list){
        const p = pts[name] || {};
        let active = false;
        const occ7 = (p.occ7 === 0 || p.occ7) ? Number(p.occ7) : NaN;
        if (Number.isFinite(occ7)) active = occ7 > 0;
        if (!active && p.t){
          try{ const ms = (typeof _toDay === 'function') ? _toDay(p.t) : null; if (ms && (now - ms) <= sevenMs) active = true; }catch(e){}
        }
        if (active) n++;
      }
      return n;
    }catch(e){ return 0; }
  }
  function updateActive7dBadge(){
    try{
      const el = document.getElementById('active7dBadge');
      if (el) el.textContent = '7p liigid: ' + computeActiveSpecies7d();
    }catch(e){}
  }
  try{
    if (typeof window.render === 'function' && !window.__active7d_render_patch__){
      const _r = window.render;
      window.render = function(){ const out = _r.apply(this, arguments); try{ updateActive7dBadge(); }catch(e){} return out; };
      window.__active7d_render_patch__ = true;
    }
  }catch(e){}
  try{
    if (typeof window.updateMarker === 'function' && !window.__active7d_upd_patch__){
      const _u = window.updateMarker;
      window.updateMarker = function(){ const out = _u.apply(this, arguments); try{ updateActive7dBadge(); }catch(e){} return out; };
      window.__active7d_upd_patch__ = true;
    }
  }catch(e){}
  if (document.readyState === 'loading') document.addEventListener('DOMContentLoaded', updateActive7dBadge);
  else updateActive7dBadge();
  setInterval(updateActive7dBadge, 60000);
})();
</script>

<!-- === postMessage API for parent app (Avatar Manager) === -->
<script>
var __sharedDefaults = {};
(function(){
  window.addEventListener('message', function(ev){
    try{
      if(!ev.data || typeof ev.data !== 'object') return;
      var type = ev.data.type;
      if(type === 'AVATARS_DEFAULTS' && ev.data.avatars){
        __sharedDefaults = ev.data.avatars || {};
        var localAvatars = JSON.parse(localStorage.getItem(LS_AVATARS) || '{}');
        var merged = Object.assign({}, __sharedDefaults, localAvatars);
        for(var k in merged){ if(merged.hasOwnProperty(k) && merged[k]) avatars[k] = merged[k]; }
        save();
        preloadAvatars(Object.values(avatars));
        SPECIES.forEach(function(name){ try{ updateMarker(name); }catch(e){} });
        render();
      }
      if(type === 'AVATARS_UPDATE' && ev.data.avatars){
        var incoming = ev.data.avatars;
        for(var k in incoming){ if(incoming.hasOwnProperty(k)){ if(incoming[k]) avatars[k] = incoming[k]; else delete avatars[k]; } }
        save();
        preloadAvatars(Object.values(avatars));
        SPECIES.forEach(function(name){ try{ updateMarker(name); }catch(e){} });
        render();
      }
      if(type === 'AVATARS_REQUEST'){
        var src = ev.source;
        if(src && typeof src.postMessage === 'function') src.postMessage({ type: 'AVATARS_CURRENT', avatars: avatars }, '*');
      }
      if(type === 'SPECIES_META_DEFAULTS' && ev.data.speciesMeta && typeof ev.data.speciesMeta === 'object'){
        var currentMeta = JSON.parse(localStorage.getItem('estbirding.speciesMeta.v1') || '{}');
        var incomingMeta = ev.data.speciesMeta || {};
        var mergedMeta = Object.assign({}, currentMeta, incomingMeta);
        localStorage.setItem('estbirding.speciesMeta.v1', JSON.stringify(mergedMeta));
        render();
      }
      if(type === 'SPECIES_META_REQUEST'){
        var src2 = ev.source;
        if(src2 && typeof src2.postMessage === 'function') src2.postMessage({ type: 'SPECIES_META_CURRENT', speciesMeta: JSON.parse(localStorage.getItem('estbirding.speciesMeta.v1') || '{}') }, '*');
      }
    }catch(e){ console.warn('postMessage handler error', e); }
  });
  try{
    if(window.parent && window.parent !== window){
      window.parent.postMessage({ type: 'AVATARS_REQUEST' }, '*');
      window.parent.postMessage({ type: 'SPECIES_META_REQUEST' }, '*');
    }
  }catch(e){}
})();
</script>
