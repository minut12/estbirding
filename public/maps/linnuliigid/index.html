<!doctype html>
<html>
<head>
  <meta charset="utf-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover"/>
  <title>Linnuliigid 2026</title>
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
  <style>
    :root{--sat:env(safe-area-inset-top,0px);--sab:env(safe-area-inset-bottom,0px);--appHeader:0px;--appBottomNav:0px}
    *{box-sizing:border-box}
    html,body{height:100%;margin:0;padding:0;overflow:hidden;font-family:system-ui,Arial,sans-serif}
    #root{height:100%;display:flex;flex-direction:column}
    #app{display:flex;flex:1;min-height:0}
    #sidebar{width:360px;border-right:1px solid #ddd;background:#fff;min-height:0;flex-shrink:0}
    #mapWrap{flex:1;min-height:0;position:relative}
    #map{position:absolute;inset:0}
    .row {display:grid;grid-template-columns:56px 1fr auto;gap:12px;align-items:flex-start;padding:8px 0;border-bottom:1px dashed #eee}
    .avatar {width:40px;height:40px;border-radius:50%;border:1px solid #999;background-size:cover;background-position:center;background-color:#eef}
    .row-main{min-width:0}
    .top {display:flex;justify-content:flex-start;align-items:center;gap:8px;flex-wrap:wrap}
    .small {color:#666;font-size:12px;margin-top:2px}
    .btn {padding:4px 8px;border:none;border-radius:6px;background:#0a7;color:white;cursor:pointer}
    .btn.secondary {background:#666}
    input[type="text"] {width:100%;padding:6px;box-sizing:border-box;margin:6px 0}
    .pill {display:inline-block;padding:2px 6px;border-radius:10px;background:#eef;font-size:11px}
    details summary {cursor:pointer}
    .latin {color:#888;font-size:12px;margin-left:6px}
    .clickable {cursor:pointer}
    .muted {opacity:.55; text-decoration: line-through;}

  .last-fetched-inline{ font-size:11px; color:#64748b; margin-left:6px; white-space:nowrap }
  .last-fetched-line{ font-size:11px; color:#64748b; margin-top:2px }

  /* Fetch queue controls */
  .fetch-controls{display:flex;gap:6px;flex-wrap:wrap;align-items:center;margin:6px 0}
  .fetch-controls .btn{font-size:12px;padding:3px 8px}
  .fetch-controls .btn.stop{background:#e74c3c}
  .fetch-progress{font-size:11px;color:#334155;padding:2px 0;min-height:16px}
  .fetch-progress-bar{height:3px;background:#e2e8f0;border-radius:2px;overflow:hidden;margin-top:2px}
  .fetch-progress-bar-inner{height:100%;background:#27ae60;transition:width .2s}
  .fetch-error{font-size:11px;color:#dc2626;margin-top:2px;max-height:40px;overflow:auto}

  /* Snapshot banner */
  .snapshot-banner{font-size:11px;color:#334155;padding:4px 8px;background:#f0fdf4;border:1px solid #bbf7d0;border-radius:6px;margin:6px 0}
  .snapshot-banner.warn{background:#fef3c7;border-color:#fde68a;color:#92400e}
  .snapshot-banner.error{background:#fee2e2;border-color:#fecaca;color:#dc2626}
  .snapshot-banner .btn-inline{font-size:11px;padding:2px 8px;margin-left:6px;border:none;border-radius:4px;background:#0a7;color:#fff;cursor:pointer}

.btn.on{background:#27ae60;color:#fff}

/* --- Marker crown for Rarity --- */
.marker-wrap{position:relative;width:44px;height:72px}
.marker-circle{position:absolute;left:2px;top:16px;width:40px;height:40px;border-radius:50%;border:3px solid #222;
  background-size:cover;background-position:center;background-color:#29c;box-sizing:border-box}
.marker-rarity-badge{position:absolute;right:-2px;top:8px;min-width:20px;height:16px;padding:0 5px;border-radius:999px;background:#111;color:#fff;border:1px solid rgba(255,255,255,.9);font-size:10px;line-height:14px;font-weight:800;text-align:center}
.marker-crown{position:absolute;left:50%;top:0;transform:translateX(-50%);width:26px;height:26px;display:flex;align-items:center;justify-content:center;
  filter:drop-shadow(0 1px 1px rgba(0,0,0,.35))}
.marker-crown svg{width:26px;height:26px;display:block}
.marker-count{position:absolute;left:50%;top:56px;transform:translateX(-50%);min-width:28px;padding:1px 6px;border-radius:10px;background:rgba(255,255,255,.92);border:1px solid #111;font-size:12px;line-height:14px;font-weight:700;text-align:center;box-shadow:0 1px 2px rgba(0,0,0,.2)}
.marker-count.mig-on{background:rgba(40,180,70,.95);color:#fff;border-color:#1c6b25}
.marker-count.mig-off{background:rgba(255,160,0,.95);color:#111;border-color:#8a5a00}

.rarity-select{font-size:12px;padding:3px 6px;border:1px solid #cbd5e1;border-radius:6px;background:#fff;vertical-align:middle}


  /* === Kevadrände (esimesed saabumised) paneel === */
  #springPanel{display:none;margin:8px 0 0;background:#fff;border:1px solid #cbd5e1;border-radius:10px;box-shadow:0 6px 18px rgba(0,0,0,0.10);overflow:hidden}
  #springHeader{display:flex;justify-content:space-between;align-items:center;padding:6px 8px;background:#f8fafc;border-bottom:1px solid #e5e7eb}
  #springHeader .title{font-size:13px;color:#334155}
  #springHeader .actions button{margin-left:6px}
  #springBody{padding:8px}
  .springTopRow{display:flex;align-items:center;gap:8px;margin-bottom:8px}
  #springSearch{flex:1;min-width:120px;padding:6px 8px;border:1px solid #cbd5e1;border-radius:8px;font-size:12px}
  #springCount{font-size:12px;color:#334155;background:#fff;border:1px solid #cbd5e1;border-radius:999px;padding:4px 8px;white-space:nowrap}
  .springTableWrap{max-height:280px;overflow:auto;border:1px solid #eef2f7;border-radius:8px}
  #springTable{width:100%;border-collapse:collapse;font-size:12px}
  #springTable th,#springTable td{padding:8px;border-bottom:1px solid #eef2f7;vertical-align:middle}
  #springTable th{position:sticky;top:0;background:#fff;color:#334155;text-align:left;font-weight:600}
  #springTable tr:hover{background:#f8fafc}
  .springDateBtn{cursor:pointer;display:inline-block;padding:2px 6px;border-radius:999px;border:1px solid #cbd5e1;background:#fff}
  .springSpeciesBtn{cursor:pointer;color:#0f172a;text-decoration:underline;text-underline-offset:2px}
  .springHint{margin-top:8px;font-size:11px;color:#64748b}
  /* --- Fix Kevad overlap in sidebar cards --- */
  .meta-grid{
    display:flex;
    flex-direction:column;
    gap:6px;
  }
  .meta-row1{
    display:flex;
    flex-wrap:wrap;
    gap:6px;
    align-items:center;
    min-width:0;
  }
  .meta-row2{
    display:flex;
    flex-wrap:wrap;
    gap:6px;
    align-items:center;
    min-width:0;
  }
  .meta-row1 > * , .meta-row2 > *{
    max-width:100%;
  }
  .meta-row2 .kevadi-chip,
  .meta-row2 .spring-date-btn,
  .meta-row2 .spring-edit-wrap{
    flex:0 0 auto;
  }

    /* Sidebar header */
    #sidebar{display:flex;flex-direction:column;height:100%;max-height:100vh;overflow:hidden}
    .panel-header{position:sticky;top:0;z-index:50;background:#fff;border-bottom:1px solid #e5e7eb;padding:10px}
    .panel-content-scroll{flex:1;min-height:0;overflow-y:auto;-webkit-overflow-scrolling:touch;overscroll-behavior:contain;padding:10px;box-sizing:border-box}
    .sidebar-header{display:flex;align-items:center;justify-content:space-between;gap:10px;margin-bottom:8px}
    .btn.icon{display:inline-flex;align-items:center;justify-content:center;width:40px;height:40px;padding:0;border:1px solid #d1d5db;background:#f3f4f6;color:#111827;border-radius:10px;box-shadow:0 1px 2px rgba(0,0,0,.08);cursor:pointer}
    .close-sidebar{display:inline-flex}
    .name-row{display:flex;align-items:center;justify-content:space-between;gap:8px}
    .rarity-badge{display:inline-flex;align-items:center;justify-content:center;min-width:26px;height:18px;padding:0 6px;border-radius:999px;background:#e2e8f0;color:#334155;font-size:10px;font-weight:700;border:1px solid #cbd5e1;line-height:1}
    .controls{display:flex;align-items:flex-start;justify-content:flex-end}
    .controls .btn{min-width:68px}

    /* Mobile drawer + backdrop */
    .leaflet-top,.leaflet-bottom{z-index:1000!important}
    .leaflet-control{z-index:1000!important}
    .sidebar-backdrop{display:none;position:fixed;inset:0;z-index:1100;background:rgba(0,0,0,.35)}
    @media (max-width: 900px){
      #app{flex-direction:column}
      #mapWrap{flex:1;min-height:0}
      #sidebar{
        position:fixed;top:0;left:0;height:100dvh;width:min(420px,92vw);
        z-index:4000;transform:translateX(-105%);transition:transform .22s ease;
        box-shadow:0 10px 30px rgba(0,0,0,.18);border-right:1px solid #e5e7eb;
      }
      #sidebar.open{transform:translateX(0)}
      .sidebar-backdrop.show{display:block}
      .sidebar-backdrop{z-index:3500!important}
    }

  /* Debug panel */
  .debug-panel{font-size:11px;color:#64748b;background:#f8fafc;border:1px solid #e2e8f0;border-radius:6px;padding:4px 8px;margin:6px 0}
  .debug-panel summary{cursor:pointer;font-weight:600;color:#475569}
  .debug-pro-grid{display:grid;grid-template-columns:1fr;gap:8px}
  .debug-pro-sec{border:1px solid #e2e8f0;border-radius:6px;padding:6px;background:#fff}
  .debug-pro-title{font-weight:600;color:#334155;margin-bottom:4px}
  .debug-pro-table{width:100%;border-collapse:collapse;font-size:11px}
  .debug-pro-table th,.debug-pro-table td{border-bottom:1px solid #eef2f7;padding:4px;text-align:left;vertical-align:top}
  .debug-pro-code{font-family:ui-monospace,Consolas,monospace;word-break:break-all}

</style>
</head>
<body>
<div id="root">
<div id="app">
  <aside id="sidebar">
    <div class="panel-header">
    <div class="sidebar-header"><h2 style="margin:0">Linnuliigid 2026</h2><button id="closeSidebarBtn" class="btn icon close-sidebar" title="Sulge" aria-label="Sulge"><svg viewBox="0 0 24 24" width="18" height="18" aria-hidden="true" focusable="false"><path d="M6 6l12 12M18 6L6 18" stroke="currentColor" stroke-width="2" stroke-linecap="round"/></svg></button></div>
    </div>
    <div class="panel-content-scroll">
<div class="top-actions" style="display:flex;gap:8px;flex-wrap:wrap;margin:8px 0;align-items:center">
  <label style="display:flex;align-items:center;gap:4px;cursor:pointer;font-size:12px">
    <input type="checkbox" id="toggle7days" checked />

</div>
<div id="snapshotBanner" class="snapshot-banner" style="display:none"></div>
<div class="fetch-controls">
  <button id="btnRefreshData" class="btn" title="Trigger server-side data refresh">Refresh data</button>
  <button id="btnForceServerRefresh" class="btn secondary" title="Force server rebuild from upstream">Force server refresh</button>
  <button id="btnReloadSnapshot" class="btn secondary" title="Reload latest snapshot from server">Reload snapshot</button>
  <button id="btnResumeFetch" class="btn secondary" title="Resume refresh from saved index">Resume</button>
  <button id="btnSkipStuck" class="btn secondary" title="Skip current stuck item by resuming from next index">Skip stuck item</button>
  <button id="btnStopFetch" class="btn stop" style="display:none" title="Stop polling">Stop</button>
</div>
<div id="fetchProgress" class="fetch-progress"></div>

<div id="fetchError" class="fetch-error"></div>
<details class="debug-panel" id="debugPanel">
  <summary>Debug (lite)</summary>
  <div style="display:flex;gap:6px;flex-wrap:wrap;margin:4px 0 6px">
    <button id="btnCopyDebugJson" class="btn secondary" style="font-size:11px;padding:2px 8px">Copy debug (lite)</button>
    <button id="btnClearDebugEvents" class="btn secondary" style="font-size:11px;padding:2px 8px">Reset debug</button>
  </div>
  <div id="debugContent">Loading...</div>
</details>
<details class="debug-panel" id="debugProPanel">
  <summary>Debug (pro)</summary>
  <div style="display:flex;gap:6px;flex-wrap:wrap;margin:4px 0 6px">
    <button id="btnCopyDebugProJson" class="btn secondary" style="font-size:11px;padding:2px 8px">Copy debug (pro)</button>
    <button id="btnExportDebugProJson" class="btn secondary" style="font-size:11px;padding:2px 8px">Export debug JSON</button>
    <button id="btnClearTrace" class="btn secondary" style="font-size:11px;padding:2px 8px">Clear trace</button>
    <button id="btnCopySelectedTrace" class="btn secondary" style="font-size:11px;padding:2px 8px">Copy selected trace JSON</button>
    <button id="btnRerunVerification" class="btn secondary" style="font-size:11px;padding:2px 8px">Re-run verification</button>
  </div>
  <div id="debugProContent" class="debug-pro-grid">Loading...</div>
</details>
    <input id="filterBox" type="text" placeholder="Filter..." />
    <div id="list"></div>
    </div>
  </aside>
  <main id="mapWrap"><div id="map"></div></main>
</div>
</div>

<div id="sidebarBackdrop" class="sidebar-backdrop" aria-hidden="true"></div>

<script src="/maps/shared/map-hamburger-control.js"></script>
<script src="/maps/shared/format-ee.js"></script>

<script>
// --- Silent notifier: replace alerts with console logs ---
function notifySilent(msg){
  try { console.warn(msg); } catch(e){}
}
window._realAlert = window.alert;
window.alert = function(msg){ notifySilent(msg); };

// --- Per-species clear: remove coords/date/occ/src and marker immediately ---
function clearOccurrence(key){
  try{
    window.points = window.points || {};
    const p = (points[key] = points[key] || {});
    delete p.lat; delete p.lon; delete p.t; delete p.occ; delete p.src;
    try{
      if (window.markers && typeof markers.has === 'function' && markers.has(key)){
        const m = markers.get(key);
        try { m.remove ? m.remove() : map.removeLayer(m); } catch(e){}
        try { markers.delete(key); } catch(e){}
      }
    }catch(e){ console.warn('marker remove failed', e); }
    try{
      if (window.circleLayers && typeof circleLayers.has === 'function' && circleLayers.has(key)){
        circleLayers.get(key).forEach(c => { try { c.remove ? c.remove() : map.removeLayer(c); } catch(e){} });
        circleLayers.delete(key);
      }
    }catch(e){ /* ignore */ }
    if (typeof save === 'function') save();
    if (typeof updateMarker === 'function') updateMarker(key);
    if (typeof render === 'function') render();
  }catch(e){ console.warn('clearOccurrence error', e); }
}
</script>

function _fixMojibake(s){
  var v = String(s || "");
  if (!/[\u00C3\u00C2\u00E2]/.test(v)) return v;
  try {
    var bytes = new Uint8Array(v.length);
    for (var i = 0; i < v.length; i++) bytes[i] = v.charCodeAt(i) & 255;
    var decoded = new TextDecoder("utf-8", { fatal: false }).decode(bytes);
    return decoded || v;
  } catch(e){ return v; }
}
function _normText(s){ return _fixMojibake(s).replace(/\uFFFD/g, "").trim(); }

    const results = await Promise.all(activeKeys.map(k => probeAvatarFile(k).then(url => ({k,url}))));

// === Helpers ===
function _toDay(s){
  if(!s) return null;
  const m = (''+s).match(/(\d{4})-(\d{2})-(\d{2})/);
  if(!m) return null;
  return new Date(+m[1], +m[2]-1, +m[3]).getTime();
}
const SPRING_CUTOFF_MMDD = '02-15'; // change if needed
function earliestInYearIsoAfterCutoff(datesIso, year, mmddCutoff){
  if(!Array.isArray(datesIso)) return null;
  const y = String(year);
  const cutoff = `${y}-${mmddCutoff}`;
  let best = null;
  for (const d of datesIso){
    if (typeof d !== 'string') continue;
    if (!d.startsWith(y + '-')) continue;
    if (d < cutoff) continue;         // IMPORTANT: ignore winter records
    if (!best || d < best) best = d;
  }
  return best;
}
function shouldUpdateToEarlier(existingIso, candidateIso){
  if(!candidateIso) return false;
  if(!existingIso) return true;
  return candidateIso < existingIso;
}
function isoToDdMm(iso){
  if(!iso || iso.length < 10) return '';
  return `${iso.slice(8,10)}.${iso.slice(5,7)}`;
}
function isInvalidWinterValue(iso){
  if(!iso || iso.length < 10) return false;
  const year = new Date().getFullYear();
  const cutoff = `${year}-${SPRING_CUTOFF_MMDD}`;
  return iso.startsWith(year + '-') && iso < cutoff;
}
function normalizeSpringDate(v){
  const t = (v || '').trim();
  if(!t) return '';
  const m = t.match(/^(\d{1,2})\.(\d{1,2})$/);
  if(!m) return null;
  const d = String(parseInt(m[1],10));          // keep 5.03 style like your list
  const mm = String(parseInt(m[2],10)).padStart(2,'0');
  return `${d}.${mm}`;
}

async function tryFetch(url){
  const urls = [url];
  const pb = String(proxyBase || '').trim();
  if(pb) urls.push(pb + encodeURIComponent(url));
  else urls.push('https://api.allorigins.win/raw?url=' + encodeURIComponent(url));
  let lastErr = null;
  for(const u of urls){
    try{
      const r = await fetch(u, { cache:'no-store' });
      if(!r.ok) throw new Error('HTTP ' + r.status);
      return await r.text();
    }catch(e){ lastErr = e; }
  }
  throw lastErr || new Error('Fetch failed');
}
function extractAllEventDates(html){
  const out = [];
  if(!html) return out;
  let m;
  const reJson = /"eventDate"\s*:\s*"?(\d{4}-\d{2}-\d{2})/ig;
  while ((m = reJson.exec(html)) !== null) out.push(m[1]);
  const reLbl = /(?:Kuupäev|Date)\s*[:\-–]\s*(\d{4}-\d{2}-\d{2})/ig;
  while ((m = reLbl.exec(html)) !== null) out.push(m[1]);
  if(out.length === 0){
    const reAny = /(\d{4}-\d{2}-\d{2})/g;
    while ((m = reAny.exec(html)) !== null){
      out.push(m[1]);
      if(out.length > 500) break;
    }
  }
  return out;
}
function extractElurikkusRecordDatesIso(html){
  // Returns ISO date list like ["2026-02-28", ...] from the Records table only
  const out = [];
  if(!html) return out;

  const doc = new DOMParser().parseFromString(html, 'text/html');

  // Try to find the records table (Elurikkus uses a table in "Records" tab)
  const tables = Array.from(doc.querySelectorAll('table'));
  if(!tables.length) return out;

  // Pick the table that has a header containing "Date" (first column)
  let t = null;
  for(const tb of tables){
    const thText = (tb.querySelector('thead')?.innerText || tb.innerText || '').toLowerCase();
    if(thText.includes('date')) { t = tb; break; }
  }
  if(!t) t = tables[0];

  const rows = Array.from(t.querySelectorAll('tbody tr'));
  for(const tr of rows){
    const td0 = tr.querySelector('td');
    if(!td0) continue;

    // Examples in UI: "2026-02-28 12:09" or "2025-08-18"
    const txt = (td0.textContent || '').trim();
    const m = txt.match(/(\d{4}-\d{2}-\d{2})/);
    if(m) out.push(m[1]);
  }
  return out;
}

function enqueueSpringYearFirst(keys){
  const uniq = Array.from(new Set((keys||[]).filter(Boolean)));
  for (const k of uniq){
    if (!springYearFirst[k] || isInvalidWinterValue(springYearFirst[k])) springQ.push(k);
  }
  if (!springQRunning) processSpringQ();
}

async function processSpringQ(){
  springQRunning = true;
  while(springQ.length){
    const key = springQ.shift();
    try { await fetchSpringYearFirstOne(key); } catch(e) {}
    await new Promise(r=>setTimeout(r, 400));
  }
  springQRunning = false;
}

async function fetchSpringYearFirstOne(key){
  const url = 'https://elurikkus.ee/app/occurrences/search?text=' + encodeURIComponent(key);
  const html = await tryFetch(url);
  const dates = extractElurikkusRecordDatesIso(html);
  const year = new Date().getFullYear();
  const earliest = earliestInYearIsoAfterCutoff(dates, year, SPRING_CUTOFF_MMDD);
  if (!earliest) return;

  const prev = springYearFirst[key];
  if (earliest && (isInvalidWinterValue(prev) || !prev || earliest < prev)){
    springYearFirst[key] = earliest;
    localStorage.setItem(LS_SPRING_YEARFIRST, JSON.stringify(springYearFirst));
    if (typeof renderSpringPanel === 'function') renderSpringPanel();
  }
}

function _safeData(v){
  try{
    const seen = new WeakSet();
    return JSON.parse(JSON.stringify(v, function(k,val){
      if(typeof val === 'object' && val){
        if(seen.has(val)) return '[Circular]';
        seen.add(val);
      }
      if(typeof val === 'function') return '[Function]';
      return val;
    }));
  }catch(e){
    return { note: 'data_unserializable', error: String(e && e.message ? e.message : e) };
  }
}
function pushDebugEvent(phase, msg, data, level){

      msg: String(msg || ''),
      data: (typeof data === 'undefined') ? undefined : _safeData(data),
    };
    __lastPhase = ev.phase;
    if(VERBOSE_DEBUG){
      __debugEvents.unshift(ev);
      if(__debugEvents.length > __DEBUG_MAX_EVENTS) __debugEvents.length = __DEBUG_MAX_EVENTS;
    }
  }catch(e){}
}

function _traceStart(input){

    tsStart: new Date().toISOString(),
    tsStartMs: Date.now(),
    tsEnd: null,
    tsEndMs: 0,
    durationMs: null,
    method: String((input && input.method) || 'GET').toUpperCase(),
    url: String((input && input.url) || ''),
    status: null,
    ok: null,
    bytesRead: null,
    errorType: '',
    abortReason: '',
    retryAttempt: input && Number.isFinite(input.retryAttempt) ? Number(input.retryAttempt) : null,
    backoffMs: input && Number.isFinite(input.backoffMs) ? Number(input.backoffMs) : null,
    details: {},

  if(__networkTrace.length > __NETWORK_TRACE_MAX) __networkTrace.length = __NETWORK_TRACE_MAX;

}
function _traceEnd(id, patch){

    const row = __networkTrace.find(function(x){ return x.id === id; });
    if(!row) return;
    row.tsEnd = new Date().toISOString();
    row.tsEndMs = Date.now();
    row.durationMs = Math.max(0, row.tsEndMs - row.tsStartMs);

}

function _scheduleLoadSnapshotRetry(reason){
  __pendingReload = true;
  if(__configDebounceTimer) clearTimeout(__configDebounceTimer);
  __configDebounceTimer = setTimeout(function(){
    __configDebounceTimer = null;
    if(__loaderStage === 'rate_limited' && __rateLimitRetryAtMs > Date.now()){
      __lastInfoMessage = 'Rate limited cooldown active; config retry deferred';
      _updateDebugPanel();
      return;
    }
    __lastInfoMessage = 'Config update queued (' + reason + ')';
    pushDebugEvent('SNAPSHOT_RETRY', 'Queued snapshot reload from config update', { reason: reason, runId: __runId });
    if(__snapshotInFlightRef){
      // Keep single-flight deterministic: let current request finish, then run one follow-up reload.
      return;
    }
    __pendingReload = false;
    loadSnapshot(false);
  }, CONFIG_RELOAD_DEBOUNCE_MS);
}

function _fmtTs(iso){

function _scheduleNextSnapshotRefresh(delayMs){

function _clearRateLimitTimers(){
  if(__rateLimitRetryTimer){ clearTimeout(__rateLimitRetryTimer); __rateLimitRetryTimer = null; }
  if(__rateLimitCountdownTimer){ clearInterval(__rateLimitCountdownTimer); __rateLimitCountdownTimer = null; }
  __rateLimitRetryAtMs = 0;
}
function _rateLimitRemainingSec(){
  if(!__rateLimitRetryAtMs) return 0;
  return Math.max(0, Math.ceil((__rateLimitRetryAtMs - Date.now()) / 1000));
}
function _calcRateLimitDelayMs(retryAfterSec){
  if(Number.isFinite(retryAfterSec) && retryAfterSec > 0){
    return Math.min(120000, Math.max(1000, Math.round(retryAfterSec * 1000)));
  }
  const base = RATE_LIMIT_BACKOFF_MS[Math.min(__rateLimitAttempt, RATE_LIMIT_BACKOFF_MS.length - 1)];
  const jitter = Math.round(base * (0.15 * Math.random()));
  return Math.min(120000, base + jitter);
}
function _scheduleRateLimitRetry(retryAfterSec){
  const delayMs = _calcRateLimitDelayMs(retryAfterSec);
  __rateLimitAttempt = Math.min(__rateLimitAttempt + 1, RATE_LIMIT_BACKOFF_MS.length - 1);
  _clearRateLimitTimers();
  __rateLimitRetryAtMs = Date.now() + delayMs;
  __lastErrorMessage = 'Rate limited';
  __lastInfoMessage = 'Rate limited, retrying in ' + _rateLimitRemainingSec() + 's';
  _showSnapshotBanner(__lastInfoMessage, 'warn');
  _updateDebugPanel();
  __rateLimitCountdownTimer = setInterval(function(){
    if(__loaderStage !== 'rate_limited'){
      if(__rateLimitCountdownTimer){ clearInterval(__rateLimitCountdownTimer); __rateLimitCountdownTimer = null; }
      return;
    }
    __lastInfoMessage = 'Rate limited, retrying in ' + _rateLimitRemainingSec() + 's';
    _showSnapshotBanner(__lastInfoMessage, 'warn');
    _updateProgressUI(0, 0, '');
    _updateDebugPanel();
  }, 1000);
  __rateLimitRetryTimer = setTimeout(function(){
    __rateLimitRetryTimer = null;
    if(__rateLimitCountdownTimer){ clearInterval(__rateLimitCountdownTimer); __rateLimitCountdownTimer = null; }
    _setLoaderStage('idle');
    loadSnapshot(true);
  }, delayMs);
}
function _withSupabaseAuthHeaders(headers){
  const anon = resolveSupabaseConfig().anonKey;
  const merged = Object.assign({}, headers || {});
  if(anon){
    merged['apikey'] = anon;
    merged['Authorization'] = 'Bearer ' + anon;
  }
  return merged;
}
function _withSnapshotGetHeaders(){
  return _withSupabaseAuthHeaders({ 'Accept': 'application/json' });

function _withCacheBuster(url){
  const base = String(url || '');
  const sep = base.indexOf('?') >= 0 ? '&' : '?';
  return base + sep + '_ts=' + Date.now();
}
function _shortId(id){
  const s = String(id || '').replace(/^W\//,'').replace(/^"|"$/g,'');
  if(!s) return '-';
  if(s.length <= 14) return s;
  return s.slice(0, 8) + '...' + s.slice(-4);
}
function _isServerDataStale(hours){
  const limitHours = Number(hours || 12) || 12;
  if(!__serverDataMaxAt) return true;
  const ts = Date.parse(__serverDataMaxAt);
  if(!Number.isFinite(ts)) return true;
  return (Date.now() - ts) > (limitHours * 60 * 60 * 1000);
}
function _updateServerSnapshotStatus(){
  const el = document.getElementById('serverRefreshStatus');
  if(!el) return;
  const gen = __serverGeneratedAt ? _fmtTs(__serverGeneratedAt) : '-';
  const chk = __serverCheckedAt ? _fmtTs(__serverCheckedAt) : '-';
  const latest = __serverDataMaxAt ? _fmtTs(__serverDataMaxAt) : '-';
  const latestTs = __serverDataMaxAt ? Date.parse(__serverDataMaxAt) : NaN;
  const latestAgeHours = Number.isFinite(latestTs) ? ((Date.now() - latestTs) / (60 * 60 * 1000)) : null;
  const id = _shortId(__serverSnapshotId);
  const staleNote = __serverMetaAvailable ? (_isServerDataStale(12) ? 'Server snapshot is stale' : 'Server data fresh') : '';
  const freshness = !__serverMetaAvailable
    ? 'Server meta not available'
    : ((!__lastProcessedSnapshotId || __serverIsNewer) ? 'New server data available' : 'No new server data');
  const err = (__serverCheckStatus === 'error' && __serverCheckError) ? ('; check error: ' + __serverCheckError) : '';
  const ageText = (latestAgeHours == null) ? '-' : (latestAgeHours.toFixed(1) + 'h');
  el.textContent = 'Snapshot built at: ' + gen + ' | ID: ' + id + ' | Bytes: ' + String(Number(__serverBytes || 0) || '-') + ' | Latest occurrence in snapshot: ' + latest + ' (age: ' + ageText + ') | Checked: ' + chk + ' | ' + freshness + (staleNote ? (' | ' + staleNote) : '') + err;
}
function _deriveMetaFromRowShape(row){
  if(!row || typeof row !== 'object') return null;
  const snapshotGeneratedAt = String(row.generated_at || row.snapshotGeneratedAt || '').trim();
  const totalItems = Number(row.progress_total || row.totalItems || 0) || 0;
  const payload = (row.points_json && typeof row.points_json === 'object') ? row.points_json : null;
  if(!payload) return null;
  const jsonText = JSON.stringify(row);
  const bytes = jsonText ? (new TextEncoder().encode(jsonText).length) : 0;
  let maxTs = 0;
  for(const k in payload){
    if(!Object.prototype.hasOwnProperty.call(payload, k)) continue;
    const v = payload[k] || {};
    const ts = _toDay(v.t || v.date || v.observed_at || v.eventDate || '');
    if(ts && ts > maxTs) maxTs = ts;
  }
  const dataMaxAt = maxTs > 0 ? new Date(maxTs).toISOString() : '';
  const itemCount = totalItems || Object.keys(payload).length;
  const snapshotId = String(bytes) + ':' + String(snapshotGeneratedAt || '-') + ':' + String(itemCount) + ':' + String(dataMaxAt || '-');
  return { snapshotId, snapshotGeneratedAt, bytes, totalItems: itemCount, dataMaxAt, dataMinAt: '' };
}
async function fetchServerMeta(){
  __serverCheckStatus = 'checking';
  __serverCheckError = '';
  _updateServerSnapshotStatus();
  try{
    const snapshotUrl = _resolveSnapshotApi();
    const metaUrl = _withCacheBuster(snapshotUrl + (snapshotUrl.indexOf('?') >= 0 ? '&' : '?') + 'meta=1');
    const traceId = _traceStart({ method: 'GET', url: metaUrl });
    const res = await fetch(metaUrl, {
      method:'GET',
      cache:'no-store',
      headers: { 'Accept': 'application/json' }
    });
    if(!res.ok) throw new Error('Meta fetch failed (HTTP ' + res.status + ')');
    const text = await res.text();
    const bytesRead = text ? (new TextEncoder().encode(text).length) : 0;
    let meta = {};
    try{ meta = text ? JSON.parse(text) : {}; }catch(e){ meta = {}; }
    _traceEnd(traceId, { status: res.status, ok: !!res.ok, bytesRead: bytesRead, details: { responseKeys: meta && typeof meta === 'object' ? Object.keys(meta) : [] } });
    const normalized = {
      snapshotId: String((meta && meta.snapshotId) || '').trim(),
      snapshotGeneratedAt: String((meta && (meta.snapshotGeneratedAt || meta.generatedAt)) || '').trim(),
      bytes: Number((meta && meta.bytes) || 0) || 0,
      totalItems: Number((meta && meta.totalItems) || 0) || 0,
      dataMaxAt: String((meta && meta.dataMaxAt) || '').trim(),
      dataMinAt: String((meta && meta.dataMinAt) || '').trim(),
    };
    if(!normalized.snapshotId || !normalized.dataMaxAt || !normalized.bytes || !normalized.totalItems){
      const fallback = _deriveMetaFromRowShape(meta);
      if(fallback){
        normalized.snapshotId = fallback.snapshotId;
        normalized.snapshotGeneratedAt = fallback.snapshotGeneratedAt;
        normalized.bytes = fallback.bytes;
        normalized.totalItems = fallback.totalItems;
        normalized.dataMaxAt = fallback.dataMaxAt;
        normalized.dataMinAt = fallback.dataMinAt;
      }
    }
    const missing = [];
    if(!normalized.snapshotId) missing.push('snapshotId');
    if(!normalized.dataMaxAt) missing.push('dataMaxAt');
    if(!(normalized.bytes >= 0)) missing.push('bytes');
    if(!(normalized.totalItems >= 0)) missing.push('totalItems');
    if(missing.length){
      __serverMetaAvailable = false;
      __serverCheckStatus = 'error';
      __serverCheckError = 'Meta endpoint missing fields: ' + missing.join(', ');
      _updateServerSnapshotStatus();
      _updateDebugPanel();
      return null;
    }
    __serverSnapshotId = normalized.snapshotId;
    __serverGeneratedAt = normalized.snapshotGeneratedAt;
    __serverBytes = normalized.bytes;
    __serverDataMaxAt = normalized.dataMaxAt;
    __serverDataMinAt = normalized.dataMinAt;
    __serverCheckedAt = new Date().toISOString();
    __serverMetaAvailable = true;
    __serverIsNewer = !!(__serverMetaAvailable && __lastProcessedSnapshotId && (__serverSnapshotId !== __lastProcessedSnapshotId));
    __serverCheckStatus = 'ok';
    logInfo('Server meta fetched', { snapshotId: __serverSnapshotId, dataMaxAt: __serverDataMaxAt, bytes: __serverBytes });
    _updateServerSnapshotStatus();
    _updateDebugPanel();
    return {
      snapshotId: __serverSnapshotId,
      snapshotGeneratedAt: __serverGeneratedAt,
      bytes: __serverBytes,
      dataMaxAt: __serverDataMaxAt,
      dataMinAt: __serverDataMinAt,
      metaAvailable: __serverMetaAvailable
    };
  }catch(e){
    __serverCheckedAt = new Date().toISOString();
    __serverMetaAvailable = false;
    __serverCheckStatus = 'error';
    __serverCheckError = String((e && e.message) ? e.message : e || 'meta fetch failed');
    logWarn('Server meta fetch failed', { error: __serverCheckError });
    _updateServerSnapshotStatus();
    _updateDebugPanel();
    return null;
  }
}
function _startServerMetaPolling(){
  if(__serverMetaPollTimer) clearInterval(__serverMetaPollTimer);
  __serverMetaPollTimer = setInterval(function(){
    if(__isReloading || __isRefreshRunning) return;
    fetchServerMeta();
  }, 180000);
}
async function loadSnapshotIfNeeded(force){
  const shouldForce = !!force;
  await fetchServerMeta();
  if(shouldForce || __serverIsNewer || !__lastProcessedSnapshotId || !__serverMetaAvailable){
    return loadSnapshot();
  }
  _showSnapshotBanner('No new server data. Snapshot reload skipped.');
  setTimeout(_hideSnapshotBanner, 2500);
  return null;
}
async function requestServerRebuild(){
  const snapshotUrl = _resolveSnapshotApi();
  const rebuildUrl = _withCacheBuster(snapshotUrl + (snapshotUrl.indexOf('?') >= 0 ? '&' : '?') + 'rebuild=1');
  const traceId = _traceStart({ method: 'GET', url: rebuildUrl });
  let res = await fetch(rebuildUrl, {
    method:'GET',
    cache:'no-store',
    headers: { 'Accept': 'application/json' }
  });
  let json = await res.json().catch(function(){ return {}; });
  if(!(res.ok || res.status === 202)){
    res = await fetch(snapshotUrl, {
      method:'POST',
      cache:'no-store',
      headers: { 'Accept': 'application/json', 'Content-Type': 'application/json' },
      body: JSON.stringify({ action: 'rebuild' })
    });
    json = await res.json().catch(function(){ return {}; });
  }
  _traceEnd(traceId, { status: res.status, ok: !!res.ok, bytesRead: null, details: { responseKeys: json && typeof json === 'object' ? Object.keys(json) : [] } });
  const keys = json && typeof json === 'object' ? Object.keys(json) : [];
  const looksLikeRow = keys.indexOf('points_json') >= 0 && keys.indexOf('id') >= 0;
  if(looksLikeRow){
    throw new Error('Rebuild endpoint returned row-shape payload; expected status/snapshotId/dataMaxAt');
  }
  if(!(res.ok || res.status === 202)){
    logError('Rebuild request failed', { status: res.status });
    throw new Error('Rebuild request failed (HTTP ' + res.status + ')');
  }
  logInfo('Rebuild request response', {
    status: json && json.status,
    snapshotId: json && json.snapshotId,
    dataMaxAt: json && json.dataMaxAt,
    upstreamDataMaxAt: json && json.upstreamDataMaxAt
  });
  return json || {};
}
async function waitForSnapshotChange(previousSnapshotId, timeoutMs){
  const started = Date.now();
  const maxMs = Math.max(10000, Number(timeoutMs || 120000) || 120000);
  while((Date.now() - started) < maxMs){
    const meta = await fetchServerMeta();
    const cur = String((meta && meta.snapshotId) || __serverSnapshotId || '');
    if(cur && previousSnapshotId && cur !== previousSnapshotId) return true;
    if(cur && !previousSnapshotId) return true;
    await _delay(10000);
  }
  return false;
}
async function triggerRefreshDataFlow(){
  try{
    const beforeMeta = await fetchServerMeta();
    const previousSnapshotId = String((beforeMeta && beforeMeta.snapshotId) || __serverSnapshotId || '');
    const previousDataMaxAt = String((beforeMeta && beforeMeta.dataMaxAt) || __serverDataMaxAt || '');
    const stale = _isServerDataStale(12);
    _showSnapshotBanner('Requesting server rebuild...');
    const rebuild = await requestServerRebuild();
    const rebuildStatus = String((rebuild && rebuild.status) || '');
    const rebuildUpstreamDataMaxAt = String((rebuild && rebuild.upstreamDataMaxAt) || '');
    const rebuildBuiltDataMaxAt = String((rebuild && rebuild.dataMaxAt) || '');
    if(rebuildStatus === 'building' || rebuildStatus === 'rebuilt'){
      await waitForSnapshotChange(previousSnapshotId, 120000);
    } else if(rebuildStatus === 'cooldown'){
      await fetchServerMeta();
    } else if(stale){
      await waitForSnapshotChange(previousSnapshotId, 120000);
    }
    const afterMeta = await fetchServerMeta();
    await loadSnapshot(true);
    const nextDataMaxAt = String((afterMeta && afterMeta.dataMaxAt) || __serverDataMaxAt || '');
    if(rebuildBuiltDataMaxAt){
      _showSnapshotBanner('Rebuild result: built dataMaxAt=' + _fmtTs(rebuildBuiltDataMaxAt) + (rebuildUpstreamDataMaxAt ? (', upstreamDataMaxAt=' + _fmtTs(rebuildUpstreamDataMaxAt)) : ''), 'warn');
    }
    if(rebuildUpstreamDataMaxAt && previousDataMaxAt && rebuildUpstreamDataMaxAt === previousDataMaxAt){
      _showSnapshotBanner('Upstream unchanged (likely Elurikkus cache/stale): ' + _fmtTs(rebuildUpstreamDataMaxAt), 'warn');
    } else if(nextDataMaxAt && previousDataMaxAt && nextDataMaxAt === previousDataMaxAt){
      _showSnapshotBanner('Rebuilt, but upstream data unchanged (still ' + _fmtTs(nextDataMaxAt) + ')', 'warn');
    }
  }catch(e){
    __lastErrorMessage = String((e && e.message) ? e.message : e || 'refresh data flow failed');
    pushDebugEvent('REFRESH_FLOW_FALLBACK', 'Refresh flow failed, falling back to snapshot GET', { error: __lastErrorMessage }, 'warn');
    _showSnapshotBanner('Rebuild check failed, loading latest snapshot...', 'warn');
    await loadSnapshot(true);
  }
}

function _setResumeIndex(i){
  let next = Math.max(0, Number(i) || 0);
  if(__snapshotProgressTotal > 0){

function _combineSignals(signals){

    return AbortSignal.any(list);

  const ctrl = new AbortController();
  const onAbort = function(ev){

      const src = ev && ev.target;
      const reason = (src && src.reason) ? src.reason : 'aborted';
      ctrl.abort(reason);
    }catch(e){

  };
  for(const s of list){
    if(s.aborted){

async function fetchWithTimeout(url, init, ms, runId){

    const sr = getAbortReason(localStopController && localStopController.signal);

  }

    try{ localRunCancelController.signal.addEventListener('abort', runRelay, { once:true }); }catch(e){}

    pushDebugEvent('FETCH_START', 'Starting request', {

      timeoutMs: ms,
      runId: runId,
      stopSignalAborted: !!(localStopController && localStopController.signal.aborted),
      stopSignalReason: getAbortReason(localStopController && localStopController.signal),
      runSignalAborted: !!(localRunCancelController && localRunCancelController.signal.aborted),
      runSignalReason: getAbortReason(localRunCancelController && localRunCancelController.signal),

      const reason = (abortReason === 'unknown' && __abortReasonHint) ? __abortReasonHint : abortReason;

async function _controlSkipOnServer(targetIndex, reason){

      body: JSON.stringify({
        action: 'force_advance',
        toIndex: Math.max(0, Number(targetIndex) || 0),
        reason: reason || 'watchdog',
        force: true,
      }),
    }, 15000, __runId);
  };

    pushDebugEvent('CONTROL_SKIP_RETRY', 'force_advance got 409, requesting force_takeover', {

    }, 15000, __runId);
    res = await doForceAdvance();

      targetIndex: targetIndex,
      reason: reason,
      httpStatus: res.status,
      durationMs: Math.round(performance.now() - t0),
      response: _safeData(payload),

  } else if(__isReloading || __loaderStage === 'loading_config' || __loaderStage === 'loading_snapshot' || __loaderStage === 'processing'){
    prog.textContent = 'Reloading... stage=' + __loaderStage + ' fetch=' + _fmtTs(__lastFetchAt) + ' processed=' + _fmtTs(__lastProcessedAt);
    if(bar){ bar.style.display='none'; }
    if(stopBtn && __isRefreshRunning) stopBtn.style.display='inline-block';
  } else if(status === 'running' && total > 0){
    __snapshotProgressDone = Number(done || 0);
    __snapshotProgressTotal = Number(total || 0);
    __currentIndex = done;
    _setResumeIndex(done);
    if(done > __lastProgressDone){
      __lastProgressDone = done;
      __lastProgressAt = Date.now();
      __lastProgressAtMs = __lastProgressAt;
      __hangKickCount = 0;
      __lastHangProgressDone = done;
      pushDebugEvent('INDEX_SUCCESS', 'Progress advanced', { done: done, total: total, runId: __runId });
    }
    prog.textContent = 'Client processing: ' + done + '/' + total;
    if(bar){ bar.style.display='block'; barInner.style.width = Math.round(done/total*100)+'%'; }
    if(stopBtn) stopBtn.style.display='inline-block';
  } else {
    if(status === 'ready' && __snapshotProgressTotal <= 0){
      __snapshotProgressTotal = SPECIES.length;
      __snapshotProgressDone = __snapshotProgressTotal;
    }
    prog.textContent = status === 'ready' ? 'Data loaded' : (status === 'error' ? 'Refresh failed' : '');
    if(bar) bar.style.display='none';
    if(stopBtn) stopBtn.style.display='none';
  }
  _updateServerSnapshotStatus();
  _updateDebugPanel();
}

function _computeCutoffIso(){
  return new Date(Date.now() - 7 * 24 * 60 * 60 * 1000).toISOString();
}
function _explainInclusion(key, p){
  const point = p || {};
  const parsedTs = _toDay(point.t || '');
  const cutoffTs = Date.now() - 7 * 24 * 60 * 60 * 1000;
  const hasCoords = Number.isFinite(point.lat) && Number.isFinite(point.lon);
  const hasDate = Number.isFinite(parsedTs) && parsedTs > 0;
  const ageDays = hasDate ? ((Date.now() - parsedTs) / (24 * 60 * 60 * 1000)) : null;
  const withinByDate = hasDate && parsedTs >= cutoffTs;
  const withinByOcc7 = Number.isFinite(point.occ7) && point.occ7 > 0;
  const reasonsExcluded = [];
  if(point.visible === false) reasonsExcluded.push('SOURCE_DISABLED');
  if(!hasCoords) reasonsExcluded.push('MISSING_COORDS');
  if(!hasDate) reasonsExcluded.push('MISSING_DATE');
  if(is7daysOnly()){
    if(!hasDate) reasonsExcluded.push('MISSING_DATE');
    if(!withinByDate) reasonsExcluded.push('OUTSIDE_7D');
  }
  return {
    species: key,
    included: reasonsExcluded.length === 0,
    reasonsExcluded: reasonsExcluded,
    parsedDate: hasDate ? new Date(parsedTs).toISOString() : null,
    ageDays: ageDays,
    hasCoords: hasCoords,
    occ7: Number(point.occ7 || 0) || 0,
    withinByDate: !!withinByDate,
    withinByOcc7: !!withinByOcc7,
  };
}
function _computeSnapshotInspector(){
  const rows = [];
  for(const key of SPECIES){
    const p = points[key] || {};
    rows.push({
      species: key,
      t: String(p.t || ''),
      src: String(p.src || ''),
      hasCoords: Number.isFinite(p.lat) && Number.isFinite(p.lon),
      occ7: Number(p.occ7 || 0) || 0,
      lat: p.lat,
      lon: p.lon,
    });
  }
  const dated = rows.map(function(r){
    const ts = _toDay(r.t || '');
    return Object.assign({}, r, { ts: ts && ts > 0 ? ts : 0 });
  }).filter(function(r){ return r.ts > 0; });
  const latestTs = dated.length ? Math.max.apply(null, dated.map(function(r){ return r.ts; })) : 0;
  const oldestTs = dated.length ? Math.min.apply(null, dated.map(function(r){ return r.ts; })) : 0;
  function bucket(ts){
    const ageDays = (Date.now() - ts) / (24 * 60 * 60 * 1000);
    if(ageDays < 1) return '0-1d';
    if(ageDays < 2) return '1-2d';
    if(ageDays < 3) return '2-3d';
    if(ageDays < 7) return '3-7d';
    if(ageDays < 14) return '7-14d';
    return '14d+';
  }
  const hist = { '0-1d': 0, '1-2d': 0, '2-3d': 0, '3-7d': 0, '7-14d': 0, '14d+': 0 };
  for(const r of dated){ hist[bucket(r.ts)]++; }
  const newestSamples = dated.slice().sort(function(a,b){ return b.ts - a.ts; }).slice(0,10).map(function(r){
    return {
      species: r.species,
      date: new Date(r.ts).toISOString(),
      source: r.src || '',
      coordsPresent: !!r.hasCoords,
      id: r.species + ':' + (r.t || ''),
    };
  });
  const perSpecies = rows.map(function(r){
    const ts = _toDay(r.t || '');
    const newest = ts && ts > 0 ? ts : 0;
    return {
      species: r.species,
      countTotal: (r.hasCoords || r.t) ? 1 : 0,
      newestTs: newest,
      newestDate: newest ? new Date(newest).toISOString() : null,
      countWithin7d: (newest && ((Date.now() - newest) <= 7*24*60*60*1000)) || ((Number(r.occ7||0)||0) > 0) ? 1 : 0,
    };
  });
  const stalestSpecies = perSpecies.filter(function(x){ return !!x.newestTs; }).sort(function(a,b){ return a.newestTs - b.newestTs; }).slice(0,20);
  return {
    snapshotGeneratedAt: __serverGeneratedAt || (__snapshotMeta.generated_at || null),
    snapshotBytes: Number(__lastResponseBytes || __serverBytes || 0),
    totalItemsRaw: rows.length,
    latestOccurrenceAt: latestTs ? new Date(latestTs).toISOString() : null,
    oldestOccurrenceAt: oldestTs ? new Date(oldestTs).toISOString() : null,
    stalenessHours: latestTs ? ((Date.now() - latestTs) / (60*60*1000)) : null,
    histogram: hist,
    newestSamples: newestSamples,
    stalestSpecies: stalestSpecies,
  };
}
function _calcDataRangeFromPointsJson(pointsJson){
  let maxTs = 0;
  let minTs = Number.POSITIVE_INFINITY;
  const src = (pointsJson && typeof pointsJson === 'object') ? pointsJson : {};
  for(const k in src){
    if(!Object.prototype.hasOwnProperty.call(src, k)) continue;
    const v = src[k] || {};
    const ts = _toDay(v.t || v.date || v.observed_at || v.eventDate || '');
    if(ts && ts > 0){
      if(ts > maxTs) maxTs = ts;
      if(ts < minTs) minTs = ts;
    }
  }
  return {
    dataMaxAt: maxTs > 0 ? new Date(maxTs).toISOString() : '',
    dataMinAt: Number.isFinite(minTs) ? new Date(minTs).toISOString() : '',
  };
}
function _computeFilterVerifier(){
  const reasons = {};
  let included = 0;
  let excluded = 0;
  const olderIncluded = [];
  const freshExcluded = [];
  for(const key of SPECIES){
    const p = points[key] || {};
    const exp = _explainInclusion(key, p);
    if(exp.included) included++; else excluded++;
    for(const r of exp.reasonsExcluded){ reasons[r] = (reasons[r] || 0) + 1; }
    if(exp.included && is7daysOnly() && Number.isFinite(exp.ageDays) && exp.ageDays > 7){
      olderIncluded.push(exp);
    }
    if(!exp.included && Number.isFinite(exp.ageDays) && exp.ageDays <= 7){
      freshExcluded.push(exp);
    }
  }
  return {
    included: included,
    excluded: excluded,
    reasons: reasons,
    olderIncluded: olderIncluded.slice(0,20),
    freshExcluded: freshExcluded.slice(0,20),
  };
}

      metaUrl: (SNAPSHOT_API ? (SNAPSHOT_API + '?meta=1') : ''),

function _applySnapshot(snap){
  if(!snap || !snap.points_json) return;
  const pts = snap.points_json;
  const keys = Object.keys(pts || {});
  __snapshotProgressTotal = keys.length;
  __snapshotProgressDone = 0;
  __lastProgressDone = 0;
  __currentIndex = 0;
  for(const key in pts){
    if(!pts.hasOwnProperty(key)) continue;
    const s = pts[key];
    points[key] = points[key] || {};
    const p = points[key];
    if(typeof s.t === 'string' && s.t.trim()) p.t = s.t;
    else delete p.t;
    if(Number.isFinite(s.lat) && Number.isFinite(s.lon)){ p.lat = s.lat; p.lon = s.lon; }
    else { delete p.lat; delete p.lon; }
    if(Number.isFinite(s.occ7)) p.occ7 = s.occ7;
    else delete p.occ7;
    if(typeof s.src === 'string' && s.src.trim()) p.src = s.src;
    else delete p.src;
    if(typeof p.visible !== 'boolean') p.visible = true;
    __snapshotProgressDone++;
    __lastProgressDone = __snapshotProgressDone;
    __currentIndex = __snapshotProgressDone;
  }
  __snapshotMeta.status = snap.status || 'ready';
  __snapshotMeta.generated_at = snap.generated_at;
  _setResumeIndex(__snapshotProgressDone);
  save();
  refreshAllMarkers();
}

function refreshAllMarkers(){
  __renderedMarkerCount = 0;
  Object.keys(points).forEach(updateMarker);
  render();
  _checkEmpty7dBanner();
  if(__loaderStage === 'ready') __lastErrorMessage = '';
  _updateDebugPanel();
}

function _checkEmpty7dBanner(){
  if(!is7daysOnly()) return;
  const occ7Count = SPECIES.filter(n => { const p = points[n]; return p && Number.isFinite(p.occ7) && p.occ7 > 0; }).length;
  const totalWithCoords = SPECIES.filter(n => { const p = points[n]; return p && Number.isFinite(p.lat); }).length;
  if(occ7Count === 0 && totalWithCoords > 0){
    _showSnapshotBanner('No observations in last 7 days in current dataset. Turn off "7 days only" to see all known locations.', 'warn', true);
  }
}

async function _loadSnapshotImpl(){
  const t0 = Date.now();
  const runId = (__runId || 0);
  try{
    __isReloading = true;
    __snapshotLoadAttemptCount++;
    __lastSnapshotLoadAtMs = Date.now();
    _setLoaderStage('loading_snapshot');
    pushDebugEvent('SNAPSHOT_LOAD_START', 'Loading snapshot', { runId: runId, attempt: __snapshotLoadAttemptCount, snapshotApi: SNAPSHOT_API || null });
    _ensureStopController();
    if(!_resolveSupabaseUrlLocal()){
      _setLoaderStage('loading_config');
      __configWaitCount++;
      if(!__configWaitStartedAtMs) __configWaitStartedAtMs = Date.now();
      __lastInfoMessage = 'Waiting for config...';
      pushDebugEvent('CONFIG_WAIT', 'Supabase URL missing before snapshot load', { waitCount: __configWaitCount }, 'warn');
      _requestSupabaseConfigFromParent();
    }
    const snapshotUrl = _resolveSnapshotApi();
    __snapshotLoadRetryCount = 0;
    _showSnapshotBanner('Reloading... stage=' + __loaderStage + ' fetch=' + _fmtTs(__lastFetchAt) + ' processed=' + _fmtTs(__lastProcessedAt));
    __activeStepController = new AbortController();
    const snapResp = await fetchJsonWithTimeout(snapshotUrl, {
      timeoutMs: 15000,
      signal: _combineSignals([__activeStepController.signal, __stopController && __stopController.signal, __runCancelController && __runCancelController.signal]),
      runId: runId,
      index: __currentIndex
    });
    const snap = snapResp && snapResp.data ? snapResp.data : {};
    const localRange = _calcDataRangeFromPointsJson(snap && snap.points_json ? snap.points_json : {});
    if(localRange.dataMaxAt) __serverDataMaxAt = localRange.dataMaxAt;
    if(localRange.dataMinAt) __serverDataMinAt = localRange.dataMinAt;
    if(snapResp && snapResp.meta){
      __serverSnapshotId = String(snapResp.meta.snapshotId || (snap && snap.snapshotId) || '');
      __serverGeneratedAt = String(snapResp.meta.snapshotGeneratedAt || (snap && (snap.snapshotGeneratedAt || snap.generatedAt || snap.generated_at)) || (__serverGeneratedAt || ''));
      __serverBytes = Number(snapResp.meta.bytes || (snap && snap.snapshotBytes) || __lastBodyBytes || 0) || 0;
      __serverDataMaxAt = String(snapResp.meta.dataMaxAt || (snap && snap.dataMaxAt) || (__serverDataMaxAt || ''));
      __serverDataMinAt = String(snapResp.meta.dataMinAt || (snap && snap.dataMinAt) || (__serverDataMinAt || ''));
      __serverCheckedAt = new Date().toISOString();
      __serverMetaAvailable = !!__serverSnapshotId;
      __serverIsNewer = !!(__serverMetaAvailable && __lastProcessedSnapshotId && (__serverSnapshotId !== __lastProcessedSnapshotId));
      __serverCheckStatus = 'ok';
    }
    _setLoaderStage('processing');
    __lastDurationMs = Date.now() - t0;
    __lastErrorMessage = '';
    var ferrOk = document.getElementById('fetchError');
    if(ferrOk) ferrOk.textContent = '';
    pushDebugEvent('SNAPSHOT_LOAD_DONE', 'Snapshot loaded', { status: snap.status, progress_done: snap.progress_done, progress_total: snap.progress_total });
    if(Number.isFinite(Number(snap.progress_total)) && Number(snap.progress_total) > 0){
      __snapshotProgressTotal = Number(snap.progress_total);
    }
    if(Number.isFinite(Number(snap.progress_done)) && Number(snap.progress_done) >= 0){
      __snapshotProgressDone = Number(snap.progress_done);
      __lastProgressDone = __snapshotProgressDone;
      __currentIndex = __snapshotProgressDone;
      _setResumeIndex(__snapshotProgressDone);
    }

    if(snap.status === 'running'){
      _updateProgressUI(snap.progress_done, snap.progress_total, 'running');
      _showSnapshotBanner('Server is refreshing data (' + snap.progress_done + '/' + snap.progress_total + ')...');
      if(snap.points_json && Object.keys(snap.points_json).length > 0){
        pushDebugEvent('SNAPSHOT_APPLY_START', 'Applying running snapshot', { runId: runId, index: __currentIndex });
        _applySnapshot(snap);
        const prevHashRun = __lastSnapshotHash;
        __lastSnapshotHash = String(__serverSnapshotId || '-') + ':' + String(__lastResponseBytes || 0) + ':' + String(snap.generated_at || '') + ':' + String(Object.keys(snap.points_json || {}).length);
        if(prevHashRun && prevHashRun !== __lastSnapshotHash && !__resumeExplicitRequested) _setResumeIndex(0);
        __lastProcessedAt = new Date().toISOString();
        pushDebugEvent('SNAPSHOT_APPLY_DONE', 'Applied running snapshot', { runId: runId, index: __currentIndex });
      }
      _setLoaderStage('ready');
      __snapshotErrorRetryAttempt = 0;
      __rateLimitAttempt = 0;
      _clearRateLimitTimers();
      _startPolling();
      return;
    }

    if(snap.points_json && Object.keys(snap.points_json).length > 0){
      pushDebugEvent('SNAPSHOT_APPLY_START', 'Applying snapshot', { runId: runId, index: __currentIndex });
      _applySnapshot(snap);
      const prevHash = __lastSnapshotHash;
      __lastSnapshotHash = String(__serverSnapshotId || '-') + ':' + String(__lastResponseBytes || 0) + ':' + String(snap.generated_at || '') + ':' + String(Object.keys(snap.points_json || {}).length);
      if(prevHash && prevHash !== __lastSnapshotHash && !__resumeExplicitRequested) _setResumeIndex(0);
      __lastProcessedAt = new Date().toISOString();
      pushDebugEvent('SNAPSHOT_APPLY_DONE', 'Applied snapshot', { runId: runId, index: __currentIndex });
      __lastProgressAtMs = Date.now();
      pushDebugEvent('PROGRESS_TICK', 'Snapshot apply completed', { runId: runId, index: __currentIndex, atMs: __lastProgressAtMs });
      const age = snap.generated_at && window.formatAgeEE ? window.formatAgeEE(snap.generated_at) : null;
      _showSnapshotBanner('Data loaded' + (age ? ' (' + age + ')' : ''));
      setTimeout(_hideSnapshotBanner, 4000);
      _updateProgressUI(__snapshotProgressDone, __snapshotProgressTotal, 'ready');
    } else {
      _showSnapshotBanner('No snapshot data yet. Press "Refresh data" to generate.', 'warn');
    }
    _setLoaderStage('ready');
    __snapshotErrorRetryAttempt = 0;
    __rateLimitAttempt = 0;
    _clearRateLimitTimers();

    if(__isRefreshRunning && snap.status !== 'running'){
      pushDebugEvent('REFRESH_COMPLETE', 'Snapshot reached terminal status', { status: snap.status, runId: runId });
      _stopPolling();
    }

    __lastProcessedSnapshotId = String((snap && snap.snapshotId) || __serverSnapshotId || __lastProcessedSnapshotId || '');
    __lastProcessedGeneratedAt = String((snap && (snap.snapshotGeneratedAt || snap.generatedAt || snap.generated_at)) || __serverGeneratedAt || __lastProcessedGeneratedAt || '');
    __serverIsNewer = false;
    __resumeExplicitRequested = false;
    _updateServerSnapshotStatus();
    if(snap.last_error && __loaderStage === 'error'){
      document.getElementById('fetchError').textContent = 'Last error: ' + snap.last_error;
    }
  }catch(e){
    if(e && e.isRateLimited){
      _setLoaderStage('rate_limited');
      _scheduleRateLimitRetry(e.retryAfterSec);
      return;
    }
    if(e && (e.isAbort || _isAbortLikeError(e))){
      const abortReason = (e && e.abortReason) ? e.abortReason : 'abort';
      __lastInfoMessage = 'Request cancelled (' + abortReason + ')';
      pushDebugEvent('SNAPSHOT_LOAD_CANCELLED', 'Snapshot load cancelled', { runId: runId, reason: abortReason }, 'warn');
      return;
    }
    __lastErrorMessage = String(e?.message || e || 'load failed');
    _setLoaderStage('error');
    __lastDurationMs = Date.now() - t0;
    if((__lastErrorMessage || '').indexOf('Supabase URL') >= 0){
      __lastInfoMessage = 'Waiting for config...';
      __lastErrorMessage = '';
      if(__snapshotLoadRetryCount < 10){
        __snapshotLoadRetryCount++;
        __lastInfoMessage = 'Waiting for config...';
        pushDebugEvent('SNAPSHOT_RETRY', 'Retry snapshot load due to config', {
          reason: 'supabase_config',
          retry: __snapshotLoadRetryCount,
          runId: runId,
        }, 'warn');
        _requestSupabaseConfigFromParent();
        setTimeout(function(){ loadSnapshot(false); }, 500);
      } else {
        _showSnapshotBanner('Missing Supabase config after retries', 'error');
      }
      _updateDebugPanel();
      throw e;
    }
    __lastErrorObj = {
      name: e && e.name ? e.name : 'Error',
      message: __lastErrorMessage || String(e),
      stack: e && e.stack ? e.stack : '',
      cause: e && e.cause ? _safeData(e.cause) : null,
      abortReason: e && e.abortReason ? e.abortReason : null,
    };
    pushDebugEvent('SNAPSHOT_LOAD_FAIL', 'Snapshot load failed', __lastErrorObj, 'error');
    console.error('[snapshot] Load failed:', e);
    if(_isNetworkFetchError(e)){
      const retryMs = _snapshotErrorBackoffMs();
      __lastInfoMessage = 'Network/CORS fetch failed; retrying in ' + Math.round(retryMs / 1000) + 's';
      pushDebugEvent('SNAPSHOT_RETRY', 'Retry after network/CORS fetch error', { retryMs: retryMs, runId: runId }, 'warn');
      _showSnapshotBanner(__lastInfoMessage, 'warn');
      if(__isRefreshRunning){
        await _delay(retryMs);
        refreshAllMarkers();
        return;
      }
    }
    if(e && Number(e.httpStatus) >= 500){
      _showSnapshotBanner('Using cached data (server unavailable)', 'warn');
    } else {
      _showSnapshotBanner('Using cached data (snapshot request failed)', 'warn');
    }
    refreshAllMarkers();
    throw e;
  }finally{
    __activeStepController = null;
    _updateProgressUI(__snapshotProgressDone, __snapshotProgressTotal, '');
    _scheduleNextSnapshotRefresh(SNAPSHOT_AUTO_REFRESH_MS);
  }
}

function loadSnapshotOnce(force){
  if(force && __snapshotInFlightRef) __pendingReload = true;
  if(__snapshotInFlightRef){
    pushDebugEvent('SNAPSHOT_LOAD_JOIN', 'Joining in-flight snapshot load', {
      startedAtMs: __snapshotInFlightStartedAtMs,
      ageMs: __snapshotInFlightStartedAtMs ? (Date.now() - __snapshotInFlightStartedAtMs) : null,
      runId: __runId
    });
    return __snapshotInFlightRef;
  }
  __snapshotInFlightStartedAtMs = Date.now();
  __isReloading = true;
  __snapshotInFlightRef = (async function(){
    try{
      return await _loadSnapshotImpl();
    }catch(e){
      if(!_isAbortLikeError(e)){
        __lastErrorMessage = String(e && e.message ? e.message : e);
        _setLoaderStage('error');
      }
      throw e;
    } finally {
      __snapshotInFlightRef = null;
      __snapshotInFlightStartedAtMs = 0;
      __isReloading = false;
      if(__pendingReload){
        __pendingReload = false;
        __configReloadAbortIssued = false;
        setTimeout(function(){ loadSnapshot(false); }, 0);
      } else {
        __configReloadAbortIssued = false;
      }
      _updateDebugPanel();
    }
  })();
  return __snapshotInFlightRef;
}

function loadSnapshot(force){
  return loadSnapshotOnce(!!force).catch(function(err){
    if(!_isAbortLikeError(err)){
      __lastErrorMessage = String(err && err.message ? err.message : err);
      _setLoaderStage('error');
    }
    _updateDebugPanel();
    return null;
  });
}

function _startPolling(){
  if(__snapshotAutoRefreshTimer){ clearTimeout(__snapshotAutoRefreshTimer); __snapshotAutoRefreshTimer = null; }
  if(__isRefreshRunning){
    pushDebugEvent('POLL_JOIN', 'Polling already active; not starting another loop', { runId: __runId });
    return;
  }
  __isRefreshRunning = true;
  __stopController = new AbortController();
  _startWatchdog();
  __pollCount = 0;
  const token = ++__pollLoopToken;
  (async function pollLoop(){
    while(__isRefreshRunning && token === __pollLoopToken){
    __pollCount++;
    if(__pollCount > 90){
      _stopPolling();
      _showSnapshotBanner('Refresh timed out. Try again later.', 'error');
      break;
    }
    try{
      await loadSnapshotOnce();
      const now = Date.now();
      if(__isRefreshRunning && __lastProgressAt > 0 && (now - __lastProgressAt) > 20000){
        pushDebugEvent('STUCK_DETECTED', 'No progress for 20s', {
          index: __currentIndex,
          attempt: __attemptForCurrentIndex,
          lastProgressAtMs: __lastProgressAt,
          lastPhase: __lastPhase
        }, 'warn');
      }
      // Watchdog logic is centralized in _startWatchdog to avoid duplicate force-advance spam.
    }catch(e){
      if(e && e.isAbort){
        if(e.abortReason === 'stop'){
          _stopPolling();
          _showSnapshotBanner('Stopped by user', 'warn');
          break;
        }
        if(e.abortReason === 'new-run' || e.abortReason === 'stop' || e.abortReason === 'watchdog_timeout' || e.abortReason === 'replace' || e.abortReason === 'active_request_abort'){
          pushDebugEvent('POLL_CANCELLED', 'Poll iteration cancelled', { reason: e.abortReason, runId: __runId }, 'warn');
          if(e.abortReason === 'new-run') break;
          await _delay(600);
          continue;
        }
        __lastInfoMessage = 'Request cancelled (' + (e.abortReason || 'abort') + ')';
      } else {
        __lastErrorMessage = String(e?.message || e || 'poll failed');
      }
      if((__lastErrorMessage || '').indexOf('Supabase URL') >= 0){
        _stopPolling();
        _showSnapshotBanner('Refresh stopped: ' + __lastErrorMessage, 'error');
        var ferr = document.getElementById('fetchError');
        if(ferr) ferr.textContent = __lastErrorMessage;
        break;
      }
    }finally{
      __activeStepController = null;
    }
      if(!__isRefreshRunning || token !== __pollLoopToken) break;
      await _delay(2000);
    }
  })();
}

function _stopPolling(){
  if(__pollTimer){ clearInterval(__pollTimer); __pollTimer = null; }
  __pollLoopToken++;
  __isRefreshRunning = false;
  _clearRateLimitTimers();
  _stopWatchdog();
  _abortActiveRequest();
  try{ __stopController.abort('replace'); }catch(e){}
  // Immediately recreate so future requests aren't poisoned
  __stopController = new AbortController();
  _endRefreshRun();
  _updateProgressUI(0, 0, '');
}

// Public refresh (no key needed)
async function triggerRefresh(opts){
  const options = opts || {};
  __resumeExplicitRequested = !!options.resumeFromSaved;
  const force = !!options.force;
  const runId = (options.newRun || !__runningRef) ? _beginRefreshRun(!!options.newRun) : __runId;
  try{
    __refreshStartedAtMs = Date.now();
    __lastProgressAtMs = __refreshStartedAtMs;
    await fetchServerMeta();
    pushDebugEvent((options.resumeFromSaved ? 'REFRESH_RESUME' : 'REFRESH_START'), 'Refresh requested', {
      runId: runId,
      startIndex: options.startIndex,
      resumeFromSaved: !!options.resumeFromSaved,
      force: force,
      filter7d: is7daysOnly(),
    });
    _ensureStopController();
    if(!_resolveSupabaseUrlLocal()) _requestSupabaseConfigFromParent();
    const validation = _validateSupabaseLocal();
    if(!validation.ok) throw new Error(validation.error || 'Supabase config vigane');
    const supabaseUrl = validation.url;
    const anonKey = _resolveSupabaseAnonKeyLocal();
    const healthUrl = supabaseUrl + '/auth/v1/health';
    try{
      const healthRes = await fetchWithTimeout(healthUrl, {
        method:'GET',
        headers: anonKey ? { apikey: anonKey, authorization: 'Bearer ' + anonKey } : {},
      }, 10000, runId);
      __lastRequestUrl = healthUrl;
      __lastDurationMs = 0;
      if(!(healthRes.ok || healthRes.status === 401 || healthRes.status === 404)){
        throw new Error('Supabase health check failed (HTTP ' + healthRes.status + ')');
      }
    }catch(healthErr){
      const msg = String(healthErr && healthErr.message ? healthErr.message : healthErr);
      if(msg.indexOf('TypeError') >= 0 || msg.indexOf('Failed to fetch') >= 0 || msg.indexOf('NetworkError') >= 0){
        throw new Error('Supabase URL unreachable (DNS). Update Supabase URL override in Settings.');
      }
      throw healthErr;
    }

    _showSnapshotBanner('Requesting server refresh...');
    _updateProgressUI(0, SPECIES.length, 'running');
    const explicitStart = Number(options.startIndex);
    const startIndex = Number.isFinite(explicitStart)
      ? Math.max(0, explicitStart)
      : (options.resumeFromSaved ? _getResumeIndex() : 0);
    const prevIndex = __currentIndex;
    __currentIndex = startIndex;
    __attemptForCurrentIndex = (prevIndex === startIndex) ? (__attemptForCurrentIndex + 1) : 1;
    pushDebugEvent('INDEX_START', 'Starting index', { runId: runId, index: startIndex, attempt: __attemptForCurrentIndex });
    const snapshotUrl = _resolveSnapshotApi();
    __lastRequestUrl = snapshotUrl;

    const res = await fetchWithTimeout(snapshotUrl, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ start_index: startIndex, force }),
    }, 30000, runId);

    if(res.status === 429){
      pushDebugEvent('INDEX_RETRY', 'Refresh throttled (429)', { runId: runId, index: startIndex, force: force }, 'warn');
      const data = await res.json().catch(()=>({}));
      if(!options.silent) _showSnapshotBanner(data.error || 'Refresh recently triggered. Try again later.', 'warn');
      _updateProgressUI(0, 0, '');
      setTimeout(_hideSnapshotBanner, 6000);
      return;
    }
    if(res.status === 409){
      pushDebugEvent('INDEX_RETRY', 'Refresh locked (409)', { runId: runId, index: startIndex, force: force }, 'warn');
      if(force) _showSnapshotBanner('Server says running; forcing takeover (stale-run check)...', 'warn');
      else _showSnapshotBanner('Refresh already in progress...');
    }

    _startPolling();
    loadSnapshot(false);
    pushDebugEvent('INDEX_SUCCESS', 'Refresh accepted', { runId: runId, index: startIndex, httpStatus: res.status });
    _updateDebugPanel();
  }catch(e){
    var reason = (e && e.abortReason) || '';
    if(e && (e.isAbort || _isAbortLikeError(e))){
      if(reason === 'user' || reason === 'new-run' || reason === 'stop'){
        _endRefreshRun();
        _updateProgressUI(0, 0, '');
        pushDebugEvent('REFRESH_STOP', 'Refresh cancelled gracefully', { runId: runId, reason: reason, userStop: reason === 'user' });
        if(reason === 'user') _showSnapshotBanner('Stopped by user', 'warn');
        return;
      }
      __lastInfoMessage = 'Request cancelled (' + (reason || 'abort') + ')';
      pushDebugEvent('REFRESH_STOP', 'Refresh request cancelled', { runId: runId, reason: reason || 'abort' }, 'warn');
      return;
    } else {
      __lastErrorMessage = String(e?.message || e || 'start failed');
    }
    if(reason === 'user'){
      // User pressed Stop – don't retry
      _stopPolling();
      pushDebugEvent('REFRESH_STOP', 'Stopped by user', { runId: runId, reason: reason, userStop: true });
      _showSnapshotBanner('Stopped by user', 'warn');
      _updateProgressUI(0, 0, '');
    } else if(reason === 'timeout'){
      // POST timed out – auto-retry after 2s
      _showSnapshotBanner('Refresh request timed out, retrying...', 'warn');
      pushDebugEvent('INDEX_RETRY', 'Refresh request timeout, retrying', { runId: runId, reason: reason }, 'warn');
      setTimeout(function(){ triggerRefresh(options); }, 2000);
    } else {
      __lastErrorObj = {
        name: e && e.name ? e.name : 'Error',
        message: __lastErrorMessage || String(e),
        stack: e && e.stack ? e.stack : '',
        cause: e && e.cause ? _safeData(e.cause) : null,
        abortReason: reason || null,
      };
      pushDebugEvent('FETCH_FAIL', 'Refresh start failed', __lastErrorObj, 'error');
      _setLoaderStage('error');
      _showSnapshotBanner('Failed to start refresh: ' + (__lastErrorMessage || 'Unknown error'), 'error');
      _stopPolling();
      _updateProgressUI(0, 0, '');
    }
    var ferr = document.getElementById('fetchError');
    if(ferr) ferr.textContent = __lastErrorMessage || 'start failed';
  }
}

// Wire buttons
function _wireSnapshotButtons(){
  const btnRefresh = document.getElementById('btnRefreshData');
  const btnForceRefresh = document.getElementById('btnForceServerRefresh');
  const btnReload = document.getElementById('btnReloadSnapshot');
  const btnResume = document.getElementById('btnResumeFetch');
  const btnSkip = document.getElementById('btnSkipStuck');
  const btnStop = document.getElementById('btnStopFetch');
  const btnCopyDebug = document.getElementById('btnCopyDebugJson');
  const btnCopyDebugPro = document.getElementById('btnCopyDebugProJson');
  const btnExportDebugPro = document.getElementById('btnExportDebugProJson');
  const btnClearTrace = document.getElementById('btnClearTrace');
  const btnCopySelectedTrace = document.getElementById('btnCopySelectedTrace');
  const btnRerunVerification = document.getElementById('btnRerunVerification');
  const btnClearDebug = document.getElementById('btnClearDebugEvents');
  const toggle7d = document.getElementById('toggle7days');

  if(btnRefresh && !btnRefresh.__wired){
    btnRefresh.addEventListener('click', function(){ triggerRefresh({ newRun: true, force: true }); });
    btnRefresh.__wired = true;
  }
  if(btnForceRefresh && !btnForceRefresh.__wired){
    btnForceRefresh.addEventListener('click', function(){ triggerRefreshDataFlow(); });
    btnForceRefresh.__wired = true;
  }
  if(btnReload && !btnReload.__wired){
    btnReload.addEventListener('click', function(){ loadSnapshotIfNeeded(false); });
    btnReload.__wired = true;
  }
  if(btnResume && !btnResume.__wired){
    btnResume.addEventListener('click', function(){ triggerRefresh({ resumeFromSaved: true, force: true, newRun: true }); });
    btnResume.__wired = true;
  }
  if(btnSkip && !btnSkip.__wired){
    btnSkip.addEventListener('click', function(){
      _abortActiveRequest();
      const nextIndex = _getResumeIndex() + 1;
      __lastFailedIndex = nextIndex;
      __lastInfoMessage = 'Skipped by user';
      pushDebugEvent('INDEX_SKIP', 'User skipped current index', { nextIndex: nextIndex, runId: __runId }, 'warn');
      _setResumeIndex(nextIndex);
      _showSnapshotBanner('Skipping stuck item, resuming from ' + nextIndex + '...', 'warn');
      _controlSkipOnServer(nextIndex, 'user_click')
        .then(function(payload){
          if(Number(payload && payload.progress_done || 0) < nextIndex){
            __lastInfoMessage = 'Skip command sent, but server did not advance. Check runner job storage.';
            _showSnapshotBanner(__lastInfoMessage, 'warn');
          }
        })
        .catch(function(err){
          __lastErrorMessage = String(err && err.message ? err.message : err);
        })
        .finally(function(){
          loadSnapshot();
        });
    });
    btnSkip.__wired = true;
  }
  if(btnStop && !btnStop.__wired){
    btnStop.addEventListener('click', function(){
      __abortReasonHint = 'user';
      _abortActiveRequest();
      try{ __stopController.abort('stop'); }catch(e){}
      // Immediately recreate so nothing is poisoned
      __stopController = new AbortController();
      _stopPolling();
      _showSnapshotBanner('Stopped by user', 'warn');
    });
    btnStop.__wired = true;
  }
  if(toggle7d && !toggle7d.__wired){
    toggle7d.addEventListener('change', function(){
      window.__recentOnly = this.checked;
      refreshAllMarkers();
      if(this.checked) _checkEmpty7dBanner();
      else _hideSnapshotBanner();
    });
    toggle7d.__wired = true;
  }
  if(btnCopyDebug && !btnCopyDebug.__wired){
    btnCopyDebug.addEventListener('click', _copyDebugJson);
    btnCopyDebug.__wired = true;
  }
  if(btnCopyDebugPro && !btnCopyDebugPro.__wired){
    btnCopyDebugPro.addEventListener('click', function(){
      const payload = _computeDebugProObject();
      const text = JSON.stringify(payload, null, 2);
      if(navigator.clipboard && navigator.clipboard.writeText){
        navigator.clipboard.writeText(text).then(function(){ logInfo('Copied debug pro JSON'); }).catch(function(err){ logWarn('Copy debug pro failed', { err: String(err) }); });
      }
    });
    btnCopyDebugPro.__wired = true;
  }
  if(btnExportDebugPro && !btnExportDebugPro.__wired){
    btnExportDebugPro.addEventListener('click', function(){
      const payload = _computeDebugProObject();
      const text = JSON.stringify(payload, null, 2);
      const blob = new Blob([text], { type: 'application/json' });
      const href = URL.createObjectURL(blob);
      const a = document.createElement('a');
      a.href = href;
      a.download = 'linnuliigid-debug-' + new Date().toISOString().replace(/[:.]/g,'-') + '.json';
      document.body.appendChild(a);
      a.click();
      document.body.removeChild(a);
      URL.revokeObjectURL(href);
    });
    btnExportDebugPro.__wired = true;
  }
  if(btnClearTrace && !btnClearTrace.__wired){
    btnClearTrace.addEventListener('click', function(){
      __networkTrace.length = 0;
      __selectedTraceId = null;
      _updateDebugProPanel();
    });
    btnClearTrace.__wired = true;
  }
  if(btnCopySelectedTrace && !btnCopySelectedTrace.__wired){
    btnCopySelectedTrace.addEventListener('click', function(){
      const selected = __networkTrace.find(function(x){ return x.id === __selectedTraceId; }) || __networkTrace[0] || null;
      if(!selected) return;
      const text = JSON.stringify(selected, null, 2);
      if(navigator.clipboard && navigator.clipboard.writeText){
        navigator.clipboard.writeText(text);
      }
    });
    btnCopySelectedTrace.__wired = true;
  }
  if(btnRerunVerification && !btnRerunVerification.__wired){
    btnRerunVerification.addEventListener('click', function(){
      __snapshotInspector = _computeSnapshotInspector();
      __filterVerifier = _computeFilterVerifier();
      _updateDebugProPanel();
    });
    btnRerunVerification.__wired = true;
  }
  if(btnClearDebug && !btnClearDebug.__wired){
    btnClearDebug.addEventListener('click', _clearDebugEvents);
    btnClearDebug.__wired = true;
  }
}

// === Auto-refresh via postMessage (parent app sends these) ===
function refreshVisible(){ loadSnapshot(); }
function refreshSelected(){ loadSnapshot(); }

window.addEventListener('message', function(ev){
  try{
    if(!ev.data || typeof ev.data !== 'object') return;
    var t = ev.data.type;
    if(t === 'SET_ADMIN_KEY') return; // no longer used
    if(t === 'SUPABASE_CONFIG'){
      const hadNoApi = !SNAPSHOT_API;
      const hadUrlMissingErr = ((__lastErrorMessage || '').indexOf('Supabase URL puudub') >= 0);
      const prevCfg = resolveSupabaseConfig();
      __resolvedSupabaseUrl = String(ev.data.supabaseUrl || '').trim();
      __resolvedSupabaseAnonKey = String(ev.data.supabaseAnonKey || '').trim();
      const nextCfg = resolveSupabaseConfig();
      const materialChanged = (String(prevCfg.supabaseUrl || '') !== String(nextCfg.supabaseUrl || '')) || (String(prevCfg.anonKey || '') !== String(nextCfg.anonKey || ''));
      __configArrivedAtMs = Date.now();
      __supabaseConfigReady = !!__resolvedSupabaseUrl;
      if(hadUrlMissingErr) __lastErrorMessage = '';
      __lastInfoMessage = 'Config ready';
      pushDebugEvent('CONFIG_READY', 'Received SUPABASE_CONFIG', {
        waitMs: (__configWaitStartedAtMs ? (__configArrivedAtMs - __configWaitStartedAtMs) : null),
        supabaseUrl: __resolvedSupabaseUrl || '',
        anonMasked: _maskKey(__resolvedSupabaseAnonKey),
      });
      __snapshotMeta.status = null;
      try { _resolveSnapshotApi(); } catch(e) {}
      if(!__bootLoadStarted && __supabaseConfigReady){
        __bootLoadStarted = true;
        fetchServerMeta();
        loadSnapshot();
      } else if(materialChanged && (hadNoApi || hadUrlMissingErr || !__snapshotMeta.generated_at)){
        pushDebugEvent('SNAPSHOT_RETRY_REASON', 'Retry reason supabase_config', { hadNoApi: hadNoApi, hadUrlMissingErr: hadUrlMissingErr }, 'warn');
        _scheduleLoadSnapshotRetry('supabase_config');
      }
      _updateDebugPanel();
      return;
    }
    if(t === 'SUPABASE_CONFIG_ERROR'){
      __lastErrorMessage = String(ev.data.error || 'Supabase config invalid');
      __lastErrorObj = { name: 'SupabaseConfigError', message: __lastErrorMessage, stack: '', cause: null, abortReason: null };
      pushDebugEvent('CONFIG_ERROR', 'Received SUPABASE_CONFIG_ERROR', __lastErrorObj, 'error');
      _showSnapshotBanner(__lastErrorMessage, 'error');
      _updateDebugPanel();
      return;
    }
    if(ev.origin !== window.location.origin) return;
    if(t === 'MAP_REFRESH_VISIBLE') refreshVisible();
    if(t === 'MAP_REFRESH_SELECTED') refreshSelected();
    if(t === 'MAP_PING' && ev.source){
      ev.source.postMessage({ type: 'MAP_PONG' }, ev.origin);
    }
  }catch(e){ console.warn('[map] postMessage handler error', e); }
});
