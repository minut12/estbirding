<!doctype html>
<html>
<head>
  <meta charset="utf-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover"/>
  <title>Linnuliigid 2026</title>
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
  <style>
    :root{--sat:env(safe-area-inset-top,0px);--sab:env(safe-area-inset-bottom,0px);--appHeader:0px;--appBottomNav:0px}
    *{box-sizing:border-box}
    html,body{height:100%;margin:0;padding:0;overflow:hidden;font-family:system-ui,Arial,sans-serif}
    #root{height:100%;display:flex;flex-direction:column}
    #app{display:flex;flex:1;min-height:0}
    #sidebar{width:360px;border-right:1px solid #ddd;background:#fff;min-height:0;flex-shrink:0}
    #mapWrap{flex:1;min-height:0;position:relative}
    #map{position:absolute;inset:0}
    .row {display:grid;grid-template-columns:56px 1fr auto;gap:12px;align-items:flex-start;padding:8px 0;border-bottom:1px dashed #eee}
    .avatar {width:40px;height:40px;border-radius:50%;border:1px solid #999;background-size:cover;background-position:center;background-color:#eef}
    .row-main{min-width:0}
    .top {display:flex;justify-content:flex-start;align-items:center;gap:8px;flex-wrap:wrap}
    .small {color:#666;font-size:12px;margin-top:2px}
    .btn {padding:4px 8px;border:none;border-radius:6px;background:#0a7;color:white;cursor:pointer}
    .btn.secondary {background:#666}
    input[type="text"] {width:100%;padding:6px;box-sizing:border-box;margin:6px 0}
    .pill {display:inline-block;padding:2px 6px;border-radius:10px;background:#eef;font-size:11px}
    details summary {cursor:pointer}
    .latin {color:#888;font-size:12px;margin-left:6px}
    .clickable {cursor:pointer}
    .muted {opacity:.55; text-decoration: line-through;}

  .last-fetched-inline{ font-size:11px; color:#64748b; margin-left:6px; white-space:nowrap }
  .last-fetched-line{ font-size:11px; color:#64748b; margin-top:2px }

  /* Fetch queue controls */
  .fetch-controls{display:flex;gap:6px;flex-wrap:wrap;align-items:center;margin:6px 0}
  .fetch-controls .btn{font-size:12px;padding:3px 8px}
  .fetch-controls .btn.stop{background:#e74c3c}
  .fetch-progress{font-size:11px;color:#334155;padding:2px 0;min-height:16px}
  .fetch-progress-bar{height:3px;background:#e2e8f0;border-radius:2px;overflow:hidden;margin-top:2px}
  .fetch-progress-bar-inner{height:100%;background:#27ae60;transition:width .2s}
  .fetch-error{font-size:11px;color:#dc2626;margin-top:2px;max-height:40px;overflow:auto}

  /* Snapshot banner */
  .snapshot-banner{font-size:11px;color:#334155;padding:4px 8px;background:#f0fdf4;border:1px solid #bbf7d0;border-radius:6px;margin:6px 0}
  .snapshot-banner.warn{background:#fef3c7;border-color:#fde68a;color:#92400e}
  .snapshot-banner.error{background:#fee2e2;border-color:#fecaca;color:#dc2626}
  .snapshot-banner .btn-inline{font-size:11px;padding:2px 8px;margin-left:6px;border:none;border-radius:4px;background:#0a7;color:#fff;cursor:pointer}

.btn.on{background:#27ae60;color:#fff}

/* --- Marker crown for Rarity --- */
.marker-wrap{position:relative;width:44px;height:72px}
.marker-circle{position:absolute;left:2px;top:16px;width:40px;height:40px;border-radius:50%;border:3px solid #222;
  background-size:cover;background-position:center;background-color:#29c;box-sizing:border-box}
.marker-rarity-badge{position:absolute;right:-2px;top:8px;min-width:20px;height:16px;padding:0 5px;border-radius:999px;background:#111;color:#fff;border:1px solid rgba(255,255,255,.9);font-size:10px;line-height:14px;font-weight:800;text-align:center}
.marker-crown{position:absolute;left:50%;top:0;transform:translateX(-50%);width:26px;height:26px;display:flex;align-items:center;justify-content:center;
  filter:drop-shadow(0 1px 1px rgba(0,0,0,.35))}
.marker-crown svg{width:26px;height:26px;display:block}
.marker-count{position:absolute;left:50%;top:56px;transform:translateX(-50%);min-width:28px;padding:1px 6px;border-radius:10px;background:rgba(255,255,255,.92);border:1px solid #111;font-size:12px;line-height:14px;font-weight:700;text-align:center;box-shadow:0 1px 2px rgba(0,0,0,.2)}
.marker-count.mig-on{background:rgba(40,180,70,.95);color:#fff;border-color:#1c6b25}
.marker-count.mig-off{background:rgba(255,160,0,.95);color:#111;border-color:#8a5a00}

.rarity-select{font-size:12px;padding:3px 6px;border:1px solid #cbd5e1;border-radius:6px;background:#fff;vertical-align:middle}


  /* === Kevadrände (esimesed saabumised) paneel === */
  #springPanel{display:none;margin:8px 0 0;background:#fff;border:1px solid #cbd5e1;border-radius:10px;box-shadow:0 6px 18px rgba(0,0,0,0.10);overflow:hidden}
  #springHeader{display:flex;justify-content:space-between;align-items:center;padding:6px 8px;background:#f8fafc;border-bottom:1px solid #e5e7eb}
  #springHeader .title{font-size:13px;color:#334155}
  #springHeader .actions button{margin-left:6px}
  #springBody{padding:8px}
  .springTopRow{display:flex;align-items:center;gap:8px;margin-bottom:8px}
  #springSearch{flex:1;min-width:120px;padding:6px 8px;border:1px solid #cbd5e1;border-radius:8px;font-size:12px}
  #springCount{font-size:12px;color:#334155;background:#fff;border:1px solid #cbd5e1;border-radius:999px;padding:4px 8px;white-space:nowrap}
  .springTableWrap{max-height:280px;overflow:auto;border:1px solid #eef2f7;border-radius:8px}
  #springTable{width:100%;border-collapse:collapse;font-size:12px}
  #springTable th,#springTable td{padding:8px;border-bottom:1px solid #eef2f7;vertical-align:middle}
  #springTable th{position:sticky;top:0;background:#fff;color:#334155;text-align:left;font-weight:600}
  #springTable tr:hover{background:#f8fafc}
  .springDateBtn{cursor:pointer;display:inline-block;padding:2px 6px;border-radius:999px;border:1px solid #cbd5e1;background:#fff}
  .springSpeciesBtn{cursor:pointer;color:#0f172a;text-decoration:underline;text-underline-offset:2px}
  .springHint{margin-top:8px;font-size:11px;color:#64748b}

    /* Sidebar header */
    #sidebar{display:flex;flex-direction:column;height:100%;max-height:100vh;overflow:hidden}
    .panel-header{position:sticky;top:0;z-index:50;background:#fff;border-bottom:1px solid #e5e7eb;padding:10px}
    .panel-content-scroll{flex:1;min-height:0;overflow-y:auto;-webkit-overflow-scrolling:touch;overscroll-behavior:contain;padding:10px;box-sizing:border-box}
    .sidebar-header{display:flex;align-items:center;justify-content:space-between;gap:10px;margin-bottom:8px}
    .btn.icon{display:inline-flex;align-items:center;justify-content:center;width:40px;height:40px;padding:0;border:1px solid #d1d5db;background:#f3f4f6;color:#111827;border-radius:10px;box-shadow:0 1px 2px rgba(0,0,0,.08);cursor:pointer}
    .close-sidebar{display:inline-flex}
    .name-row{display:flex;align-items:center;justify-content:space-between;gap:8px}
    .rarity-badge{display:inline-flex;align-items:center;justify-content:center;min-width:26px;height:18px;padding:0 6px;border-radius:999px;background:#e2e8f0;color:#334155;font-size:10px;font-weight:700;border:1px solid #cbd5e1;line-height:1}
    .controls{display:flex;align-items:flex-start;justify-content:flex-end}
    .controls .btn{min-width:68px}

    /* Mobile drawer + backdrop */
    .leaflet-top,.leaflet-bottom{z-index:1000!important}
    .leaflet-control{z-index:1000!important}
    .sidebar-backdrop{display:none;position:fixed;inset:0;z-index:1100;background:rgba(0,0,0,.35)}
    @media (max-width: 900px){
      #app{flex-direction:column}
      #mapWrap{flex:1;min-height:0}
      #sidebar{
        position:fixed;top:0;left:0;height:100dvh;width:min(420px,92vw);
        z-index:4000;transform:translateX(-105%);transition:transform .22s ease;
        box-shadow:0 10px 30px rgba(0,0,0,.18);border-right:1px solid #e5e7eb;
      }
      #sidebar.open{transform:translateX(0)}
      .sidebar-backdrop.show{display:block}
      .sidebar-backdrop{z-index:3500!important}
    }

  /* Debug panel */
  .debug-panel{font-size:11px;color:#64748b;background:#f8fafc;border:1px solid #e2e8f0;border-radius:6px;padding:4px 8px;margin:6px 0}

<script>
// --- Silent notifier: replace alerts with console logs ---
function notifySilent(msg){
  try { console.warn(msg); } catch(e){}
}
window._realAlert = window.alert;
window.alert = function(msg){ notifySilent(msg); };

// --- Per-species clear: remove coords/date/occ/src and marker immediately ---
function clearOccurrence(key){
  try{
    window.points = window.points || {};
    const p = (points[key] = points[key] || {});
    delete p.lat; delete p.lon; delete p.t; delete p.occ; delete p.src;
    try{
      if (window.markers && typeof markers.has === 'function' && markers.has(key)){
        const m = markers.get(key);
        try { m.remove ? m.remove() : map.removeLayer(m); } catch(e){}
        try { markers.delete(key); } catch(e){}
      }
    }catch(e){ console.warn('marker remove failed', e); }
    try{
      if (window.circleLayers && typeof circleLayers.has === 'function' && circleLayers.has(key)){
        circleLayers.get(key).forEach(c => { try { c.remove ? c.remove() : map.removeLayer(c); } catch(e){} });
        circleLayers.delete(key);
      }
    }catch(e){ /* ignore */ }
    if (typeof save === 'function') save();
    if (typeof updateMarker === 'function') updateMarker(key);
    if (typeof render === 'function') render();
  }catch(e){ console.warn('clearOccurrence error', e); }
}
</script>

function _fixMojibake(s){

async function autoDetectAvatarsForActive(){
  try{
    const now = Date.now(), sevenMs = 7*24*60*60*1000;
    const activeKeys = [];
    for(const name of SPECIES){

      const p = points[name];
      if(!p) continue;
      let active = false;
      if(Number.isFinite(p.occ7) && p.occ7 > 0) active = true;
      if(!active && p.t){
        const ms = _toDay(p.t);
        if(ms && (now - ms) <= sevenMs) active = true;
      }
      if(active) activeKeys.push(name);
    }
    const results = await Promise.all(activeKeys.map(k => probeAvatarFile(k).then(url => ({k,url}))));
    let changed = false;
    for(const {k,url} of results){

      preloadAvatars(Object.values(avatars));
      activeKeys.forEach(k=>{ try{ updateMarker(k); }catch(e){} });
      render();
    }
  }catch(e){ /* ignore */ }
}

// === Helpers ===
function _toDay(s){
  if(!s) return null;
  const m = (''+s).match(/(\d{4})-(\d{2})-(\d{2})/);
  if(!m) return null;
  return new Date(+m[1], +m[2]-1, +m[3]).getTime();
}
const SPRING_CUTOFF_MMDD = '02-15'; // change if needed
function earliestInYearIsoAfterCutoff(datesIso, year, mmddCutoff){
  if(!Array.isArray(datesIso)) return null;
  const y = String(year);
  const cutoff = `${y}-${mmddCutoff}`;
  let best = null;
  for (const d of datesIso){
    if (typeof d !== 'string') continue;
    if (!d.startsWith(y + '-')) continue;
    if (d < cutoff) continue;         // IMPORTANT: ignore winter records
    if (!best || d < best) best = d;
  }
  return best;
}
function shouldUpdateToEarlier(existingIso, candidateIso){
  if(!candidateIso) return false;
  if(!existingIso) return true;
  return candidateIso < existingIso;
}
function isoToDdMm(iso){
  if(!iso || iso.length < 10) return '';
  return `${iso.slice(8,10)}.${iso.slice(5,7)}`;
}
function isInvalidWinterValue(iso){
  if(!iso || iso.length < 10) return false;
  const year = new Date().getFullYear();
  const cutoff = `${year}-${SPRING_CUTOFF_MMDD}`;
  return iso.startsWith(year + '-') && iso < cutoff;
}
function normalizeSpringDate(v){
  const t = (v || '').trim();
  if(!t) return '';
  const m = t.match(/^(\d{1,2})\.(\d{1,2})$/);
  if(!m) return null;
  const d = String(parseInt(m[1],10));          // keep 5.03 style like your list
  const mm = String(parseInt(m[2],10)).padStart(2,'0');
  return `${d}.${mm}`;
}

async function tryFetch(url){
  const urls = [url];
  const pb = String(proxyBase || '').trim();
  if(pb) urls.push(pb + encodeURIComponent(url));
  else urls.push('https://api.allorigins.win/raw?url=' + encodeURIComponent(url));
  let lastErr = null;
  for(const u of urls){
    try{
      const r = await fetch(u, { cache:'no-store' });
      if(!r.ok) throw new Error('HTTP ' + r.status);
      return await r.text();
    }catch(e){ lastErr = e; }
  }
  throw lastErr || new Error('Fetch failed');
}
function extractAllEventDates(html){
  const out = [];
  if(!html) return out;
  let m;
  const reJson = /"eventDate"\s*:\s*"?(\d{4}-\d{2}-\d{2})/ig;
  while ((m = reJson.exec(html)) !== null) out.push(m[1]);
  const reLbl = /(?:Kuupäev|Date)\s*[:\-–]\s*(\d{4}-\d{2}-\d{2})/ig;
  while ((m = reLbl.exec(html)) !== null) out.push(m[1]);
  if(out.length === 0){
    const reAny = /(\d{4}-\d{2}-\d{2})/g;
    while ((m = reAny.exec(html)) !== null){
      out.push(m[1]);
      if(out.length > 500) break;
    }
  }
  return out;
}
function extractElurikkusRecordDatesIso(html){
  // Returns ISO date list like ["2026-02-28", ...] from the Records table only
  const out = [];
  if(!html) return out;

  const doc = new DOMParser().parseFromString(html, 'text/html');

  // Try to find the records table (Elurikkus uses a table in "Records" tab)
  const tables = Array.from(doc.querySelectorAll('table'));
  if(!tables.length) return out;

  // Pick the table that has a header containing "Date" (first column)
  let t = null;
  for(const tb of tables){
    const thText = (tb.querySelector('thead')?.innerText || tb.innerText || '').toLowerCase();
    if(thText.includes('date')) { t = tb; break; }
  }
  if(!t) t = tables[0];

  const rows = Array.from(t.querySelectorAll('tbody tr'));
  for(const tr of rows){
    const td0 = tr.querySelector('td');
    if(!td0) continue;

    // Examples in UI: "2026-02-28 12:09" or "2025-08-18"
    const txt = (td0.textContent || '').trim();
    const m = txt.match(/(\d{4}-\d{2}-\d{2})/);
    if(m) out.push(m[1]);
  }
  return out;
}

function enqueueSpringYearFirst(keys){
  const uniq = Array.from(new Set((keys||[]).filter(Boolean)));
  for (const k of uniq){
    if (!springYearFirst[k] || isInvalidWinterValue(springYearFirst[k])) springQ.push(k);
  }
  if (!springQRunning) processSpringQ();
}

async function processSpringQ(){
  springQRunning = true;
  while(springQ.length){
    const key = springQ.shift();
    try { await fetchSpringYearFirstOne(key); } catch(e) {}
    await new Promise(r=>setTimeout(r, 400));
  }
  springQRunning = false;
}

async function fetchSpringYearFirstOne(key){
  const url = 'https://elurikkus.ee/app/occurrences/search?text=' + encodeURIComponent(key);
  const html = await tryFetch(url);
  const dates = extractElurikkusRecordDatesIso(html);
  const year = new Date().getFullYear();
  const earliest = earliestInYearIsoAfterCutoff(dates, year, SPRING_CUTOFF_MMDD);
  if (!earliest) return;

  const prev = springYearFirst[key];
  if (earliest && (isInvalidWinterValue(prev) || !prev || earliest < prev)){
    springYearFirst[key] = earliest;
    localStorage.setItem(LS_SPRING_YEARFIRST, JSON.stringify(springYearFirst));
    if (typeof renderSpringPanel === 'function') renderSpringPanel();
  }
}

function _safeData(v){
  try{
    const seen = new WeakSet();
    return JSON.parse(JSON.stringify(v, function(k,val){
      if(typeof val === 'object' && val){
        if(seen.has(val)) return '[Circular]';
        seen.add(val);
      }
      if(typeof val === 'function') return '[Function]';
      return val;
    }));
  }catch(e){
    return { note: 'data_unserializable', error: String(e && e.message ? e.message : e) };
  }
}
function pushDebugEvent(phase, msg, data, level){

  return SNAPSHOT_API;
}
function _resolveSnapshotControlApi(){
  const validation = _validateSupabaseLocal();
  if(!validation.ok){
    throw new Error(validation.error);
  }
  SNAPSHOT_CONTROL_API = validation.url + '/functions/v1/linnuliigid-control';
  return SNAPSHOT_CONTROL_API;
}
function _makeAbortError(reason, durationMs, timeoutMs){
  const err = new Error('Aborted (' + (reason || 'unknown') + ') after ' + Math.round(durationMs) + 'ms; timeout=' + timeoutMs + '; stopAborted=' + __stopSignalAbortedAtStart);
  err.name = 'AbortError';
  err.isAbort = true;
  err.abortReason = reason || 'unknown';
  err.durationMs = Math.round(durationMs);
  return err;
}

function _combineSignals(signals){
  const list = (signals || []).filter(Boolean);
  if(typeof AbortSignal !== 'undefined' && AbortSignal.any){
    return AbortSignal.any(list);
  }
  const ctrl = new AbortController();
  const onAbort = function(ev){
    try{
      const src = ev && ev.target;
      const reason = (src && src.reason) ? src.reason : 'aborted';
      ctrl.abort(reason);
    }catch(e){
      try{ ctrl.abort('aborted'); }catch(_e){}
    }
  };
  for(const s of list){
    if(s.aborted){
      try{ ctrl.abort(s.reason || 'aborted'); }catch(e){}
      return ctrl.signal;
    }
    try{ s.addEventListener('abort', onAbort, { once:true }); }catch(e){}
  }
  return ctrl.signal;
}

async function fetchJsonWithTimeout(url, opts){
  const options = opts || {};
  const timeoutMs = Math.max(Number(options.timeoutMs || 15000), 5000);
  const runId = options.runId;
  const index = options.index;
  const timeoutCtrl = new AbortController();
  const combinedSignal = _combineSignals([options.signal, timeoutCtrl.signal]);
  const t0 = performance.now();
  let timeoutId = null;
  try{
    timeoutId = setTimeout(function(){ try{ timeoutCtrl.abort('timeout'); }catch(e){} }, timeoutMs);
    pushDebugEvent('FETCH_START', 'Starting request', { url:url, timeoutMs:timeoutMs, runId:runId, index:index });
    const res = await fetch(url, { signal: combinedSignal, cache:'no-store' });
    __lastHttpStatus = res.status;
    __lastHttpOk = res.ok;
    __lastContentType = res.headers.get('content-type') || '';
    pushDebugEvent('FETCH_HEADERS', 'Headers received', {
      url:url, runId:runId, index:index, status:res.status, ok:res.ok,
      contentType: __lastContentType,
      durationMs: Math.round(performance.now() - t0),
    }, res.ok ? 'info' : 'warn');

    const b0 = performance.now();
    pushDebugEvent('BODY_READ_START', 'Reading response body', { url:url, runId:runId, index:index });
    const text = await res.text();
    __lastBodyDurationMs = Math.round(performance.now() - b0);
    __lastBodyBytes = text ? (new TextEncoder().encode(text).length) : 0;
    __lastResponseBytes = __lastBodyBytes;
    pushDebugEvent('BODY_READ_DONE', 'Body read done', {
      url:url, runId:runId, index:index, bytes: __lastBodyBytes, durationMs: __lastBodyDurationMs, contentType: __lastContentType
    });

    if(!res.ok){
      const err = new Error('HTTP ' + res.status + ' ' + res.statusText);
      err.bodySnippet = (text || '').slice(0, 300);
      throw err;
    }

    const p0 = performance.now();
    pushDebugEvent('JSON_PARSE_START', 'Parsing JSON', { url:url, runId:runId, index:index });
    const json = text ? JSON.parse(text) : null;
    __lastParseDurationMs = Math.round(performance.now() - p0);
    pushDebugEvent('JSON_PARSE_DONE', 'JSON parsed', {
      url:url, runId:runId, index:index, parseMs: __lastParseDurationMs,
      topKeys: (json && typeof json === 'object') ? Object.keys(json).slice(0, 10) : null
    });
    return json;
  }catch(e){
    const isAbort = !!(e && (e.name === 'AbortError' || (combinedSignal && combinedSignal.aborted)));
    if(isAbort){
      const reason = getAbortReason(combinedSignal) || getAbortReason(timeoutCtrl.signal) || 'aborted';
      const dur = performance.now() - t0;
      pushDebugEvent('FETCH_FAIL', 'Request aborted', {
        url:url, runId:runId, index:index, wasAbortError: (e && e.name === 'AbortError') || false,
        abortReason: reason,
        abortReasonStopSignal: getAbortReason(__stopController && __stopController.signal),
        abortReasonRequestSignal: getAbortReason(combinedSignal),
        durationMs: Math.round(dur),
      }, 'warn');
      throw _makeAbortError(reason, dur, timeoutMs);
    }
    pushDebugEvent('FETCH_FAIL', 'Request failed', { url:url, runId:runId, index:index, message: String(e && e.message ? e.message : e) }, 'error');
    throw e;
  }finally{
    if(timeoutId) clearTimeout(timeoutId);
  }
}

async function fetchWithTimeout(url, init, ms, runId){
  // Hard clamp: never abort below 5 seconds
  ms = Math.max(ms || 15000, 5000);
  __lastTimeoutMs = ms;

  _ensureStopController();

  const controller = new AbortController();
  const startedAt = performance.now();
  let abortReason = 'unknown';
  __activeRequestController = controller;

  const localStopController = __stopController;
  const localRunCancelController = __runCancelController;
  __stopSignalAbortedAtStart = !!(localStopController && localStopController.signal && localStopController.signal.aborted);

  if(runId != null && runId !== __runId){
    pushDebugEvent('FETCH_CANCELLED', 'Run id mismatch before fetch', { runId: runId, activeRunId: __runId }, 'warn');
    throw _makeAbortError('new-run', 0, ms);
  }

  const stopRelay = function(){
    const sr = getAbortReason(localStopController && localStopController.signal);
    if(sr === 'stop' || __abortReasonHint === 'user') abortReason = 'stop';
    else if(sr === 'replace' || sr === 'retry' || sr === 'config_retry') abortReason = sr;
    else abortReason = 'replace';
    controller.abort(abortReason);
  };
  const runRelay = function(){
    abortReason = 'new-run';
    controller.abort('new-run');
  };
  if(localStopController && !localStopController.signal.aborted){
    try{ localStopController.signal.addEventListener('abort', stopRelay, { once:true }); }catch(e){}
  }
  if(localRunCancelController && !localRunCancelController.signal.aborted){
    try{ localRunCancelController.signal.addEventListener('abort', runRelay, { once:true }); }catch(e){}
  }

  const id = setTimeout(function(){
    abortReason = 'timeout';
    controller.abort('timeout');
  }, ms);

  try{
    pushDebugEvent('FETCH_START', 'Starting request', {
      url: url,
      timeoutMs: ms,
      runId: runId,
      stopSignalAborted: !!(localStopController && localStopController.signal.aborted),
      stopSignalReason: getAbortReason(localStopController && localStopController.signal),
      runSignalAborted: !!(localRunCancelController && localRunCancelController.signal.aborted),
      runSignalReason: getAbortReason(localRunCancelController && localRunCancelController.signal),
    });
    const reqInit = Object.assign({}, init || {}, { signal: controller.signal });
    const res = await fetch(url, reqInit);
    __lastHttpStatus = res.status;
    __lastHttpOk = res.ok;
    const bytes = Number(res.headers.get('content-length') || 0) || null;
    __lastResponseBytes = bytes;
    pushDebugEvent('FETCH_DONE', 'Request completed', {
      url: url,
      status: res.status,
      ok: res.ok,
      durationMs: Math.round(performance.now() - startedAt),
      bytes: bytes,
    }, res.ok ? 'info' : 'warn');
    return res;
  }catch(e){
    if(e && (e.name === 'AbortError' || (abortReason !== 'unknown'))){
      const durationMs = performance.now() - startedAt;
      const reason = (abortReason === 'unknown' && __abortReasonHint) ? __abortReasonHint : abortReason;
      __lastDurationMs = Math.round(durationMs);
      pushDebugEvent('FETCH_FAIL', 'Request aborted', {
        url: url,
        wasAbortError: (e && e.name === 'AbortError') || false,
        abortReason: reason,
        abortReasonStopSignal: getAbortReason(localStopController && localStopController.signal),
        abortReasonRequestSignal: getAbortReason(controller.signal),
        durationMs: Math.round(durationMs),
      }, 'warn');
      throw _makeAbortError(reason, durationMs, ms);
    }
    __lastErrorObj = {
      name: e && e.name ? e.name : 'Error',
      message: e && e.message ? e.message : String(e),
      stack: e && e.stack ? e.stack : '',
      cause: e && e.cause ? _safeData(e.cause) : null,
      abortReason: null,
    };
    pushDebugEvent('FETCH_FAIL', 'Request failed', __lastErrorObj, 'error');
    throw e;
  }finally{
    clearTimeout(id);
    try{ localStopController.signal.removeEventListener('abort', stopRelay); }catch(e){}
    try{ localRunCancelController.signal.removeEventListener('abort', runRelay); }catch(e){}
    __abortReasonHint = '';
    if(__activeRequestController === controller) __activeRequestController = null;
  }
}
function _abortActiveRequest(){
  try{ if(__activeRequestController) __activeRequestController.abort('replace'); }catch(e){}
  try{ if(__activeStepController) __activeStepController.abort('replace'); }catch(e){}
}
async function _controlSkipOnServer(targetIndex, reason){
  const controlUrl = _resolveSnapshotControlApi();
  const t0 = performance.now();
  pushDebugEvent('CONTROL_SKIP_START', 'Sending skip control to server', {
    targetIndex: targetIndex,
    reason: reason,
    runId: __runId,
    url: controlUrl,
  }, 'warn');
  const doForceAdvance = function(){
    return fetchWithTimeout(controlUrl, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        action: 'force_advance',
        toIndex: Math.max(0, Number(targetIndex) || 0),
        reason: reason || 'watchdog',
        force: true,
      }),
    }, 15000, __runId);
  };
  let res = await doForceAdvance();
  if(res.status === 409){
    pushDebugEvent('CONTROL_SKIP_RETRY', 'force_advance got 409, requesting force_takeover', {
      targetIndex: targetIndex, reason: reason, runId: __runId
    }, 'warn');
    await fetchWithTimeout(controlUrl, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ action: 'force_takeover', reason: reason || 'watchdog' }),
    }, 15000, __runId);
    res = await doForceAdvance();
  }
  const text = await res.text();
  let payload = {};
  try{ payload = text ? JSON.parse(text) : {}; }catch(e){ payload = { raw: (text || '').slice(0, 300) }; }
  if(!res.ok){
    if(res.status === 409){
      __lastInfoMessage = 'Backend rejected force_advance (unexpected). Check function routing.';
      _showSnapshotBanner(__lastInfoMessage, 'warn');
    }
    pushDebugEvent('CONTROL_SKIP_FAIL', 'Skip control failed', {
      targetIndex: targetIndex,
      reason: reason,
      httpStatus: res.status,
      durationMs: Math.round(performance.now() - t0),
      response: _safeData(payload),
    }, 'error');
    __lastInfoMessage = "DB workaround: update public.linnuliigid_snapshot set progress_done=186 or status='stopped' in SQL editor.";
    throw new Error('Skip control failed: HTTP ' + res.status);
  }
  pushDebugEvent('CONTROL_SKIP_DONE', 'Skip control applied', {
    targetIndex: targetIndex,
    reason: reason,
    httpStatus: res.status,
    durationMs: Math.round(performance.now() - t0),
    progress_done: Number(payload && payload.progress_done || 0),
    progress_total: Number(payload && payload.progress_total || 0),
    status: payload && payload.status || null,
  });
  return payload;
}
function _delay(ms){
  return new Promise(function(resolve){ setTimeout(resolve, ms); });
}
function _startWatchdog(){
  _stopWatchdog();
  __watchdogTimer = setInterval(function(){
    if(!__isRefreshRunning) return;
    if(__lastProgressAt <= 0) return;
    if(Date.now() - __lastProgressAt <= 20000) return;
    const idx = _getResumeIndex();
    __lastFailedIndex = idx;
    __lastInfoMessage = 'Watchdog timeout; forcing stale takeover';
    pushDebugEvent('INDEX_RETRY', 'Watchdog triggered force takeover', { index: idx, runId: __runId }, 'warn');
    _setResumeIndex(idx);
    _showSnapshotBanner('Hang detected, retrying...', 'warn');
    __lastProgressAt = Date.now();
    pushDebugEvent('WATCHDOG_ABORT', 'Watchdog aborting active step', { index: idx, runId: __runId }, 'warn');
    try{ if(__activeStepController) __activeStepController.abort('watchdog_timeout'); }catch(e){}
    _abortActiveRequest();
    const targetIndex = Math.max(_getResumeIndex(), idx, Number(__currentIndex) || 0) + 1;
    _setResumeIndex(targetIndex);
    _controlSkipOnServer(targetIndex, 'watchdog')
      .then(function(payload){
        if(Number(payload && payload.progress_done || 0) < targetIndex){
          __lastInfoMessage = 'Skip command sent, but server did not advance. Check runner job storage.';
          _showSnapshotBanner(__lastInfoMessage, 'warn');
        }
      })
      .catch(function(err){
        __lastErrorMessage = String(err && err.message ? err.message : err);
      })
      .finally(function(){
        loadSnapshotOnce();
      });
  }, 5000);
}
function _stopWatchdog(){
  if(__watchdogTimer){ clearInterval(__watchdogTimer); __watchdogTimer = null; }
}

function _showSnapshotBanner(msg, type, showAllBtn){

// "Show all" shortcut - turns off 7-day toggle

function _updateProgressUI(done, total, status){
  const prog = document.getElementById('fetchProgress');
  const bar = document.getElementById('fetchProgressBar');
  const barInner = document.getElementById('fetchProgressBarInner');
  const stopBtn = document.getElementById('btnStopFetch');
  if(!prog) return;
  if(status === 'running' && total > 0){
    __currentIndex = done;
    _setResumeIndex(done);
    if(done > __lastProgressDone){
      __lastProgressDone = done;
      __lastProgressAt = Date.now();
      __lastProgressAtMs = __lastProgressAt;
      __hangKickCount = 0;
      __lastHangProgressDone = done;
      pushDebugEvent('INDEX_SUCCESS', 'Progress advanced', { done: done, total: total, runId: __runId });
    }
    prog.textContent = 'Server refresh: ' + done + '/' + total;
    if(bar){ bar.style.display='block'; barInner.style.width = Math.round(done/total*100)+'%'; }
    if(stopBtn) stopBtn.style.display='inline-block';
  } else {
    prog.textContent = status === 'ready' ? 'Data loaded' : (status === 'error' ? 'Refresh failed' : '');
    if(bar) bar.style.display='none';
    if(stopBtn) stopBtn.style.display='none';
  }
  _updateDebugPanel();
}

function _updateDebugPanel(){
  const el = document.getElementById('debugContent');
  if(!el) return;
  const totalWithCoords = SPECIES.filter(n => { const p = points[n]; return p && Number.isFinite(p.lat); }).length;
  const progressDone = (__snapshotMeta.status === 'running') ? Number(__currentIndex || 0) : Number(__lastProgressDone > 0 ? __lastProgressDone : 0);
  const progressTotal = (__snapshotMeta.status === 'running' || __lastProgressDone > 0) ? SPECIES.length : 0;
  el.innerHTML = [
    'buildId: <b>' + MAP_BUILD_ID + '</b>',
    'status: <b>' + (__snapshotMeta.status || (__isRefreshRunning ? 'running' : 'stopped')) + '</b>',
    'generatedAt: <b>' + (__snapshotMeta.generated_at ? (window.formatDateEE ? window.formatDateEE(__snapshotMeta.generated_at) : __snapshotMeta.generated_at) : '-') + '</b>',
    'progress: <b>' + progressDone + '/' + progressTotal + '</b>',
    'resumeIndex: <b>' + _getResumeIndex() + '</b>',
    'Species with coords: <b>' + totalWithCoords + '</b>',
    'Markers rendered: <b>' + __renderedMarkerCount + '</b>',
    'lastRequestUrl: <b>' + (__lastRequestUrl || '-') + '</b>',
    'lastHttp: <b>{ status: ' + (__lastHttpStatus ?? '-') + ', ok: ' + (__lastHttpOk ?? '-') + ', durationMs: ' + (__lastDurationMs ?? '-') + ' }</b>',
    'lastSnapshotBytes: <b>' + (__lastResponseBytes ?? '-') + '</b>',
    'lastInfoMessage: <b>' + (__lastInfoMessage || '-') + '</b>',
    'lastErrorMessage: <b>' + (__lastErrorMessage || '-') + '</b>',
    'stopSignalAborted: <b>' + (!!(__stopController && __stopController.signal && __stopController.signal.aborted)) + '</b>',

function _applySnapshot(snap){
  if(!snap || !snap.points_json) return;
  const pts = snap.points_json;
  for(const key in pts){
    if(!pts.hasOwnProperty(key)) continue;
    const s = pts[key];
    points[key] = points[key] || {};
    const p = points[key];
    if(s.t) p.t = s.t;
    if(Number.isFinite(s.lat) && Number.isFinite(s.lon)){ p.lat = s.lat; p.lon = s.lon; }
    if(Number.isFinite(s.occ7)) p.occ7 = s.occ7;
    if(s.src) p.src = s.src;
    if(typeof p.visible !== 'boolean') p.visible = true;
  }
  __snapshotMeta.status = snap.status || 'ready';
  __snapshotMeta.generated_at = snap.generated_at;
  save();
  refreshAllMarkers();
}

function refreshAllMarkers(){
  __renderedMarkerCount = 0;
  Object.keys(points).forEach(updateMarker);
  render();
  _checkEmpty7dBanner();
  _updateDebugPanel();
}

function _checkEmpty7dBanner(){
  if(!is7daysOnly()) return;
  const occ7Count = SPECIES.filter(n => { const p = points[n]; return p && Number.isFinite(p.occ7) && p.occ7 > 0; }).length;
  const totalWithCoords = SPECIES.filter(n => { const p = points[n]; return p && Number.isFinite(p.lat); }).length;
  if(occ7Count === 0 && totalWithCoords > 0){
    _showSnapshotBanner('No observations in last 7 days in current dataset. Turn off "7 days only" to see all known locations.', 'warn', true);
  }
}

async function _loadSnapshotImpl(){
  const t0 = Date.now();
  const runId = (__runId || 0);
  try{
    __snapshotLoadAttemptCount++;
    __lastSnapshotLoadAtMs = Date.now();
    pushDebugEvent('SNAPSHOT_LOAD_START', 'Loading snapshot', { runId: runId, attempt: __snapshotLoadAttemptCount, snapshotApi: SNAPSHOT_API || null });
    _ensureStopController();
    if(!_resolveSupabaseUrlLocal()){
      __configWaitCount++;
      if(!__configWaitStartedAtMs) __configWaitStartedAtMs = Date.now();
      __lastInfoMessage = 'Waiting for config...';
      pushDebugEvent('CONFIG_WAIT', 'Supabase URL missing before snapshot load', { waitCount: __configWaitCount }, 'warn');
      _requestSupabaseConfigFromParent();
    }
    const snapshotUrl = _resolveSnapshotApi();
    __snapshotLoadRetryCount = 0;
    __lastRequestUrl = snapshotUrl;
    _showSnapshotBanner('Loading data...');
    __activeStepController = new AbortController();
    const snap = await fetchJsonWithTimeout(snapshotUrl, {
      timeoutMs: 15000,
      signal: _combineSignals([__activeStepController.signal, __stopController && __stopController.signal, __runCancelController && __runCancelController.signal]),
      runId: runId,
      index: __currentIndex
    });
    __lastDurationMs = Date.now() - t0;
    pushDebugEvent('SNAPSHOT_LOAD_DONE', 'Snapshot loaded', { status: snap.status, progress_done: snap.progress_done, progress_total: snap.progress_total });

    if(snap.status === 'running'){
      _updateProgressUI(snap.progress_done, snap.progress_total, 'running');
      _showSnapshotBanner('Server is refreshing data (' + snap.progress_done + '/' + snap.progress_total + ')...');
      if(snap.points_json && Object.keys(snap.points_json).length > 0){
        pushDebugEvent('SNAPSHOT_APPLY_START', 'Applying running snapshot', { runId: runId, index: __currentIndex });
        _applySnapshot(snap);
        pushDebugEvent('SNAPSHOT_APPLY_DONE', 'Applied running snapshot', { runId: runId, index: __currentIndex });
      }
      _startPolling();
      return;
    }

    if(snap.points_json && Object.keys(snap.points_json).length > 0){
      pushDebugEvent('SNAPSHOT_APPLY_START', 'Applying snapshot', { runId: runId, index: __currentIndex });
      _applySnapshot(snap);
      pushDebugEvent('SNAPSHOT_APPLY_DONE', 'Applied snapshot', { runId: runId, index: __currentIndex });
      __lastProgressAtMs = Date.now();
      pushDebugEvent('PROGRESS_TICK', 'Snapshot apply completed', { runId: runId, index: __currentIndex, atMs: __lastProgressAtMs });
      const age = snap.generated_at && window.formatAgeEE ? window.formatAgeEE(snap.generated_at) : null;
      _showSnapshotBanner('Data loaded' + (age ? ' (' + age + ')' : ''));
      setTimeout(_hideSnapshotBanner, 4000);
      _updateProgressUI(0, 0, 'ready');
    } else {
      _showSnapshotBanner('No snapshot data yet. Press "Refresh data" to generate.', 'warn');
    }

    if(__isRefreshRunning && snap.status !== 'running'){
      pushDebugEvent('REFRESH_COMPLETE', 'Snapshot reached terminal status', { status: snap.status, runId: runId });
      _stopPolling();
    }

    if(snap.last_error){
      document.getElementById('fetchError').textContent = 'Last error: ' + snap.last_error;
    }
  }catch(e){
    if(e && e.isAbort){
      if(e.abortReason === 'user' || e.abortReason === 'new-run' || e.abortReason === 'stop' || e.abortReason === 'watchdog_timeout' || e.abortReason === 'replace' || e.abortReason === 'active_request_abort'){
        pushDebugEvent('SNAPSHOT_LOAD_CANCELLED', 'Snapshot load cancelled', { runId: runId, reason: e.abortReason }, 'warn');
        return;
      }
      __lastErrorMessage = e.message || String(e);
    } else {
      __lastErrorMessage = String(e?.message || e || 'load failed');
    }
    __lastDurationMs = Date.now() - t0;
    if((__lastErrorMessage || '').indexOf('Supabase URL') >= 0){
      __lastInfoMessage = 'Waiting for config...';
      __lastErrorMessage = '';
      if(__snapshotLoadRetryCount < 10){
        __snapshotLoadRetryCount++;
        __lastInfoMessage = 'Waiting for config...';
        pushDebugEvent('SNAPSHOT_RETRY', 'Retry snapshot load due to config', {
          reason: 'supabase_config',
          retry: __snapshotLoadRetryCount,
          runId: runId,
        }, 'warn');
        _requestSupabaseConfigFromParent();
        setTimeout(loadSnapshotOnce, 500);
      } else {
        _showSnapshotBanner('Missing Supabase config after retries', 'error');
      }
      _updateDebugPanel();
      return;
    }
    __lastErrorObj = {
      name: e && e.name ? e.name : 'Error',
      message: __lastErrorMessage || String(e),
      stack: e && e.stack ? e.stack : '',
      cause: e && e.cause ? _safeData(e.cause) : null,
      abortReason: e && e.abortReason ? e.abortReason : null,
    };
    pushDebugEvent('SNAPSHOT_LOAD_FAIL', 'Snapshot load failed', __lastErrorObj, 'error');
    console.warn('[snapshot] Load failed:', e);
    _showSnapshotBanner('Using cached data (server unavailable)', 'warn');
    refreshAllMarkers();
  }finally{
    __activeStepController = null;
  }
}

function loadSnapshotOnce(){
  if(__snapshotInFlightRef){
    pushDebugEvent('SNAPSHOT_LOAD_JOIN', 'Joining in-flight snapshot load', {
      startedAtMs: __snapshotInFlightStartedAtMs,
      ageMs: __snapshotInFlightStartedAtMs ? (Date.now() - __snapshotInFlightStartedAtMs) : null,
      runId: __runId
    });
    return __snapshotInFlightRef;
  }
  __snapshotInFlightStartedAtMs = Date.now();
  __snapshotInFlightRef = (async function(){
    try{
      return await _loadSnapshotImpl();
    } finally {
      __snapshotInFlightRef = null;
      __snapshotInFlightStartedAtMs = 0;
    }
  })();
  return __snapshotInFlightRef;
}

function loadSnapshot(){
  return loadSnapshotOnce();
}

function _startPolling(){
  if(__isRefreshRunning){
    pushDebugEvent('POLL_JOIN', 'Polling already active; not starting another loop', { runId: __runId });
    return;
  }
  __isRefreshRunning = true;
  __stopController = new AbortController();
  _startWatchdog();
  __pollCount = 0;
  const token = ++__pollLoopToken;
  (async function pollLoop(){
    while(__isRefreshRunning && token === __pollLoopToken){
    __pollCount++;
    if(__pollCount > 90){
      _stopPolling();
      _showSnapshotBanner('Refresh timed out. Try again later.', 'error');
      break;
    }
    try{
      await loadSnapshotOnce();
      const now = Date.now();
      if(__isRefreshRunning && __lastProgressAt > 0 && (now - __lastProgressAt) > 20000){
        pushDebugEvent('STUCK_DETECTED', 'No progress for 20s', {
          index: __currentIndex,
          attempt: __attemptForCurrentIndex,
          lastProgressAtMs: __lastProgressAt,
          lastPhase: __lastPhase
        }, 'warn');
      }
      if(__isRefreshRunning && __lastProgressAt > 0 && (now - __lastProgressAt) > 30000 && (now - __lastAutoKickAt) > 10000 && !__forceRetryInFlight){
        const nextIndex = Math.max(_getResumeIndex(), Number(__currentIndex) || 0) + 1;
        _setResumeIndex(nextIndex);
        __lastFailedIndex = nextIndex;
        __lastInfoMessage = 'Hang detected; auto-skip to ' + nextIndex + ' (force)';
        __currentIndex = nextIndex;
        __attemptForCurrentIndex++;
        if(__attemptForCurrentIndex > 5){
          __lastInfoMessage = 'Use Skip stuck item (attempts > 5)';
        }
        __lastProgressAt = now;
        __lastAutoKickAt = now;
        pushDebugEvent('INDEX_SKIP', 'Auto skip stuck index', { nextIndex: nextIndex, attempt: __attemptForCurrentIndex, runId: __runId }, 'warn');
        _showSnapshotBanner('Hang detected, auto-skip to ' + nextIndex + ' (force)...', 'warn');
        try{
          const payload = await _controlSkipOnServer(nextIndex, 'poll_hang');
          if(Number(payload && payload.progress_done || 0) < nextIndex){
            __lastInfoMessage = 'Skip command sent, but server did not advance. Check runner job storage.';
            _showSnapshotBanner(__lastInfoMessage, 'warn');
          }
        }catch(err){
          __lastErrorMessage = String(err && err.message ? err.message : err);
        }finally{
          await loadSnapshotOnce();
        }
      }
    }catch(e){
      if(e && e.isAbort){
        if(e.abortReason === 'stop'){
          _stopPolling();
          _showSnapshotBanner('Stopped by user', 'warn');
          break;
        }
        if(e.abortReason === 'new-run' || e.abortReason === 'stop' || e.abortReason === 'watchdog_timeout' || e.abortReason === 'replace' || e.abortReason === 'active_request_abort'){
          pushDebugEvent('POLL_CANCELLED', 'Poll iteration cancelled', { reason: e.abortReason, runId: __runId }, 'warn');
          if(e.abortReason === 'new-run') break;
          await _delay(600);
          continue;
        }
        __lastErrorMessage = e.message || String(e);
      } else {
        __lastErrorMessage = String(e?.message || e || 'poll failed');
      }
      if((__lastErrorMessage || '').indexOf('Supabase URL') >= 0){
        _stopPolling();
        _showSnapshotBanner('Refresh stopped: ' + __lastErrorMessage, 'error');
        var ferr = document.getElementById('fetchError');
        if(ferr) ferr.textContent = __lastErrorMessage;
        break;
      }
    }finally{
      __activeStepController = null;
    }
      if(!__isRefreshRunning || token !== __pollLoopToken) break;
      await _delay(2000);
    }
  })();
}

function _stopPolling(){
  if(__pollTimer){ clearInterval(__pollTimer); __pollTimer = null; }
  __pollLoopToken++;
  __isRefreshRunning = false;
  _stopWatchdog();
  _abortActiveRequest();
  try{ __stopController.abort('replace'); }catch(e){}
  // Immediately recreate so future requests aren't poisoned
  __stopController = new AbortController();
  _endRefreshRun();
  _updateProgressUI(0, 0, '');
}

// Public refresh (no key needed)
async function triggerRefresh(opts){
  const options = opts || {};
  const force = !!options.force;
  const runId = (options.newRun || !__runningRef) ? _beginRefreshRun(!!options.newRun) : __runId;
  try{
    __refreshStartedAtMs = Date.now();
    __lastProgressAtMs = __refreshStartedAtMs;
    pushDebugEvent((options.resumeFromSaved ? 'REFRESH_RESUME' : 'REFRESH_START'), 'Refresh requested', {
      runId: runId,
      startIndex: options.startIndex,
      resumeFromSaved: !!options.resumeFromSaved,
      force: force,
      filter7d: is7daysOnly(),
    });
    _ensureStopController();
    if(!_resolveSupabaseUrlLocal()) _requestSupabaseConfigFromParent();
    const validation = _validateSupabaseLocal();
    if(!validation.ok) throw new Error(validation.error || 'Supabase config vigane');
    const supabaseUrl = validation.url;
    const anonKey = _resolveSupabaseAnonKeyLocal();
    const healthUrl = supabaseUrl + '/auth/v1/health';
    try{
      const healthRes = await fetchWithTimeout(healthUrl, {
        method:'GET',
        headers: anonKey ? { apikey: anonKey, authorization: 'Bearer ' + anonKey } : {},
      }, 10000, runId);
      __lastRequestUrl = healthUrl;
      __lastDurationMs = 0;
      if(!(healthRes.ok || healthRes.status === 401 || healthRes.status === 404)){
        throw new Error('Supabase health check failed (HTTP ' + healthRes.status + ')');
      }
    }catch(healthErr){
      const msg = String(healthErr && healthErr.message ? healthErr.message : healthErr);
      if(msg.indexOf('TypeError') >= 0 || msg.indexOf('Failed to fetch') >= 0 || msg.indexOf('NetworkError') >= 0){
        throw new Error('Supabase URL unreachable (DNS). Update Supabase URL override in Settings.');
      }
      throw healthErr;
    }

    _showSnapshotBanner('Requesting server refresh...');
    _updateProgressUI(0, SPECIES.length, 'running');
    const explicitStart = Number(options.startIndex);
    const startIndex = Number.isFinite(explicitStart)
      ? Math.max(0, explicitStart)
      : (options.resumeFromSaved ? _getResumeIndex() : 0);
    const prevIndex = __currentIndex;
    __currentIndex = startIndex;
    __attemptForCurrentIndex = (prevIndex === startIndex) ? (__attemptForCurrentIndex + 1) : 1;
    pushDebugEvent('INDEX_START', 'Starting index', { runId: runId, index: startIndex, attempt: __attemptForCurrentIndex });
    const snapshotUrl = _resolveSnapshotApi();
    __lastRequestUrl = snapshotUrl;

    const res = await fetchWithTimeout(snapshotUrl, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ start_index: startIndex, force }),
    }, 30000, runId);

    if(res.status === 429){
      pushDebugEvent('INDEX_RETRY', 'Refresh throttled (429)', { runId: runId, index: startIndex, force: force }, 'warn');
      const data = await res.json().catch(()=>({}));
      if(!options.silent) _showSnapshotBanner(data.error || 'Refresh recently triggered. Try again later.', 'warn');
      _updateProgressUI(0, 0, '');
      setTimeout(_hideSnapshotBanner, 6000);
      return;
    }
    if(res.status === 409){
      pushDebugEvent('INDEX_RETRY', 'Refresh locked (409)', { runId: runId, index: startIndex, force: force }, 'warn');
      if(force) _showSnapshotBanner('Server says running; forcing takeover (stale-run check)...', 'warn');
      else _showSnapshotBanner('Refresh already in progress...');
    }

    _startPolling();
    pushDebugEvent('INDEX_SUCCESS', 'Refresh accepted', { runId: runId, index: startIndex, httpStatus: res.status });
    _updateDebugPanel();
  }catch(e){
    var reason = (e && e.abortReason) || '';
    if(e && e.isAbort){
      if(reason === 'user' || reason === 'new-run' || reason === 'stop'){
        _endRefreshRun();
        _updateProgressUI(0, 0, '');
        pushDebugEvent('REFRESH_STOP', 'Refresh cancelled gracefully', { runId: runId, reason: reason, userStop: reason === 'user' });
        if(reason === 'user') _showSnapshotBanner('Stopped by user', 'warn');
        return;
      }
      __lastErrorMessage = e.message || String(e);
    } else {
      __lastErrorMessage = String(e?.message || e || 'start failed');
    }
    if(reason === 'user'){
      // User pressed Stop – don't retry
      _stopPolling();
      pushDebugEvent('REFRESH_STOP', 'Stopped by user', { runId: runId, reason: reason, userStop: true });
      _showSnapshotBanner('Stopped by user', 'warn');
      _updateProgressUI(0, 0, '');
    } else if(reason === 'timeout'){
      // POST timed out – auto-retry after 2s
      _showSnapshotBanner('Refresh request timed out, retrying...', 'warn');
      pushDebugEvent('INDEX_RETRY', 'Refresh request timeout, retrying', { runId: runId, reason: reason }, 'warn');
      setTimeout(function(){ triggerRefresh(options); }, 2000);
    } else {
      __lastErrorObj = {
        name: e && e.name ? e.name : 'Error',
        message: __lastErrorMessage || String(e),
        stack: e && e.stack ? e.stack : '',
        cause: e && e.cause ? _safeData(e.cause) : null,
        abortReason: reason || null,
      };
      pushDebugEvent('FETCH_FAIL', 'Refresh start failed', __lastErrorObj, 'error');
      _showSnapshotBanner('Failed to start refresh: ' + (__lastErrorMessage || 'Unknown error'), 'error');
      _stopPolling();
      _updateProgressUI(0, 0, '');
    }
    var ferr = document.getElementById('fetchError');
    if(ferr) ferr.textContent = __lastErrorMessage || 'start failed';
  }
}

// Wire buttons
function _wireSnapshotButtons(){
  const btnRefresh = document.getElementById('btnRefreshData');
  const btnReload = document.getElementById('btnReloadSnapshot');
  const btnResume = document.getElementById('btnResumeFetch');
  const btnSkip = document.getElementById('btnSkipStuck');
  const btnStop = document.getElementById('btnStopFetch');
  const btnCopyDebug = document.getElementById('btnCopyDebugJson');
  const btnClearDebug = document.getElementById('btnClearDebugEvents');
  const toggle7d = document.getElementById('toggle7days');

  if(btnRefresh && !btnRefresh.__wired){
    btnRefresh.addEventListener('click', function(){ triggerRefresh({ newRun: true }); });
    btnRefresh.__wired = true;
  }
  if(btnReload && !btnReload.__wired){
    btnReload.addEventListener('click', function(){ loadSnapshot(); });
    btnReload.__wired = true;
  }
  if(btnResume && !btnResume.__wired){
    btnResume.addEventListener('click', function(){ triggerRefresh({ resumeFromSaved: true, force: true, newRun: true }); });
    btnResume.__wired = true;
  }
  if(btnSkip && !btnSkip.__wired){
    btnSkip.addEventListener('click', function(){
      _abortActiveRequest();
      const nextIndex = _getResumeIndex() + 1;
      __lastFailedIndex = nextIndex;
      __lastInfoMessage = 'Skipped by user';
      pushDebugEvent('INDEX_SKIP', 'User skipped current index', { nextIndex: nextIndex, runId: __runId }, 'warn');
      _setResumeIndex(nextIndex);
      _showSnapshotBanner('Skipping stuck item, resuming from ' + nextIndex + '...', 'warn');
      _controlSkipOnServer(nextIndex, 'user_click')
        .then(function(payload){
          if(Number(payload && payload.progress_done || 0) < nextIndex){
            __lastInfoMessage = 'Skip command sent, but server did not advance. Check runner job storage.';
            _showSnapshotBanner(__lastInfoMessage, 'warn');
          }
        })
        .catch(function(err){
          __lastErrorMessage = String(err && err.message ? err.message : err);
        })
        .finally(function(){
          loadSnapshot();
        });
    });
    btnSkip.__wired = true;
  }
  if(btnStop && !btnStop.__wired){
    btnStop.addEventListener('click', function(){
      __abortReasonHint = 'user';
      _abortActiveRequest();
      try{ __stopController.abort('stop'); }catch(e){}
      // Immediately recreate so nothing is poisoned
      __stopController = new AbortController();
      _stopPolling();
      _showSnapshotBanner('Stopped by user', 'warn');
    });
    btnStop.__wired = true;
  }
  if(toggle7d && !toggle7d.__wired){
    toggle7d.addEventListener('change', function(){
      window.__recentOnly = this.checked;
      refreshAllMarkers();
      if(this.checked) _checkEmpty7dBanner();
      else _hideSnapshotBanner();
    });
    toggle7d.__wired = true;
  }
  if(btnCopyDebug && !btnCopyDebug.__wired){
    btnCopyDebug.addEventListener('click', _copyDebugJson);
    btnCopyDebug.__wired = true;
  }
  if(btnClearDebug && !btnClearDebug.__wired){
    btnClearDebug.addEventListener('click', _clearDebugEvents);
    btnClearDebug.__wired = true;
  }
}

function refreshVisible(){ loadSnapshot(); }

window.addEventListener('message', function(ev){
  try{
    if(!ev.data || typeof ev.data !== 'object') return;
    var t = ev.data.type;
    if(t === 'SET_ADMIN_KEY') return; // no longer used
    if(t === 'SUPABASE_CONFIG'){
      const hadNoApi = !SNAPSHOT_API;
      const hadUrlMissingErr = ((__lastErrorMessage || '').indexOf('Supabase URL puudub') >= 0);
      __resolvedSupabaseUrl = String(ev.data.supabaseUrl || '').trim();
      __resolvedSupabaseAnonKey = String(ev.data.supabaseAnonKey || '').trim();
      __configArrivedAtMs = Date.now();
      __supabaseConfigReady = !!__resolvedSupabaseUrl;
      if(hadUrlMissingErr) __lastErrorMessage = '';
      __lastInfoMessage = 'Config ready';
      pushDebugEvent('CONFIG_READY', 'Received SUPABASE_CONFIG', {
        waitMs: (__configWaitStartedAtMs ? (__configArrivedAtMs - __configWaitStartedAtMs) : null),
        supabaseUrl: __resolvedSupabaseUrl || '',
        anonMasked: _maskKey(__resolvedSupabaseAnonKey),
      });
      __snapshotMeta.status = null;
      try { _resolveSnapshotApi(); } catch(e) {}
      if(hadNoApi || hadUrlMissingErr || !__snapshotMeta.generated_at){
        pushDebugEvent('SNAPSHOT_RETRY_REASON', 'Retry reason supabase_config', { hadNoApi: hadNoApi, hadUrlMissingErr: hadUrlMissingErr }, 'warn');
        _scheduleLoadSnapshotRetry('supabase_config');
      }
      _updateDebugPanel();
      return;
    }
    if(t === 'SUPABASE_CONFIG_ERROR'){
      __lastErrorMessage = String(ev.data.error || 'Supabase config invalid');
      __lastErrorObj = { name: 'SupabaseConfigError', message: __lastErrorMessage, stack: '', cause: null, abortReason: null };
      pushDebugEvent('CONFIG_ERROR', 'Received SUPABASE_CONFIG_ERROR', __lastErrorObj, 'error');
      _showSnapshotBanner(__lastErrorMessage, 'error');
      _updateDebugPanel();
      return;
    }
    if(ev.origin !== window.location.origin) return;
    if(t === 'MAP_REFRESH_VISIBLE') refreshVisible();
    if(t === 'MAP_REFRESH_SELECTED') refreshSelected();
    if(t === 'MAP_PING' && ev.source){
      ev.source.postMessage({ type: 'MAP_PONG' }, ev.origin);
    }
  }catch(e){ console.warn('[map] postMessage handler error', e); }
});

// === Spring migration dates ===
function _normSpringDDMM(s){
  s = (s||'').trim();
  if(!s) return null;
  let m = s.match(/^(\d{1,2})\.(\d{1,2})$/);
  if(m){
    const d = parseInt(m[1],10), mo = parseInt(m[2],10);
    if(mo>=1 && mo<=12 && d>=1 && d<=31) return d+'.'+String(mo).padStart(2,'0');
  }
  m = s.match(/^(\d{4})-(\d{2})-(\d{2})$/);
  if(m){
    const d = parseInt(m[3],10), mo = parseInt(m[2],10);
    if(mo>=1 && mo<=12 && d>=1 && d<=31) return d+'.'+String(mo).padStart(2,'0');
  }
  return null;
}
function _ddmmToDate(ddmm){
  const mm = (ddmm||'').match(/^(\d{1,2})\.(\d{2})$/);
  if(!mm) return null;
  return new Date(2025, parseInt(mm[2],10)-1, parseInt(mm[1],10), 12, 0, 0, 0);
}
function _dateToDdmm(dt){
  return dt.getDate()+'.'+String(dt.getMonth()+1).padStart(2,'0');
}
function editSpringDate(key){
  const prev = (springDates && springDates[key]) ? springDates[key] : '';
  const v = prompt('Kevadine saabumise kuupäev (D.MM või YYYY-MM-DD)\n\n'+key, prev || '');
  if(v === null) return;
  if(String(v).trim() === ''){
    delete springDates[key];
    save(); render();
    return;
  }
  const n = _normSpringDDMM(v);
  if(!n){
    notifySilent('Vigane kuupäeva formaat. Kasuta D.MM (nt 5.04) või YYYY-MM-DD.');
    return;
  }
  springDates[key] = n;
  save(); render();
}

function updateMarker(key) {
  const p = points[key];
  if (markers.has(key)) { map.removeLayer(markers.get(key)); markers.delete(key); }
  if (!p) return;

  // Determine visibility based on 7-day toggle
  const hasCoords = Number.isFinite(p.lat) && Number.isFinite(p.lon);
  const passesRecent = isRecent(p.t) || (Number.isFinite(p.occ7) && p.occ7 > 0);
  const passesFilter = is7daysOnly() ? passesRecent : true;
  const isVisible = (p.visible !== false) && passesFilter && hasCoords;

  if (isVisible) {
    __renderedMarkerCount++;
    const bcol = _borderColorByDate(p.t);
    const metaCfg = window.getSpeciesMetaShared ? window.getSpeciesMetaShared(key) : { rarityLevel: 'none' };
    const c7 = Number.isFinite(p.occ7) ? p.occ7 : null;
    const icon = avatarIcon(getDisplayAvatar(key), bcol, c7, metaCfg.rarityLevel || 'none');
    const when = p.t ? '<br><small>' + ((window.ET_STRINGS && window.ET_STRINGS.observationDate) || 'vaatluse kuup\u00e4ev') + ': ' + (window.formatDateEE ? window.formatDateEE(p.t) : p.t) + '</small>' : '';
    const src = p.src ? '<br><small>allikas: '+p.src+'</small>' : '';
    const m = L.marker([p.lat,p.lon], {icon}).addTo(map)
      .bindPopup('<b>'+key+'</b>'+when+(Number.isFinite(p.occ7)?'<br><small>' + ((window.ET_STRINGS && window.ET_STRINGS.days7) || '7 p\u00e4eva vaatlused') + ': '+p.occ7+'</small>':'')+src);
    markers.set(key, m);
  }
}

  const closeBtn = document.getElementById('closeSidebarBtn');
  const backdrop = document.getElementById('sidebarBackdrop');
  if(!sidebar || !backdrop) return;

  function invalidateSoon(){
    try{ setTimeout(()=>{ if(map && map.invalidateSize) map.invalidateSize(true); }, 260); }catch(e){}
  }
  function openSidebar(){
    sidebar.classList.add('open');
    backdrop.classList.add('show');
    document.body.classList.add('sidebar-open');
    invalidateSoon();
  }
  function closeSidebar(){
    sidebar.classList.remove('open');
    backdrop.classList.remove('show');
    document.body.classList.remove('sidebar-open');
    invalidateSoon();
  }

  initMapHamburgerControl({
    map,
    onClick: function(){
      if (sidebar.classList.contains('open')) closeSidebar();
      else openSidebar();
    },
    title: (window.ET_STRINGS && window.ET_STRINGS.listMenu) || 'Nimekiri',
    ariaLabel: (window.ET_STRINGS && window.ET_STRINGS.listMenu) || 'Nimekiri',
    iconText: '☰'
  });
  backdrop.addEventListener('click', closeSidebar);
  if (closeBtn) closeBtn.addEventListener('click', closeSidebar);

  try{
    if (window.matchMedia && window.matchMedia('(max-width: 900px)').matches) closeSidebar();
  }catch(e){}

  window.addEventListener('resize', invalidateSoon);
  window.addEventListener('orientationchange', invalidateSoon);
})();

try{

  }
}catch(e){}
document.addEventListener('DOMContentLoaded', function(){
  _requestSupabaseConfigFromParent();
});

<script>
(function(){
  (function placeWindButton(){
    const bar = document.getElementById('windToggleBar');
    const spring = document.getElementById('springPanel');
    const exportRow = document.getElementById('exportBtn')?.parentElement;
    try{
      if (exportRow && exportRow.parentElement){
        exportRow.parentElement.insertBefore(bar, exportRow.nextSibling);
        if(spring){ exportRow.parentElement.insertBefore(spring, bar.nextSibling); }
      } else {
        const sb = (document.getElementById('sidebar')||document.body);
        sb.prepend(bar);
        if(spring){ sb.insertBefore(spring, bar.nextSibling); }
      }
    }catch(e){}
  })();

  const panel = document.getElementById('windPanel');
  const iframe = document.getElementById('windyFrame');
  const btn = document.getElementById('toggleWind');
  const btnClose = document.getElementById('windClose');
  const bS = document.getElementById('windSmall');
  const bM = document.getElementById('windMedium');
  const bL = document.getElementById('windLarge');
  const isMob = window.matchMedia && window.matchMedia('(max-width: 900px)').matches;

  let __lastWindSync = 0;
  function windyUrl(lat, lon, zoom){
    const z = Math.max(3, Math.min(12, Math.round(zoom||6)));
    return 'https://embed.windy.com/embed2.html?lat='+lat.toFixed(3)+'&lon='+lon.toFixed(3)+'&detailLat='+lat.toFixed(3)+'&detailLon='+lon.toFixed(3)+'&zoom='+z+'&level=surface&overlay=wind&marker=true&pressure=true';
  }
  function refreshWind(){
    if(isMob){
      const now = Date.now();
      if(now - __lastWindSync < 1000) return;
      __lastWindSync = now;
    }
    try{
      const c = window.map && map.getCenter ? map.getCenter() : {lat:58.7, lng:25.3};
      const z = window.map && map.getZoom ? map.getZoom() : 6;
      const url = windyUrl(c.lat, c.lng, z);
      if (iframe.getAttribute('src') !== url) iframe.setAttribute('src', url);
    }catch(e){}
  }
  function openWind(){
    refreshWind();
    if(isMob){
      panel.classList.add('windy-modal-open');
      document.body.style.overflow = 'hidden';
    } else {
      panel.style.display = 'block';
    }
    try{
      if (!window.__wind_sync__ && window.map){
        map.on('moveend zoomend', refreshWind);
        window.__wind_sync__ = true;
      }
    }catch(e){}
  }
  function closeWind(){
    if(isMob){
      panel.classList.remove('windy-modal-open');
      document.body.style.overflow = '';
      iframe.setAttribute('src', 'about:blank');
    } else {
      panel.style.display = 'none';
    }
    try{ setTimeout(()=>{ if(map && map.invalidateSize) map.invalidateSize(true); }, 260); }catch(e){}
  }
  btn.addEventListener('click', ()=>{
    const isOpen = isMob ? panel.classList.contains('windy-modal-open') : (panel.style.display !== 'none' && panel.style.display);
    if (!isOpen) openWind(); else closeWind();
  });
  btnClose.addEventListener('click', closeWind);
  const btnCloseMob = document.getElementById('windCloseMobile');
  if(btnCloseMob) btnCloseMob.addEventListener('click', closeWind);
  if(!isMob){
    bS.addEventListener('click', ()=>{ panel.style.width='320px'; panel.style.height='240px'; refreshWind(); });
    bM.addEventListener('click', ()=>{ panel.style.width='420px'; panel.style.height='300px'; refreshWind(); });
    bL.addEventListener('click', ()=>{ panel.style.width='560px'; panel.style.height='420px'; refreshWind(); });
  }
})();
</script>


<!-- === Kevadrände paneel === -->
<script>
(function(){
  function springSortKey(v){
    try{
      if(!v) return 999999;
      const x = (typeof _normSpringDDMM === 'function') ? (_normSpringDDMM(String(v).trim()) || String(v).trim()) : String(v).trim();
      let m = x.match(/^(\d{1,2})\.(\d{1,2})$/);
      if(m) return (+m[2])*100 + (+m[1]);
      m = x.match(/^(\d{4})-(\d{2})-(\d{2})$/);
      if(m) return (+m[2])*100 + (+m[3]);
      return 999999;
    }catch(e){ return 999999; }
  }
  function getSpringDates(){ try{ return (typeof springDates !== 'undefined') ? springDates : {}; }catch(e){ return {}; } }
  function getSpeciesList(){ try{ return (typeof SPECIES !== 'undefined') ? SPECIES : Object.keys(getSpringDates()); }catch(e){ return []; } }

  function renderSpringPanel(){
    const body = document.getElementById('springTableBody');
    const countEl = document.getElementById('springCount');
    const q = (document.getElementById('springSearch')?.value || '').toLowerCase().trim();
    if(!body || !countEl) return;
    const sd = getSpringDates();
    const list = getSpeciesList();
    const rows = [];
    for(const name of list){
      const raw = (sd[name] !== undefined) ? String(sd[name]).trim() : '';
      if(!raw) continue;
      if(q && !String(name).toLowerCase().includes(q)) continue;
      const disp = (typeof _normSpringDDMM === 'function') ? (_normSpringDDMM(raw) || raw) : raw;
      rows.push({name, disp, key: springSortKey(disp)});
    }
    rows.sort((a,b)=> (a.key-b.key) || String(a.name).localeCompare(String(b.name)));
    body.innerHTML = rows.map(r => {
      const safeName = String(r.name).replace(/"/g,'&quot;');
      const yIso = springYearFirst[r.name];
      const yDisp = yIso ? isoToDdMm(yIso) : '—';
      const key = safeName;
      const springDateText = r.disp;
      const isEditing = (springEditRowKey === key);
      const currentVal = (springDates && springDates[key]) ? springDates[key] : '';
      const dateCellHtml = isEditing
        ? `
    <div class="spring-edit-wrap" style="display:flex; gap:6px; align-items:center;">
      <input class="spring-edit-input" data-key="${key}" value="${currentVal}" placeholder="DD.MM"
        inputmode="numeric"
        style="width:72px; padding:6px 8px; border:1px solid #ddd; border-radius:10px; font-size:14px;" />
      <button class="spring-edit-save" data-key="${key}"
        style="padding:6px 10px; border:0; border-radius:10px; background:#16a34a; color:#fff;">OK</button>
      <button class="spring-edit-cancel" data-key="${key}"
        style="padding:6px 10px; border:0; border-radius:10px; background:#eee; color:#111;">X</button>
    </div>
  `
        : `
    <button class="spring-date-btn" data-key="${key}"
      style="border:0; border-radius:999px; padding:6px 10px; background:#f3f4f6; color:#111;">
      ${springDateText}
    </button>
  `;
      return '<tr><td>'+dateCellHtml+'</td><td><span class="springSpeciesBtn" onclick="window.__springScrollToSpecies && window.__springScrollToSpecies(\''+safeName.replace(/'/g, "\\'")+'\')">'+ safeName+'</span></td><td>'+yDisp+'</td></tr>';
    }).join('');
    const root = document.getElementById('springPanel') || document; // use your actual panel root if different

    // Start editing
    root.querySelectorAll('.spring-date-btn').forEach(btn => {
      btn.onclick = (e) => {
        e.preventDefault();
        e.stopPropagation();
        springEditRowKey = btn.getAttribute('data-key');
        renderSpringPanel();
        // focus input (inline, should work on mobile)
        setTimeout(() => {
          const inp = root.querySelector(`.spring-edit-input[data-key="${springEditRowKey}"]`);
          if(inp){ try{ inp.focus(); inp.select(); }catch(e){} }
        }, 50);
      };
    });

    // Cancel editing
    root.querySelectorAll('.spring-edit-cancel').forEach(btn => {
      btn.onclick = (e) => {
        e.preventDefault();
        e.stopPropagation();
        springEditRowKey = null;
        renderSpringPanel();
      };
    });

    // Save editing
    root.querySelectorAll('.spring-edit-save').forEach(btn => {
      btn.onclick = (e) => {
        e.preventDefault();
        e.stopPropagation();

        const key = btn.getAttribute('data-key');
        const inp = root.querySelector(`.spring-edit-input[data-key="${key}"]`);
        if(!inp) return;

        const norm = normalizeSpringDate(inp.value);
        if(norm === null){
          // lightweight inline feedback
          inp.style.borderColor = '#b91c1c';
          return;
        }

        if(!norm){
          delete springDates[key];
        } else {
          springDates[key] = norm;
        }

        if(typeof save === 'function') save();
        springEditRowKey = null;
        renderSpringPanel();
      };
    });
    const keysShown = rows.map(r=>r.name);
    enqueueSpringYearFirst(keysShown);
    countEl.textContent = rows.length;
  }
  window.renderSpringPanel = renderSpringPanel;

  window.__springScrollToSpecies = function(name){
    try{
      const row = document.querySelector('.row[data-key="'+CSS.escape(name)+'"]');
      if(row){
        row.scrollIntoView({behavior:'smooth', block:'nearest'});
        row.style.outline = '2px solid #93c5fd';
        row.style.outlineOffset = '2px';
        setTimeout(()=>{ row.style.outline=''; row.style.outlineOffset=''; }, 1200);
      }
    }catch(e){}
  };

  function toggleSpring(open){
    const panel = document.getElementById('springPanel');
    if(!panel) return;
    const wantOpen = (open===true) ? true : (open===false ? false : (panel.style.display==='none' || !panel.style.display));
    if(wantOpen){ panel.style.display = 'block'; renderSpringPanel(); } else { panel.style.display = 'none'; }
  }

  function wire(){
    const btn = document.getElementById('toggleSpring');
    const close = document.getElementById('springClose');
    const search = document.getElementById('springSearch');
    if(btn && !btn.__springBound){ btn.addEventListener('click', ()=> toggleSpring()); btn.__springBound = true; }
    if(close && !close.__springBound){ close.addEventListener('click', ()=> toggleSpring(false)); close.__springBound = true; }
    if(search && !search.__springBound){ search.addEventListener('input', renderSpringPanel); search.__springBound = true; }
  }

  try{
    if (typeof window.render === 'function' && !window.__springpanel_render_patch__){
      const _r = window.render;
      window.render = function(){ const out = _r.apply(this, arguments); try{ wire(); renderSpringPanel(); }catch(e){} return out; };
      window.__springpanel_render_patch__ = true;
    }
  }catch(e){}
  if (document.readyState === 'loading') document.addEventListener('DOMContentLoaded', ()=>{ wire(); renderSpringPanel(); });
  else { wire(); renderSpringPanel(); }
})();
</script>

<!-- === 7d active species badge === -->
<script>
(function(){
  function computeActiveSpecies7d(){
    try{
      const pts = (typeof points !== 'undefined') ? points : {};
      const list = (typeof SPECIES !== 'undefined') ? SPECIES : [];
      const now = Date.now(), sevenMs = 7*24*60*60*1000;
      let n = 0;
      for (const name of list){
        const p = pts[name] || {};
        let active = false;
        const occ7 = (p.occ7 === 0 || p.occ7) ? Number(p.occ7) : NaN;
        if (Number.isFinite(occ7)) active = occ7 > 0;
        if (!active && p.t){
          try{ const ms = (typeof _toDay === 'function') ? _toDay(p.t) : null; if (ms && (now - ms) <= sevenMs) active = true; }catch(e){}
        }
        if (active) n++;
      }
      return n;
    }catch(e){ return 0; }
  }
  function updateActive7dBadge(){
    try{
      const el = document.getElementById('active7dBadge');
      if (el) el.textContent = '7p liigid: ' + computeActiveSpecies7d();
    }catch(e){}
  }
  try{
    if (typeof window.render === 'function' && !window.__active7d_render_patch__){
      const _r = window.render;
      window.render = function(){ const out = _r.apply(this, arguments); try{ updateActive7dBadge(); }catch(e){} return out; };
      window.__active7d_render_patch__ = true;
    }
  }catch(e){}
  try{
    if (typeof window.updateMarker === 'function' && !window.__active7d_upd_patch__){
      const _u = window.updateMarker;
      window.updateMarker = function(){ const out = _u.apply(this, arguments); try{ updateActive7dBadge(); }catch(e){} return out; };
      window.__active7d_upd_patch__ = true;
    }
  }catch(e){}
  if (document.readyState === 'loading') document.addEventListener('DOMContentLoaded', updateActive7dBadge);
  else updateActive7dBadge();
  setInterval(updateActive7dBadge, 60000);
})();
</script>

<!-- === postMessage API for parent app (Avatar Manager) === -->
<script>
var __sharedDefaults = {};
(function(){
  window.addEventListener('message', function(ev){
    try{
      if(!ev.data || typeof ev.data !== 'object') return;
      var type = ev.data.type;
      if(type === 'AVATARS_DEFAULTS' && ev.data.avatars){
        __sharedDefaults = ev.data.avatars || {};
        var localAvatars = JSON.parse(localStorage.getItem(LS_AVATARS) || '{}');
        var merged = Object.assign({}, __sharedDefaults, localAvatars);
        for(var k in merged){ if(merged.hasOwnProperty(k) && merged[k]) avatars[k] = merged[k]; }
        save();
        preloadAvatars(Object.values(avatars));
        SPECIES.forEach(function(name){ try{ updateMarker(name); }catch(e){} });
        render();
      }
      if(type === 'AVATARS_UPDATE' && ev.data.avatars){
        var incoming = ev.data.avatars;
        for(var k in incoming){ if(incoming.hasOwnProperty(k)){ if(incoming[k]) avatars[k] = incoming[k]; else delete avatars[k]; } }
        save();
        preloadAvatars(Object.values(avatars));
        SPECIES.forEach(function(name){ try{ updateMarker(name); }catch(e){} });
        render();
      }
      if(type === 'AVATARS_REQUEST'){
        var src = ev.source;
        if(src && typeof src.postMessage === 'function') src.postMessage({ type: 'AVATARS_CURRENT', avatars: avatars }, '*');
      }
      if(type === 'SPECIES_META_DEFAULTS' && ev.data.speciesMeta && typeof ev.data.speciesMeta === 'object'){
        var currentMeta = JSON.parse(localStorage.getItem('estbirding.speciesMeta.v1') || '{}');
        var incomingMeta = ev.data.speciesMeta || {};
        var mergedMeta = Object.assign({}, currentMeta, incomingMeta);
        localStorage.setItem('estbirding.speciesMeta.v1', JSON.stringify(mergedMeta));
        render();
      }
      if(type === 'SPECIES_META_REQUEST'){
        var src2 = ev.source;
        if(src2 && typeof src2.postMessage === 'function') src2.postMessage({ type: 'SPECIES_META_CURRENT', speciesMeta: JSON.parse(localStorage.getItem('estbirding.speciesMeta.v1') || '{}') }, '*');
      }
    }catch(e){ console.warn('postMessage handler error', e); }
  });
  try{
    if(window.parent && window.parent !== window){
      window.parent.postMessage({ type: 'AVATARS_REQUEST' }, '*');
      window.parent.postMessage({ type: 'SPECIES_META_REQUEST' }, '*');
    }
  }catch(e){}
})();
</script>
